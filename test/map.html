<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>통합 상권지도 · 케이프혼타워</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08090d; --s1:#0f1118; --s2:#151821; --s3:#1c2030;
  --border:#222636; --border2:#2a3050;
  --blue:#3b7fff; --blue-g:linear-gradient(135deg,#3b7fff,#6c48f5);
  --green:#22d186; --yellow:#f5bc30; --orange:#f07830;
  --red:#f03860; --purple:#9060f0;
  --t1:#eef0f8; --t2:#8890aa; --t3:#4a5270; --t4:#2a3050;
  --mono:'DM Mono',monospace; --sans:'Noto Sans KR',sans-serif;
  --display:'Bebas Neue',sans-serif;
  --r:10px; --r2:6px;
  --panel-w:400px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--sans)}

/* ── 지도 풀스크린 ── */
#map{position:fixed;inset:0;z-index:0;width:100%;height:100%}

/* ── 헤더 ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:800;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:rgba(8,9,13,.88);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(59,127,255,.15);
}
.brand{display:flex;align-items:baseline;gap:10px}
.brand-name{font-family:var(--display);font-size:22px;letter-spacing:2px;
  background:var(--blue-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-sub{font-size:10px;color:var(--t3);letter-spacing:3px;text-transform:uppercase}
.topbar-r{display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:blink 2.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn-nav{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.06);border:1px solid var(--border2);
  color:var(--t2);padding:5px 12px;border-radius:var(--r2);
  font-size:11px;cursor:pointer;transition:.18s;text-decoration:none
}
.btn-nav:hover{background:rgba(59,127,255,.15);color:var(--t1);border-color:var(--blue)}

/* ── 우측 패널 ── */
.panel{
  position:fixed;top:62px;right:14px;bottom:14px;z-index:700;
  width:var(--panel-w);display:flex;flex-direction:column;
  border-radius:14px;border:1px solid rgba(59,127,255,.18);
  background:rgba(10,11,16,.92);backdrop-filter:blur(20px);
  box-shadow:0 8px 40px rgba(0,0,0,.65);overflow:hidden;
}

/* 패널 헤더 */
.panel-head{
  padding:14px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
  background:linear-gradient(135deg,rgba(59,127,255,.06),rgba(108,72,245,.04));
}
.panel-title{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:2px}
.panel-sub{font-size:11px;color:var(--t3)}

/* ── 레이어 토글 ── */
.layer-wrap{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.layer-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:8px}
.layer-row{display:flex;gap:6px}
.layer-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 8px;border-radius:8px;cursor:pointer;transition:.18s;
  border:1.5px solid var(--border2);background:var(--s2);
  font-size:11px;font-weight:600;color:var(--t3);
}
.layer-btn:hover{border-color:var(--border2);background:var(--s3)}
.layer-btn.on{border-color:var(--blue);background:rgba(59,127,255,.12);color:var(--t1)}
.layer-btn .l-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── 주소 검색 ── */
.search-wrap{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:7px}
.search-row{display:flex;gap:6px;margin-bottom:8px}
.search-input{
  flex:1;background:var(--s2);border:1px solid var(--border2);
  border-radius:var(--r2);padding:9px 13px;
  color:var(--t1);font-family:var(--sans);font-size:12px;outline:none;transition:.18s
}
.search-input:focus{border-color:var(--blue);background:var(--s3)}
.search-input::placeholder{color:var(--t3)}
.btn-search{
  background:rgba(59,127,255,.18);border:1px solid rgba(59,127,255,.3);
  color:var(--blue);border-radius:var(--r2);
  padding:9px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:.18s;white-space:nowrap
}
.btn-search:hover{background:rgba(59,127,255,.3)}
.radius-row{display:flex;gap:5px}
.r-chip{
  flex:1;text-align:center;padding:7px 0;border-radius:20px;
  font-size:11px;font-weight:700;border:1px solid var(--border2);
  background:var(--s2);color:var(--t2);cursor:pointer;transition:.15s
}
.r-chip.on{background:rgba(59,127,255,.18);border-color:var(--blue);color:var(--blue)}

/* ── 실시간 상권 카테고리 ── */
.cat-section{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.cat-section.hidden{display:none}
.cat-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;
  margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.cat-reset{font-size:10px;color:var(--blue);cursor:pointer;font-weight:600}
.cat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.cat-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:10px 6px;border-radius:10px;cursor:pointer;transition:.18s;
  border:1.5px solid var(--border2);background:var(--s2);position:relative;
}
.cat-item:hover{background:var(--s3)}
.cat-item.on{background:rgba(59,127,255,.1);border-color:var(--blue)}
.cat-check{
  position:absolute;top:5px;right:6px;width:13px;height:13px;border-radius:50%;
  border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:.15s
}
.cat-item.on .cat-check{background:var(--blue);border-color:var(--blue)}
.cat-check::after{content:'';display:block;width:4px;height:3px;
  border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;
  transform:rotate(-45deg) translate(1px,-1px);opacity:0;transition:.15s}
.cat-item.on .cat-check::after{opacity:1}
.cat-emoji{font-size:18px;line-height:1}
.cat-name{font-size:10px;color:var(--t3);font-weight:600;text-align:center}
.cat-item.on .cat-name{color:var(--t1)}
.cat-cnt{font-family:var(--mono);font-size:9px;color:var(--green);font-weight:700;
  background:rgba(34,209,134,.1);border-radius:8px;padding:1px 5px}
.cat-cnt:empty{display:none}

/* ── 검색 버튼 ── */
.run-wrap{padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.run-wrap.hidden{display:none}
.btn-run{
  width:100%;padding:12px;border:none;border-radius:var(--r);
  background:var(--blue-g);color:#fff;font-family:var(--sans);
  font-size:13px;font-weight:700;cursor:pointer;transition:.18s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-run:hover{filter:brightness(1.1)}
.btn-run:disabled{opacity:.5;cursor:not-allowed}

/* ── 결과 목록 ── */
.result-wrap{flex:1;overflow-y:auto;min-height:0}
.result-wrap::-webkit-scrollbar{width:3px}
.result-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.result-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:10px;color:var(--t3);font-size:12px;text-align:center;padding:24px
}
.result-empty .e-ico{font-size:32px;opacity:.35}

/* 임대건물 목록 */
.bld-item{
  padding:11px 16px;border-bottom:1px solid rgba(34,38,54,.45);
  cursor:pointer;transition:.12s
}
.bld-item:hover{background:rgba(59,127,255,.06)}
.bld-item.ours{background:rgba(59,127,255,.06);border-left:3px solid var(--blue)}
.bld-name{font-size:12.5px;font-weight:700;color:var(--t1);margin-bottom:2px}
.bld-meta{font-size:10.5px;color:var(--t3)}
.bld-dist{font-family:var(--mono);font-size:10px;color:var(--blue)}

/* 실시간 시설 목록 */
.poi-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;border-bottom:1px solid rgba(34,38,54,.45);
  cursor:pointer;transition:.12s
}
.poi-item:hover{background:rgba(59,127,255,.05)}
.poi-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.poi-info{flex:1;min-width:0}
.poi-name{font-size:12px;font-weight:600;color:var(--t1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.poi-cat{font-size:10px;color:var(--t3);margin-top:1px}
.poi-dist{font-family:var(--mono);font-size:11px;color:var(--t2);flex-shrink:0}

/* 결과 헤더 */
.result-header{
  padding:9px 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:rgba(10,11,16,.97);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.result-count{font-family:var(--mono);font-size:11px;color:var(--t2)}
.result-count span{color:var(--green);font-weight:700}
.btn-csv{
  font-size:10px;padding:3px 10px;border-radius:20px;
  border:1px solid var(--border2);background:transparent;
  color:var(--t3);cursor:pointer;transition:.15s
}
.btn-csv:hover{border-color:var(--green);color:var(--green)}

/* ── 범례 ── */
.legend-box{
  position:fixed;bottom:20px;left:16px;z-index:700;
  background:rgba(10,11,16,.9);backdrop-filter:blur(14px);
  border:1px solid rgba(59,127,255,.15);border-radius:10px;
  padding:10px 13px;box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.legend-box.hidden{display:none}
.leg-title{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;font-weight:700}
.leg-item{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.leg-item:last-child{margin-bottom:0}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-name{font-size:11px;color:var(--t2)}
.leg-cnt{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--green);padding-left:8px;font-weight:700}

/* ── 버전 배지 ── */
.ver-badge{
  position:fixed;bottom:16px;right:16px;z-index:750;
  font-family:var(--mono);font-size:11px;font-weight:700;color:var(--t3);
  letter-spacing:1px;background:rgba(10,11,16,.85);
  border:1px solid var(--border2);border-radius:6px;padding:3px 9px;
}

/* ── 임대건물 팝업 오버레이 ── */
.bld-popup{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:900;
  width:420px;max-height:70vh;
  background:var(--s1);border:1px solid rgba(59,127,255,.25);border-radius:14px;
  box-shadow:0 16px 48px rgba(0,0,0,.7);overflow:hidden;display:flex;flex-direction:column;
}
.bld-popup.hidden{display:none}
.bld-popup-head{
  padding:16px 18px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;
}
.bld-popup-name{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:3px}
.bld-popup-addr{font-size:11px;color:var(--t3)}
.btn-close{background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
.btn-close:hover{color:var(--t1)}
.bld-popup-body{overflow-y:auto;padding:14px 18px;flex:1}
.bld-popup-body::-webkit-scrollbar{width:3px}
.bld-popup-body::-webkit-scrollbar-thumb{background:var(--border2)}
.floor-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;border-bottom:1px solid rgba(34,38,54,.4);font-size:12px
}
.floor-item:last-child{border-bottom:none}
.floor-num{font-family:var(--mono);font-size:11px;color:var(--blue);
  width:28px;flex-shrink:0;font-weight:700}
.floor-tenant{flex:1;color:var(--t1);font-weight:600}
.floor-industry{font-size:10px;color:var(--t3)}
.floor-rent{font-family:var(--mono);font-size:11px;color:var(--green);flex-shrink:0}
.popup-overlay{
  position:fixed;inset:0;z-index:890;background:rgba(0,0,0,.5);
}
.popup-overlay.hidden{display:none}

@media(max-width:640px){
  :root{--panel-w:calc(100vw - 20px)}
  .panel{right:10px;left:10px;top:58px;bottom:0;border-radius:14px 14px 0 0;width:auto;max-height:55vh}
  .bld-popup{width:calc(100vw - 32px)}
}


/* ══════════════════════════════════════════════
   임대상권 전용 하단 탭/필터 (마켓앱 이식)
══════════════════════════════════════════════ */
.lease-filter-bar{display:flex;align-items:center;gap:4px;overflow-x:auto;overflow-y:hidden;height:38px;min-height:38px;padding:0 8px;background:#09090f;border-bottom:1px solid rgba(255,255,255,.07);scrollbar-width:none;flex-shrink:0}
.lease-filter-bar::-webkit-scrollbar{display:none}
.lease-chip{flex-shrink:0;display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border-radius:18px;border:1px solid var(--border2);background:var(--s2);color:var(--t2);font-size:11px;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap}
.lease-chip:hover{border-color:var(--blue);color:var(--t1)}
.lease-chip.active{background:rgba(59,127,255,.18);border-color:var(--blue);color:#fff}
.lease-chip .cnt{font-family:var(--mono);font-size:10px;color:var(--green);background:rgba(34,209,134,.1);padding:1px 5px;border-radius:10px}
.lease-tabs{display:grid;grid-template-columns:repeat(4,1fr);height:48px;min-height:48px;background:#090a10;border-bottom:1px solid var(--border);flex-shrink:0}
.lease-tab{display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--t3);border-right:1px solid rgba(255,255,255,.04);cursor:pointer;position:relative;transition:.15s}
.lease-tab:last-child{border-right:none}.lease-tab:hover{color:var(--t2)}.lease-tab.active{color:var(--t1);background:rgba(255,255,255,.025)}.lease-tab.active:after{content:'';position:absolute;left:0;right:0;bottom:0;height:3px;background:var(--blue)}
.lease-pane{display:none}.lease-pane.active{display:block}.lease-pad{padding:14px 16px}.lease-section-title{font-size:12px;font-weight:800;color:var(--t2);margin:0 0 12px;display:flex;align-items:center;gap:7px}.lease-section-title:before{content:'';width:4px;height:16px;border-radius:3px;background:var(--blue)}
.dong-group{border-bottom:1px solid rgba(255,255,255,.07)}.dong-head{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;background:#111320;border-left:4px solid var(--blue)}.dong-badge{padding:5px 12px;border:1px solid rgba(100,120,255,.55);border-radius:7px;color:var(--t1);font-size:12px;font-weight:800;background:rgba(59,127,255,.08)}.dong-meta{color:#7f89b5;font-size:12px;font-weight:700}.dong-arrow{margin-left:auto;color:#748ffc}.dong-body{display:none}.dong-group.open .dong-body{display:block}.dong-group.open .dong-arrow{transform:rotate(180deg)}
.lease-bld-card{padding:13px 18px;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;transition:.12s;background:#0e101a}.lease-bld-card:hover{background:#151827}.lease-bld-card.ours{background:rgba(245,158,11,.08);border-left:4px solid #f59e0b}.lease-bld-top{display:flex;align-items:center;gap:8px}.lease-bld-name{font-size:13px;font-weight:900;color:var(--t1)}.lease-bld-price{margin-left:auto;color:#7090ff;font-family:var(--mono);font-size:11px}.lease-bld-meta{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}.lease-tag{font-size:10px;color:var(--t3);background:#151827;border:1px solid var(--border);border-radius:5px;padding:3px 7px}.lease-floor-line{display:flex;align-items:center;gap:9px;margin-top:8px;font-size:11.5px;color:var(--t2)}.lease-floor-line .fl{width:34px;color:var(--t3);font-family:var(--mono)}.lease-floor-line .tt{font-weight:700;color:var(--t1);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.lease-type-pill{font-size:10px;font-weight:700;color:#fff;border-radius:5px;padding:2px 6px}.lease-rent{font-family:var(--mono);font-size:11px;color:var(--green)}
.type-row{display:grid;grid-template-columns:120px 1fr 76px;align-items:center;gap:10px;margin:10px 0;cursor:pointer}.type-label{font-size:12px;font-weight:800;color:var(--t2);text-align:right}.type-bar-bg{height:34px;border-radius:9px;background:#151821;overflow:hidden}.type-bar{height:100%;display:flex;align-items:center;padding:0 12px;color:white;font-family:var(--mono);font-size:15px;font-weight:900;min-width:42px;border-radius:9px}.type-buildings{text-align:right;font-size:11px;color:var(--t3);font-weight:700}.insight-box{margin-top:18px;border:1px solid rgba(245,188,48,.25);border-radius:12px;padding:14px 16px;background:rgba(245,188,48,.05);font-size:12px;line-height:1.8;color:var(--t2)}.insight-box b{color:var(--yellow)}
.ana-panel{padding:14px 16px;border-bottom:1px solid var(--border);background:#0b0c13}.ana-label{font-size:11px;color:var(--t3);font-weight:800;margin:12px 0 7px}.ana-chips{display:flex;flex-wrap:wrap;gap:6px}.ana-chip{padding:5px 10px;border:1px solid var(--border2);border-radius:20px;font-size:11px;color:var(--t2);cursor:pointer}.ana-chip.active{background:rgba(59,127,255,.16);border-color:var(--blue);color:var(--blue);font-weight:800}.ana-row{display:grid;grid-template-columns:42px 1fr 42px;align-items:center;gap:7px;margin:7px 0;color:var(--blue);font-size:11px;font-weight:800}.ana-row input{width:100%}.ana-reset{width:100%;margin-top:14px;padding:10px;border:1px solid var(--border);border-radius:8px;background:#151821;color:var(--t3);cursor:pointer}.ana-summary{margin:14px 16px;padding:12px;border:1px solid var(--border2);border-radius:8px;background:#101320;color:var(--t2);font-size:12px;line-height:1.6}.ana-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 16px}.ana-kpi{border:1px solid var(--border);border-radius:8px;background:#101320;padding:10px;text-align:center}.ana-kpi strong{display:block;font-family:var(--mono);font-size:20px;color:var(--blue)}.ana-kpi span{font-size:10px;color:var(--t3)}
.legend-grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.legend-card{display:flex;align-items:center;gap:8px;padding:9px;border:1px solid var(--border);border-radius:8px;background:#111320}.legend-dot2{width:10px;height:10px;border-radius:50%}.legend-card span{font-size:11px;color:var(--t2)}


/* ══════════════════════════════════════════════
   v4 레이아웃: 상단 모드/업종 필터 + 우측 기능 패널
══════════════════════════════════════════════ */
.mode-switch{display:flex;align-items:center;gap:6px;margin-right:4px}
.mode-btn{display:flex;align-items:center;gap:6px;height:30px;padding:0 13px;border-radius:8px;border:1px solid var(--border2);background:rgba(255,255,255,.04);color:var(--t3);font-size:11px;font-weight:800;cursor:pointer;transition:.16s;white-space:nowrap}
.mode-btn:hover{color:var(--t1);border-color:rgba(59,127,255,.45);background:rgba(59,127,255,.08)}
.mode-btn.on{color:var(--t1);border-color:var(--blue);background:rgba(59,127,255,.18);box-shadow:inset 0 -2px 0 var(--blue)}
.top-lease-filter{position:fixed;top:52px;left:0;right:var(--panel-w);z-index:760;height:38px;display:flex;align-items:center;gap:4px;overflow-x:auto;overflow-y:hidden;padding:0 8px;background:rgba(8,9,13,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(59,127,255,.14);scrollbar-width:none}
.top-lease-filter::-webkit-scrollbar{display:none}.top-lease-filter.hidden{display:none}

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const OUR_LAT = 37.5232, OUR_LNG = 127.0212;
const MAP_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSqODQv0J98AN_VrhIpdXr8pUYfcgEH_2Fvxfgq_g0z3sCR49t0heYBC0k4Za3hxQiAr9bwVNRtWGxe/pub?gid=1985638477&single=true&output=csv';

const OUR_BUILDING = {
  id:'ours', isOurs:true,
  name:'케이프혼타워 (신축예정)', short:'우리건물',
  address:'서울 강남구 압구정로 112', lat:OUR_LAT, lng:OUR_LNG,
  dong:'신사동', distance:'core', tenants:[], floors:[]
};

const TYPES = {
  'F&B/음식점':'#ef4444','병원/의료':'#06b6d4','뷰티/미용':'#ec4899','사무실/기업':'#3b82f6',
  '학원/교육':'#f59e0b','패션/잡화':'#8b5cf6','스포츠/레저':'#10b981','약국':'#f97316',
  '편의점':'#6b7280','공유오피스':'#0ea5e9','스튜디오/공간':'#a855f7','카페':'#92400e',
  '주점/노래방':'#be185d','의료기기':'#0891b2','근린생활':'#64748b','주거':'#78716c',
  '갤러리':'#7c3aed','법무법인':'#1d4ed8','제약사':'#059669','헬스케어':'#0d9488','기타':'#64748b'
};

const CATEGORIES = [
  { id:'SW8', name:'지하철역',  emoji:'🚇', color:'#3b7fff' },
  { id:'HP8', name:'병원',      emoji:'🏥', color:'#f03860' },
  { id:'PM9', name:'약국',      emoji:'💊', color:'#ff6b9d' },
  { id:'BK9', name:'은행',      emoji:'🏦', color:'#f5bc30' },
  { id:'MT1', name:'대형마트',  emoji:'🛒', color:'#22d186' },
  { id:'CS2', name:'편의점',    emoji:'🏪', color:'#00d4ff' },
  { id:'CE7', name:'카페',      emoji:'☕', color:'#9060f0' },
  { id:'PS3', name:'어린이집',  emoji:'🧒', color:'#ffa94d' },
  { id:'PK6', name:'주차장',    emoji:'🅿️', color:'#748ffc' },
  { id:'AG2', name:'부동산',    emoji:'🏠', color:'#63e6be' },
  { id:'OL7', name:'주유소',    emoji:'⛽', color:'#f07830' },
  { id:'AC5', name:'숙박',      emoji:'🏨', color:'#c084fc' },
];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let map, ps, infowindow;
let currentLat = OUR_LAT, currentLng = OUR_LNG;
let currentRadius = 1000;
let activeCats = new Set(CATEGORIES.map(c => c.id));
let layerBld = true, layerPoi = false;

// 마커 그룹
let bldMarkers = [];      // 임대 건물 마커
let poiMarkers = [];      // 실시간 POI 마커
let circleObj = null;
let centerMarker = null;

// 데이터
let buildings = [OUR_BUILDING]; // 시트에서 불러온 건물 목록
let allPoi = [];          // POI 검색 결과

// ══════════════════════════════════════════════
// 카카오맵 초기화
// ══════════════════════════════════════════════
window.initKakaoMap = function() {
  kakao.maps.load(() => {
    const container = document.getElementById('map');
    map = new kakao.maps.Map(container, {
      center: new kakao.maps.LatLng(OUR_LAT, OUR_LNG),
      level: 5
    });
    map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.BOTTOMLEFT);
    ps = new kakao.maps.services.Places();
    infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

    // 기준점 마커
    placeCenterPin(OUR_LAT, OUR_LNG);
    drawCircle(OUR_LAT, OUR_LNG, currentRadius);

    // UI 초기화
    buildCatGrid();
    document.getElementById('addrInput').value = '압구정로 112';
    document.getElementById('addrInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') geocodeAddress();
    });

    // 임대 건물 데이터 로드
    loadBuildingData();
  });
};

// ══════════════════════════════════════════════
// 기준점 핀
// ══════════════════════════════════════════════
function placeCenterPin(lat, lng) {
  if (centerMarker) centerMarker.setMap(null);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="34" viewBox="0 0 24 34">
    <path d="M12 0C5.373 0 0 5.373 0 12c0 9 12 22 12 22S24 21 24 12C24 5.373 18.627 0 12 0z"
      fill="#3b7fff" stroke="white" stroke-width="2"/>
    <text x="12" y="16" text-anchor="middle" font-size="10" fill="white">⭐</text>
  </svg>`;
  const img = new kakao.maps.MarkerImage(
    'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg))),
    new kakao.maps.Size(24, 34),
    { offset: new kakao.maps.Point(12, 34) }
  );
  centerMarker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(lat, lng), image: img, map, zIndex: 9999 });
  const iw = new kakao.maps.InfoWindow({
    content: `<div style="padding:8px 12px;font-size:12px;font-weight:700;color:#222;white-space:nowrap">⭐ 케이프혼타워</div>`,
    removable: true
  });
  kakao.maps.event.addListener(centerMarker, 'click', () => iw.open(map, centerMarker));
}

// ══════════════════════════════════════════════
// 반경 원
// ══════════════════════════════════════════════
function drawCircle(lat, lng, r) {
  if (circleObj) circleObj.setMap(null);
  circleObj = new kakao.maps.Circle({
    center: new kakao.maps.LatLng(lat, lng), radius: r,
    strokeWeight: 1.5, strokeColor: '#3b7fff', strokeOpacity: 0.5,
    strokeStyle: 'shortdash', fillColor: '#3b7fff', fillOpacity: 0.03
  });
  circleObj.setMap(map);
}

function setRadius(r) {
  currentRadius = r;
  document.querySelectorAll('.r-chip').forEach(el => el.classList.toggle('on', el.dataset.r == r));
  drawCircle(currentLat, currentLng, r);
  // 반경 변경 시 임대 건물 목록도 갱신
  if (buildings.length > 0 && layerBld) renderBldList();
}

// ══════════════════════════════════════════════
// 임대 건물 데이터 로드
// ══════════════════════════════════════════════
async function loadBuildingData() {
  try {
    const res = await fetch(MAP_SHEET_URL);
    const text = await res.text();
    buildings = parseBuildingCSV(text);
    if (layerBld) drawBldMarkers();
    renderBldList();
  } catch(e) {
    console.error('건물 데이터 로드 실패:', e);
  }
}

function parseBuildingCSV(text) {
  return rowsToBuildings(parseMapCSV(text));
}

function parseMapCSV(text){
  text = String(text || '').replace(/^\uFEFF/, '');
  const lines = text.trim().split(/\r?\n/).filter(Boolean);
  if (!lines.length) return [];
  const headers = splitCsvLine(lines[0]).map(h => cleanCsvValue(h));
  return lines.slice(1).map(line => {
    const vals = splitCsvLine(line);
    const obj = {};
    headers.forEach((h,i)=>{ obj[h] = cleanCsvValue(vals[i] || ''); });
    return obj;
  }).filter(r => (r['건물명'] || '').trim());
}

function splitCsvLine(line) {
  const vals = []; let cur = '', inQ = false;
  for (let i=0; i<line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) { vals.push(cur); cur = ''; }
    else cur += ch;
  }
  vals.push(cur);
  return vals;
}

function cleanCsvValue(v) {
  return String(v || '').replace(/^\uFEFF/, '').replace(/^['"\s]+|['"\s]+$/g, '').trim();
}

function getFirst(row, names) {
  for (const n of names) if (row[n] != null && String(row[n]).trim() !== '') return String(row[n]).trim();
  return '';
}

function toNumber(v) {
  const n = parseFloat(String(v || '').replace(/,/g, '').replace(/[^0-9.\-]/g, ''));
  return Number.isFinite(n) ? n : 0;
}

function normalizeType(raw) {
  if (!raw) return '기타';
  const t = String(raw).trim();
  const map = {
    '음식점':'F&B/음식점','고기요리':'F&B/음식점','양갈비':'F&B/음식점','이탈리아음식':'F&B/음식점','브런치전문점':'F&B/음식점','소주방':'F&B/음식점',
    '주류회사':'주점/노래방','주점':'주점/노래방','노래방':'주점/노래방','카페':'카페',
    '병원':'병원/의료','치과':'병원/의료','한의원':'병원/의료','피부과':'병원/의료','성형외과':'병원/의료','한방병원':'병원/의료','신경외과':'병원/의료','산부인과':'병원/의료','비뇨기과':'병원/의료','통증의학과':'병원/의료','가정의학과':'병원/의료','이비인후과':'병원/의료',
    '요가원':'스포츠/레저','골프연습장':'스포츠/레저','필라테스':'스포츠/레저','스포츠':'스포츠/레저','댄스학원':'스포츠/레저',
    '미용실':'뷰티/미용','네일아트':'뷰티/미용','뷰티업체':'뷰티/미용','뷰티':'뷰티/미용','피부관리':'뷰티/미용','에스테틱':'뷰티/미용','가발':'뷰티/미용','미용교육':'학원/교육',
    '사무실':'사무실/기업','경영컨설팅':'사무실/기업','인테리어디자인':'사무실/기업','광고회사':'사무실/기업','영상편집':'사무실/기업','사무소':'사무실/기업','업무시설':'사무실/기업',
    '학원':'학원/교육','패션':'패션/잡화','패션잡화':'패션/잡화','의류':'패션/잡화','약국':'약국','편의점':'편의점','공유오피스':'공유오피스',
    '스튜디오':'스튜디오/공간','사진관':'스튜디오/공간','창고':'스튜디오/공간','의료기기':'의료기기','법무법인':'법무법인','제약':'제약사','헬스케어':'헬스케어','갤러리':'갤러리','주거':'주거','근린':'근린생활',
    '통신':'기타','당구장':'기타','안경':'기타','은행':'기타','공실':'기타'
  };
  if (map[t]) return map[t];
  for (const [key, val] of Object.entries(map)) if (t.includes(key)) return val;
  return '기타';
}

function rowsToBuildings(rows){
  const bmap = {};
  rows.forEach(row => {
    const key = getFirst(row, ['건물명','빌딩명','상호']);
    if (!key) return;
    if (!bmap[key]) {
      const lat = toNumber(getFirst(row, ['위도','lat','LAT','Latitude']));
      const lng = toNumber(getFirst(row, ['경도','lng','LNG','lon','Longitude']));
      if (!lat || !lng) return;
      const dist = calcDist(OUR_LAT, OUR_LNG, lat, lng);
      bmap[key] = {
        id: key.replace(/[^\w가-힣]/g,'_'), isOurs:false,
        name:key, short:key.length>8 ? key.slice(0,8) : key,
        address:getFirst(row, ['주소','도로명주소','지번주소']), lat, lng,
        dong:getFirst(row, ['동','행정동','법정동']) || guessDong(getFirst(row, ['주소','도로명주소','지번주소'])),
        distance: dist < 300 ? 'core' : dist < 700 ? 'mid' : 'far',
        source:getFirst(row, ['파일명','출처']), fileId:getFirst(row, ['파일ID']),
        price:getPrice(row), priceNum:toNumber(getFirst(row, ['매매가 (억)','매매가(억)','매매가'])),
        builtYear:parseInt(getFirst(row, ['준공년도','준공연도','사용승인일'])) || 0,
        elevator:getFirst(row, ['승강기','엘리베이터']), parking:getFirst(row, ['주차대수','주차']),
        tenants:[], floors:[]
      };
    }
    const rawType = getFirst(row, ['업종','업태','분류']);
    const tenant = {
      floor:getFirst(row, ['층','해당층','층수']),
      name:getFirst(row, ['임차인','상호','입점업체']) || '공실',
      type:normalizeType(rawType), rawType:rawType,
      areaM2:toNumber(getFirst(row, ['면적(㎡)','전용면적(㎡)','계약면적(㎡)'])),
      areaPy:toNumber(getFirst(row, ['면적(평)','전용면적(평)','계약면적(평)'])),
      deposit:Math.round(toNumber(getFirst(row, ['보증금(만원)','보증금']))),
      rent:Math.round(toNumber(getFirst(row, ['임대료(만원)','월세(만원)','임대료']))),
      mgmt:Math.round(toNumber(getFirst(row, ['관리비(만원)','관리비']))),
    };
    if (tenant.floor || tenant.name !== '공실' || rawType || tenant.rent || tenant.deposit) {
      bmap[key].tenants.push(tenant);
      bmap[key].floors.push({
        floor:tenant.floor, tenant:tenant.name, industry:tenant.rawType || tenant.type,
        rent:tenant.rent, deposit:tenant.deposit, area:tenant.areaPy
      });
    }
  });
  return [OUR_BUILDING].concat(Object.values(bmap).sort((a,b)=>calcDist(OUR_LAT,OUR_LNG,a.lat,a.lng)-calcDist(OUR_LAT,OUR_LNG,b.lat,b.lng)));
}

function getPrice(row) {
  const v = getFirst(row, ['매매가 (억)','매매가(억)','매매가']);
  if (!v || v === '0') return '';
  return v.includes('억') ? v : v + '억';
}

function guessDong(address) {
  const m = String(address || '').match(/([가-힣]+동)/);
  return m ? m[1] : '기타';
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
}

// ══════════════════════════════════════════════
// 임대 건물 마커
// ══════════════════════════════════════════════
function getBldColor(bld) {
  if (bld.isOurs) return '#f59e0b';
  const mainType = (bld.tenants || [])[0]?.type || '기타';
  return TYPES[mainType] || '#3b7fff';
}

function drawBldMarkers() {
  clearBldMarkers();
  buildings.forEach(bld => {
    if (!bld.lat || !bld.lng) return;
    const pos = new kakao.maps.LatLng(bld.lat, bld.lng);
    const color = getBldColor(bld);
    const size = bld.isOurs ? 24 : 18;
    const height = bld.isOurs ? 34 : 26;
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${height}" viewBox="0 0 18 26">
      <path d="M9 0C4.029 0 0 4.029 0 9c0 6.75 9 17 9 17S18 15.75 18 9C18 4.029 13.971 0 9 0z"
        fill="${color}" stroke="white" stroke-width="1.6"/>
      <circle cx="9" cy="9" r="3.5" fill="white" opacity="0.9"/>
    </svg>`;
    const img = new kakao.maps.MarkerImage(
      'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg))),
      new kakao.maps.Size(size, height),
      { offset: new kakao.maps.Point(size/2, height) }
    );
    const m = new kakao.maps.Marker({ position: pos, image: img, map, zIndex: bld.isOurs ? 20 : 5, title: bld.name });
    kakao.maps.event.addListener(m, 'click', () => openBldPopup(bld));
    bldMarkers.push(m);
  });
}

function clearBldMarkers() {
  bldMarkers.forEach(m => m.setMap(null));
  bldMarkers = [];
}

// ══════════════════════════════════════════════
// 임대 건물 팝업
// ══════════════════════════════════════════════
function openBldPopupById(id) {
  const bld = buildings.find(b => b.id === id);
  if (bld) openBldPopup(bld);
}

function openBldPopup(bld) {
  document.getElementById('popupName').textContent = bld.name;
  document.getElementById('popupAddr').textContent = [bld.address, bld.price ? '매매가 ' + bld.price : ''].filter(Boolean).join(' · ');

  const body = document.getElementById('popupBody');
  const floors = (bld.floors || []).slice().sort((a,b)=>toNumber(String(b.floor).replace('B','-'))-toNumber(String(a.floor).replace('B','-')));
  if (!floors.length) {
    body.innerHTML = `<div style="color:var(--t3);font-size:12px;padding:12px 0">${bld.isOurs ? '기준 건물입니다.' : '층별 임차인 데이터 없음'}</div>`;
  } else {
    body.innerHTML = floors.map(f => `
      <div class="floor-item">
        <div class="floor-num">${escapeHtml(formatFloor(f.floor))}</div>
        <div class="floor-info" style="flex:1;min-width:0">
          <div class="floor-tenant">${escapeHtml(f.tenant || '공실')}</div>
          <div class="floor-industry">${escapeHtml(f.industry || '')}${f.area ? ' · '+escapeHtml(f.area)+'평' : ''}</div>
        </div>
        <div class="floor-rent">${f.rent ? Number(f.rent).toLocaleString()+'만' : '-'}</div>
      </div>`).join('');
  }

  document.getElementById('popupOverlay').classList.remove('hidden');
  document.getElementById('bldPopup').classList.remove('hidden');
  flyTo(bld.lat, bld.lng);
}

function formatFloor(f) {
  const s = String(f || '').trim();
  if (!s) return '-';
  if (/^B/i.test(s) || s.startsWith('지')) return s;
  return s.includes('층') ? s : s + 'F';
}

function closeBldPopup() {
  document.getElementById('popupOverlay').classList.add('hidden');
  document.getElementById('bldPopup').classList.add('hidden');
}

// ══════════════════════════════════════════════
// 임대 건물 목록 렌더
// ══════════════════════════════════════════════
function renderBldList() {
  const filtered = buildings.filter(b => {
    if (b.isOurs) return true;
    const d = calcDist(currentLat, currentLng, b.lat, b.lng);
    return d <= currentRadius;
  }).sort((a, b) => calcDist(currentLat, currentLng, a.lat, a.lng) - calcDist(currentLat, currentLng, b.lat, b.lng));

  const wrap = document.getElementById('resultWrap');
  if (!filtered.length) {
    wrap.innerHTML = `<div class="result-empty"><div class="e-ico">🏢</div><div>반경 내 임대 데이터<br>없음</div></div>`;
    return;
  }
  const normalCount = filtered.filter(b => !b.isOurs).length;
  let h = `<div class="result-header">
    <div class="result-count"><span>${normalCount}</span>개 임대건물 · 기준 ${formatDist(currentRadius)}</div>
  </div>`;
  filtered.forEach(bld => {
    const d = calcDist(currentLat, currentLng, bld.lat, bld.lng);
    const tenants = bld.tenants || [];
    const topTypes = [...new Set(tenants.map(t=>t.type).filter(Boolean))].slice(0,2).join(' · ');
    h += `<div class="bld-item ${bld.isOurs ? 'ours' : ''}" onclick="openBldPopupById('${escapeHtml(bld.id)}')">
      <div class="bld-name">${escapeHtml(bld.name)}</div>
      <div class="bld-meta">${escapeHtml(bld.dong || '기타')} · ${tenants.length || (bld.floors||[]).length}개 층/임차 데이터${topTypes ? ' · '+escapeHtml(topTypes) : ''}</div>
      <div class="bld-dist">${formatDist(Math.round(d))}${bld.price ? ' · '+escapeHtml(bld.price) : ''}</div>
    </div>`;
  });
  wrap.innerHTML = h;
}

// ══════════════════════════════════════════════
// 레이어 토글
// ══════════════════════════════════════════════
function toggleLayer(type) {
  if (type === 'bld') {
    layerBld = !layerBld;
    document.getElementById('layerBld').classList.toggle('on', layerBld);
    if (layerBld) { drawBldMarkers(); renderBldList(); }
    else { clearBldMarkers(); }
  } else {
    layerPoi = !layerPoi;
    document.getElementById('layerPoi').classList.toggle('on', layerPoi);
    document.getElementById('catSection').classList.toggle('hidden', !layerPoi);
    document.getElementById('runWrap').classList.toggle('hidden', !layerPoi);
    if (!layerPoi) { clearPoiMarkers(); }
  }
  // 현재 활성 레이어에 맞는 목록 표시
  updateResultView();
}

function updateResultView() {
  if (layerBld && !layerPoi) renderBldList();
  else if (layerPoi && allPoi.length > 0) renderPoiList(allPoi.filter(p => activeCats.has(p._cat.id)));
  else if (layerBld) renderBldList();
}

// ══════════════════════════════════════════════
// 주소 검색
// ══════════════════════════════════════════════
function geocodeAddress() {
  const addr = document.getElementById('addrInput').value.trim();
  if (!addr) return;
  const geocoder = new kakao.maps.services.Geocoder();
  geocoder.addressSearch(addr, (result, status) => {
    if (status === kakao.maps.services.Status.OK) {
      currentLat = parseFloat(result[0].y);
      currentLng = parseFloat(result[0].x);
      applyNewCenter();
    } else {
      const ps2 = new kakao.maps.services.Places();
      ps2.keywordSearch(addr, (result2, status2) => {
        if (status2 === kakao.maps.services.Status.OK) {
          currentLat = parseFloat(result2[0].y);
          currentLng = parseFloat(result2[0].x);
          applyNewCenter();
        } else alert('주소를 찾을 수 없습니다.');
      }, { size: 1 });
    }
  });
}

function applyNewCenter() {
  map.setCenter(new kakao.maps.LatLng(currentLat, currentLng));
  placeCenterPin(currentLat, currentLng);
  drawCircle(currentLat, currentLng, currentRadius);
  if (layerBld) renderBldList();
}

// ══════════════════════════════════════════════
// 카테고리 UI
// ══════════════════════════════════════════════
function buildCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const el = document.createElement('div');
    el.className = 'cat-item' + (activeCats.has(cat.id) ? ' on' : '');
    el.id = 'cat-' + cat.id;
    el.onclick = () => toggleCat(cat.id);
    el.innerHTML = `
      <div class="cat-check"></div>
      <div class="cat-emoji">${cat.emoji}</div>
      <div class="cat-name">${cat.name}</div>
      <span class="cat-cnt" id="cnt-${cat.id}"></span>`;
    grid.appendChild(el);
  });
}

function toggleCat(id) {
  activeCats.has(id) ? activeCats.delete(id) : activeCats.add(id);
  document.getElementById('cat-' + id)?.classList.toggle('on', activeCats.has(id));
  // 결과 있으면 즉시 필터링
  if (allPoi.length > 0) filterPoiBycat();
}

function toggleAllCats() {
  const allOn = activeCats.size === CATEGORIES.length;
  activeCats = allOn ? new Set() : new Set(CATEGORIES.map(c => c.id));
  CATEGORIES.forEach(cat => document.getElementById('cat-' + cat.id)?.classList.toggle('on', activeCats.has(cat.id)));
  if (allPoi.length > 0) filterPoiBycat();
}

function filterPoiBycat() {
  clearPoiMarkers();
  const filtered = allPoi.filter(p => activeCats.has(p._cat.id));
  filtered.forEach(p => addPoiMarker(p, p._cat));
  renderPoiList(filtered);
  renderLegend(filtered);
}

// ══════════════════════════════════════════════
// POI 검색 (실시간 상권)
// ══════════════════════════════════════════════
function runPoiSearch() {
  if (!layerPoi) return;
  if (activeCats.size === 0) { alert('카테고리를 최소 1개 선택해주세요'); return; }

  const btn = document.getElementById('btnRun');
  btn.disabled = true;
  document.getElementById('runTxt').textContent = '검색 중…';
  document.getElementById('runIco').textContent = '⏳';

  clearPoiMarkers();
  allPoi = [];
  CATEGORIES.forEach(c => { const el = document.getElementById('cnt-' + c.id); if (el) el.textContent = ''; });

  const cats = CATEGORIES.filter(c => activeCats.has(c.id));
  let done = 0;

  function searchPage(cat, page) {
    ps.categorySearch(cat.id, (data, status, pagination) => {
      if (status === kakao.maps.services.Status.OK) {
        data.forEach(place => {
          place._cat = cat;
          allPoi.push(place);
          addPoiMarker(place, cat);
        });
        if (pagination.hasNextPage) {
          setTimeout(() => searchPage(cat, page + 1), 100);
        } else {
          const cnt = allPoi.filter(p => p._cat.id === cat.id).length;
          const el = document.getElementById('cnt-' + cat.id);
          if (el && cnt) el.textContent = cnt;
          done++;
          if (done === cats.length) finishPoiSearch();
        }
      } else {
        done++;
        if (done === cats.length) finishPoiSearch();
      }
    }, {
      location: new kakao.maps.LatLng(currentLat, currentLng),
      radius: currentRadius,
      useMapBounds: false,
      size: 15,
      page
    });
  }

  cats.forEach((cat, i) => setTimeout(() => searchPage(cat, 1), i * 200));
}

function finishPoiSearch() {
  allPoi.sort((a, b) => parseInt(a.distance) - parseInt(b.distance));
  renderPoiList(allPoi);
  renderLegend(allPoi);

  map.setCenter(new kakao.maps.LatLng(currentLat, currentLng));
  const level = currentRadius <= 500 ? 4 : currentRadius <= 1000 ? 5 : currentRadius <= 2000 ? 6 : 7;
  map.setLevel(level);

  const btn = document.getElementById('btnRun');
  btn.disabled = false;
  document.getElementById('runTxt').textContent = '다시 검색';
  document.getElementById('runIco').textContent = '🔄';
}

// ══════════════════════════════════════════════
// POI 마커
// ══════════════════════════════════════════════
function addPoiMarker(place, cat) {
  const pos = new kakao.maps.LatLng(place.y, place.x);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="22" viewBox="0 0 16 22">
    <path d="M8 0C3.582 0 0 3.582 0 8c0 6 8 14 8 14S16 14 16 8C16 3.582 12.418 0 8 0z"
      fill="${cat.color}" stroke="white" stroke-width="1.5"/>
    <circle cx="8" cy="8" r="3" fill="white" opacity="0.85"/>
  </svg>`;
  const img = new kakao.maps.MarkerImage(
    'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg))),
    new kakao.maps.Size(16, 22),
    { offset: new kakao.maps.Point(8, 22) }
  );
  const m = new kakao.maps.Marker({ position: pos, image: img, map, zIndex: 3, title: place.place_name });
  kakao.maps.event.addListener(m, 'click', () => {
    infowindow.setContent(`
      <div style="padding:10px 14px;font-family:'Noto Sans KR',sans-serif;min-width:160px;max-width:220px">
        <div style="font-size:9px;color:${cat.color};font-weight:700;letter-spacing:1px;margin-bottom:3px">${cat.emoji} ${cat.name}</div>
        <div style="font-size:13px;font-weight:700;color:#222;margin-bottom:4px">${place.place_name}</div>
        <div style="font-size:11px;color:#666;margin-bottom:4px">${place.road_address_name || place.address_name || ''}</div>
        ${place.distance ? `<div style="font-size:11px;color:${cat.color};font-weight:600">📏 ${formatDist(parseInt(place.distance))}</div>` : ''}
      </div>`);
    infowindow.open(map, m);
  });
  poiMarkers.push(m);
}

function clearPoiMarkers() {
  poiMarkers.forEach(m => m.setMap(null));
  poiMarkers = [];
  infowindow?.close();
  document.getElementById('legendBox').classList.add('hidden');
}

// ══════════════════════════════════════════════
// POI 목록 렌더
// ══════════════════════════════════════════════
function renderPoiList(items) {
  const wrap = document.getElementById('resultWrap');
  if (!items.length) {
    wrap.innerHTML = `<div class="result-empty"><div class="e-ico">🔍</div><div>검색 결과 없음</div></div>`;
    return;
  }
  let h = `<div class="result-header">
    <div class="result-count"><span>${items.length}</span>개 시설</div>
    <button class="btn-csv" onclick="exportCsv()">📥 CSV</button>
  </div>`;
  items.forEach(it => {
    const dist = it.distance ? formatDist(parseInt(it.distance)) : '';
    h += `<div class="poi-item" onclick="flyTo(${parseFloat(it.y)},${parseFloat(it.x)})">
      <div class="poi-dot" style="background:${it._cat.color}"></div>
      <div class="poi-info">
        <div class="poi-name">${it.place_name}</div>
        <div class="poi-cat">${it._cat.emoji} ${it._cat.name}</div>
      </div>
      <div class="poi-dist">${dist}</div>
    </div>`;
  });
  wrap.innerHTML = h;
}

// ══════════════════════════════════════════════
// 범례
// ══════════════════════════════════════════════
function renderLegend(items) {
  const box = document.getElementById('legendBox');
  if (!items.length) { box.classList.add('hidden'); return; }
  const bycat = {};
  items.forEach(it => { bycat[it._cat.id] = (bycat[it._cat.id] || 0) + 1; });
  document.getElementById('legendItems').innerHTML = CATEGORIES.filter(c => bycat[c.id]).map(cat =>
    `<div class="leg-item">
      <div class="leg-dot" style="background:${cat.color}"></div>
      <div class="leg-name">${cat.emoji} ${cat.name}</div>
      <div class="leg-cnt">${bycat[cat.id]}</div>
    </div>`).join('');
  box.classList.remove('hidden');
}

// ══════════════════════════════════════════════
// CSV 내보내기
// ══════════════════════════════════════════════
function exportCsv() {
  const items = allPoi.filter(p => activeCats.has(p._cat.id));
  if (!items.length) return;
  const rows = [['카테고리','시설명','도로명주소','거리(m)','위도','경도']];
  items.forEach(it => rows.push([it._cat.name, it.place_name,
    it.road_address_name || '', it.distance || '', it.y, it.x]));
  const csv = rows.map(r => r.map(c => '"'+(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'}));
  a.download = `통합상권_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ══════════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════════
function flyTo(lat, lng) {
  map.setCenter(new kakao.maps.LatLng(lat, lng));
  map.setLevel(3);
}

function formatDist(m) { return m >= 1000 ? (m/1000).toFixed(1)+'km' : m+'m'; }

function calcDist(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

  if(activeLeaseTab==='legend') renderLeaseLegend();
}
function leasePane(){ return document.getElementById('leasePane') || document.getElementById('resultWrap'); }
function nonOurs(){ return buildings.filter(b=>!b.isOurs); }
function buildingMatchesFilter(b, filter){
  if(filter==='all') return true;
  if(filter==='core') return b.distance==='core' || calcDist(OUR_LAT,OUR_LNG,b.lat,b.lng)<=300;
  if(filter==='공실') return (b.tenants||[]).some(t => (t.name||'').includes('공실') || t.rawType==='공실');
  return (b.tenants||[]).some(t => t.type===filter);
}
function applyMapFilter(filter){
  if(activeMapFilter===filter && filter!=='all') filter='all';
  activeMapFilter=filter;
  document.querySelectorAll('.lease-chip').forEach(c=>c.classList.toggle('active', c.dataset.filter===filter));
  drawBldMarkersFiltered();
  renderActiveLeaseTab();
}
function updateFilterCounts(){
  const arr=nonOurs(); const set=(id,v)=>{const el=document.getElementById(id); if(el) el.textContent=v};
  set('fc-all', arr.length); set('fc-core', arr.filter(b=>buildingMatchesFilter(b,'core')).length);
  set('fc-food', arr.filter(b=>buildingMatchesFilter(b,'F&B/음식점')).length); set('fc-cafe', arr.filter(b=>buildingMatchesFilter(b,'카페')).length);
  set('fc-med', arr.filter(b=>buildingMatchesFilter(b,'병원/의료')).length); set('fc-office', arr.filter(b=>buildingMatchesFilter(b,'사무실/기업')).length);
  set('fc-beauty', arr.filter(b=>buildingMatchesFilter(b,'뷰티/미용')).length); set('fc-edu', arr.filter(b=>buildingMatchesFilter(b,'학원/교육')).length);
  set('fc-vacant', arr.filter(b=>buildingMatchesFilter(b,'공실')).length);
}
function drawBldMarkersFiltered(){
  clearBldMarkers();
  buildings.forEach(bld=>{
    if(!bld.isOurs && !buildingMatchesFilter(bld, activeMapFilter)) return;
    if(!bld.lat || !bld.lng) return;
    const pos=new kakao.maps.LatLng(bld.lat,bld.lng); const color=getBldColor(bld); const size=bld.isOurs?24:18, height=bld.isOurs?34:26;
    const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${height}" viewBox="0 0 18 26"><path d="M9 0C4.029 0 0 4.029 0 9c0 6.75 9 17 9 17S18 15.75 18 9C18 4.029 13.971 0 9 0z" fill="${color}" stroke="white" stroke-width="1.6"/><circle cx="9" cy="9" r="3.5" fill="white" opacity="0.9"/></svg>`;
    const img=new kakao.maps.MarkerImage('data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg))), new kakao.maps.Size(size,height), {offset:new kakao.maps.Point(size/2,height)});
    const m=new kakao.maps.Marker({position:pos,image:img,map,zIndex:bld.isOurs?20:5,title:bld.name}); kakao.maps.event.addListener(m,'click',()=>openBldPopup(bld)); bldMarkers.push(m);
  });
}

function renderBldList(){
  const arr=nonOurs().filter(b=>buildingMatchesFilter(b,activeMapFilter)).sort((a,b)=>calcDist(OUR_LAT,OUR_LNG,a.lat,a.lng)-calcDist(OUR_LAT,OUR_LNG,b.lat,b.lng));
  const groups={}; arr.forEach(b=>{const d=b.dong||'기타'; (groups[d]||(groups[d]=[])).push(b);});
  const totalTenants=arr.reduce((s,b)=>s+(b.tenants||[]).length,0);
  let h=`<div class="lease-bld-card ours" onclick="openBldPopupById('ours')"><div class="lease-bld-top"><div class="lease-bld-name">⭐ 케이프혼타워 (신축예정)</div><div class="lease-bld-price">신축 예정</div></div><div class="bld-meta">신사동 529 외 2필지</div></div>`;
  if(!arr.length) h+=`<div class="result-empty"><div class="e-ico">🏢</div><div>조건에 맞는 임대 건물이 없습니다</div></div>`;
  Object.entries(groups).sort((a,b)=>a[0].localeCompare(b[0],'ko')).forEach(([dong,list],idx)=>{
    const tc=list.reduce((s,b)=>s+(b.tenants||[]).length,0);
    h+=`<div class="dong-group open"><div class="dong-head" onclick="this.parentElement.classList.toggle('open')"><span class="dong-badge">${escapeHtml(dong)}</span><span class="dong-meta">건물 ${list.length} · 임차인 ${tc}</span><span class="dong-arrow">▼</span></div><div class="dong-body">`;
    list.forEach(b=>{h+=leaseBuildingCard(b)}); h+=`</div></div>`;
  });
  leasePane().innerHTML=h;
}
function leaseBuildingCard(b){
  const floors=(b.floors||[]).slice(0,3); const d=Math.round(calcDist(OUR_LAT,OUR_LNG,b.lat,b.lng));
  let h=`<div class="lease-bld-card" onclick="openBldPopupById('${escapeHtml(b.id)}')"><div class="lease-bld-top"><div class="lease-bld-name">◆ ${escapeHtml(b.name)}</div><div class="lease-bld-price">${escapeHtml(b.price||'')}</div></div><div class="lease-bld-meta"><span class="lease-tag">💰 ${escapeHtml(b.price||'-')}</span><span class="lease-tag">🏢 ${b.builtYear||'-'}년</span><span class="lease-tag">P ${escapeHtml(b.parking||'-')}</span><span class="lease-tag">${formatDist(d)}</span></div>`;
  floors.forEach(f=>{const type=normalizeType(f.industry||'기타'), color=TYPES[type]||TYPES['기타']; h+=`<div class="lease-floor-line"><span class="fl">${escapeHtml(formatFloor(f.floor))}</span><span class="tt">${escapeHtml(f.tenant||'공실')}</span><span class="lease-type-pill" style="background:${color}">${escapeHtml(type)}</span><span class="lease-rent">${f.rent?Number(f.rent).toLocaleString()+'만':''}</span></div>`});
  return h+`</div>`;
}
function renderTypeChart(){
  const counts={}; const bsets={}; nonOurs().forEach(b=>{ if(!buildingMatchesFilter(b,activeMapFilter)) return; (b.tenants||[]).forEach(t=>{const ty=t.type||'기타'; counts[ty]=(counts[ty]||0)+1; (bsets[ty]||(bsets[ty]=new Set())).add(b.id);});});
  const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]); const max=Math.max(1,...entries.map(e=>e[1]));
  let h=`<div class="lease-pad"><div class="lease-section-title">업종별 임차인 수 (전체 건물 합산)</div>`;
  entries.forEach(([ty,c])=>{const color=TYPES[ty]||TYPES['기타']; h+=`<div class="type-row" onclick="applyMapFilter('${escapeHtml(ty)}')"><div class="type-label">${escapeHtml(ty)}</div><div class="type-bar-bg"><div class="type-bar" style="width:${Math.max(12,c/max*100)}%;background:${color}">${c}</div></div><div class="type-buildings">${bsets[ty].size}개 건물</div></div>`});
  h+=`<div class="insight-box"><b>💡 주목할 인사이트</b><br>• <b>${entries[0]?.[0]||'-'}</b> 임차인이 가장 많은 업종입니다.<br>• 업종 막대를 클릭하면 해당 업종 건물만 지도와 목록에서 확인됩니다.<br>• 현재 필터: <b>${activeMapFilter==='all'?'전체':activeMapFilter}</b></div></div>`;
  leasePane().innerHTML=h;
}
function renderLeaseLegend(){
  let h=`<div class="lease-pad"><div class="lease-section-title">업종 색상</div><div class="legend-grid2">`;
  Object.entries(TYPES).forEach(([k,c])=> h+=`<div class="legend-card"><i class="legend-dot2" style="background:${c}"></i><span>${escapeHtml(k)}</span></div>`);
  h+=`</div><div class="insight-box"><b>마커 안내</b><br>⭐ 별 마커 — 케이프혼타워 신축 예정<br>색상 마커 — 건물의 주요 임차 업종 기준<br>상단 필터 선택 시 지도 마커와 건물 목록이 함께 변경됩니다.</div></div>`;
  leasePane().innerHTML=h;
}
function renderAnalysisTab(){
  const types=Object.keys(TYPES);
  let h=`<div class="ana-panel"><div class="ana-label">업종 <span style="color:#4a5270;font-weight:400">복수 선택 가능</span></div><div class="ana-chips">`;
  types.forEach(t=> h+=`<span class="ana-chip ${anaState.types.has(t)?'active':''}" onclick="anaToggleType('${escapeHtml(t)}')">${escapeHtml(t)}</span>`);
  h+=`</div><div class="ana-label">면적 <span id="ana-area-val">${anaState.areaMin}~${anaState.areaMax}평</span></div><div class="ana-row"><span>이상</span><input type="range" min="0" max="300" step="5" value="${anaState.areaMin}" oninput="anaState.areaMin=+this.value; renderAnalysisTab()"><span>평</span></div><div class="ana-row"><span>이하</span><input type="range" min="0" max="300" step="5" value="${anaState.areaMax}" oninput="anaState.areaMax=+this.value; renderAnalysisTab()"><span>평</span></div><div class="ana-label">월 임대료 <span>${anaState.rentMin}~${anaState.rentMax}만원</span></div><div class="ana-row"><span>이상</span><input type="range" min="0" max="5000" step="50" value="${anaState.rentMin}" oninput="anaState.rentMin=+this.value; renderAnalysisTab()"><span>만원</span></div><div class="ana-row"><span>이하</span><input type="range" min="0" max="5000" step="50" value="${anaState.rentMax}" oninput="anaState.rentMax=+this.value; renderAnalysisTab()"><span>만원</span></div>${anaToggleGroup('dist','우리 건물과의 거리',[['','전체'],['core','🔴 300m이내'],['mid','🟡 ~700m'],['far','⚪ 700m+']])}<button class="ana-reset" onclick="anaReset()">↺ 필터 초기화</button></div>`;
  const res=analysisResults(); const tenants=res.flatMap(b=>(b.tenants||[]).filter(t=>tenantPass(t,b)));
  h+=`<div class="ana-kpis"><div class="ana-kpi"><strong>${res.length}</strong><span>건물</span></div><div class="ana-kpi"><strong>${tenants.length}</strong><span>임차인</span></div><div class="ana-kpi"><strong>${avgRent(tenants)}</strong><span>평균임대(만)</span></div><div class="ana-kpi"><strong>${tenants.filter(t=>(t.name||'').includes('공실')).length}</strong><span>공실·퇴거</span></div></div><div class="ana-summary">${res.length}개 건물, ${tenants.length}개 임차인이 조건을 충족합니다. 가장 많은 업종은 <b>${topType(tenants)}</b>입니다.</div><div>`;
  res.forEach(b=> h+=leaseBuildingCard(b)); h+='</div>'; leasePane().innerHTML=h;
}
function anaToggleGroup(key,label,items){ return `<div class="ana-label">${label}</div><div class="ana-chips">`+items.map(([v,l])=>`<span class="ana-chip ${anaState[key]===v?'active':''}" onclick="anaState.${key}='${v}'; renderAnalysisTab()">${l}</span>`).join('')+`</div>`; }
function anaToggleType(t){ anaState.types.has(t)?anaState.types.delete(t):anaState.types.add(t); renderAnalysisTab(); }
function anaReset(){ anaState={types:new Set(),areaMin:0,areaMax:300,rentMin:0,rentMax:5000,yearMin:1960,priceMax:3000,elev:'',park:'',dist:''}; renderAnalysisTab(); }
function tenantPass(t,b){ if(anaState.types.size && !anaState.types.has(t.type)) return false; const area=Number(t.areaPy||0), rent=Number(t.rent||0); if(area && (area<anaState.areaMin||area>anaState.areaMax)) return false; if(rent && (rent<anaState.rentMin||rent>anaState.rentMax)) return false; return true; }
function analysisResults(){ return nonOurs().filter(b=>buildingMatchesFilter(b,activeMapFilter)).filter(b=>!anaState.dist || b.distance===anaState.dist).filter(b=>(b.tenants||[]).some(t=>tenantPass(t,b))); }
function avgRent(ts){ const a=ts.map(t=>+t.rent||0).filter(Boolean); return a.length?Math.round(a.reduce((s,v)=>s+v,0)/a.length).toLocaleString():'-'; }
function topType(ts){ const c={}; ts.forEach(t=>c[t.type]=(c[t.type]||0)+1); return Object.entries(c).sort((a,b)=>b[1]-a[1])[0]?.[0]||'-'; }

// 원본 로드/반경 변경 후 임대 UI 유지
const _origLoadBuildingData = loadBuildingData;
loadBuildingData = async function(){ await _origLoadBuildingData(); showLeaseMode(); };
const _origSetRadius = setRadius;
setRadius = function(r){ _origSetRadius(r); if(activeViewMode==='lease') renderActiveLeaseTab(); };

</script>
