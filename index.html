<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>블루피카 | 프로젝트 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
:root{
  --bg:#0a0c10;--surface:#12151d;--surface2:#1a1e2a;--surface3:#222738;
  --border:#252b3d;--border2:#2f3650;
  --accent:#4f8ef7;--accent2:#6ee7b7;--accent3:#f5a623;--accent4:#e05c73;
  --accent5:#a78bfa;--accent6:#fb923c;
  --text:#e4e8f5;--text-muted:#6b748f;--text-dim:#3d4460;
  --radius:10px;--font-body:'Noto Sans KR',sans-serif;--font-mono:'JetBrains Mono',monospace;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;--orange:#f97316;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;font-size:13px;}

header{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:200;}
.logo{font-family:'DM Serif Display',serif;font-size:20px;color:var(--accent);display:flex;align-items:center;gap:10px;}
.logo-dot{width:8px;height:8px;background:var(--accent2);border-radius:50%;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.logo span{color:var(--text-muted);font-size:12px;font-family:var(--font-body);margin-left:2px;font-weight:400;}
.header-right{display:flex;align-items:center;gap:8px;}
.last-updated{font-size:10px;color:var(--text-dim);font-family:var(--font-mono);}
.icon-btn{background:var(--surface2);border:1px solid var(--border);border-radius:7px;cursor:pointer;font-size:12px;font-family:var(--font-body);display:flex;align-items:center;gap:5px;padding:7px 12px;color:var(--text-muted);transition:all .2s;}
.icon-btn:hover{background:var(--surface3);color:var(--text);border-color:var(--border2);}
.icon-btn.accent{color:var(--accent);}
.icon-btn.spinning .si{animation:spin .8s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}

.tabs{display:flex;padding:0 32px;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;}
.tab{padding:13px 18px;cursor:pointer;font-size:12px;color:var(--text-muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:6px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}

main{padding:24px 32px;max-width:1480px;margin:0 auto;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.st{font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.8px;}
.st .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.st::after{content:'';flex:1;height:1px;background:var(--border);}
.tag{font-size:9px;color:var(--accent2);text-transform:none;letter-spacing:0;padding:1px 5px;background:rgba(110,231,183,.1);border-radius:3px;border:1px solid rgba(110,231,183,.2);}
.tag-dim{font-size:9px;color:var(--text-dim);}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:18px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;transition:border-color .2s;}
.card:hover{border-color:var(--border2);}
.card-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.card-value{font-size:20px;font-weight:700;color:var(--text);line-height:1;}
.card-value.sm{font-size:13px;font-weight:600;}
.card-sub{font-size:10px;color:var(--text-dim);margin-top:4px;}
.card.cg{border-color:rgba(34,197,94,.25);}
.card.cb{border-color:rgba(79,142,247,.25);}
.card.cr{border-color:rgba(239,68,68,.2);}
.card.cy{border-color:rgba(234,179,8,.25);}

.badge{display:inline-flex;align-items:center;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap;}
.bg{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.18);}
.bo{background:rgba(249,115,22,.12);color:#fb923c;border:1px solid rgba(249,115,22,.18);}
.br{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.18);}
.bb{background:rgba(79,142,247,.12);color:#93c5fd;border:1px solid rgba(79,142,247,.18);}

.status-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:52px 20px;color:var(--text-muted);gap:10px;}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
.status-box p{font-size:12px;}
.status-box small{font-size:10px;color:var(--text-dim);text-align:center;line-height:1.7;}
.setup-cta{margin-top:4px;background:var(--accent);color:#fff;border:none;border-radius:7px;padding:7px 15px;font-family:var(--font-body);font-size:12px;cursor:pointer;}

/* GANTT - 샘플 스타일 */
.gantt-wrap{border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);overflow:hidden;}
.gantt-yr-bar{display:flex;background:var(--surface2);border-bottom:1px solid var(--border);}
.gantt-yr-cell{text-align:center;padding:7px 0 4px;font-size:11px;font-weight:700;color:var(--text-muted);font-family:var(--font-mono);border-right:1px solid var(--border);}
.gantt-yr-cell:last-child{border-right:none;}
.gantt-mo-bar{display:flex;background:var(--surface2);border-bottom:1px solid var(--border);}
.gantt-mo-cell{text-align:center;padding:2px 0 4px;font-size:9px;color:var(--text-dim);border-right:1px solid rgba(37,43,61,.3);}
.gantt-mo-cell:last-child{border-right:none;}
.gantt-body{position:relative;padding:8px 12px;}
.gantt-row{position:relative;height:38px;margin:3px 0;}
.gantt-bar{position:absolute;top:50%;transform:translateY(-50%);height:28px;border-radius:6px;display:flex;align-items:center;padding:0 10px;cursor:default;overflow:hidden;transition:filter .2s;}
.gantt-bar:hover{filter:brightness(1.15);}
.gantt-bar-name{font-size:11px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gantt-bar-dur{font-size:9px;color:rgba(255,255,255,.7);margin-left:6px;flex-shrink:0;}
.gantt-ygrid{position:absolute;top:0;bottom:0;width:1px;background:rgba(79,142,247,.12);pointer-events:none;}
.gantt-today{position:absolute;top:-8px;bottom:-8px;width:2px;background:rgba(239,68,68,.5);pointer-events:none;z-index:5;}
.gantt-ms-row{position:relative;height:32px;margin:3px 0;display:flex;align-items:center;}
.gantt-ms-diamond{position:absolute;width:12px;height:12px;background:var(--red);transform:rotate(45deg);box-shadow:0 0 6px rgba(239,68,68,.5);}
.gantt-ms-label{position:absolute;font-size:11px;font-weight:600;color:var(--red);white-space:nowrap;}
.gantt-tooltip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--surface3);border:1px solid var(--border2);border-radius:6px;padding:5px 10px;font-size:10px;color:var(--text);white-space:nowrap;pointer-events:none;z-index:99;font-family:var(--font-mono);box-shadow:0 4px 16px rgba(0,0,0,.5);}
.gantt-bar:hover .gantt-tooltip{display:block;}

/* LEASE */
.lease-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
@media(max-width:960px){.lease-grid{grid-template-columns:1fr;}}
.lease-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.lease-block-hdr{display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:11px 15px;background:var(--surface2);border-bottom:2px solid var(--accent);}
.lease-block-addr{font-size:13px;font-weight:700;color:var(--text);}
.lease-block-stats{display:flex;gap:14px;margin-left:auto;}
.lease-bkv{text-align:right;}
.lease-bkl{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px;}
.lease-bkn{font-size:12px;font-weight:700;font-family:var(--font-mono);}
.tenant-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border);}
.tenant-row:last-child{border-bottom:none;}
.tenant-row:hover{background:rgba(79,142,247,.03);}
.tenant-floor{width:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text-muted);background:var(--surface2);border-right:1px solid var(--border);}
.tenant-body{flex:1;padding:9px 13px;}
.tenant-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px;}
.tenant-period{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);margin-bottom:6px;}
.tenant-nums{display:flex;gap:14px;flex-wrap:wrap;}
.tenant-kv{font-size:10px;color:var(--text-muted);}
.tenant-kv b{color:var(--text);font-family:var(--font-mono);font-weight:600;}
.tenant-badge{padding:9px 13px;display:flex;align-items:center;justify-content:flex-end;min-width:80px;}
.lease-subtotal{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:rgba(79,142,247,.04);border-top:1px solid var(--border2);}

/* PERSONAL */
.pos{color:var(--green);}
.neg{color:var(--red);}
.cp{color:var(--accent2);font-weight:600;}
.cn{color:var(--red);font-weight:600;}
.mo{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);}
.mtbl{width:100%;border-collapse:collapse;font-size:11px;}
.mtbl th{padding:5px 9px;text-align:right;color:var(--text-muted);font-weight:500;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap;font-size:10px;font-family:var(--font-mono);}
.mtbl th.tl{text-align:left;}
.mtbl th.ti{background:rgba(34,197,94,.07);color:var(--accent2);}
.mtbl th.te{background:rgba(239,68,68,.06);color:var(--red);}
.mtbl th.ts{background:var(--surface2);}
.mtbl td{padding:4px 9px;border-bottom:1px solid var(--border);text-align:right;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
.mtbl td.tl{text-align:left;color:var(--text);font-weight:600;font-size:11px;font-family:var(--font-body);}
.mtbl td.ts2{text-align:left;color:var(--text-muted);font-size:10px;font-family:var(--font-body);}
.mtbl tbody tr:last-child td{border-bottom:none;}
.mtbl .yrs td{background:rgba(79,142,247,.06);color:var(--accent);text-align:left;font-family:var(--font-body);font-size:11px;font-weight:700;padding:5px 13px;border-top:2px solid rgba(79,142,247,.2);}
.sbody{display:block;max-height:400px;overflow-y:auto;}
.sbody tr{display:table;width:100%;table-layout:fixed;}

/* CORP */
.corp-total-banner{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:linear-gradient(90deg,rgba(167,139,250,.07),rgba(79,142,247,.05));border:1px solid rgba(167,139,250,.18);border-radius:var(--radius);margin-bottom:20px;}
.corp-sections{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;}
.corp-sec{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s;}
.corp-sec:hover{border-color:var(--border2);}
.corp-sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);}
.corp-sec-title{font-size:11px;font-weight:700;color:var(--accent5);display:flex;align-items:center;gap:6px;}
.corp-sec-amt{font-size:12px;font-weight:700;font-family:var(--font-mono);color:var(--red);}
.corp-item{display:flex;align-items:flex-start;gap:10px;padding:8px 14px;border-bottom:1px solid rgba(37,43,61,.5);}
.corp-item:last-child{border-bottom:none;}
.corp-dot{width:5px;height:5px;border-radius:50%;background:var(--accent5);flex-shrink:0;margin-top:5px;}
.corp-item-info{flex:1;min-width:0;}
.corp-item-name{font-size:11px;font-weight:500;color:var(--text);line-height:1.4;margin-bottom:2px;}
.corp-item-meta{font-size:9px;color:var(--text-muted);line-height:1.6;}
.corp-item-amt{font-size:11px;font-weight:700;font-family:var(--font-mono);color:var(--red);white-space:nowrap;flex-shrink:0;}

/* IRR */
.ikgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px;margin-bottom:18px;}
.ikc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.ikc .kl{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.ikc .kv{font-size:24px;font-weight:700;line-height:1;}
.ikc .kv.pos{color:var(--accent2);}
.ikc .kv.neg{color:var(--red);}
.ikc .kv.neu{color:var(--accent);}
.ikc .ks{font-size:10px;color:var(--text-dim);margin-top:4px;line-height:1.5;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-bottom:18px;}
.pc{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 15px;}
.num{text-align:right;font-family:var(--font-mono);font-size:11px;}
.calc-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;margin-bottom:18px;}
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 22px;}
.cf{display:flex;flex-direction:column;gap:5px;}
.cf label{font-size:10px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
.cf .fr{display:flex;gap:7px;align-items:center;}
.cf input[type=number]{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 9px;color:var(--text);font-size:12px;font-family:var(--font-mono);outline:none;}
.cf input[type=range]{width:100%;accent-color:var(--accent);}
.cf .rv2{font-size:11px;color:var(--accent);font-family:var(--font-mono);min-width:38px;text-align:right;}
.calc-btn{margin-top:12px;background:var(--accent);color:#fff;border:none;border-radius:7px;padding:8px 18px;font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;}
.res-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.ri{text-align:center;}
.ri-l{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.ri-v{font-size:20px;font-weight:700;font-family:var(--font-mono);}
.ri-v.pos{color:var(--accent2);}
.ri-v.neg{color:var(--red);}
.ri-v.neu{color:var(--accent);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:15px;padding:24px;width:550px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,.7);}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--text-muted);font-size:17px;cursor:pointer;padding:3px 7px;border-radius:5px;}
.modal-desc{font-size:11px;color:var(--text-muted);line-height:1.65;margin-bottom:14px;}
.how-to{background:var(--surface2);border-radius:8px;padding:10px 13px;margin-bottom:16px;font-size:11px;color:var(--text-muted);line-height:1.9;}
.how-to strong{color:var(--accent2);}
.url-ex{background:var(--bg);border-radius:5px;padding:5px 9px;font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin:4px 0;word-break:break-all;}
.url-ex em{color:var(--accent3);font-style:normal;font-weight:700;}
.field-group{display:flex;flex-direction:column;gap:9px;margin-bottom:16px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:11px;color:var(--text-muted);font-weight:500;}
.field-row{display:flex;gap:7px;align-items:center;}
.field input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-size:12px;font-family:var(--font-body);outline:none;}
.field input::placeholder{color:var(--text-dim);}
.field input[readonly]{color:var(--text-dim);cursor:default;}
.test-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:var(--font-body);white-space:nowrap;min-width:58px;text-align:center;}
.test-btn.ok{border-color:var(--accent2);color:var(--accent2);}
.test-btn.fail{border-color:var(--accent4);color:var(--accent4);}
.modal-foot{display:flex;align-items:center;gap:8px;}
.saved-msg{font-size:11px;color:var(--accent2);display:none;margin-right:auto;}
.saved-msg.show{display:block;}
.btn-cancel{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:8px 15px;border-radius:7px;cursor:pointer;font-size:12px;font-family:var(--font-body);margin-left:auto;}
.btn-save{background:var(--accent);border:none;color:#fff;padding:8px 18px;border-radius:7px;cursor:pointer;font-size:12px;font-family:var(--font-body);font-weight:600;}

.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{padding:7px 11px;text-align:left;color:var(--text-muted);font-weight:500;background:var(--surface);border-bottom:1px solid var(--border);white-space:nowrap;font-size:11px;}
.tbl td{padding:7px 11px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
.tbl tbody tr:last-child td{border-bottom:none;}
.tbl tbody tr:hover{background:rgba(79,142,247,.025);}
  </style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-dot"></div>BLUEPICA <span>프로젝트 시뮬레이션 대시보드</span></div>
  <div class="header-right">
    <div class="last-updated" id="lastUpdated"></div>
    <button class="icon-btn" onclick="openSettings()">&#9881; 시트 연결 설정</button>
    <button class="icon-btn accent" id="refreshBtn" onclick="loadAll()"><span class="si">&#8635;</span> 새로고침</button>
  </div>
</header>
<nav class="tabs">
  <div class="tab active" data-tab="timeline">&#128197; 프로젝트 타임라인</div>
  <div class="tab" data-tab="irr">&#128202; 신축 IRR</div>
  <div class="tab" data-tab="lease">&#127970; 임차인 현황</div>
  <div class="tab" data-tab="personal">&#128100; 개인 비용</div>
  <div class="tab" data-tab="corp">&#127970; 법인 비용</div>
</nav>
<main>
  <section class="tab-panel active" id="panel-timeline">
    <div class="cards" id="cards-timeline"></div>
    <div class="st"><span class="dot"></span><span id="tl-title">단계별 타임라인</span><span class="tag-dim" id="tl-src"></span></div>
    <div id="content-timeline"></div>
  </section>
  <section class="tab-panel" id="panel-irr"><div id="content-irr"></div></section>
  <section class="tab-panel" id="panel-lease">
    <div class="cards" id="cards-lease"></div>
    <div id="content-lease"></div>
  </section>
  <section class="tab-panel" id="panel-personal"><div id="content-personal"></div></section>
  <section class="tab-panel" id="panel-corp"><div id="content-corp"></div></section>
</main>

<div class="modal-overlay" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <div class="modal-head"><div class="modal-title">&#9881; 구글시트 연결 설정</div><button class="modal-close" onclick="closeSettings()">&#10005;</button></div>
    <div class="modal-desc">각 탭의 <strong>gid</strong> 값을 입력하면 구글시트와 자동 연결됩니다.</div>
    <div class="how-to">
      <strong>gid 찾는 방법</strong><br>
      구글시트에서 탭 클릭 후 URL 끝의 <strong style="color:var(--accent3)">gid=</strong> 뒤 숫자를 복사<br>
      <div class="url-ex">https://docs.google.com/spreadsheets/d/…/edit#gid=<em>835667947</em></div>
      <strong style="color:var(--accent3)">&#9888; 파일 &rarr; 공유 &rarr; 웹에 게시</strong> 상태여야 합니다.
    </div>
    <div class="field-group">
      <div class="field"><label>스프레드시트 ID</label><input readonly value="17lL6O55R56PGODOu-iM5EBH4a6ZbWEJfkypcdWzlGHA"/></div>
      <div class="field"><label>&#128197; 프로젝트 타임라인 gid</label><div class="field-row"><input id="g-timeline" placeholder="예: 835667947"/><button class="test-btn" id="tb-timeline" onclick="testGid('timeline')">연결 확인</button></div></div>
      <div class="field"><label>&#128202; 신축 IRR gid</label><div class="field-row"><input id="g-irr" placeholder="IRR 탭 gid"/><button class="test-btn" id="tb-irr" onclick="testGid('irr')">연결 확인</button></div></div>
      <div class="field"><label>&#128202; IRR 필지 요약 gid</label><div class="field-row"><input id="g-parcel" placeholder="필지 요약 탭 gid (선택)"/><button class="test-btn" id="tb-parcel" onclick="testGid('parcel')">연결 확인</button></div></div>
      <div class="field"><label>&#127970; 임차인 현황 gid</label><div class="field-row"><input id="g-lease" placeholder="임차인 현황 탭 gid"/><button class="test-btn" id="tb-lease" onclick="testGid('lease')">연결 확인</button></div></div>
      <div class="field"><label>&#128100; 개인 비용 gid</label><div class="field-row"><input id="g-personal" placeholder="개인 비용 탭 gid"/><button class="test-btn" id="tb-personal" onclick="testGid('personal')">연결 확인</button></div></div>
      <div class="field"><label>&#127970; 법인 비용 gid</label><div class="field-row"><input id="g-corp" placeholder="법인 비용 탭 gid"/><button class="test-btn" id="tb-corp" onclick="testGid('corp')">연결 확인</button></div></div>
    </div>
    <div class="modal-foot">
      <div class="saved-msg" id="savedMsg">&#10003; 저장 완료!</div>
      <button class="btn-cancel" onclick="closeSettings()">취소</button>
      <button class="btn-save" onclick="saveSettings()">저장 &amp; 적용</button>
    </div>
  </div>
</div>

<script>
// ── CORE ──────────────────────────────────────────
const SHEET_ID='17lL6O55R56PGODOu-iM5EBH4a6ZbWEJfkypcdWzlGHA';
function getConfig(){try{return JSON.parse(localStorage.getItem('bp_cfg')||'{}');}catch(e){return{};}}
function setConfig(c){localStorage.setItem('bp_cfg',JSON.stringify(c));}
function csvUrl(gid){return 'https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/export?format=csv&gid='+gid+'&t='+Date.now();}
function el(id){return document.getElementById(id);}
function sh(id,html){var e=el(id);if(e)e.innerHTML=html;}
function pn(s){if(!s&&s!==0)return 0;return parseFloat(String(s).replace(/[^0-9.\-]/g,''))||0;}
function fmt(n){if(n===null||n===undefined||n==='')return '—';var a=Math.abs(n);if(a>=100000000)return (n/100000000).toFixed(1)+'억';if(a>=10000)return Math.round(n/10000).toLocaleString()+'만';return n.toLocaleString();}
function bdg(t,c){return '<span class="badge '+c+'">'+t+'</span>';}
function showLoad(id){sh(id,'<div class="status-box"><div class="spinner"></div><p>데이터 불러오는 중…</p></div>');}
function showErr(id,lbl,msg){sh(id,'<div class="status-box"><div style="font-size:28px">&#9888;</div><p>'+lbl+' 데이터를 불러오지 못했습니다.</p><small>'+(msg||'구글시트가 <strong>웹에 게시</strong>되어 있는지 확인하세요.')+'</small><button class="setup-cta" onclick="openSettings()">&#9881; 설정 확인</button></div>');}
function showNoData(id,lbl){sh(id,'<div class="status-box"><div style="font-size:28px">&#128279;</div><p><strong>'+lbl+'</strong> gid가 설정되지 않았습니다.</p><small>우측 상단 &#9881; 시트 연결 설정을 눌러 gid를 입력해 주세요.</small><button class="setup-cta" onclick="openSettings()">&#9881; 지금 설정하기</button></div>');}

function parseCSV(txt){
  var rows=[],f='',row=[],q=false;
  for(var i=0;i<txt.length;i++){var c=txt[i];
    if(q){if(c==='"'&&txt[i+1]==='"'){f+='"';i++;}else if(c==='"')q=false;else f+=c;}
    else if(c==='"')q=true;
    else if(c===','){row.push(f.trim());f='';}
    else if(c==='\n'||(c==='\r'&&txt[i+1]==='\n')){if(c==='\r')i++;row.push(f.trim());rows.push(row);row=[];f='';}
    else f+=c;
  }
  if(f||row.length){row.push(f.trim());rows.push(row);}
  return rows;
}
async function fetchSheet(gid){
  var r=await fetch(csvUrl(gid),{redirect:'follow'});
  if(!r.ok)throw new Error('HTTP '+r.status);
  var txt=await r.text();
  if(txt.trim().charAt(0)==='<')throw new Error('시트가 웹에 게시되지 않았거나 접근 권한이 없습니다.');
  return parseCSV(txt);
}

// ── MODAL ──────────────────────────────────────────
function openSettings(){
  var c=getConfig();
  ['timeline','irr','parcel','lease','personal','corp'].forEach(function(k){
    var e=el('g-'+k);if(e)e.value=c[k]||(k==='timeline'?'835667947':k==='lease'?'0':k==='personal'?'662143448':k==='corp'?'551803703':'');
    var b=el('tb-'+k);if(b){b.className='test-btn';b.textContent='연결 확인';}
  });
  var sm=el('settingsModal');if(sm)sm.classList.add('open');
  var sv=el('savedMsg');if(sv)sv.classList.remove('show');
}
function closeSettings(){var sm=el('settingsModal');if(sm)sm.classList.remove('open');}
function saveSettings(){
  var c={};
  ['timeline','irr','parcel','lease','personal','corp'].forEach(function(k){var e=el('g-'+k);if(e)c[k]=e.value.trim();});
  setConfig(c);
  var sv=el('savedMsg');if(sv)sv.classList.add('show');
  setTimeout(function(){closeSettings();loadAll();},1100);
}
async function testGid(key){
  var e=el('g-'+key),b=el('tb-'+key);
  if(!e||!b)return;
  var gid=e.value.trim();
  if(!gid){b.className='test-btn fail';b.textContent='gid 없음';return;}
  b.className='test-btn';b.textContent='확인 중…';
  try{
    var r=await fetch(csvUrl(gid));
    if(!r.ok)throw 0;
    var t=await r.text();
    if(t.length<5||t.trim().charAt(0)==='<')throw 0;
    b.className='test-btn ok';b.textContent='✓ 연결됨';
  }catch(e2){b.className='test-btn fail';b.textContent='✗ 실패';}
}

// ── TIMELINE ──────────────────────────────────────
// 시트: [0]빈칸 [1]항목명 [2]기간("2026년 5월 ~ 9월") [3]소요 [4]기타
function parseRange(s){
  if(!s)return null;
  s=String(s).trim();
  var m;
  // YYYY년 M월 ~ YYYY년 N월
  m=s.match(/(\d{4})[년\s]*(\d{1,2})[월]?\s*[~\-～]\s*(\d{4})[년\s]*(\d{1,2})[월]?/);
  if(m)return{start:m[1]+'.'+(m[2].length===1?'0'+m[2]:m[2]),end:m[3]+'.'+(m[4].length===1?'0'+m[4]:m[4])};
  // YYYY년 M월 ~ YYYY년 (월 없음)
  m=s.match(/(\d{4})[년\s]*(\d{1,2})[월]?\s*[~\-～]\s*(\d{4})[년]?\s*$/);
  if(m)return{start:m[1]+'.'+(m[2].length===1?'0'+m[2]:m[2]),end:m[3]+'.12'};
  // YYYY년 M월 ~ N월 (종료 연도 생략)
  m=s.match(/(\d{4})[년\s]*(\d{1,2})[월]?\s*[~\-～]\s*(\d{1,2})[월]?/);
  if(m){var sy=parseInt(m[1]),sm2=parseInt(m[2]),em=parseInt(m[3]);var ey=em<sm2?sy+1:sy;return{start:sy+'.'+(m[2].length===1?'0'+m[2]:m[2]),end:ey+'.'+(em<10?'0'+em:String(em))};}
  // 단일 월 (마일스톤)
  m=s.match(/(\d{4})[년\s]*(\d{1,2})[월]?/);
  if(m){var ym=m[1]+'.'+(m[2].length===1?'0'+m[2]:m[2]);return{start:ym,end:ym,milestone:true};}
  return null;
}

var PHASE_COLORS=['#3b82f6','#7c3aed','#c2410c','#374151','#0f766e','#15803d','#b91c1c','#0369a1','#7e22ce','#065f46'];
var PHASE_COLORS2=['#60a5fa','#a78bfa','#f97316','#6b7280','#2dd4bf','#4ade80','#f87171','#38bdf8','#c084fc','#34d399'];

function renderTimeline(rows){
  var phases=[],milestones=[],colorIdx=0;
  rows.forEach(function(r){
    var name=(r[1]||'').trim();
    if(!name||name==='항목'||name.includes('타임라인'))return;
    var range=parseRange(r[2]);
    if(!range)return;
    if(range.milestone)milestones.push({name:name,start:range.start,end:range.end});
    else{phases.push({name:name,start:range.start,end:range.end,c1:PHASE_COLORS[colorIdx%PHASE_COLORS.length],c2:PHASE_COLORS2[colorIdx%PHASE_COLORS2.length]});colorIdx++;}
  });

  if(!phases.length&&!milestones.length){
    sh('content-timeline','<div class="status-box"><div style="font-size:28px">&#9888;</div><p>타임라인 데이터를 파싱하지 못했습니다.</p><small>시트 기간 형식 예: 2026년 5월 ~ 9월</small></div>');
    return;
  }
  var tlSrc=el('tl-src');if(tlSrc)tlSrc.textContent='';

  function toAbs(ym){var p=ym.split('.');return parseInt(p[0]||0)*12+parseInt(p[1]||1);}
  var all=[].concat(phases,milestones);
  var allAbs=[];
  all.forEach(function(p){allAbs.push(toAbs(p.start),toAbs(p.end));});
  var rS=Math.min.apply(null,allAbs),rE=Math.max.apply(null,allAbs)+1,total=rE-rS;
  function pct(a){return (((a-rS)/total)*100).toFixed(3)+'%';}
  function wpct(dur){return ((dur/total)*100).toFixed(3)+'%';}
  var sY=Math.floor(rS/12),eY=Math.floor((rE-1)/12);

  // summary cards
  var lastPhase=phases[phases.length-1];
  var constr=phases.find(function(p){return p.name.includes('공사')||p.name.includes('신축');});
  if(!constr)constr=lastPhase;
  var mindo=milestones.find(function(m){return m.name.includes('명도');});
  var cardsHtml='<div class="card cb"><div class="card-label">총 단계</div><div class="card-value">'+phases.length+'</div><div class="card-sub">개 프로세스</div></div>';
  cardsHtml+='<div class="card"><div class="card-label">프로젝트 기간</div><div class="card-value">'+total+'<span style="font-size:12px;font-weight:400">개월</span></div><div class="card-sub">'+(phases[0]?phases[0].start:'')+' ~ '+(lastPhase?lastPhase.end:'')+'</div></div>';
  cardsHtml+='<div class="card cg"><div class="card-label">착공 예정</div><div class="card-value sm">'+(constr?constr.start:'—')+'</div><div class="card-sub">'+(constr?constr.name:'')+'</div></div>';
  cardsHtml+='<div class="card cy"><div class="card-label">준공 예정</div><div class="card-value sm">'+(lastPhase?lastPhase.end:'—')+'</div><div class="card-sub">전체 공사 완료</div></div>';
  if(mindo)cardsHtml+='<div class="card cr"><div class="card-label">'+mindo.name+'</div><div class="card-value sm" style="color:var(--red)">'+mindo.start+'</div><div class="card-sub">임차인 전원 퇴거</div></div>';
  sh('cards-timeline',cardsHtml);

  // year/month header
  var yrHtml='',moHtml='';
  for(var y=sY;y<=eY;y++){
    var mStart=(y===sY)?rS%12||12:1,mEnd=(y===eY)?(rE-1)%12||12:12,cnt=mEnd-mStart+1;
    yrHtml+='<div class="gantt-yr-cell" style="width:'+((cnt/total)*100).toFixed(3)+'%">'+y+'</div>';
    for(var m=mStart;m<=mEnd;m++){moHtml+='<div class="gantt-mo-cell" style="width:'+((1/total)*100).toFixed(3)+'%">'+m+'</div>';}
  }

  // grid lines
  var gridHtml='';
  for(var gy=sY+1;gy<=eY;gy++){gridHtml+='<div class="gantt-ygrid" style="left:'+pct(gy*12+1)+'"></div>';}
  var now=new Date(),tAbs=now.getFullYear()*12+now.getMonth()+1;
  if(tAbs>=rS&&tAbs<=rE)gridHtml+='<div class="gantt-today" style="left:'+pct(tAbs)+'"></div>';

  // phase rows
  var phHtml='';
  phases.forEach(function(p){
    var s=toAbs(p.start),e=toAbs(p.end)+1,dur=e-s;
    var bg='linear-gradient(90deg,'+p.c1+','+p.c2+')';
    var durLabel=dur>=2?'<span class="gantt-bar-dur">'+dur+'개월</span>':'';
    phHtml+='<div class="gantt-row">';
    phHtml+=gridHtml;
    phHtml+='<div class="gantt-bar" style="left:'+pct(s)+';width:'+wpct(dur)+';background:'+bg+'">';
    phHtml+='<span class="gantt-bar-name">'+p.name+'</span>'+durLabel;
    phHtml+='<div class="gantt-tooltip">'+p.start+' ~ '+p.end+' ('+dur+'개월)</div>';
    phHtml+='</div></div>';
  });

  // milestone rows
  var msHtml='';
  milestones.forEach(function(m){
    var a=toAbs(m.start);
    msHtml+='<div class="gantt-ms-row">';
    msHtml+=gridHtml;
    msHtml+='<div class="gantt-ms-diamond" style="left:calc('+pct(a)+' - 6px)"></div>';
    msHtml+='<div class="gantt-ms-label" style="left:calc('+pct(a)+' + 18px)">&#128681; '+m.name+'</div>';
    msHtml+='</div>';
  });

  var tlTitle=el('tl-title');if(tlTitle)tlTitle.textContent='단계별 타임라인 ('+phases[0].start+' ~ '+lastPhase.end+')';

  sh('content-timeline',
    '<div class="gantt-wrap">'+
    '<div class="gantt-yr-bar">'+yrHtml+'</div>'+
    '<div class="gantt-mo-bar">'+moHtml+'</div>'+
    '<div class="gantt-body">'+gridHtml+phHtml+(msHtml?'<div style="margin-top:6px;border-top:1px dashed rgba(239,68,68,.2);padding-top:6px">'+msHtml+'</div>':'')+
    '</div></div>'
  );
}

// ── LEASE ──────────────────────────────────────────
// 시트: 섹션헤더 r[0]="1. 압구정로 112", 데이터 r[0]=건물 r[1]=층 r[2]=임차인 r[3]=시작 r[4]=종료 r[5]=보증금 r[6]=월임대 r[7]=관리비 r[8]=월계
function renderLease(rows){
  var sections=[],cur=null;
  rows.forEach(function(r){
    var c0=String(r[0]||'').trim(),c1=String(r[1]||'').trim(),c2=String(r[2]||'').trim();
    if(/^\d+\./.test(c0)){cur={title:c0.replace(/^\d+\.\s*/,''),tenants:[]};sections.push(cur);return;}
    if(c1==='층'||c2==='임차인'||c2==='임차인명')return;
    if(c2==='합계'||c1==='합계'||c0==='합계')return;
    if(!c2&&!c1)return;
    if(cur&&(c2||c1)){
      cur.tenants.push({bldg:c0,floor:c1,name:c2,start:String(r[3]||'').trim(),end:String(r[4]||'').trim(),
        deposit:pn(r[5]),rent:pn(r[6]),mgmt:pn(r[7]),total:pn(r[8])});
    }
  });
  if(!sections.length||!sections.some(function(s){return s.tenants.length;})){showNoData('content-lease','임차인 현황');return;}

  function expBadge(endDate){
    if(!endDate)return '';
    var end=new Date(endDate.replace(/\./g,'-')),now=new Date(),diff=(end-now)/(1000*60*60*24*30);
    if(diff<0)return bdg('만료','br');
    if(diff<6)return bdg('&#9888; '+Math.round(diff)+'개월 후','bo');
    return bdg('✓ '+endDate,'bg');
  }

  var allD=0,allR=0,allM=0,allN=0;
  sections.forEach(function(s){s.tenants.forEach(function(t){allD+=t.deposit;allR+=t.rent;allM+=t.mgmt;allN++;});});

  var mainSec=sections.filter(function(s){return !s.title.includes('토지');});
  var landSec=sections.filter(function(s){return s.title.includes('토지');});

  function renderSec(s){
    var sD=0,sR=0,sM=0;
    s.tenants.forEach(function(t){sD+=t.deposit;sR+=t.rent;sM+=t.mgmt;});
    var rows2='';
    s.tenants.forEach(function(t){
      rows2+='<div class="tenant-row">';
      rows2+='<div class="tenant-floor">'+t.floor+'</div>';
      rows2+='<div class="tenant-body">';
      rows2+='<div class="tenant-name">'+t.name+'</div>';
      rows2+='<div class="tenant-period">'+t.start+' ~ '+t.end+'</div>';
      rows2+='<div class="tenant-nums">';
      rows2+='<div class="tenant-kv">보증금 <b style="color:var(--accent3)">'+(t.deposit/10000).toFixed(0)+'만</b></div>';
      rows2+='<div class="tenant-kv">월임대 <b style="color:var(--accent2)">'+t.rent.toLocaleString()+'</b></div>';
      rows2+='<div class="tenant-kv">관리비 <b>'+t.mgmt.toLocaleString()+'</b></div>';
      rows2+='<div class="tenant-kv">월합계 <b>'+(t.rent+t.mgmt).toLocaleString()+'</b></div>';
      rows2+='</div></div>';
      rows2+='<div class="tenant-badge">'+expBadge(t.end)+'</div>';
      rows2+='</div>';
    });
    return '<div class="lease-block">'+
      '<div class="lease-block-hdr">'+
        '<span>&#128205;</span>'+
        '<span class="lease-block-addr">'+s.title+'</span>'+
        '<div class="lease-block-stats">'+
          '<div class="lease-bkv"><div class="lease-bkl">임차인</div><div class="lease-bkn">'+s.tenants.length+'명</div></div>'+
          '<div class="lease-bkv"><div class="lease-bkl">월 합계</div><div class="lease-bkn" style="color:var(--accent2)">'+(sR+sM).toLocaleString()+'</div></div>'+
          '<div class="lease-bkv"><div class="lease-bkl">보증금</div><div class="lease-bkn" style="color:var(--accent3)">'+(sD/100000000).toFixed(1)+'억</div></div>'+
        '</div>'+
      '</div>'+
      rows2+
      '<div class="lease-subtotal"><span style="font-size:10px;color:var(--text-muted)">소계 '+s.tenants.length+'개 임차인</span><span style="font-size:12px;font-weight:700;font-family:var(--font-mono);color:var(--accent2)">'+(sR+sM).toLocaleString()+'원 / 월</span></div>'+
    '</div>';
  }

  function renderLand(s){
    var html='';
    s.tenants.forEach(function(t){
      html+='<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:13px 16px;background:var(--surface);border:1px solid rgba(245,166,35,.2);border-radius:var(--radius);margin-bottom:8px">';
      html+='<div style="display:flex;align-items:center;gap:12px"><span style="font-size:16px">&#127959;</span><div>';
      html+='<div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px">'+t.name+' — '+(t.bldg||s.title)+'</div>';
      html+='<div style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono)">'+t.start+' ~ '+t.end+'</div></div></div>';
      html+='<div style="display:flex;gap:20px;align-items:center">';
      html+='<div style="text-align:right"><div style="font-size:9px;color:var(--text-muted);margin-bottom:2px">보증금</div><div style="font-size:13px;font-weight:700;font-family:var(--font-mono);color:var(--accent3)">'+(t.deposit/100000000).toFixed(1)+'억</div></div>';
      html+='<div style="text-align:right"><div style="font-size:9px;color:var(--text-muted);margin-bottom:2px">월 임대료</div><div style="font-size:13px;font-weight:700;font-family:var(--font-mono);color:var(--accent2)">'+t.rent.toLocaleString()+'</div></div>';
      html+='<div>'+expBadge(t.end)+'</div></div></div>';
    });
    return html;
  }

  var mainHtml='';mainSec.forEach(function(s){mainHtml+=renderSec(s);});
  var landHtml='';landSec.forEach(function(s){landHtml+=renderLand(s);});

  // cards
  sh('cards-lease',
    '<div class="card cb"><div class="card-label">총 임차인</div><div class="card-value">'+allN+'</div><div class="card-sub">'+mainSec.length+'개 건물</div></div>'+
    '<div class="card cg"><div class="card-label">월 임대료</div><div class="card-value sm">'+fmt(allR)+'원</div><div class="card-sub">관리비 제외</div></div>'+
    '<div class="card"><div class="card-label">월 관리비</div><div class="card-value sm">'+fmt(allM)+'원</div></div>'+
    '<div class="card cy"><div class="card-label">월 합계</div><div class="card-value sm">'+fmt(allR+allM)+'원</div></div>'+
    '<div class="card"><div class="card-label">보증금 합계</div><div class="card-value sm">'+(allD/100000000).toFixed(1)+'억</div></div>'
  );
  sh('content-lease',
    '<div class="lease-grid">'+mainHtml+'</div>'+
    (landHtml?'<div class="st" style="margin-top:4px"><span class="dot" style="background:var(--accent3)"></span>토지 임대료</div>'+landHtml:'')+
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);margin-top:12px">'+
      '<span style="font-weight:700;color:var(--text-muted);font-size:12px">전체 합계 (임차인 '+allN+'명)</span>'+
      '<div style="display:flex;gap:20px;align-items:center">'+
        '<span style="font-size:11px;color:var(--text-muted)">보증금 <span style="color:var(--accent3);font-family:var(--font-mono);font-weight:700">'+(allD/100000000).toFixed(1)+'억</span></span>'+
        '<span style="font-size:11px;color:var(--text-muted)">월 합계 <span style="color:var(--accent2);font-family:var(--font-mono);font-size:14px;font-weight:700">'+(allR+allM).toLocaleString()+'원</span></span>'+
      '</div></div>'
  );
}

// ── PERSONAL ──────────────────────────────────────
function renderPersonal(pRows,leaseRows,corpRows){
  // 임차인 시트 → 수입 추출
  var leaseInc=[],lastAddr='';
  (leaseRows||[]).forEach(function(r){
    var addr=String(r[0]||'').trim(),name=String(r[2]||'').trim();
    if(!name||['임차인','임차인명','건물','주소','항목','층'].indexOf(name)>=0)return;
    if(['건물','주소','항목'].indexOf(addr)>=0)return;
    if(addr)lastAddr=addr;
    var rent=pn(r[6]),mgmt=pn(r[7]);
    if(rent>0||mgmt>0){leaseInc.push({name:name+' ('+String(r[1]||'').trim()+')',source:'임차인 현황',period:String(r[3]||'')+' ~ '+String(r[4]||''),monthly:Math.round((rent+mgmt)/10000),total:0});}
  });
  // 법인 시트 → 지출 추출
  var corpExp=[],curSect='';
  (corpRows||[]).forEach(function(r){
    var name=String(r[1]||'').trim();
    if(!name||name==='항목')return;
    var amt=pn(r[3]);
    var isSectHdr=/^\d+\./.test(name)||(!amt&&!String(r[4]||'').trim()&&name.length<25&&name.charAt(0)!=='-'&&name.charAt(0)!=='–');
    if(isSectHdr){curSect=name;}
    else if(curSect&&amt){corpExp.push({name:name.replace(/^[-–]\s*/,''),source:'법인비용 · '+curSect,period:String(r[4]||''),monthly:0,total:Math.round(amt/10000)});}
  });
  // 개인 시트 파싱
  var inc=[],exp=[],mly=[],mode='';
  (pRows||[]).forEach(function(r){
    var c0=String(r[0]||'').trim(),c1=String(r[1]||'').trim();
    if(!c0)return;
    if((c0+c1).replace(/\s/g,'').indexOf('수입')>=0&&!c0.match(/^\d{4}/)){mode='inc';return;}
    if((c0+c1).replace(/\s/g,'').indexOf('지출')>=0&&!c0.match(/^\d{4}/)){mode='exp';return;}
    if((c0+c1).replace(/\s/g,'').indexOf('월별')>=0||c1==='진행단계'){mode='mly';return;}
    if(c0.match(/^\d{4}[.\-]\d{2}/))mode='mly';
    if(mode==='mly'&&c0.match(/^\d{4}[.\-]\d{2}/)){mly.push(r);return;}
    if(mode==='inc'&&(r[3]||r[4])){inc.push({name:c0,source:'개인비용',period:String(r[2]||''),monthly:pn(r[3]),total:pn(r[4])});return;}
    if(mode==='exp'&&(r[3]||r[4])){exp.push({name:c0,source:'개인비용',period:String(r[2]||''),monthly:pn(r[3]),total:pn(r[4])});return;}
  });

  var allInc=inc.concat(leaseInc),allExp=exp.concat(corpExp);
  var tI=allInc.reduce(function(s,i){return s+(i.total||0);},0);
  var tE=allExp.reduce(function(s,e){return s+(e.total||0);},0);
  var net=tI-tE;

  function srcColor(src){if(src==='개인비용')return 'var(--accent)';if(src.indexOf('임차인')>=0)return 'var(--accent2)';return 'var(--accent5)';}
  function itemRow(it,isInc){
    var amt=it.total||0,sign=isInc?'+':'',color=isInc?'var(--green)':'var(--red)';
    var html='<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid rgba(37,43,61,.45)">';
    html+='<div style="flex:1;min-width:0;margin-right:10px">';
    html+='<div style="font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px;line-height:1.4">'+it.name+'</div>';
    html+='<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">';
    html+='<span style="font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:'+srcColor(it.source)+'">'+it.source+'</span>';
    if(it.period)html+='<span style="font-size:10px;color:var(--text-muted);font-family:var(--font-mono)">'+it.period+'</span>';
    html+='</div></div>';
    html+='<div style="text-align:right;flex-shrink:0">';
    if(it.monthly)html+='<div style="font-size:10px;color:var(--text-muted);margin-bottom:1px">월 '+it.monthly.toLocaleString()+'만</div>';
    if(amt)html+='<div style="font-size:13px;font-weight:700;font-family:var(--font-mono);color:'+color+'">'+sign+amt.toLocaleString()+'만</div>';
    else html+='<div style="font-size:11px;color:var(--text-dim)">월액만</div>';
    html+='</div></div>';
    return html;
  }

  var incCards='',expCards='';
  allInc.forEach(function(i){incCards+=itemRow(i,true);});
  allExp.forEach(function(e){expCards+=itemRow(e,false);});
  if(!incCards)incCards='<div style="padding:16px;text-align:center;color:var(--text-dim);font-size:12px">수입 항목 없음</div>';
  if(!expCards)expCards='<div style="padding:16px;text-align:center;color:var(--text-dim);font-size:12px">지출 항목 없음</div>';

  // 월별
  var mRows='',py='';
  mly.forEach(function(r){
    var ym=String(r[0]||''),yr=ym.split(/[.\-]/)[0];
    var sep=yr!==py?'<tr class="yrs"><td colspan="14">── '+yr+'년</td></tr>':'';py=yr;
    function fv(n){if(!n&&n!==0)return '<span style="color:var(--text-dim)">-</span>';var v=pn(n);if(v===0)return '<span style="color:var(--text-dim)">-</span>';var vc=v>0?'cp':'cn';return '<span class="'+vc+'">'+(v>0?'+':'')+v.toLocaleString()+'</span>';}
    var mn=pn(r[12]),cu=pn(r[13]);
    mRows+=sep+'<tr><td class="tl">'+ym+'</td><td class="ts2">'+(r[1]||'—')+'</td>';
    for(var i2=2;i2<=11;i2++)mRows+='<td>'+fv(r[i2])+'</td>';
    mRows+='<td><span class="'+(mn>=0?'cp':'cn')+'" style="font-weight:700">'+(mn>=0?'+':'')+mn.toLocaleString()+'</span></td>';
    mRows+='<td><span class="'+(cu>=0?'cp':'cn')+'">'+(cu>=0?'+':'')+cu.toLocaleString()+'</span></td></tr>';
  });

  var borderColor=net>=0?'rgba(34,197,94,.2)':'rgba(239,68,68,.18)';
  var netColor=net>=0?'var(--green)':'var(--red)';
  var html='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px">';
  html+='<div style="background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2);border-radius:var(--radius);padding:16px 18px"><div style="font-size:10px;color:var(--accent2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">총 수입</div><div style="font-size:24px;font-weight:700;font-family:var(--font-mono);color:var(--green)">+'+tI.toLocaleString()+'만</div><div style="font-size:10px;color:var(--text-dim);margin-top:4px">'+allInc.length+'개 항목</div></div>';
  html+='<div style="background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.18);border-radius:var(--radius);padding:16px 18px"><div style="font-size:10px;color:var(--red);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">총 지출</div><div style="font-size:24px;font-weight:700;font-family:var(--font-mono);color:var(--red)">'+tE.toLocaleString()+'만</div><div style="font-size:10px;color:var(--text-dim);margin-top:4px">'+allExp.length+'개 항목</div></div>';
  html+='<div style="background:var(--surface2);border:1px solid '+borderColor+';border-radius:var(--radius);padding:16px 18px"><div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px">순 현금흐름</div><div style="font-size:24px;font-weight:700;font-family:var(--font-mono);color:'+netColor+'">'+(net>=0?'+':'')+net.toLocaleString()+'만</div><div style="font-size:10px;color:var(--text-dim);margin-top:4px">전체 기간 합산</div></div>';
  html+='</div>';
  html+='<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center"><span style="font-size:10px;color:var(--text-muted)">데이터 출처:</span><span style="font-size:10px;padding:2px 7px;border-radius:3px;background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.2);color:var(--accent)">개인비용</span><span style="font-size:10px;padding:2px 7px;border-radius:3px;background:rgba(110,231,183,.1);border:1px solid rgba(110,231,183,.2);color:var(--accent2)">임차인 현황 (수입)</span><span style="font-size:10px;padding:2px 7px;border-radius:3px;background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);color:var(--accent5)">법인비용 (지출)</span></div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">';
  html+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;max-height:440px;overflow-y:auto"><div style="position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(34,197,94,.07);border-bottom:1px solid rgba(34,197,94,.15);z-index:1"><span style="font-size:11px;font-weight:700;color:var(--green)">&#128176; 수입 항목 ('+allInc.length+')</span><span style="font-size:12px;font-weight:700;font-family:var(--font-mono);color:var(--green)">+'+tI.toLocaleString()+'만</span></div>'+incCards+'</div>';
  html+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;max-height:440px;overflow-y:auto"><div style="position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(239,68,68,.06);border-bottom:1px solid rgba(239,68,68,.12);z-index:1"><span style="font-size:11px;font-weight:700;color:var(--red)">&#128228; 지출 항목 ('+allExp.length+')</span><span style="font-size:12px;font-weight:700;font-family:var(--font-mono);color:var(--red)">'+tE.toLocaleString()+'만</span></div>'+expCards+'</div>';
  html+='</div>';
  var mlyTag=mly.length?'<span class="tag">✓ 시트 연동</span>':'<span class="tag-dim">월별 데이터 없음</span>';
  html+='<div class="st"><span class="dot"></span>월별 캐시플로우 (개인비용 시트)'+mlyTag+'</div>';
  if(mly.length){
    html+='<div class="mo"><table class="mtbl" style="min-width:1100px"><thead><tr>';
    html+='<th class="tl" rowspan="2" style="vertical-align:middle;border-right:1px solid var(--border)">연월</th>';
    html+='<th class="tl" rowspan="2" style="vertical-align:middle;border-right:1px solid var(--border)">단계</th>';
    html+='<th colspan="5" class="ti" style="text-align:center;border-bottom:1px solid rgba(34,197,94,.2)">수입 (만원)</th>';
    html+='<th colspan="5" class="te" style="text-align:center;border-bottom:1px solid rgba(239,68,68,.15)">지출 (만원)</th>';
    html+='<th class="ts" rowspan="2" style="vertical-align:middle">월 순현금</th>';
    html+='<th class="ts" rowspan="2" style="vertical-align:middle">누적</th>';
    html+='</tr><tr>';
    html+='<th class="ti">임대(112)</th><th class="ti">관리(112)</th><th class="ti">임대(8길)</th><th class="ti">관리(8길)</th><th class="ti">토지임대</th>';
    html+='<th class="te">대출(112)</th><th class="te">고정(112)</th><th class="te">대출(8길)</th><th class="te">고정(8길)</th><th class="te">기타</th>';
    html+='</tr></thead><tbody class="sbody">'+mRows+'</tbody></table></div>';
  }else{
    html+='<div class="status-box" style="padding:22px"><p style="color:var(--text-dim)">개인비용 시트에 월별 섹션을 추가하면 여기에 표시됩니다.</p></div>';
  }
  sh('content-personal',html);
}

// ── CORP ──────────────────────────────────────────
function renderCorp(rows){
  if(!rows||rows.length<2){showNoData('content-corp','법인 비용');return;}
  var sections=[],cur=null,grand=0;
  var COLORS=['var(--accent5)','var(--accent)','var(--accent2)','var(--accent3)','var(--accent6)','var(--accent4)'];
  rows.forEach(function(r){
    var name=String(r[1]||'').trim();
    if(!name||name==='항목')return;
    var amt=pn(r[3]),period=String(r[4]||'').trim(),method=String(r[5]||'').trim(),detail=String(r[6]||'').trim();
    var isSectHdr=/^\d+\./.test(name)||(!amt&&!period&&name.length<25&&name.charAt(0)!=='-'&&name.charAt(0)!=='–');
    if(isSectHdr){cur={title:name,items:[],total:0};sections.push(cur);}
    else if(cur){cur.items.push({name:name.replace(/^[-–]\s*/,''),amt:amt,period:period,method:method,detail:detail});cur.total+=amt;grand+=amt;}
  });
  if(!sections.length){showErr('content-corp','법인 비용','');return;}

  var sectHtml='';
  sections.forEach(function(s,si){
    var color=COLORS[si%COLORS.length];
    var items='';
    s.items.forEach(function(it){
      var meta=[it.period,it.method,it.detail].filter(Boolean).join(' · ');
      items+='<div class="corp-item"><div class="corp-dot" style="background:'+color+'"></div><div class="corp-item-info"><div class="corp-item-name">'+it.name+'</div><div class="corp-item-meta">'+meta+'</div></div><div class="corp-item-amt">'+(it.amt?Math.round(it.amt/10000).toLocaleString()+'만':'—')+'</div></div>';
    });
    sectHtml+='<div class="corp-sec"><div class="corp-sec-hdr"><div class="corp-sec-title"><span style="width:6px;height:6px;border-radius:50%;background:'+color+';display:inline-block;flex-shrink:0"></span>'+s.title+'</div><div class="corp-sec-amt">'+Math.round(s.total/10000).toLocaleString()+'만원</div></div>'+(items||'<div style="padding:12px 14px;color:var(--text-dim);font-size:11px">항목 없음</div>')+'</div>';
  });

  sh('content-corp',
    '<div class="corp-total-banner"><div><div style="font-size:12px;color:var(--text-muted);font-weight:600">법인 총비용 합계</div><div style="font-size:11px;color:var(--text-dim);margin-top:3px">'+sections.length+'개 항목 분류</div></div><div style="text-align:right"><div style="font-size:22px;font-weight:700;font-family:var(--font-mono);color:var(--red)">'+Math.round(grand/10000).toLocaleString()+'만원<span style="font-size:11px;color:var(--text-dim);margin-left:6px">&#8776; '+(grand/100000000).toFixed(1)+'억</span></div></div></div>'+
    '<div class="corp-sections">'+sectHtml+'</div>'
  );
}

// ── IRR ──────────────────────────────────────────
function renderIrr(rows,parcelRows){
  var pSrc=(parcelRows&&parcelRows.length>1)?parcelRows:null;
  var parcelHTML='';
  if(pSrc){
    var pdr=pSrc.filter(function(r){return r[0]&&!String(r[0]).match(/^\d/)&&!String(r[0]).includes('필지')&&r[1];});
    pdr.forEach(function(r){
      parcelHTML+='<div class="pc"><div style="font-size:13px;font-weight:700;margin-bottom:2px">'+r[0]+'</div><div style="font-size:10px;color:var(--text-muted);margin-bottom:9px">'+r[1]+'</div>';
      [['토지 면적',r[2]],['매입가',r[3]],['대출금',r[4]],['보증금/월세',r[5]],['공시지가',r[6]]].forEach(function(kv){
        parcelHTML+='<div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:11px"><span style="color:var(--text-muted)">'+kv[0]+'</span><span style="font-family:var(--font-mono);font-size:10px">'+(kv[1]||'—')+'</span></div>';
      });
      parcelHTML+='</div>';
    });
  }

  var km={};
  (rows||[]).forEach(function(r){if(r[0]&&r[1]&&!String(r[0]).match(/^\d{4}[.\-]\d/))km[String(r[0]).trim()]=String(r[1]).trim();});
  var kI=km['IRR']||km['추정 IRR']||km['irr']||'—';
  var kN=km['NPV']||km['순현재가치']||'—';
  var kP=km['투자회수기간']||km['회수기간']||'—';
  var kV=km['총투자비용']||km['총 투자비용']||'—';
  var kR=km['연간임대수입']||km['연간 임대수입']||'—';

  var cfr=(rows||[]).filter(function(r){return r[0]&&String(r[0]).match(/^\d{4}[.\-]\d/);});
  var cfHTML='';
  cfr.forEach(function(r){
    function cv(v){if(!v||v==='0')return '—';return '<span style="color:'+(pn(v)>=0?'var(--green)':'var(--red)')+'">'+v+'</span>';}
    cfHTML+='<tr><td style="font-weight:600">'+r[0]+'</td><td style="color:var(--text-muted)">'+r[1]+'</td><td class="num" style="color:var(--green)">'+(r[2]&&r[2]!=='0'?'+'+String(r[2]):'—')+'</td><td class="num" style="color:var(--red)">'+(r[3]||'—')+'</td><td class="num '+(pn(r[4])>=0?'pos':'neg')+'">'+(r[4]||'—')+'</td><td class="num '+(pn(r[5])>=0?'pos':'neg')+'">'+(r[5]||'—')+'</td></tr>';
  });

  var html='<div class="st"><span class="dot"></span>필지 요약'+(pSrc?'<span class="tag">✓ 시트 연동</span>':'')+'</div>';
  html+='<div class="pgrid">'+(parcelHTML||'<div style="color:var(--text-dim);font-size:12px;padding:10px">필지 데이터가 없습니다. parcel gid를 설정하세요.</div>')+'</div>';
  html+='<div class="st"><span class="dot"></span>IRR 분석 요약'+(cfr.length?'<span class="tag">✓ 시트 연동</span>':'')+'</div>';
  html+='<div class="ikgrid">';
  html+='<div class="ikc"><div class="kl">추정 IRR</div><div class="kv pos">'+kI+'</div><div class="ks">내부수익률 (세전)</div></div>';
  html+='<div class="ikc"><div class="kl">순현재가치 (NPV)</div><div class="kv pos">'+kN+'</div><div class="ks">할인율 기준</div></div>';
  html+='<div class="ikc"><div class="kl">투자 회수 기간</div><div class="kv neu">'+kP+'</div><div class="ks">준공 후 임대수익 기준</div></div>';
  html+='<div class="ikc"><div class="kl">총 투자비용</div><div class="kv neg" style="font-size:16px">'+kV+'</div><div class="ks">공사비 + 설계/감리 + 토지임대</div></div>';
  html+='<div class="ikc"><div class="kl">연간 임대수입 (추정)</div><div class="kv pos" style="font-size:16px">'+kR+'</div><div class="ks">준공 후 안정화 기준</div></div>';
  html+='</div>';
  if(cfHTML){
    html+='<div class="st"><span class="dot"></span>연도별 현금흐름</div>';
    html+='<div style="border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:18px"><table class="tbl"><thead><tr><th>연도</th><th>단계</th><th class="num">유입</th><th class="num">유출</th><th class="num">순 현금흐름</th><th class="num">누적</th></tr></thead><tbody>'+cfHTML+'</tbody></table></div>';
  }
  html+='<div class="st"><span class="dot"></span>IRR 시뮬레이터</div>';
  html+='<div class="calc-wrap"><div style="font-size:13px;font-weight:700;margin-bottom:14px">&#129518; IRR 계산기</div><div class="calc-grid">';
  html+='<div class="cf"><label>총 투자비용 (만원)</label><div class="fr"><input type="number" id="ic-inv" value="132470" oninput="calcIRR()"/></div></div>';
  html+='<div class="cf"><label>연간 임대수입 (만원)</label><div class="fr"><input type="number" id="ic-inc" value="6840" oninput="calcIRR()"/></div></div>';
  html+='<div class="cf"><label>보유 기간 (년)</label><div class="fr"><input type="range" id="ic-yr" min="5" max="30" value="20" oninput="el(\'ic-yr-v\').textContent=this.value+\'년\';calcIRR()"/><span class="rv2" id="ic-yr-v">20년</span></div></div>';
  html+='<div class="cf"><label>Cap Rate (%)</label><div class="fr"><input type="range" id="ic-cap" min="2" max="8" step="0.1" value="4.5" oninput="el(\'ic-cap-v\').textContent=this.value+\'%\';calcIRR()"/><span class="rv2" id="ic-cap-v">4.5%</span></div></div>';
  html+='<div class="cf"><label>할인율 (%)</label><div class="fr"><input type="range" id="ic-disc" min="2" max="12" step="0.5" value="6" oninput="el(\'ic-disc-v\').textContent=this.value+\'%\';calcIRR()"/><span class="rv2" id="ic-disc-v">6%</span></div></div>';
  html+='<div class="cf"><label>공실률 (%)</label><div class="fr"><input type="range" id="ic-vac" min="0" max="30" step="1" value="5" oninput="el(\'ic-vac-v\').textContent=this.value+\'%\';calcIRR()"/><span class="rv2" id="ic-vac-v">5%</span></div></div>';
  html+='</div><button class="calc-btn" onclick="calcIRR()">&#128260; IRR 재계산</button>';
  html+='<div class="res-bar"><div class="ri"><div class="ri-l">추정 IRR</div><div class="ri-v pos" id="r-irr">—</div></div><div class="ri"><div class="ri-l">NPV</div><div class="ri-v pos" id="r-npv">—</div></div><div class="ri"><div class="ri-l">단순 회수기간</div><div class="ri-v neu" id="r-pb">—</div></div></div></div>';
  html+='<div style="font-size:11px;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-top:10px;line-height:1.8">&#9888; 시뮬레이터 수치는 추정값입니다.</div>';
  sh('content-irr',html);
  calcIRR();
}

function calcIRR(){
  var inv=parseFloat((el('ic-inv')||{value:132470}).value)||132470;
  var inc=parseFloat((el('ic-inc')||{value:6840}).value)||6840;
  var yr=parseFloat((el('ic-yr')||{value:20}).value)||20;
  var cap=parseFloat((el('ic-cap')||{value:4.5}).value)/100||0.045;
  var disc=parseFloat((el('ic-disc')||{value:6}).value)/100||0.06;
  var vac=parseFloat((el('ic-vac')||{value:5}).value)/100||0.05;
  var ei=inc*(1-vac),ev=Math.round(ei/cap);
  var cf=[-inv];for(var i=1;i<yr;i++)cf.push(ei);cf.push(ei+ev);
  function npvFn(r){return cf.reduce(function(s,v,i){return s+v/Math.pow(1+r,i);},0);}
  var r=0.08,step=0.01;
  for(var it=0;it<300;it++){var v=npvFn(r);if(Math.abs(v)<0.5)break;if(v>0)r+=step;else r-=step;step*=0.92;}
  var npv=Math.round(npvFn(disc));
  var ri=el('r-irr'),rn=el('r-npv'),rp=el('r-pb');
  if(ri){ri.textContent=(r*100).toFixed(2)+'%';ri.className='ri-v '+(r>=0.06?'pos':'neg');}
  if(rn){rn.textContent=(npv>=0?'+':'')+Math.round(npv/10000)+'만';rn.className='ri-v '+(npv>=0?'pos':'neg');}
  if(rp){rp.textContent=Math.max(0,inv/ei).toFixed(1)+'년';}
}

// ── LOAD ──────────────────────────────────────────
async function loadOne(key,label,contentId,renderFn,cardId){
  var cfg=getConfig();
  var defaults={timeline:'835667947',lease:'0',personal:'662143448',corp:'551803703'};
  var gid=cfg[key]||defaults[key]||'';
  if(cardId){var ce=el(cardId);if(ce)ce.innerHTML='';}
  if(!gid){renderFn([]);return;}
  showLoad(contentId);
  try{var rows=await fetchSheet(gid);renderFn(rows);}
  catch(e){console.warn('['+label+']',e.message);showErr(contentId,label,e.message);}
}

async function loadAll(){
  var btn=el('refreshBtn');if(btn)btn.classList.add('spinning');
  var cfg=getConfig();
  try{
    await Promise.all([
      loadOne('timeline','타임라인','content-timeline',renderTimeline,'cards-timeline'),
      loadOne('lease','임차인 현황','content-lease',renderLease,'cards-lease'),
      loadOne('corp','법인 비용','content-corp',renderCorp),
      (async function(){
        showLoad('content-personal');
        var pGid=cfg['personal']||'662143448',lGid=cfg['lease']||'0',cGid=cfg['corp']||'551803703';
        var pR=[],lR=[],cR=[];
        try{pR=await fetchSheet(pGid);}catch(e){console.warn('[personal]',e.message);}
        try{lR=await fetchSheet(lGid);}catch(e){console.warn('[personal/lease]',e.message);}
        try{cR=await fetchSheet(cGid);}catch(e){console.warn('[personal/corp]',e.message);}
        renderPersonal(pR,lR,cR);
      })(),
      (async function(){
        var iGid=cfg['irr']||'',pGid2=cfg['parcel']||'';
        var iR=[],pR2=[];
        if(iGid){showLoad('content-irr');try{iR=await fetchSheet(iGid);}catch(e){console.warn('[irr]',e.message);}}
        if(pGid2){try{pR2=await fetchSheet(pGid2);}catch(e){console.warn('[parcel]',e.message);}}
        renderIrr(iR,pR2);
      })()
    ]);
  }catch(e){console.error('loadAll error:',e);}
  var lu=el('lastUpdated');if(lu)lu.textContent='마지막 업데이트: '+new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'});
  if(btn)btn.classList.remove('spinning');
}

// ── TABS ──────────────────────────────────────────
document.querySelectorAll('.tab').forEach(function(t){
  t.addEventListener('click',function(){
    document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
    document.querySelectorAll('.tab-panel').forEach(function(x){x.classList.remove('active');});
    t.classList.add('active');
    var p=el('panel-'+t.dataset.tab);if(p)p.classList.add('active');
  });
});

try{loadAll();}catch(e){console.error('init error:',e);}
