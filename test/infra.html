<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>인프라 분석 · 케이프혼타워</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08090d; --s1:#0f1118; --s2:#151821; --s3:#1c2030;
  --border:#222636; --border2:#2a3050;
  --blue:#3b7fff; --blue-g:linear-gradient(135deg,#3b7fff,#6c48f5);
  --green:#22d186; --yellow:#f5bc30; --orange:#f07830;
  --red:#f03860; --purple:#9060f0;
  --t1:#eef0f8; --t2:#8890aa; --t3:#4a5270; --t4:#2a3050;
  --mono:'DM Mono',monospace; --sans:'Noto Sans KR',sans-serif;
  --display:'Bebas Neue',sans-serif;
  --r:10px; --r2:6px;
  --panel-w:440px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--sans)}

/* ── 지도 풀스크린 ── */
#map{position:fixed;inset:0;z-index:0;width:100%;height:100%}

/* ── 상단 헤더 바 ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:800;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;
  background:rgba(8,9,13,.85);
  backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(59,127,255,.15);
  height:52px;
}
.brand{display:flex;align-items:baseline;gap:10px}
.brand-name{
  font-family:var(--display);font-size:22px;letter-spacing:2px;
  background:var(--blue-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.brand-sub{font-size:10px;color:var(--t3);letter-spacing:3px;text-transform:uppercase}
.topbar-r{display:flex;align-items:center;gap:10px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:blink 2.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn-back{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.06);border:1px solid var(--border2);
  color:var(--t2);padding:6px 14px;border-radius:var(--r2);
  font-size:12px;cursor:pointer;transition:.18s;text-decoration:none
}
.btn-back:hover{background:rgba(59,127,255,.15);color:var(--t1);border-color:var(--blue)}

/* ── 우측 플로팅 패널 ── */
.panel{
  position:fixed;top:62px;right:14px;bottom:14px;z-index:700;
  width:var(--panel-w);
  display:flex;flex-direction:column;
  overflow:hidden;
  border-radius:14px;
  border:1px solid rgba(59,127,255,.18);
  background:rgba(10,11,16,.9);
  backdrop-filter:blur(20px);
  box-shadow:0 8px 40px rgba(0,0,0,.65);
}

/* 패널 헤더 */
.panel-head{
  padding:18px 20px 14px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  background:linear-gradient(135deg,rgba(59,127,255,.06),rgba(108,72,245,.04));
}
.panel-title{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:4px}
.panel-sub{font-size:12px;color:var(--t3)}

/* ── 일체형 컨트롤 영역 ── */
.ctrl-wrap{padding:16px 20px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:14px}

/* 섹션 타이틀 */
.sec-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.8px;font-weight:700;margin-bottom:8px}

/* 주소 + 반경 */
.addr-row{display:flex;gap:6px;margin-bottom:10px}
.addr-input{
  flex:1;background:var(--s2);border:1px solid var(--border2);
  border-radius:var(--r2);padding:10px 14px;
  color:var(--t1);font-family:var(--sans);font-size:13px;
  outline:none;transition:.18s
}
.addr-input:focus{border-color:var(--blue);background:var(--s3)}
.addr-input::placeholder{color:var(--t3)}
.btn-geo{
  background:rgba(59,127,255,.18);border:1px solid rgba(59,127,255,.3);
  color:var(--blue);border-radius:var(--r2);
  padding:10px 14px;font-size:13px;font-weight:600;
  cursor:pointer;transition:.18s;white-space:nowrap
}
.btn-geo:hover{background:rgba(59,127,255,.3)}
.radius-row{display:flex;gap:5px}
.r-chip{
  flex:1;text-align:center;
  padding:9px 0;border-radius:20px;font-size:12px;font-weight:700;
  border:1px solid var(--border2);background:var(--s2);color:var(--t2);
  cursor:pointer;transition:.15s
}
.r-chip.on{background:rgba(59,127,255,.18);border-color:var(--blue);color:var(--blue)}

/* 카테고리 */
.cat-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cat-reset{font-size:11px;color:var(--blue);cursor:pointer;padding:2px 0;font-weight:600}
.cat-reset:hover{text-decoration:underline}
.cat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.cat-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;padding:14px 6px;border-radius:10px;cursor:pointer;transition:.18s;
  border:1.5px solid var(--border2);background:var(--s2);
  position:relative;user-select:none;
}
.cat-item:hover{border-color:var(--border2);background:var(--s3)}
.cat-item.on{
  background:rgba(59,127,255,.1);
  border-color:var(--blue);
}
.cat-check{
  position:absolute;top:6px;right:7px;
  width:15px;height:15px;border-radius:50%;
  border:1.5px solid var(--border2);
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  transition:.15s;flex-shrink:0;
}
.cat-item.on .cat-check{
  background:var(--blue);border-color:var(--blue);
}
.cat-check::after{
  content:'';display:block;
  width:5px;height:3px;
  border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;
  transform:rotate(-45deg) translate(1px,-1px);
  opacity:0;transition:.15s;
}
.cat-item.on .cat-check::after{opacity:1}
.cat-emoji{font-size:22px;line-height:1}
.cat-name{font-size:11.5px;color:var(--t3);font-weight:600;line-height:1.2;text-align:center;transition:.15s}
.cat-item.on .cat-name{color:var(--t1)}
.cat-cnt{
  font-family:var(--mono);font-size:10px;
  color:var(--green);font-weight:700;
  background:rgba(34,209,134,.12);border-radius:8px;
  padding:1px 7px;
}
.cat-cnt:empty{display:none}

/* 실행 버튼 */
.run-wrap{padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.btn-run{
  width:100%;padding:15px;border:none;border-radius:var(--r);
  background:var(--blue-g);color:#fff;font-family:var(--sans);
  font-size:15px;font-weight:700;cursor:pointer;transition:.18s;
  display:flex;align-items:center;justify-content:center;gap:10px;
  letter-spacing:.3px;
}
.btn-run:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-run:active{transform:translateY(0)}
.btn-run:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* 결과 목록 */
.result-wrap{flex:1;overflow-y:auto;min-height:0}
.result-wrap::-webkit-scrollbar{width:3px}
.result-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.result-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:10px;color:var(--t3);font-size:12px;text-align:center;padding:24px
}
.result-empty .e-ico{font-size:32px;opacity:.35}

.result-header{
  padding:11px 18px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;
  background:rgba(10,11,16,.95);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.result-count{font-family:var(--mono);font-size:12px;color:var(--t2)}
.result-count span{color:var(--green);font-weight:700}
.result-hd-r{display:flex;align-items:center;gap:8px}
.btn-sel-all{
  font-size:10px;padding:3px 10px;border-radius:20px;
  border:1px solid var(--border2);background:transparent;
  color:var(--t3);cursor:pointer;transition:.15s
}
.btn-sel-all:hover{border-color:var(--blue);color:var(--blue)}

.result-list{list-style:none}
.result-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;border-bottom:1px solid rgba(34,38,54,.45);
  cursor:pointer;transition:.12s
}
.result-item:hover{background:rgba(59,127,255,.05)}
.result-item.selected{background:rgba(59,127,255,.08)}
.ri-chk{
  width:16px;height:16px;border-radius:4px;flex-shrink:0;
  border:1.5px solid var(--border2);background:transparent;
  display:flex;align-items:center;justify-content:center;transition:.15s;
}
.result-item.selected .ri-chk{background:var(--blue);border-color:var(--blue)}
.ri-chk::after{
  content:'';display:block;width:5px;height:3px;
  border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;
  transform:rotate(-45deg) translate(1px,-1px);
  opacity:0;transition:.15s;
}
.result-item.selected .ri-chk::after{opacity:1}
.ri-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ri-info{flex:1;min-width:0}
.ri-name{font-size:12.5px;font-weight:600;color:var(--t1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-cat{font-size:10.5px;color:var(--t3);margin-top:2px}
.ri-dist{font-family:var(--mono);font-size:11.5px;color:var(--t2);flex-shrink:0}

/* 추출 바 */
.export-bar{
  padding:10px 16px;border-top:1px solid var(--border);
  background:rgba(10,11,16,.97);flex-shrink:0;
  display:flex;gap:7px;align-items:center;
}
.export-bar.hidden{display:none}
.export-sel-cnt{font-size:11px;color:var(--t2);flex:1}
.export-sel-cnt span{color:var(--green);font-weight:700}
.btn-export-sel{
  padding:7px 14px;border-radius:var(--r2);font-size:11.5px;font-weight:700;
  cursor:pointer;transition:.15s;border:none;
}
.btn-export-all{
  background:transparent;border:1px solid var(--border2);
  color:var(--t2);padding:7px 12px;border-radius:var(--r2);
  font-size:11px;cursor:pointer;transition:.15s;
}
.btn-export-all:hover{border-color:var(--blue);color:var(--blue)}
.btn-export-sel{background:var(--blue);color:#fff}
.btn-export-sel:hover{background:#2f69f0}
.btn-export-sel:disabled{opacity:.4;cursor:not-allowed}

/* ── 좌측 하단 범례 ── */
.legend-box{
  position:fixed;bottom:20px;left:16px;z-index:700;
  background:rgba(10,11,16,.9);backdrop-filter:blur(14px);
  border:1px solid rgba(59,127,255,.15);border-radius:10px;
  padding:10px 13px;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  max-height:50vh;overflow-y:auto;
}
.legend-box.hidden{display:none}
.leg-title{font-size:9px;color:var(--t3);text-transform:uppercase;
  letter-spacing:1.2px;margin-bottom:7px;font-weight:700}
.leg-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer}
.leg-item:last-child{margin-bottom:0}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.leg-name{font-size:12px;color:var(--t2)}
.leg-cnt{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--green);padding-left:10px;font-weight:700}

/* ── 로딩 바 ── */
.map-loading{
  position:fixed;top:62px;left:0;right:0;z-index:900;
  display:flex;justify-content:center;pointer-events:none;padding-top:12px;
}
.loading-inner{
  display:flex;align-items:center;gap:10px;
  background:rgba(10,11,16,.92);border:1px solid var(--border2);
  border-radius:20px;padding:9px 18px;
  font-size:12px;color:var(--t2);
  box-shadow:0 4px 16px rgba(0,0,0,.4);
}
.loading-inner.hidden{display:none}
.spinner{width:14px;height:14px;border:2px solid var(--border2);
  border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 카카오 커스텀 오버레이 ── */
.kk-label{
  background:rgba(10,11,16,.88);
  border-radius:5px;padding:3px 7px;
  font-size:10px;font-weight:700;color:#fff;
  border:1px solid rgba(255,255,255,.15);
  white-space:nowrap;pointer-events:none;
  transform:translateX(-50%);
  margin-top:2px;
  display:block;
}

@media(max-width:640px){
  :root{--panel-w:calc(100vw - 24px)}
  .panel{top:58px;right:0;left:0;bottom:0;border-radius:14px 14px 0 0;width:100%;max-height:55vh}
  .legend-box{bottom:auto;top:64px;left:10px;max-height:40vh}
}
</style>
</head>
<body>

<div id="map"></div>

<!-- 헤더 -->
<div class="topbar">
  <div class="brand">
    <div class="brand-name">BLUEPICA</div>
    <div class="brand-sub">INFRA SIMULATOR</div>
    <div style="font-size:9px;color:var(--t3);letter-spacing:1px;font-family:var(--mono);margin-left:4px;align-self:flex-end;padding-bottom:2px">v0623.0609</div>
  </div>
  <div class="topbar-r">
    <div class="sync-dot"></div>
    <a href="index.html" class="btn-back">← 허브로</a>
  </div>
</div>

<!-- 로딩 -->
<div class="map-loading">
  <div class="loading-inner hidden" id="loadingBar">
    <div class="spinner"></div>
    <span id="loadingMsg">검색 중…</span>
  </div>
</div>

<!-- 우측 패널 -->
<div class="panel" id="mainPanel">
  <div class="panel-head">
    <div class="panel-title">📍 상권 인프라 분석</div>
    <div class="panel-sub">반경 내 주요 시설을 실시간으로 시각화합니다</div>
  </div>

  <!-- 일체형 컨트롤 -->
  <div class="ctrl-wrap">
    <!-- 위치 설정 -->
    <div>
      <div class="sec-title">위치 및 반경</div>
      <div class="addr-row">
        <input class="addr-input" id="addrInput" type="text"
          placeholder="주소 입력 후 Enter 또는 설정 버튼" autocomplete="off">
        <button class="btn-geo" id="btnGeo" onclick="geocodeAddress()">📍 설정</button>
      </div>
      <div class="radius-row" id="radiusRow">
        <div class="r-chip" data-r="500" onclick="setRadius(500)">500m</div>
        <div class="r-chip on" data-r="1000" onclick="setRadius(1000)">1km</div>
        <div class="r-chip" data-r="2000" onclick="setRadius(2000)">2km</div>
        <div class="r-chip" data-r="3000" onclick="setRadius(3000)">3km</div>
      </div>
    </div>

    <!-- 카테고리 선택 -->
    <div>
      <div class="cat-top">
        <div class="sec-title" style="margin-bottom:0">카테고리 선택</div>
        <span class="cat-reset" onclick="toggleAllCats()">전체 토글</span>
      </div>
      <div class="cat-grid" id="catGrid"></div>
    </div>
  </div>

  <!-- 실행 -->
  <div class="run-wrap">
    <button class="btn-run" id="btnRun" onclick="runSearch()">
      <span id="runIco">🔍</span>
      <span id="runTxt">지도에서 미리보기</span>
    </button>
  </div>

  <!-- 결과 -->
  <div class="result-wrap" id="resultWrap">
    <div class="result-empty" id="emptyState">
      <div class="e-ico">🗺️</div>
      <div>주소를 입력하고<br>카테고리를 선택 후<br>검색하세요</div>
    </div>
  </div>

  <!-- 추출 바 -->
  <div class="export-bar hidden" id="exportBar">
    <div class="export-sel-cnt"><span id="selCnt">0</span>개 선택됨</div>
    <button class="btn-export-all" onclick="exportCSV(false)">전체 CSV</button>
    <button class="btn-export-sel" id="btnExportSel" onclick="exportCSV(true)" disabled>선택 추출</button>
  </div>
</div>

<!-- 범례 -->
<div class="legend-box hidden" id="legendBox">
  <div class="leg-title">범례</div>
  <div id="legendItems"></div>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const OUR_LAT = 37.5232, OUR_LNG = 127.0212;
const APPS_URL = 'https://script.google.com/macros/s/AKfycbyflo91eL18ds40xfXjUfPdY8SBFF7BIqbZlddVKUHArlh0kCFmT8VKibDMiMR3bbJ8/exec';

const CATEGORIES = [
  { id:'SW8', name:'지하철역',  emoji:'🚇', color:'#3b7fff', kw:'지하철역' },
  { id:'HP8', name:'병원',      emoji:'🏥', color:'#f03860', kw:'병원' },
  { id:'PM9', name:'약국',      emoji:'💊', color:'#ff6b9d', kw:'약국' },
  { id:'BK9', name:'은행',      emoji:'🏦', color:'#f5bc30', kw:'은행' },
  { id:'MT1', name:'대형마트',  emoji:'🛒', color:'#22d186', kw:'마트' },
  { id:'CS2', name:'편의점',    emoji:'🏪', color:'#00d4ff', kw:'편의점' },
  { id:'CE7', name:'카페',      emoji:'☕', color:'#9060f0', kw:'카페' },
  { id:'PS3', name:'어린이집',  emoji:'🧒', color:'#ffa94d', kw:'어린이집' },
  { id:'PK6', name:'주차장',    emoji:'🅿️', color:'#748ffc', kw:'주차장' },
  { id:'AG2', name:'부동산',    emoji:'🏠', color:'#63e6be', kw:'부동산' },
  { id:'OL7', name:'주유소',    emoji:'⛽', color:'#f07830', kw:'주유소' },
  { id:'AC5', name:'숙박',      emoji:'🏨', color:'#c084fc', kw:'호텔' },
];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let map, infowindow;
let currentLat = OUR_LAT, currentLng = OUR_LNG;
let currentRadius = 1000;
let activeCats = new Set(CATEGORIES.map(c => c.id));
let markers = [], overlays = [], circles = [];
let allResults = [];
let selectedItems = new Set(); // 선택된 결과 인덱스
let centerMarker = null;

// ══════════════════════════════════════════════
// 카카오맵 SDK 로드 후 초기화
// ══════════════════════════════════════════════
window.initKakaoMap = function() {
  kakao.maps.load(() => {
    const container = document.getElementById('map');
    map = new kakao.maps.Map(container, {
      center: new kakao.maps.LatLng(OUR_LAT, OUR_LNG),
      level: 4
    });

    // 줌 컨트롤
    map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.BOTTOMLEFT);

    // 장소 검색 서비스
    infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

    // 케이프혼타워 마커
    placeCenterMarker(OUR_LAT, OUR_LNG);

    // 기본 반경 원
    drawCircle(OUR_LAT, OUR_LNG, currentRadius);

    // UI 초기화
    buildCatGrid();
    document.getElementById('addrInput').value = '';
    bindEnterKey();
  });
};

// ══════════════════════════════════════════════
// 기준 마커
// ══════════════════════════════════════════════
function placeCenterMarker(lat, lng) {
  if (centerMarker) centerMarker.setMap(null);
  const pos = new kakao.maps.LatLng(lat, lng);

  // 커스텀 마커 이미지
  const img = new kakao.maps.MarkerImage(
    'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png',
    new kakao.maps.Size(24, 35)
  );
  centerMarker = new kakao.maps.Marker({ position: pos, image: img, map, zIndex: 9999 });

  const iw = new kakao.maps.InfoWindow({
    content: `<div style="padding:8px 12px;font-size:12px;font-weight:700;color:#222;white-space:nowrap">⭐ 케이프혼타워</div>`,
    removable: true
  });
  kakao.maps.event.addListener(centerMarker, 'click', () => iw.open(map, centerMarker));
}

// ══════════════════════════════════════════════
// 반경 원
// ══════════════════════════════════════════════
function drawCircle(lat, lng, r) {
  circles.forEach(c => c.setMap(null));
  circles = [];
  const c = new kakao.maps.Circle({
    center: new kakao.maps.LatLng(lat, lng),
    radius: r,
    strokeWeight: 1.5,
    strokeColor: '#3b7fff',
    strokeOpacity: 0.6,
    strokeStyle: 'shortdash',
    fillColor: '#3b7fff',
    fillOpacity: 0.04
  });
  c.setMap(map);
  circles.push(c);
}

// ══════════════════════════════════════════════
// 반경 선택
// ══════════════════════════════════════════════
function setRadius(r) {
  currentRadius = r;
  document.querySelectorAll('.r-chip').forEach(el =>
    el.classList.toggle('on', el.dataset.r == r));
  drawCircle(currentLat, currentLng, r);
}

// ══════════════════════════════════════════════
// 카테고리 UI
// ══════════════════════════════════════════════
function buildCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const el = document.createElement('div');
    el.className = 'cat-item' + (activeCats.has(cat.id) ? ' on' : '');
    el.id = 'cat-' + cat.id;
    el.onclick = () => toggleCat(cat.id);
    el.innerHTML = `
      <div class="cat-check">✓</div>
      <div class="cat-emoji">${cat.emoji}</div>
      <div class="cat-name">${cat.name}</div>
      <span class="cat-cnt" id="cnt-${cat.id}"></span>`;
    grid.appendChild(el);
  });
}

function toggleCat(id) {
  activeCats.has(id) ? activeCats.delete(id) : activeCats.add(id);
  const el = document.getElementById('cat-' + id);
  if (el) el.classList.toggle('on', activeCats.has(id));
}

function toggleAllCats() {
  const allOn = activeCats.size === CATEGORIES.length;
  activeCats = allOn ? new Set() : new Set(CATEGORIES.map(c => c.id));
  CATEGORIES.forEach(cat => {
    const el = document.getElementById('cat-' + cat.id);
    if (el) el.classList.toggle('on', activeCats.has(cat.id));
  });
}

// ══════════════════════════════════════════════
// 주소 → 좌표 (카카오 Geocoder)
// ══════════════════════════════════════════════
function geocodeAddress() {
  const addr = document.getElementById('addrInput').value.trim();
  if (!addr) return;
  setLoading(true, '위치 검색 중…');

  const geocoder = new kakao.maps.services.Geocoder();
  geocoder.addressSearch(addr, (result, status) => {
    if (status === kakao.maps.services.Status.OK) {
      currentLat = parseFloat(result[0].y);
      currentLng = parseFloat(result[0].x);
      applyNewCenter();
      runSearch();
    } else {
      // 키워드 검색 fallback - Geocoder 사용
      const ps2 = new kakao.maps.services.Places();
      ps2.keywordSearch(addr, (result2, status2) => {
        if (status2 === kakao.maps.services.Status.OK) {
          currentLat = parseFloat(result2[0].y);
          currentLng = parseFloat(result2[0].x);
          applyNewCenter();
          runSearch();
        } else {
          setLoading(false);
          alert('주소를 찾을 수 없습니다. 다시 확인해주세요.');
        }
      }, { size: 1 });
    }
  });
}

function applyNewCenter() {
  const pos = new kakao.maps.LatLng(currentLat, currentLng);
  map.setCenter(pos);
  placeCenterMarker(currentLat, currentLng);
  drawCircle(currentLat, currentLng, currentRadius);
  setLoading(false);
}

// ══════════════════════════════════════════════
// 메인 검색
// ══════════════════════════════════════════════
function runSearch() {
  if (activeCats.size === 0) { alert('카테고리를 최소 1개 선택해주세요'); return; }
  if (!map) { alert('지도가 아직 로딩 중입니다.'); return; }

  const btn = document.getElementById('btnRun');
  btn.disabled = true;
  document.getElementById('runTxt').textContent = '검색 중…';
  document.getElementById('runIco').textContent = '⏳';

  clearMarkers();
  allResults = [];
  CATEGORIES.forEach(c => {
    const el = document.getElementById('cnt-' + c.id);
    if (el) el.textContent = '';
  });

  const cats = [...activeCats];
  // Apps Script 경유 카카오 REST API 검색
  async function oneCat(cat) {
    setLoading(true, `${cat.emoji} ${cat.name} 검색 중…`);
    try {
      const url = APPS_URL
        + '?action=infra'
        + '&keyword=' + encodeURIComponent(cat.kw)
        + '&lat=' + currentLat
        + '&lng=' + currentLng
        + '&radius=' + currentRadius
        + '&size=15';

      const res = await fetch(url);
      const json = await res.json();
      console.log(`[${cat.name}] ok=${json.ok}, count=${json.documents?.length || 0}`);

      if (json.ok && Array.isArray(json.documents)) {
        json.documents.forEach(place => {
          const dist = parseInt(place.distance || 0);
          if (dist > currentRadius) return;
          place._cat = cat;
          allResults.push(place);
          addMarker(place, cat);
        });
        const cnt = allResults.filter(r => r._cat.id === cat.id).length;
        const el = document.getElementById('cnt-' + cat.id);
        if (el && cnt) el.textContent = cnt;
      } else if (!json.ok) {
        showDebugMsg(`${cat.name}: ${json.error || '오류'}`);
      }
    } catch(e) {
      console.error(`[${cat.name}] fetch error:`, e);
      showDebugMsg(`${cat.name}: 네트워크 오류`);
    }
  }

  // 순차 실행
  (async () => {
    for (const cat of cats) {
      await oneCat(cat);
      await new Promise(r => setTimeout(r, 100));
    }
    finishSearch();
  })();
}

function finishSearch() {
  allResults.sort((a, b) => parseInt(a.distance) - parseInt(b.distance));
  renderResultList(allResults);
  renderLegend(allResults);

  map.setCenter(new kakao.maps.LatLng(currentLat, currentLng));
  const level = currentRadius <= 500 ? 4 : currentRadius <= 1000 ? 5 : currentRadius <= 2000 ? 6 : 7;
  map.setLevel(level);

  setLoading(false);
  const btn = document.getElementById('btnRun');
  btn.disabled = false;
  document.getElementById('runTxt').textContent = '다시 검색';
  document.getElementById('runIco').textContent = '🔄';

  // 결과 0건 → 원인 힌트 표시
  if (allResults.length === 0) {
    const wrap = document.getElementById('resultWrap');
    const errHint = _debugMsgs.length > 0
      ? `<div style="font-size:10px;color:#f03860;margin-top:8px;padding:8px;background:rgba(240,56,96,.1);border-radius:6px;text-align:left">`
        + `⚠️ ${_debugMsgs.join('<br>')}<br><br>`
        + `카카오 디벨로퍼스 → 내 앱 → 플랫폼 → Web<br>`
        + `사이트 도메인에 <b>wing-kim.github.io</b> 등록 확인`
        + `</div>`
      : `<div style="font-size:10px;color:#8890aa;margin-top:8px">반경을 늘리거나 다른 카테고리를 선택해보세요</div>`;
    wrap.innerHTML = `<div class="result-empty">
      <div class="e-ico">🔍</div>
      <div>검색 결과가 없습니다${errHint}</div>
    </div>`;
    document.getElementById('exportBar').classList.add('hidden');
  }
  _debugMsgs = [];
}

// ══════════════════════════════════════════════
// 마커
// ══════════════════════════════════════════════
function addMarker(place, cat) {
  const pos = new kakao.maps.LatLng(place.y, place.x);

  // 커스텀 마커 (컬러 원 + 이모지)
  const markerHtml = `
    <div style="
      width:30px;height:30px;border-radius:50%;
      background:${cat.color};
      display:flex;align-items:center;justify-content:center;
      font-size:14px;border:2px solid rgba(255,255,255,.5);
      box-shadow:0 2px 8px rgba(0,0,0,.4);cursor:pointer;
      transform:translateX(-50%) translateY(-50%);
    ">${cat.emoji}</div>
    <div style="
      position:absolute;top:16px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.75);color:#fff;font-size:9.5px;font-weight:700;
      padding:2px 6px;border-radius:4px;white-space:nowrap;
      border:1px solid rgba(255,255,255,.15);pointer-events:none;
      max-width:80px;overflow:hidden;text-overflow:ellipsis;
    ">${place.place_name}</div>`;

  const overlay = new kakao.maps.CustomOverlay({
    position: pos,
    content: `<div style="position:relative;display:inline-block;">${markerHtml}</div>`,
    zIndex: 3
  });
  overlay.setMap(map);
  overlays.push(overlay);

  // 클릭 → 인포윈도우
  // CustomOverlay는 kakao.maps.event 못 씀 → DOM 이벤트 직접
  // 대신 일반 마커도 같이 생성 (투명, 클릭용)
  const m = new kakao.maps.Marker({ position: pos, map, opacity: 0, zIndex: 4 });
  kakao.maps.event.addListener(m, 'click', () => {
    infowindow.setContent(`
      <div style="padding:10px 14px;font-family:'Noto Sans KR',sans-serif;min-width:180px">
        <div style="font-size:9px;color:${cat.color};font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">
          ${cat.emoji} ${cat.name}
        </div>
        <div style="font-size:13px;font-weight:700;color:#222;margin-bottom:4px">${place.place_name}</div>
        <div style="font-size:11px;color:#666;margin-bottom:6px">${place.road_address_name || place.address_name || ''}</div>
        ${place.distance ? `<div style="font-size:11px;color:${cat.color};font-weight:600">📏 ${formatDist(parseInt(place.distance))}</div>` : ''}
      </div>`);
    infowindow.open(map, m);
  });
  markers.push(m);
}

function clearMarkers() {
  overlays.forEach(o => o.setMap(null));
  markers.forEach(m => m.setMap(null));
  overlays = []; markers = [];
  selectedItems.clear();
  allSelected = false;
  const selBtn = document.querySelector('.btn-sel-all');
  if (selBtn) selBtn.textContent = '전체 선택';
  infowindow.close();
  document.getElementById('resultWrap').innerHTML =
    `<div class="result-empty"><div class="e-ico">⏳</div><div>검색 중…</div></div>`;
  document.getElementById('legendBox').classList.add('hidden');
}

// ══════════════════════════════════════════════
// 결과 목록
// ══════════════════════════════════════════════
function renderResultList(items) {
  selectedItems.clear();
  updateExportBar();
  const wrap = document.getElementById('resultWrap');
  if (!items.length) {
    wrap.innerHTML = `<div class="result-empty"><div class="e-ico">🔍</div><div>검색 결과 없음<br>반경을 넓혀보세요</div></div>`;
    document.getElementById('exportBar').classList.add('hidden');
    return;
  }
  let h = `<div class="result-header">
    <div class="result-count"><span>${items.length}</span>개 시설</div>
    <div class="result-hd-r">
      <button class="btn-sel-all" onclick="toggleSelectAll()">전체 선택</button>
    </div>
  </div><ul class="result-list">`;
  items.forEach((it, idx) => {
    const cat = it._cat;
    const dist = it.distance ? formatDist(parseInt(it.distance)) : '';
    h += `<li class="result-item" id="ri-${idx}" onclick="toggleSelect(event,${idx},${parseFloat(it.y)},${parseFloat(it.x)})">
      <div class="ri-chk"></div>
      <div class="ri-dot" style="background:${cat.color}"></div>
      <div class="ri-info">
        <div class="ri-name">${it.place_name}</div>
        <div class="ri-cat">${cat.emoji} ${cat.name}</div>
      </div>
      <div class="ri-dist">${dist}</div>
    </li>`;
  });
  h += '</ul>';
  wrap.innerHTML = h;
  document.getElementById('exportBar').classList.remove('hidden');
}

function toggleSelect(e, idx, lat, lng) {
  if (selectedItems.has(idx)) {
    selectedItems.delete(idx);
    document.getElementById('ri-'+idx)?.classList.remove('selected');
  } else {
    selectedItems.add(idx);
    document.getElementById('ri-'+idx)?.classList.add('selected');
    flyTo(lat, lng);
  }
  updateExportBar();
}

let allSelected = false;
function toggleSelectAll() {
  allSelected = !allSelected;
  allResults.forEach((_, idx) => {
    if (allSelected) selectedItems.add(idx);
    else selectedItems.delete(idx);
    document.getElementById('ri-'+idx)?.classList.toggle('selected', allSelected);
  });
  const btn = document.querySelector('.btn-sel-all');
  if (btn) btn.textContent = allSelected ? '전체 해제' : '전체 선택';
  updateExportBar();
}

function updateExportBar() {
  const cnt = selectedItems.size;
  const el = document.getElementById('selCnt');
  if (el) el.textContent = cnt;
  const btn = document.getElementById('btnExportSel');
  if (btn) btn.disabled = cnt === 0;
}

function flyTo(lat, lng) {
  map.setCenter(new kakao.maps.LatLng(lat, lng));
  map.setLevel(3);
}

// ══════════════════════════════════════════════
// 범례
// ══════════════════════════════════════════════
function renderLegend(items) {
  const box = document.getElementById('legendBox');
  const inner = document.getElementById('legendItems');
  if (!items.length) { box.classList.add('hidden'); return; }
  const bycat = {};
  items.forEach(it => { const id=it._cat.id; bycat[id]=(bycat[id]||0)+1; });
  inner.innerHTML = CATEGORIES.filter(c=>bycat[c.id]).map(cat =>
    `<div class="leg-item">
      <div class="leg-dot" style="background:${cat.color}"></div>
      <div class="leg-name">${cat.emoji} ${cat.name}</div>
      <div class="leg-cnt">${bycat[cat.id]}</div>
    </div>`).join('');
  box.classList.remove('hidden');
}

// ══════════════════════════════════════════════
// CSV 내보내기
// ══════════════════════════════════════════════
function exportCSV(selOnly) {
  const target = selOnly
    ? allResults.filter((_, i) => selectedItems.has(i))
    : allResults;
  if (!target.length) return;
  const rows = [['카테고리','시설명','도로명주소','지번주소','거리(m)','위도','경도']];
  target.forEach(it => rows.push([
    it._cat.name, it.place_name,
    it.road_address_name||'', it.address_name||'',
    it.distance||'', it.y, it.x
  ]));
  const csv = rows.map(r=>r.map(c=>'"'+(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const suffix = selOnly ? `_선택${selectedItems.size}건` : `_전체${target.length}건`;
  a.download = `인프라분석${suffix}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ══════════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════════
function setLoading(on, msg='') {
  document.getElementById('loadingBar').classList.toggle('hidden', !on);
  if (msg) document.getElementById('loadingMsg').textContent = msg;
}

let _debugMsgs = [];
function showDebugMsg(msg) {
  _debugMsgs.push(msg);
  console.warn('[INFRA DEBUG]', msg);
}
function formatDist(m) { return m >= 1000 ? (m/1000).toFixed(1)+'km' : m+'m'; }

// Enter 키 → geocode 후 자동 검색
function bindEnterKey() {
  const inp = document.getElementById('addrInput');
  if (!inp) return;
  inp.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    // 위치 설정 후 바로 검색 실행
    geocodeAndSearch();
  });
}

async function geocodeAndSearch() {
  await new Promise(resolve => {
    const addr = document.getElementById('addrInput').value.trim();
    if (!addr) { resolve(); return; }
    setLoading(true, '위치 검색 중…');
    const geocoder = new kakao.maps.services.Geocoder();
    geocoder.addressSearch(addr, (result, status) => {
      if (status === kakao.maps.services.Status.OK) {
        currentLat = parseFloat(result[0].y);
        currentLng = parseFloat(result[0].x);
        applyNewCenter();
        resolve();
      } else {
        const ps3 = new kakao.maps.services.Places();
        ps3.keywordSearch(addr, (result2, status2) => {
          if (status2 === kakao.maps.services.Status.OK) {
            currentLat = parseFloat(result2[0].y);
            currentLng = parseFloat(result2[0].x);
            applyNewCenter();
          } else {
            setLoading(false);
          }
          resolve();
        }, { size: 1 });
      }
    });
  });
  // 위치 설정 완료 후 자동 검색
  runSearch();
}
