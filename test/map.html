<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>통합 상권지도 · 케이프혼타워</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090d;--s1:#0f1118;--s2:#151821;--s3:#1c2030;--line:#222636;--line2:#2a3050;
  --blue:#3b7fff;--blue-g:linear-gradient(135deg,#3b7fff,#6c48f5);--green:#22d186;--yellow:#f5bc30;--red:#f03860;--t1:#eef0f8;--t2:#8890aa;--t3:#4a5270;
  --mono:'DM Mono',monospace;--sans:'Noto Sans KR',sans-serif;--display:'Bebas Neue',sans-serif;--panel:390px;
}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--sans)}
#map{position:fixed;inset:0;z-index:0;width:100%;height:100%}

/* ── TOPBAR ── */
.topbar{position:fixed;top:0;left:0;right:0;height:52px;z-index:900;background:rgba(8,9,13,.92);backdrop-filter:blur(14px);border-bottom:1px solid rgba(59,127,255,.15);display:flex;align-items:center;justify-content:space-between;padding:0 18px}
.top-left{display:flex;align-items:center;gap:10px;min-width:0}.top-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.brand{display:flex;align-items:baseline;gap:10px;min-width:0}.brand-name{font-family:var(--sans);font-size:24px;font-weight:500;letter-spacing:-.4px;line-height:1;background:var(--blue-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}.brand-sub{font-size:11px;color:var(--t3);letter-spacing:3px;text-transform:uppercase;white-space:nowrap}
.top-r{display:flex;gap:8px;align-items:center}.ver{font-family:var(--mono);font-size:11px;color:var(--t3);border:1px solid var(--line2);border-radius:6px;padding:3px 8px;background:rgba(10,11,16,.85)}
.home,.refresh,.top-link{font-size:11px;text-decoration:none;color:var(--t2);border:1px solid var(--line2);background:var(--s2);border-radius:7px;padding:6px 10px;cursor:pointer;font-family:var(--sans);font-weight:400}
.home:hover,.refresh:hover,.top-link:hover{color:#fff;border-color:var(--blue);background:rgba(59,127,255,.12)}.top-link.primary{background:rgba(59,127,255,.14);border-color:rgba(59,127,255,.36);color:#9fb8ff}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MODE BUTTONS (panel top) ── */
.panel-modes{display:flex;gap:7px;margin-top:0}
.mode-btn{flex:1;height:38px;border:1px solid var(--line2);background:var(--s2);color:var(--t2);border-radius:10px;font-size:12px;font-weight:800;cursor:pointer}
.mode-btn.active{background:rgba(59,127,255,.18);border-color:var(--blue);color:#fff;box-shadow:0 0 0 1px rgba(59,127,255,.15) inset}.mode-btn:hover{color:#fff}

/* ── FILTERBAR ── */
.filterbar{position:fixed;top:52px;left:0;right:var(--panel);height:38px;z-index:840;background:rgba(8,9,13,.94);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:5px;overflow-x:auto;padding:0 10px;scrollbar-width:none}.filterbar::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;height:25px;display:inline-flex;align-items:center;gap:5px;padding:0 11px;border:1px solid rgba(255,255,255,.14);background:rgba(15,17,30,.75);border-radius:20px;color:#6878a8;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.chip.active{background:var(--blue);border-color:#7aaaff;color:#fff}.chip .cnt{font-family:var(--mono);font-size:9px;background:rgba(0,0,0,.25);border-radius:8px;padding:1px 5px}
.divider{width:1px;height:16px;background:rgba(255,255,255,.1);flex:0 0 auto;margin:0 2px}

/* ── PANEL ── */
.panel{position:fixed;top:52px;right:0;bottom:0;width:var(--panel);z-index:870;background:var(--s1);border-left:1px solid var(--line);display:flex;flex-direction:column}
.panel-head{padding:10px 12px;border-bottom:1px solid var(--line);background:#111827}
.subtabs{display:flex;background:#090a10;border-bottom:1px solid var(--line)}
.subtab{flex:1;text-align:center;padding:10px 4px;font-size:12px;font-weight:700;color:var(--t3);cursor:pointer;border-bottom:2px solid transparent}
.subtab.active{color:#fff;border-bottom-color:var(--blue);background:var(--s1)}
.panel-body{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--line2) var(--s1)}
.panel-body::-webkit-scrollbar{width:4px}.panel-body::-webkit-scrollbar-thumb{background:var(--line2)}
.panel-ver{position:absolute;right:12px;bottom:12px;z-index:2;font-family:var(--mono);font-size:12px;color:#dfe6ff;font-weight:600;letter-spacing:.6px;border:1px solid rgba(120,140,255,.35);border-radius:18px;padding:6px 12px;background:rgba(14,17,28,.92);backdrop-filter:blur(10px);box-shadow:0 0 12px rgba(80,120,255,.16)}

/* ── REALTIME 검색 UI ── */
.search-box{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;gap:6px}
.input{flex:1;background:var(--s2);border:1px solid var(--line2);border-radius:7px;color:var(--t1);padding:8px 10px;font-size:12px;outline:none}
.btn{border:1px solid rgba(59,127,255,.35);background:rgba(59,127,255,.16);color:#7eb3ff;border-radius:7px;padding:8px 11px;font-size:12px;font-weight:700;cursor:pointer}
.btn.full{width:100%;margin-top:8px}
.radius-row{display:flex;gap:5px;padding:10px 14px;border-bottom:1px solid var(--line)}
.rchip{flex:1;text-align:center;border:1px solid var(--line2);background:var(--s2);color:var(--t2);border-radius:20px;padding:6px 0;font-size:11px;font-weight:700;cursor:pointer}
.rchip.active{border-color:var(--blue);color:#7eb3ff;background:rgba(59,127,255,.14)}
.section{padding:14px}.section-title-bar{font-size:11px;font-weight:800;color:var(--t3);letter-spacing:.6px;margin-bottom:10px;display:flex;gap:6px;align-items:center}
.section-title-bar:before{content:'';width:3px;height:14px;border-radius:2px;background:var(--blue)}
.hint{font-size:10px;color:var(--t3);text-align:center;background:var(--s2);border:1px dashed var(--line2);border-radius:7px;padding:7px;margin-bottom:10px}
.kpi{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kbox{background:var(--s2);border:1px solid var(--line);border-radius:9px;padding:11px}
.klabel{font-size:10px;color:var(--t3);font-weight:800}.kval{font-family:var(--mono);font-size:17px;font-weight:800;margin-top:4px}
.range{width:100%;accent-color:#3b7fff}.formrow{margin-bottom:12px}
.formrow label{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);font-weight:700;margin-bottom:6px}
.poi-item{display:flex;gap:10px;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer}
.poi-item:hover{background:rgba(59,127,255,.04)}.poi-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.poi-name{font-size:12px;font-weight:800}.poi-meta{font-size:10px;color:var(--t3);margin-top:2px}
.empty{padding:48px 20px;text-align:center;color:var(--t3);font-size:12px}
.infow{padding:8px 10px;font-size:12px;color:#222;white-space:nowrap}.infow strong{display:block;margin-bottom:3px}
.infow button{margin-top:6px;border:0;background:#3b7fff;color:#fff;border-radius:5px;padding:4px 8px;font-size:11px;cursor:pointer}

/* ════════════════════════════════════
   임대건물 — market.html 완전 이식
════════════════════════════════════ */
/* 건물 카드 */
.bldg-card{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;position:relative}
.bldg-card.active{background:rgba(59,127,255,.04)}
.bldg-card.selected{background:rgba(59,127,255,.04);border-bottom-color:rgba(59,127,255,.2);box-shadow:inset 3px 0 0 #3b7fff}
.bldg-card.selected .bldg-name{color:#7eb3ff}
.bldg-header{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;user-select:none}
.bldg-header:hover{background:rgba(255,255,255,.02)}
.bldg-num{width:4px;height:36px;border-radius:2px;background:#2a3050;flex-shrink:0;align-self:stretch}
.bldg-num.ours{background:#f59e0b}
.bldg-info{flex:1;min-width:0}
.bldg-name{font-size:13px;font-weight:700;color:#eef0f8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bldg-name.ours-name{color:#f59e0b}
.bldg-meta{font-size:11px;color:#4a5270;margin-top:2px}
.bldg-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.bldg-price{font-size:11px;font-weight:600;color:#3b7fff;background:rgba(59,127,255,.1);padding:2px 7px;border-radius:20px}
.bldg-tenant-cnt{font-size:11px;color:#4a5270;background:#151821;padding:2px 6px;border-radius:20px}
.chevron{font-size:10px;color:#4a5270;transition:transform .25s;width:14px;text-align:center}
.bldg-card.active .chevron{transform:rotate(180deg)}
.bldg-detail{max-height:0;overflow:hidden;transition:max-height .3s ease}
.bldg-card.active .bldg-detail{max-height:600px}
.detail-inner{padding:0 14px 14px 22px}
.floor-table{width:100%;border-collapse:collapse}
.floor-table th{background:#151821;color:#4a5270;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:6px 8px;text-align:left;border-bottom:1px solid #222636}
.floor-table td{padding:6px 8px;font-size:12px;color:#8890aa;border-bottom:1px solid #151821;vertical-align:middle}
.floor-table tr:last-child td{border-bottom:none}
.floor-cell{font-weight:700;color:#4a5270;white-space:nowrap;width:42px}
.name-cell{color:#eef0f8}
.type-badge{font-size:10px;padding:2px 7px;border-radius:20px;color:#fff;font-weight:600;white-space:nowrap}
.bldg-card.ours-card{background:rgba(245,158,11,.05);border-left:3px solid #f59e0b}
.bldg-card.ours-card:hover,.bldg-card.ours-card.active{background:rgba(245,158,11,.08)}
.ours-placeholder{padding:10px 14px 14px 22px;font-size:12px;color:#92400e;line-height:1.7}

/* 동별 아코디언 */
.dong-group{margin-bottom:0;border-bottom:2px solid rgba(255,255,255,.08);transition:border-color .2s}
.dong-group.dong-open{border-bottom:2px solid rgba(59,91,219,.5);margin-bottom:4px}
.dong-group-header{display:flex;align-items:stretch;padding:0;cursor:pointer;user-select:none;background:#0f1120;transition:background .15s;position:sticky;top:0;z-index:10;border-bottom:1px solid rgba(255,255,255,.07);width:100%;box-sizing:border-box}
.dong-group-header:hover{background:rgba(22,26,50,.5)}
.dong-group-header.open{background:rgba(24,29,56,.5);border-bottom:1px solid rgba(59,91,219,.3)}
.dong-color-bar{width:3px;align-self:stretch;flex-shrink:0;background:#3b5bdb}
.dong-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0;padding:9px 12px}
.dong-badge{font-size:11px;font-weight:800;color:#c7cfe8;padding:3px 9px;border-radius:5px;flex-shrink:0;letter-spacing:-.3px;background:rgba(26,31,58,.6);border:1px solid rgba(59,91,219,.5)}
.dong-stats{display:flex;align-items:center;gap:4px;flex:1;min-width:0}
.dong-stat-item{font-size:11px;color:#5060a0}
.dong-stat-num{font-family:var(--mono);font-size:11px;font-weight:700;color:#7080c0}
.dong-stat-sep{color:#304070;margin:0 1px}
.dong-chevron{font-size:9px;color:#3b5bdb;transition:transform .22s,color .15s;flex-shrink:0;padding:10px 14px 10px 6px;align-self:center}
.dong-group-header:hover .dong-chevron{color:#6680ff}
.dong-group-header.open .dong-chevron{color:#7890ff;transform:rotate(180deg)}
.dong-group-body{display:none;border-left:3px solid rgba(59,91,219,.4);background:rgba(10,12,28,.35);padding-bottom:6px}
.dong-group-body.open{display:block}
.no-result-msg{padding:18px 14px;font-size:12px;color:#4a5270;text-align:center;line-height:1.7}
.no-result-msg span{display:block;font-size:20px;margin-bottom:6px}
.detail-btn{margin-top:10px;width:100%;background:rgba(59,127,255,.12);border:1px solid rgba(59,127,255,.3);color:#3b7fff;font-size:11px;font-weight:700;padding:6px 0;border-radius:5px;cursor:pointer;font-family:var(--sans)}

/* 업종 차트 */
.chart-pad{padding:14px 14px 20px}
.section-title{font-size:11px;font-weight:700;color:#4a5270;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.section-title::before{content:'';display:block;width:3px;height:14px;background:#3b7fff;border-radius:2px}
.type-row{margin-bottom:4px;border:2px solid transparent;border-radius:10px;transition:border-color .15s,background .15s}
.type-row.t-selected{border-color:rgba(59,127,255,.3);background:rgba(59,127,255,.05)}
.type-bar-row{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:8px;cursor:pointer;transition:background .15s}
.type-bar-row:hover{background:#151821}
.type-lbl{width:76px;font-size:11px;font-weight:600;color:#8890aa;text-align:right;flex-shrink:0;line-height:1.2}
.type-track{flex:1;background:#151821;border-radius:6px;height:28px;overflow:hidden;position:relative}
.type-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:8px;min-width:36px;transition:width .7s cubic-bezier(.22,1,.36,1)}
.type-cnt{font-size:14px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);white-space:nowrap}
.type-hint{font-size:10px;color:#4a5270;text-align:center;margin:0 0 10px;padding:6px;background:#151821;border-radius:6px;border:1px dashed #222636}
.type-bldg-list{display:flex;flex-wrap:wrap;gap:6px;padding:6px 8px 8px;margin-top:2px}
.type-bldg-item{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;cursor:pointer;background:#0f1118;border:1px solid #222636;font-size:12px;font-weight:600;color:#eef0f8;transition:all .15s;white-space:nowrap}
.type-bldg-item:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.3)}
.bldg-arrow{font-size:10px;opacity:.6}
.reset-filter{display:block;margin:8px 0 2px;padding:7px;text-align:center;font-size:11px;color:#4a5270;cursor:pointer;border-radius:7px;border:1px dashed #222636;transition:all .15s}
.reset-filter:hover{background:#151821;color:#8890aa;border-color:#2a3050}
.insight-box{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:10px;padding:12px 14px;font-size:12px;color:#8890aa;line-height:1.9;margin-top:14px}
.insight-box .insight-title{font-size:12px;font-weight:700;color:#f59e0b;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.insight-box ul{list-style:none}.insight-box li{padding:2px 0;display:flex;gap:6px;align-items:flex-start}
.insight-box li::before{content:'•';color:#f59e0b;font-weight:700;margin-top:1px}

/* 리포트 탭 */
.report-wrap{padding:0 0 24px}
.rp-area{border-bottom:1px solid #151821}
.rp-area-header{display:flex;align-items:center;gap:10px;padding:14px 14px 12px;cursor:pointer;user-select:none;transition:background .15s}
.rp-area-header:hover{background:#151821}
.rp-area-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;color:#fff;flex-shrink:0}
.rp-area-title{font-size:13px;font-weight:700;color:#eef0f8;flex:1}
.rp-area-sub{font-size:11px;color:#4a5270;margin-top:2px}
.rp-area-chevron{font-size:10px;color:#4a5270;transition:transform .25s}
.rp-area.open .rp-area-chevron{transform:rotate(180deg)}
.rp-area-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.rp-area.open .rp-area-body{max-height:3000px}
.rp-area-inner{padding:0 14px 16px}
.rp-kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.rp-kpi{background:#151821;border:1px solid #222636;border-radius:10px;padding:10px 10px 8px;text-align:center}
.rp-kpi-val{font-size:16px;font-weight:800;color:#eef0f8;line-height:1;font-family:var(--mono)}
.rp-kpi-unit{font-size:10px;color:#4a5270;margin-top:3px}
.rp-stack-wrap{margin-bottom:12px}
.rp-stack-label{font-size:10px;font-weight:600;color:#4a5270;margin-bottom:5px}
.rp-stack-bar{display:flex;height:20px;border-radius:6px;overflow:hidden;gap:1px}
.rp-stack-seg{height:100%;transition:flex .5s ease;cursor:default}
.rp-stack-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.rp-stack-item{display:flex;align-items:center;gap:4px;font-size:10px;color:#8890aa}
.rp-stack-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rp-table-title{font-size:11px;font-weight:700;color:#8890aa;margin:12px 0 6px;display:flex;align-items:center;gap:5px;cursor:pointer}
.rp-table{width:100%;border-collapse:collapse;font-size:11px}
.rp-table th{background:#151821;color:#4a5270;font-size:10px;font-weight:700;padding:5px 7px;text-align:left;border-bottom:1px solid #222636}
.rp-table td{padding:5px 7px;color:#8890aa;border-bottom:1px solid #151821;vertical-align:middle}
.rp-table tr:last-child td{border-bottom:none}
.rp-table .fl{font-weight:700;color:#4a5270;white-space:nowrap}
.rp-vacant{color:#4a5270;font-style:italic}.rp-leaving{color:#f59e0b;font-weight:600}
.rp-memo{background:rgba(59,127,255,.06);border-left:3px solid #3b7fff;border-radius:0 8px 8px 0;padding:10px 12px;font-size:11px;color:#8890aa;line-height:1.8;margin-top:12px}
.rp-memo-title{font-weight:700;font-size:11px;color:#eef0f8;margin-bottom:4px}
.rp-summary-header{background:#1e293b;color:#fff;padding:16px 14px 14px}
.rp-summary-title{font-size:13px;font-weight:700}.rp-summary-sub{font-size:10px;color:#4a5270;margin-top:3px}
.rp-total-kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:14px 14px 0}
.rp-total-card{background:#0f1118;border:1px solid #222636;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:2px}
.rp-total-card-label{font-size:10px;font-weight:600;color:#4a5270}
.rp-total-card-val{font-size:18px;font-weight:800;color:#eef0f8;font-family:var(--mono)}
.rp-total-card-sub{font-size:10px;color:#4a5270}
.rp-total-card.accent{background:#1e293b;border-color:#2a3050}
.rp-total-card.accent .rp-total-card-val{color:#f59e0b}
.rp-dist-wrap{padding:14px 14px 0}.rp-strategy-wrap{padding:12px 14px 0}
.rp-strategy-card{border:1px solid #222636;border-radius:10px;overflow:hidden;margin-bottom:8px}
.rp-strategy-head{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#151821}
.rp-strategy-icon{font-size:16px}.rp-strategy-name{font-size:12px;font-weight:700;color:#eef0f8}
.rp-strategy-tag{margin-left:auto;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;color:#fff}
.rp-strategy-body{padding:10px 12px;font-size:11px;color:#8890aa;line-height:1.8}
.rp-upload-notice{margin:12px 14px 0;padding:12px;border-radius:10px;background:rgba(245,158,11,.05);border:1px dashed rgba(245,158,11,.2);font-size:11px;color:#8890aa;line-height:1.7;text-align:center}
.rp-dong-section-header{padding:16px 14px 8px;border-top:1px solid #151821}
.rp-dong-section-title{font-size:12px;font-weight:700;color:#eef0f8}.rp-dong-section-sub{font-size:10px;color:#4a5270;margin-top:3px}
.rp-dong-badge-wrap{flex-shrink:0}
.rp-area-empty{opacity:.4;cursor:default!important}
.rp-table-section-title{font-size:11px;font-weight:700;color:#4a5270;margin:0 0 8px;display:flex;align-items:center;gap:5px}
.rp-bldg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.rp-bldg-meta{font-size:10px;color:#4a5270;font-weight:400;margin-left:2px}

/* 범례 탭 */
.legend-pad{padding:16px}
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:#8890aa}

<script>
// ════════════════════════════════════
//  상수 & 전역 상태
// ════════════════════════════════════
const OUR_LAT = 37.5232, OUR_LNG = 127.0212;
const MAP_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSqODQv0J98AN_VrhIpdXr8pUYfcgEH_2Fvxfgq_g0z3sCR49t0heYBC0k4Za3hxQiAr9bwVNRtWGxe/pub?gid=1985638477&single=true&output=csv';
const OUR_BUILDING = {
  id:'ours', isOurs:true,
  name:'케이프혼타워 (신축예정)', short:'우리건물',

// 업종 색상 (market.html 완전 이식)
const TYPES = {

  '사무실/기업':'#3b82f6','학원/교육':'#f59e0b','패션/잡화':'#8b5cf6',

  '공유오피스':'#0ea5e9','스튜디오/공간':'#a855f7','카페':'#92400e',
  '주점/노래방':'#be185d','의료기기':'#0891b2','근린생활':'#64748b',
  '주거':'#78716c','갤러리':'#7c3aed','법무법인':'#1d4ed8',

};

  {id:'HP8',name:'병원',emoji:'🏥'},{id:'PM9',name:'약국',emoji:'💊'},
  {id:'CE7',name:'카페',emoji:'☕'},{id:'PK6',name:'주차장',emoji:'🅿️'},
  {id:'BK9',name:'은행',emoji:'🏦'},{id:'CS2',name:'편의점',emoji:'🏪'},
  {id:'SW8',name:'지하철역',emoji:'🚇'},{id:'AG2',name:'부동산',emoji:'🏠'}
];

  realtime:{label:'실시간상권', tabs:['장소검색','검색결과','요약']}
};

let map, ps, info;
let mode = 'lease', subtab = 0;
let buildings = [OUR_BUILDING], filteredBuildings = [];
let activeLeaseType = '전체';
let activeRealCats = new Set(['HP8','PM9']);
let overlays = {}, selectedId = null, selectedType = null;
let poiMarkers = [], poiResults = [];
let radius = 1000, circle = null;

// ════════════════════════════════════
//  업종 정규화 (market.html 완전 이식)
// ════════════════════════════════════
function normalizeType(raw) {
  if (!raw) return '기타';
  const t = raw.trim();
  const map = {
    '음식점':'F&B/음식점','고기요리':'F&B/음식점','양갈비':'F&B/음식점',
    '이탈리아음식':'F&B/음식점','브런치전문점':'F&B/음식점','소주방':'F&B/음식점',
    '주류회사':'주점/노래방','주점':'주점/노래방','노래방':'주점/노래방','카페':'카페',
    '병원':'병원/의료','치과':'병원/의료','한의원':'병원/의료','피부과':'병원/의료',
    '성형외과':'병원/의료','한방병원':'병원/의료','신경외과':'병원/의료',
    '산부인과':'병원/의료','비뇨기과':'병원/의료','통증의학과':'병원/의료',
    '가정의학과':'병원/의료','이비인후과':'병원/의료',
    '요가원':'스포츠/레저','골프연습장':'스포츠/레저','필라테스':'스포츠/레저',
    '스포츠':'스포츠/레저','댄스학원':'스포츠/레저',
    '미용실':'뷰티/미용','네일아트':'뷰티/미용','뷰티업체':'뷰티/미용',
    '뷰티':'뷰티/미용','피부관리':'뷰티/미용','에스테틱':'뷰티/미용','가발':'뷰티/미용',
    '미용교육':'뷰티/미용',
    '사무실':'사무실/기업','경영컨설팅':'사무실/기업','인테리어디자인':'사무실/기업',
    '광고회사':'사무실/기업','영상편집':'사무실/기업','사무소':'사무실/기업','업무시설':'사무실/기업',
    '학원':'학원/교육',
    '패션':'패션/잡화','패션잡화':'패션/잡화','의류':'패션/잡화',
    '약국':'약국','편의점':'편의점','공유오피스':'공유오피스',
    '스튜디오':'스튜디오/공간','사진관':'스튜디오/공간','창고':'스튜디오/공간',
    '통신':'기타','당구장':'기타','안경':'기타','은행':'기타',
    '근린생활':'근린생활','주거':'주거','갤러리':'갤러리',
    '법무법인':'법무법인','제약사':'제약사','헬스케어':'헬스케어','의료기기':'의료기기',
    '공실':'기타',
  };
  if (map[t]) return map[t];
  for (const [key, val] of Object.entries(map)) { if (t.includes(key)) return val; }
  return '기타';
}

// ════════════════════════════════════
//  CSV 파싱 & 건물 변환
// ════════════════════════════════════
function parseCSV(text) {
  text = text.replace(/^\uFEFF/, '');
  const lines = text.trim().split(/\r?\n/).filter(Boolean);
  if (!lines.length) return [];
  const headers = lines[0].split(',').map(h => h.replace(/^["'\s\uFEFF]+|["'\s]+$/g,'').trim());
  console.log('[CSV] headers:', headers);
  const parsed = lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (const ch of line) {
      if (ch==='"') inQ=!inQ;
      else if (ch===','&&!inQ){vals.push(cur.trim());cur='';}
      else cur+=ch;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h,i) => { obj[h] = (vals[i]||'').replace(/^"|"$/g,''); });
    return obj;
  }).filter(r => r['건물명']&&r['건물명'].trim());
  console.log('[CSV] 총 행수:', parsed.length, '/ 첫 행 샘플:', parsed[0]);
  return parsed;
}

function calcDist(lat1, lng1, lat2, lng2) {
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function rowsToBuildings(rows) {
  const bmap = {};
  rows.forEach(row => {
    const key = row['건물명'].trim();
    if (!bmap[key]) {
      const lat = parseFloat(row['위도'])||0, lng = parseFloat(row['경도'])||0;
      const hasCoord = lat!==0&&lng!==0;
      const d = hasCoord ? calcDist(OUR_LAT,OUR_LNG,lat,lng) : 9999;
      const distance = d<300?'core':d<700?'mid':'far';
      bmap[key] = {
        id: key.replace(/[^\w가-힣]/g,'_'),
        name: row['건물명'],
        short: row['건물명'].length>6 ? row['건물명'].slice(0,6) : row['건물명'],
        address: row['주소']||'', lat, lng,
        _needGeocode: !hasCoord,
        price: (function(){
          const v=(row['매매가 (억)']||row['매매가(억)']||row['매매가']||'').trim();
          if(!v||v==='0') return null;
          return v.includes('억')?v:v+'억';
        })(),
        dong: row['동']||'기타', distance,
        source: row['파일명']||'',
        fileId: row['파일ID']||'', tenants:[]
      };
    }
    if (row['임차인']&&row['임차인'].trim()) {
      const rawType = row['업종']||'';
      bmap[key].tenants.push({
        floor: row['층']||'',
        name: row['임차인'].trim(),
        type: normalizeType(rawType),
        rawType
      });
    }
  });
  return Object.values(bmap).filter(b=>b.lat!==0&&b.lng!==0);
}

// ════════════════════════════════════
//  데이터 로딩 (market.html 완전 동일)
// ════════════════════════════════════
let _dataReady = false;

function loadBuildings() {
  // 로딩 스피너 표시
  showDataLoader(true);

  const fetchPromise = fetch(MAP_SHEET_URL);
  const timeoutPromise = new Promise(function(_, reject) {
    setTimeout(function(){ reject(new Error('fetch timeout')); }, 8000);
  });

  Promise.race([fetchPromise, timeoutPromise])
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.text();
    })
    .then(function(text) {
      const rows = parseCSV(text);
      const valid = rowsToBuildings(rows);
      buildings = rows.length > 0 ? [OUR_BUILDING].concat(valid) : [OUR_BUILDING];
      const needGeo = valid.filter(b => b._needGeocode).length;
      console.log('✅ 지도데이터:', valid.length, '개 건물 (주소→좌표변환 필요:', needGeo, '개)');
    })
    .catch(function(e) {
      console.warn('⚠️ 지도데이터 실패:', e.message);
      buildings = [OUR_BUILDING];
      // 에러 토스트 (3초 자동 제거)
      showDataError('상권 데이터 연동 실패 · 기본 건물만 표시합니다');
    })
    .finally(function() {
      showDataLoader(false);
      _dataReady = true;
      const t = document.getElementById('syncTime');
      if (t) t.textContent = new Date().toLocaleTimeString('ko-KR');
      applyLeaseFilter();
      drawBuildings();
      if (mode === 'lease') renderLeasePanel();
    });
}

function showDataLoader(show) {
  let el = document.getElementById('_data-loader');
  if (show) {
    if (!el) {
      el = document.createElement('div');
      el.id = '_data-loader';
      el.style.cssText = 'position:fixed;top:90px;left:50%;transform:translateX(-50%);z-index:9500;background:rgba(15,17,24,.95);border:1px solid var(--line2);border-radius:10px;padding:10px 20px;font-size:12px;color:var(--t2);font-family:var(--sans);display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.5);';
      el.innerHTML = '<div style="width:14px;height:14px;border:2px solid var(--line2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0"></div>상권 데이터 로딩 중…';
      document.body.appendChild(el);
    }
    el.style.display = 'flex';
  } else {
    if (el) el.style.display = 'none';
  }
}

function showDataError(msg) {
  let el = document.getElementById('_data-err');
  if (!el) {
    el = document.createElement('div');
    el.id = '_data-err';
    el.style.cssText = 'position:fixed;top:90px;left:50%;transform:translateX(-50%);z-index:9500;background:rgba(239,68,68,.92);color:#fff;padding:8px 18px;border-radius:8px;font-size:12px;font-family:var(--sans);white-space:nowrap;box-shadow:0 3px 12px rgba(0,0,0,.4);';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(function(){ if(el.parentNode) el.style.display = 'none'; }, 3000);
}

// 새로고침 버튼용 — 마커 재생성 포함
function reloadMap() {
  _dataReady = false;
  const fetchPromise = fetch(MAP_SHEET_URL);
  const timeoutPromise = new Promise(function(_, reject) {
    setTimeout(function(){ reject(new Error('fetch timeout')); }, 8000);
  });

  // 로딩 표시
  showDataLoader(true);

  Promise.race([fetchPromise, timeoutPromise])
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.text();
    })
    .then(function(text) {
      const rows = parseCSV(text);
      const valid = rowsToBuildings(rows);
      buildings = rows.length > 0 ? [OUR_BUILDING].concat(valid) : [OUR_BUILDING];
      console.log('✅ 데이터 갱신:', valid.length, '개 건물');
    })
    .catch(function(e) {
      console.warn('⚠️ 갱신 실패:', e.message);
      showDataError('데이터 갱신 실패 · 기존 데이터를 유지합니다');
    })
    .finally(function() {
      showDataLoader(false);
      _dataReady = true;
      const t = document.getElementById('syncTime');
      if (t) t.textContent = new Date().toLocaleTimeString('ko-KR');
      applyLeaseFilter();
      // 마커 전체 재생성
      Object.values(overlays).forEach(ov => ov.setMap(null));
      overlays = {};
      drawBuildings();
      if (mode === 'lease') renderLeasePanel();
    });
}

function renderLeaseFilter() {
  const counts = {};
  buildings.forEach(b => (b.tenants||[]).forEach(t => counts[t.type]=(counts[t.type]||0)+1));
  const nonOurs = buildings.filter(b=>!b.isOurs);
  const chips = [
    {id:'전체', name:'전체', count:nonOurs.length},
    {id:'인접300m', name:'인접 300m', count:nonOurs.filter(b=>b.distance==='core').length},
    {divider:true},
    {id:'F&B/음식점', name:'음식점', emoji:'🍽️', count:nonOurs.filter(b=>b.tenants.some(t=>t.type==='F&B/음식점')).length},
    {id:'카페', name:'카페', emoji:'☕', count:nonOurs.filter(b=>b.tenants.some(t=>t.type==='카페')).length},
    {id:'병원/의료', name:'의료', emoji:'🏥', count:nonOurs.filter(b=>b.tenants.some(t=>t.type==='병원/의료')).length},
    {id:'사무실/기업', name:'사무실', emoji:'🏢', count:nonOurs.filter(b=>b.tenants.some(t=>t.type==='사무실/기업')).length},
    {id:'뷰티/미용', name:'뷰티', emoji:'💅', count:nonOurs.filter(b=>b.tenants.some(t=>t.type==='뷰티/미용')).length},
    {id:'학원/교육', name:'학원', emoji:'📚', count:nonOurs.filter(b=>b.tenants.some(t=>t.type==='학원/교육')).length},
    {id:'공실', name:'공실', emoji:'🔓', count:nonOurs.filter(b=>b.tenants.some(t=>t.name.includes('공실')||t.rawType==='공실')).length},
  ];
  renderFilter(chips, activeLeaseType, 'setLeaseType');
}

function setLeaseType(t) {
  if (activeLeaseType===t&&t!=='전체') t='전체';
  activeLeaseType = t;
  renderLeaseFilter(); applyLeaseFilter(); drawBuildings();
  if (subtab===0) renderBuildingList();
  else renderLeasePanel();
}

function applyLeaseFilter() {
  filteredBuildings = buildings.filter(b => {
    if (activeLeaseType==='전체') return true;
    if (activeLeaseType==='인접300m') return b.distance==='core'||b.isOurs;
    if (activeLeaseType==='공실') return b.isOurs||b.tenants.some(t=>t.name.includes('공실')||t.rawType==='공실');
    return b.isOurs||b.tenants.some(t=>t.type===activeLeaseType);
  });
}

function buildingMatchesFilter(b, filter) {
  if (b.isOurs) return true;
  if (filter==='전체') return true;
  if (filter==='인접300m') return b.distance==='core';
  if (filter==='공실') return b.tenants.some(t=>t.name.includes('공실')||t.rawType==='공실');
  return b.tenants.some(t=>t.type===filter);
}

function renderLeasePanel() {
  if (subtab===0) renderBuildingList();
  else if (subtab===1) renderChart();
  else if (subtab===2) renderReport();
  else renderLegend();
}

function toggleCard(id) {
  const card = document.getElementById('card-'+id);
  if (!card) return;
  const wasSelected = card.classList.contains('selected');
  document.querySelectorAll('.bldg-card').forEach(c => c.classList.remove('active','selected'));
  if (!wasSelected) {
    card.classList.add('active','selected');
    selectedId = id;
    const b = buildings.find(x=>x.id===id);
    if (b&&b.lat&&b.lng) map.setCenter(new kakao.maps.LatLng(b.lat,b.lng));
    // 마커 선택 강조
    Object.values(overlays).forEach(ov => {
      const el = ov.getContent();
      el.classList.remove('selected');
    });
    const ov = overlays[id];
    if (ov) ov.getContent().classList.add('selected');
  } else {
    selectedId = null;
  }
}

function toggleDongGroup(dong) {
  const body = document.getElementById('dgb-'+dong);
  const header = document.getElementById('dgh-'+dong);
  const dg = document.getElementById('dg-'+dong);
  if (!body) return;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  header.classList.toggle('open', !isOpen);
  if (dg) dg.classList.toggle('dong-open', !isOpen);
  if (!isOpen) {
    const dongBuildings = buildings.filter(b=>!b.isOurs&&b.dong===dong&&b.lat&&b.lng);
    if (dongBuildings.length===1) {
      map.setCenter(new kakao.maps.LatLng(dongBuildings[0].lat,dongBuildings[0].lng));
      map.setLevel(4);
    } else if (dongBuildings.length>1) {
      const bounds = new kakao.maps.LatLngBounds();
      dongBuildings.forEach(b=>bounds.extend(new kakao.maps.LatLng(b.lat,b.lng)));
      map.setBounds(bounds);
    }
  }
}

// ────── 업종 분석 탭 ──────
function typeKey(type) { return type.replace(/\//g,'_'); }

function renderChart() {
  const typeBuildings = {};
  buildings.forEach(b => {
    if (b.isOurs) return;
    const typeFloors = {};
    b.tenants.forEach(t => { if(!typeFloors[t.type]) typeFloors[t.type]=[]; typeFloors[t.type].push(t.floor); });
    Object.entries(typeFloors).forEach(([type,floors]) => {
      if(!typeBuildings[type]) typeBuildings[type]=[];
      typeBuildings[type].push({b,floors});
    });
  });
  const cnt = {};
  Object.entries(typeBuildings).forEach(([type,list]) => { cnt[type]=list.reduce((s,x)=>s+x.floors.length,0); });
  const sorted = Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  const maxVal = sorted[0]?.[1]||1;

  const rows = sorted.map(([type,n]) => {
    const color = TYPES[type]||'#888';
    const pct = Math.round(n/maxVal*100);
    const bldgCnt = (typeBuildings[type]||[]).length;
    const bldgList = (typeBuildings[type]||[]).map(({b,floors}) => `
      <div class="type-bldg-item" style="border-color:${color}40"
           onmouseover="this.style.background='${color}22';this.style.borderColor='${color}'"
           onmouseout="this.style.background='';this.style.borderColor='${color}40'">
        <span onclick="event.stopPropagation();flyToBuilding('${b.id}')" style="flex:1;cursor:pointer">${b.name} <span class="bldg-arrow">→</span></span>
        <span onclick="event.stopPropagation();openBldgModal('${b.id}')" style="font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(59,127,255,.2);color:#3b7fff;cursor:pointer;white-space:nowrap;font-weight:700">상세</span>
      </div>`).join('');
    return `
      <div class="type-row" id="tyrow-${typeKey(type)}" onclick="selectType('${type}')">
        <div class="type-bar-row">
          <div class="type-lbl">${type}</div>
          <div class="type-track" style="position:relative">
            <div class="type-fill" style="width:${Math.max(pct,4)}%;background:linear-gradient(90deg,${color}bb,${color});min-width:36px">
              <span class="type-cnt">${n}</span>
            </div>
            <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:600;color:rgba(255,255,255,.5)">${bldgCnt}개 건물</span>
          </div>
        </div>
        <div class="type-bldg-list" id="tblist-${typeKey(type)}" style="display:none">${bldgList}</div>
      </div>`;
  }).join('');

  document.getElementById('panelBody').innerHTML = `
    <div class="chart-pad">
      <div class="section-title">업종별 임차인 수 (전체 건물 합산)</div>
      <div class="type-hint">👆 업종 클릭 → 해당 건물을 지도에서 확인</div>
      <div id="type-chart">${rows}</div>
      <div class="insight-box">
        <div class="insight-title">💡 주목할 인사이트</div>
        <ul>
          <li><b style="color:#3b82f6">사무실/기업</b> 임차인이 가장 많아 오피스 수요가 탄탄한 상권</li>
          <li><b style="color:#06b6d4">병원/의료</b> 클러스터 형성 — 메디컬 빌딩 전층 임대 사례 다수</li>
          <li><b style="color:#ef4444">F&B/음식점</b> 저층 집중, 가로수길 상권 특성상 외식 수요 안정적</li>
          <li><b style="color:#ec4899">뷰티/미용</b> (네일·피부·속눈썹) 2~3층 다수 — 젊은 여성 유동인구</li>
          <li><b style="color:#f59e0b">학원/교육</b> 중층에서 장기 임차 — 안정적 수익원 역할</li>
        </ul>
      </div>
    </div>`;
}

function selectType(type) {
  if (selectedType===type) { resetTypeFilter(); return; }
  selectedType = type;
  document.querySelectorAll('.type-row').forEach(r=>r.classList.remove('t-selected'));
  document.querySelectorAll('[id^="tblist-"]').forEach(el=>el.style.display='none');
  const row = document.getElementById('tyrow-'+typeKey(type));
  if (row) row.classList.add('t-selected');
  const list = document.getElementById('tblist-'+typeKey(type));
  if (list) list.style.display='block';
  const existing = document.getElementById('reset-btn-el');
  if (existing) existing.remove();
  const btn = document.createElement('div');
  btn.id='reset-btn-el'; btn.className='reset-filter'; btn.textContent='✕ 필터 해제';
  btn.onclick=()=>resetTypeFilter();
  const chartEl = document.getElementById('type-chart');
  if (chartEl) chartEl.prepend(btn);
  // 지도 & 필터바 동기화
  setLeaseType(type);
}

function resetTypeFilter() {
  selectedType = null;
  setLeaseType('전체');
}

function flyToBuilding(id) {
  const b = buildings.find(x=>x.id===id);
  if (!b) return;
  Object.values(overlays).forEach(ov=>ov.getContent().classList.remove('selected'));
  const ov = overlays[id];
  if (ov) ov.getContent().classList.add('selected');
  map.setCenter(new kakao.maps.LatLng(b.lat,b.lng));
  map.setLevel(3);
}

  const vacantCnt = allTenants.filter(t=>t.name.includes('공실')||t.name.includes('명도')||t.name.includes('퇴거')).length;

  function makeStackBar(tenants) {
    const cnt = {};
    tenants.forEach(t=>{ cnt[t.type]=(cnt[t.type]||0)+1; });
    const total = tenants.length||1;
    const sorted = Object.entries(cnt).sort((a,b)=>b[1]-a[1]);

    return {segs,legend};
  }

  const {segs:allSegs,legend:allLegend} = makeStackBar(allTenants);

  const dongMeta = {
    '신사동':{color:'#1e40af',icon:'📍',desc:'강남구 신사동 · 가로수길 · 압구정로 일대',note:'케이프혼타워 사업지가 위치한 핵심 상권.',strategy:'압구정로 접면부 F&B(저층)·오피스(중고층) 조합이 검증된 패턴.'},
    '논현동':{color:'#065f46',icon:'🏥',desc:'강남구 논현동 · 언주로·학동로 일대',note:'메디컬 특화 상권.',strategy:'메디컬 전층 임대 또는 오피스·클리닉 혼합 구성.'},
    '삼성동':{color:'#7c3aed',icon:'🏢',desc:'강남구 삼성동 · COEX 인근',note:'대형 오피스·의료시설 중심.',strategy:'전층 메디컬 또는 대형 기업 단독 임대 권장.'},
    '청담동':{color:'#b45309',icon:'✨',desc:'강남구 청담동 · 명품·럭셔리 상권',note:'럭셔리 브랜드·F&B·성형외과 클러스터.',strategy:'저층 명품/F&B, 중고층 성형·피부과 유치.'},
    '역삼동':{color:'#0f766e',icon:'🏗️',desc:'강남구 역삼동 · 테헤란로·역삼역 일대',note:'오피스·사무실 수요 압도적.',strategy:'중소형 사무실 분할 임대 또는 공유오피스 유치.'},
    '대치동':{color:'#1d4ed8',icon:'📚',desc:'강남구 대치동 · 학원가 밀집 상권',note:'학원/교육 업종이 절대 다수.',strategy:'학원 전층 임대가 가장 안정적.'},
    '방배동':{color:'#6d28d9',icon:'🌿',desc:'서초구 방배동 · 방배역 일대',note:'주거 친화 상권.',strategy:'근린생활형 임차인 중심 구성.'},
    '반포동':{color:'#0369a1',icon:'🏘️',desc:'서초구 반포동 일대',note:'주거·사무 혼합 지역.',strategy:'사무실·근린생활 혼합 임대.'},
    '서초동':{color:'#064e3b',icon:'⚖️',desc:'서초구 서초동 · 법조타운 인근',note:'법무법인·사무소 집중.',strategy:'법무·회계 사무실 유치.'},
    '한남동':{color:'#7f1d1d',icon:'🌉',desc:'용산구 한남동 · 이태원 인근',note:'고급 F&B·사무실 복합 상권.',strategy:'럭셔리 F&B 또는 기업 사무실.'},
    '성수동1가':{color:'#166534',icon:'🏭',desc:'성동구 성수동 · 팝업·F&B 핫플레이스',note:'팝업스토어·브런치·F&B 특화 상권.',strategy:'단기·팝업 임대와 장기 임대 혼합.'},
    '신공덕동':{color:'#164e63',icon:'🏥',desc:'마포구 신공덕동 · 공덕 메디컬 상권',note:'메디컬·사무 복합 빌딩 중심.',strategy:'의료기관 전층 임대가 가장 안정적.'},
    '당주동':{color:'#1e3a5f',icon:'🏛️',desc:'종로구 당주동 · 광화문 인근',note:'상업·오피스 복합.',strategy:'저층 통신·F&B, 중고층 사무실 임대.'},
  };

  const dongSet = new Set(buildings.filter(b=>!b.isOurs).map(b=>b.dong));
  const dongDefs = Array.from(dongSet).sort((a,b)=>{
    if(a==='신사동') return -1; if(b==='신사동') return 1;
    if(a==='논현동') return -1; if(b==='논현동') return 1;
    return a.localeCompare(b,'ko');
  }).map(key => {
    const meta = dongMeta[key]||{color:'#374151',icon:'📌',desc:`${key} 일대`,note:'데이터 수집 중.',strategy:'추가 데이터 분석 후 전략 수립 예정.'};
    return {key,...meta};
  });

  const areaSections = dongDefs.map(def => {
    const bldgs = buildings.filter(b=>!b.isOurs&&b.dong===def.key);
    if (bldgs.length===0) return `
      <div class="rp-area" id="rp-area-${def.key}">
        <div class="rp-area-header rp-area-empty">
          <span class="rp-area-badge" style="background:#cbd5e1;color:#64748b">${def.key}</span>
          <div><div class="rp-area-title" style="color:#94a3b8">데이터 업로드 예정</div><div class="rp-area-sub">${def.desc}</div></div>
          <span style="font-size:10px;color:#cbd5e1;margin-left:auto">준비중</span>
        </div>
      </div>`;
    const tenants = bldgs.flatMap(b=>b.tenants);
    const {segs,legend} = makeStackBar(tenants);
    const bCnt=bldgs.length,tCnt=tenants.length;
    const vacCnt=tenants.filter(t=>t.name.includes('공실')||t.name.includes('퇴거')||t.name.includes('명도')).length;
    const bldgRows = bldgs.map(b => {
      const tRows = b.tenants.map(t=>`<tr><td class="fl">${t.floor}</td><td class="${t.name.includes('공실')?'rp-vacant':t.name.includes('퇴거')||t.name.includes('명도')?'rp-leaving':''}">${t.name}</td><td><span class="type-badge" style="background:${TYPES[t.type]||'#888'};font-size:9px;padding:2px 5px">${t.type}</span></td></tr>`).join('');
      return `
        <div class="rp-table-title" onclick="flyToBuilding('${b.id}');setSubtab(0)">
          <span class="rp-bldg-dot" style="background:${def.color}"></span>
          ${b.name} <span class="rp-bldg-meta">${b.price?b.price+' ·':''} 지도에서 보기 →</span>
        </div>
        <table class="rp-table"><thead><tr><th>층</th><th>임차인</th><th>업종</th></tr></thead><tbody>${tRows}</tbody></table>`;
    }).join('');
    return `
      <div class="rp-area" id="rp-area-${def.key}">
        <div class="rp-area-header" onclick="toggleArea('${def.key}')">
          <div class="rp-dong-badge-wrap"><span class="rp-area-badge" style="background:${def.color}">${def.icon} ${def.key}</span></div>
          <div style="flex:1;min-width:0">
            <div class="rp-area-title">건물 ${bCnt}개 · 임차인 ${tCnt}건${vacCnt>0?` · <span style="color:#ef4444">공실·퇴거 ${vacCnt}건</span>`:''}</div>
            <div class="rp-area-sub">${def.desc}</div>
          </div>
          <span class="rp-area-chevron">▼</span>
        </div>
        <div class="rp-area-body"><div class="rp-area-inner">
          <div class="rp-kpi-row">
            <div class="rp-kpi"><div class="rp-kpi-val" style="color:${def.color}">${bCnt}</div><div class="rp-kpi-unit">분석 건물</div></div>
            <div class="rp-kpi"><div class="rp-kpi-val">${tCnt}</div><div class="rp-kpi-unit">임차인 수</div></div>
            <div class="rp-kpi"><div class="rp-kpi-val" style="color:${vacCnt>0?'#ef4444':'#10b981'}">${vacCnt}</div><div class="rp-kpi-unit">공실·퇴거</div></div>
          </div>
          <div class="rp-stack-wrap"><div class="rp-stack-label">업종 구성 비율</div><div class="rp-stack-bar">${segs}</div><div class="rp-stack-legend">${legend}</div></div>
          <div style="height:1px;background:#222636;margin:12px 0"></div>
          <div class="rp-table-section-title">건물별 임차인 상세</div>
          ${bldgRows}
          <div class="rp-memo"><div class="rp-memo-title">📋 ${def.key} 분석 메모</div>${def.note}<br><b>전략 포인트:</b> ${def.strategy}</div>
        </div></div>
      </div>`;
  }).join('');

  const strategies = [
    {icon:'🏪',name:'저층 (B1~1F)',tag:'F&B · 편의점 · 약국',tagColor:'#ef4444',body:'<b>F&B·편의점·약국</b>이 압도적. 압구정로 유동인구 흡입력 활용. 프랜차이즈 유치 시 공실 리스크 최소화.'},
    {icon:'💆',name:'2~3층',tag:'뷰티 · 학원 · 스튜디오',tagColor:'#ec4899',body:'<b>뷰티(네일·피부·속눈썹)</b>와 <b>학원·교육</b>이 가장 많이 분포. 장기 임차 경향 강해 안정적.'},
    {icon:'🏢',name:'4층 이상',tag:'사무실 · 의료',tagColor:'#3b82f6',body:'<b>사무실/기업</b>이 중심. <b>병원·의료</b> 고층 진출 사례 증가. 전층 병원 통임대 시 월세 수익 극대화 가능.'},
  ];

  document.getElementById('panelBody').innerHTML = `
    <div class="report-wrap" id="report-wrap">
      <div class="rp-summary-header"><div class="rp-summary-title">📊 케이프혼타워 상권 임대 리포트</div><div class="rp-summary-sub">서울 · ${totalBuildings}개 건물 분석</div></div>
      <div class="rp-total-kpi">
        <div class="rp-total-card accent"><div class="rp-total-card-label">전체 임차인</div><div class="rp-total-card-val">${totalTenants}건</div><div class="rp-total-card-sub">${totalBuildings}개 건물 합산</div></div>
        <div class="rp-total-card accent"><div class="rp-total-card-label">공실·퇴거 예정</div><div class="rp-total-card-val">${vacantCnt}건</div><div class="rp-total-card-sub">임박한 임차 기회</div></div>
        <div class="rp-total-card"><div class="rp-total-card-label">1위 업종</div><div class="rp-total-card-val" style="font-size:13px;color:${TYPES[top1[0]]||'#3b7fff'}">${top1[0]}</div><div class="rp-total-card-sub">${top1[1]}건 (${totalTenants?Math.round(top1[1]/totalTenants*100):0}%)</div></div>
        <div class="rp-total-card"><div class="rp-total-card-label">2위 업종</div><div class="rp-total-card-val" style="font-size:13px;color:${TYPES[top2[0]]||'#3b7fff'}">${top2[0]}</div><div class="rp-total-card-sub">${top2[1]}건 (${totalTenants?Math.round(top2[1]/totalTenants*100):0}%)</div></div>
      </div>
      <div class="rp-dist-wrap"><div class="rp-stack-label" style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:6px">전체 업종 분포</div><div class="rp-stack-bar" style="height:24px">${allSegs}</div><div class="rp-stack-legend" style="margin-top:8px">${allLegend}</div></div>
      <div class="rp-strategy-wrap"><div class="rp-stack-label" style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:8px">🏗️ 층별 임대 전략 제안</div>${strategies.map(s=>`<div class="rp-strategy-card"><div class="rp-strategy-head"><span class="rp-strategy-icon">${s.icon}</span><span class="rp-strategy-name">${s.name}</span><span class="rp-strategy-tag" style="background:${s.tagColor}">${s.tag}</span></div><div class="rp-strategy-body">${s.body}</div></div>`).join('')}</div>
      <div class="rp-dong-section-header"><div class="rp-dong-section-title">동별 상세 데이터</div><div class="rp-dong-section-sub">각 동 탭을 클릭하면 건물별 임차인 내역을 확인할 수 있습니다</div></div>
      ${areaSections}
    </div>`;
}

function toggleArea(key) {
  const el = document.getElementById('rp-area-'+key);
  if (el) el.classList.toggle('open');
}

// ────── 범례 탭 ──────
function renderLegend() {
  document.getElementById('panelBody').innerHTML = `
    <div class="legend-pad">
      <div class="section-title">업종 색상</div>
      <div class="legend-grid">
        ${Object.entries(TYPES).map(([type,color])=>`<div class="legend-item"><div class="legend-dot" style="background:${color}"></div><span>${type}</span></div>`).join('')}
      </div>
      <div class="section-title" style="margin-top:14px">마커 안내</div>
      <div class="legend-section">
        ⭐ 원형 금색 — 우리 건물 (케이프혼타워 신축 예정)<br>
        🔷 다이아몬드 핀 — 주변 분석 건물<br>
        클릭 시 건물 목록과 지도가 서로 연동됩니다.
      </div>
    </div>`;
}

// ════════════════════════════════════
//  건물 상세 모달
// ════════════════════════════════════
function openBldgModal(id) {
  const b = buildings.find(x=>x.id===id);
  if (!b) return;
  document.getElementById('bm-title').textContent = b.name;
  document.getElementById('bm-addr').textContent = b.address||'주소 정보 없음';
  document.getElementById('bm-icon').textContent = b.isOurs?'🏗️':'🏢';
  const floors = [...new Set(b.tenants.map(t=>t.floor).filter(Boolean))];
  document.getElementById('bm-kpi-floors').textContent = floors.length||'—';
  document.getElementById('bm-kpi-tenants').textContent = b.tenants.length||'—';
  document.getElementById('bm-kpi-price').textContent = b.price||'—';
  const rows = b.tenants.map(t=>`
    <tr>
      <td class="bm-floor-cell">${t.floor||'—'}</td>
      <td class="bm-name-cell">${t.name}</td>
      <td><span class="type-badge" style="background:${TYPES[t.type]||'#888'}">${t.type}</span></td>
    </tr>`).join('');
  document.getElementById('bm-tbody').innerHTML = rows||`<tr><td colspan="3" class="bm-empty">임차인 정보 없음</td></tr>`;
  document.getElementById('bm-map-btn').onclick = () => { closeBldgModal(); flyToBuilding(id); };
  document.getElementById('bldg-modal-overlay').classList.add('open');
}
function closeBldgModal() { document.getElementById('bldg-modal-overlay').classList.remove('open'); }
document.getElementById('bldg-modal-overlay').addEventListener('click', function(e){
  if(e.target===this) closeBldgModal();
});

// ════════════════════════════════════
//  지도 마커 (Kakao CustomOverlay)
// ════════════════════════════════════
function drawBuildings() {
  // 기존 오버레이 제거
  Object.values(overlays).forEach(ov=>ov.setMap(null));
  overlays = {};

  const toShow = filteredBuildings.filter(b=>b.lat&&b.lng);
  toShow.forEach(b => {
    const el = document.createElement('div');
    const isOurs = b.isOurs;
    el.className = 'mk-wrap' + (isOurs?' ours-wrap':'');
    el.id = 'mkw-'+b.id;
    el.innerHTML = isOurs
      ? '<div class="mk-pin"><div class="mk-circle">⭐</div></div><div class="mk-label">우리건물</div>'
      : '<div class="mk-pin"><div class="mk-circle"></div></div><div class="mk-label">'+b.short+'</div>';
    if (!isOurs) {
      el.addEventListener('click', () => {
        // 탭이 건물목록이면 카드 선택, 아니면 모달 오픈
        if (subtab===0&&mode==='lease') toggleCard(b.id);
        else openBldgModal(b.id);
        map.setCenter(new kakao.maps.LatLng(b.lat,b.lng));
      });
    }
    const ov = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(b.lat, b.lng),
      content: el, zIndex: isOurs?10:3, yAnchor:1
    });
    ov.setMap(map);
    overlays[b.id] = ov;
  });
}

// ════════════════════════════════════
//  실시간상권 모드
// ════════════════════════════════════
function renderRealtimeFilter() {
  const chips = REAL_CATS.map(c=>({id:c.id, name:c.name, emoji:c.emoji}));
  renderFilter(chips, activeRealCats, 'toggleRealCat');
}

function toggleRealCat(id) {
  activeRealCats.has(id) ? activeRealCats.delete(id) : activeRealCats.add(id);
  renderRealtimeFilter();
}

function renderRealtimePanel() {
  if (subtab===0) {
    document.getElementById('panelBody').innerHTML = `
      <div class="search-box"><input id="addr" class="input" value="압구정로 112"><button class="btn" onclick="geocode()">설정</button></div>
      <div class="radius-row">${[500,1000,2000,3000].map(r=>`<div class="rchip ${radius==r?'active':''}" onclick="radius=${r};drawCircle();renderRealtimePanel()">${r>=1000?r/1000+'km':r+'m'}</div>`).join('')}</div>
      <div class="section"><button class="btn full" onclick="runPlaceSearch()">선택 카테고리 검색</button><div class="hint" style="margin-top:12px">필터바에서 병원/약국/카페/주차장 등을 선택한 뒤 검색하세요.</div></div>`;
  } else if (subtab===1) {
    renderPoiList();
  } else {
    document.getElementById('panelBody').innerHTML = `
      <div class="section"><div class="section-title-bar">검색 요약</div><div class="kpi"><div class="kbox"><div class="klabel">검색 결과</div><div class="kval">${poiResults.length}</div></div><div class="kbox"><div class="klabel">반경</div><div class="kval">${radius}m</div></div></div></div>`;
  }
}

function runPlaceSearch() {
  clearPoi(); poiResults = [];
  const cats = [...activeRealCats];
  if (!cats.length) { alert('카테고리를 선택하세요.'); return; }
  let pending = cats.length;
  cats.forEach(cid => {
    ps.categorySearch(cid, (data,status) => {
      if (status===kakao.maps.services.Status.OK) {
        data.forEach(d => { d._cat=cid; poiResults.push(d); drawPoi(d); });
      }
      if (--pending===0) { subtab=1; renderShell(); renderPoiList(); }
    }, {location:new kakao.maps.LatLng(OUR_LAT,OUR_LNG), radius:Number(radius)});
  });
}

function renderPoiList() {
  document.getElementById('panelBody').innerHTML = poiResults.map(p=>`
    <div class="poi-item" onclick="map.setCenter(new kakao.maps.LatLng(${p.y},${p.x}));map.setLevel(3)">
      <div class="poi-dot"></div>
      <div><div class="poi-name">${p.place_name}</div><div class="poi-meta">${p.category_name||''} · ${p.distance||'-'}m</div></div>
    </div>`).join('') || '<div class="empty">아직 검색 결과가 없습니다.</div>';
}

function drawPoi(p) {
  const m = new kakao.maps.Marker({position:new kakao.maps.LatLng(p.y,p.x),map,title:p.place_name});
  kakao.maps.event.addListener(m,'click',()=>info.open(map,m));
  poiMarkers.push(m);
}

function clearPoi() { poiMarkers.forEach(m=>m.setMap(null)); poiMarkers=[]; }

function geocode() {
  const q = document.getElementById('addr').value||'압구정로 112';
  ps.keywordSearch(q,(data,status)=>{
    if(status===kakao.maps.services.Status.OK&&data[0]) {
      map.setCenter(new kakao.maps.LatLng(data[0].y,data[0].x));
      map.setLevel(4);
    }
  });
}

// ════════════════════════════════════
//  공통 유틸
// ════════════════════════════════════
function drawCircle() {
  if (!map) return;
  if (circle) circle.setMap(null);
  circle = new kakao.maps.Circle({
    center:new kakao.maps.LatLng(OUR_LAT,OUR_LNG),
    radius:Number(radius),
    strokeWeight:1,strokeColor:'#3b7fff',strokeOpacity:.5,strokeStyle:'shortdash',
    fillColor:'#3b7fff',fillOpacity:.035
  });
  circle.setMap(map);
}
</script>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=2a3ec83cc3ca9f434e295d2ded3f0eac&libraries=services&autoload=false" onload="initKakaoMap()"></script>
