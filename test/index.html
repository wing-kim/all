        <td style="padding:7px 12px;text-align:right;font-family:var(--mono);font-size:11px;color:${r.constInt<0?'var(--red)':'var(--t4)'}">${r.constInt<0?'-'+fSmall(Math.abs(r.constInt)):'вҖ”'}</td>
        <td style="padding:7px 12px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--red)">-${fSmall(Math.abs(r.htax))}</td>
        <td style="padding:7px 12px;text-align:right;font-family:var(--mono);font-size:11px;color:${r.ccost<0?'var(--red)':'var(--t4)'}">${r.ccost<0?'-'+fSmall(Math.abs(r.ccost)):'вҖ”'}</td>
        <td style="padding:7px 12px;text-align:right;font-family:var(--mono);font-size:12px;font-weight:700;color:${r.net>=0?'var(--green)':'var(--red)'}">${r.net>=0?'+':''}${fSmall(r.net)}</td>
        <td style="padding:7px 12px;text-align:right;font-family:var(--mono);font-size:11px;color:${r.cum>=0?'#6b7899':'var(--red)'}">${r.cum>=0?'+':''}${fSmall(r.cum)}</td>
        <td style="padding:7px 12px;text-align:right;font-family:var(--mono);font-size:11px;color:var(--blue)">${fSmall(r.asset)}</td>
      </tr>`;
    });
    cfHtml+='</tbody></table>';
    cfWrapEl.innerHTML=cfHtml;
  }

  /* в”Җв”Җ лҜјк°җлҸ„ л¶„м„қ мұ„мҡ°кё° в”Җв”Җ */
  const scCell=(v,hi)=>{
    if(v===null) return`<div class="irr-sens-cell irr-sens-hdr">вҖ”</div>`;
    const pct=(v*100).toFixed(1)+'%';
    const cls=v>=0.08?'irr-sens-hi':v>=0?'irr-sens-mid':'irr-sens-lo';
    const hl=hi?'irr-sens-hl':'';
    return`<div class="irr-sens-cell ${cls} ${hl}">${pct}</div>`;
  };

  const calcSensIRR2=(overS)=>{
    const so={...S,...overS};
    const cc2=(so.constCost+so.designCost)/W;
    const eq2=buyOk-loanOk-depOk+buyOk*so.acqTaxRate;
    if(eq2<=0)return null;
    /* н•„м§Җлі„ мқҙмһҗ н•©мӮ° (л©”мқё лЎңм§Ғкіј лҸҷмқј) */
    const annI2=(loanA_ok+loanB_ok>0)
      ? loanA_ok*so.rateA + loanB_ok*so.rateB
      : loanOk*(so.rateA+so.rateB)/2;
    const pfL2=cc2*so.pfRatio;
    const pfI2=pfL2*so.pfRate;
    /* ліҙмң м„ё: calcPropertyTax лҸҷмқј лЎңм§Ғ */
    const ht2ok  = calcPropertyTax(landValRaw, bldgValRaw, false) / W;
    const nBldg2 = (so.constCost+so.designCost)*0.4;
    const nht2ok = calcPropertyTax(landValRaw, nBldg2, true)      / W;
    const cfs=[-eq2];
    for(let yr=1;yr<=so.totalYrs;yr++){
      const arb2=(sd._totalRent/W)*12;
      if(yr<=so.holdYrs){
        cfs.push(arb2*Math.pow(1+so.rentUp,yr-1)*(1-so.vacancy)-annI2-ht2ok);
      }else if(yr<=so.holdYrs+constY){
        cfs.push(-annI2-pfI2-ht2ok*0.5-(cc2-pfL2)/constY);
      }else{
        const yac=yr-so.holdYrs-constY;
        const nr2=newRentAok*12*Math.pow(1+so.rentUp,yac-1)*(1-so.newVacancy);
        cfs.push(nr2-annI2-pfI2-nht2ok);
      }
      if(yr===so.totalYrs){
        const sp2=buyOk*so.valueMult*Math.pow(1+so.priceUp,so.totalYrs);
        const g2=sp2-buyOk-cc2-buyOk*so.acqTaxRate;
        const la2=Math.max(0,g2)*lthdAvg;
        const tg2=Math.max(0,g2-la2);
        const cgt2=progressiveTaxCalc(Math.max(0,tg2-0.025))*1.1;
        const ns2=sp2-loanOk-pfL2-cgt2+depOk;
        cfs[cfs.length-1]+=ns2;
      }
    }
    try{const r2=irrNR(cfs);return(!isNaN(r2)&&isFinite(r2))?r2:null;}catch(e){return null;}
  };

  const curA=S.priceUp*100, curR=(S.rateA+S.rateB)/2*100;

  /* лҜјк°җлҸ„ н…Ңмқҙлё” л№ҢлҚ” */
  const buildSensTable=(rowSteps, colSteps, rowKey, colKey, rowFmt, colFmt, calcFn)=>{
    const curRow=S[rowKey], curCol=S[colKey];
    const nRow=rowSteps.reduce((bi,v,i)=>Math.abs(v-curRow)<Math.abs(rowSteps[bi]-curRow)?i:bi,0);
    const nCol=colSteps.reduce((bi,v,i)=>Math.abs(v-curCol)<Math.abs(colSteps[bi]-curCol)?i:bi,0);
    let t=`<table style="width:100%;border-collapse:collapse;font-size:11px">
      <thead><tr style="background:var(--s3)">
        <th style="padding:8px 12px;text-align:left;font-size:10px;color:#8890aa;border:1px solid var(--border2);font-weight:600;white-space:nowrap">гҖҖ</th>
        ${colSteps.map((c,ci)=>`<th style="padding:8px 10px;text-align:center;font-size:10px;
          color:${ci===nCol?'var(--t1)':'#8890aa'};
          background:${ci===nCol?'rgba(59,127,255,.12)':'var(--s3)'};
          border:1px solid ${ci===nCol?'rgba(59,127,255,.3)':'var(--border2)'};font-weight:600">
          ${colFmt(c)}</th>`).join('')}
      </tr></thead><tbody>`;
    rowSteps.forEach((rv,ri)=>{
      const isNR=ri===nRow;
      t+=`<tr>
        <td style="padding:8px 12px;font-family:var(--mono);font-size:10.5px;font-weight:600;
          white-space:nowrap;
          color:${isNR?'var(--t1)':'#8890aa'};
          background:${isNR?'rgba(59,127,255,.08)':'var(--s2)'};
          border:1px solid ${isNR?'rgba(59,127,255,.25)':'var(--border2)'}">
          ${rowFmt(rv)}</td>`;
      colSteps.forEach((cv,ci)=>{
        const isNC=ci===nCol;
        const v=calcFn({[rowKey]:rv,[colKey]:cv});
        if(v===null){
          t+=`<td style="text-align:center;color:var(--t4);font-size:10px;padding:7px 10px;border:1px solid rgba(42,48,80,.35)">вҖ”</td>`;
        } else {
          const pct=(v*100).toFixed(1)+'%';
          let bg,tc,bord;
          if(v<0){          bg='rgba(240,56,96,.25)'; tc='#ff5a5a'; bord='rgba(240,56,96,.5)';}
          else if(v<0.12){  bg='rgba(245,188,48,.18)';tc='#f5bc30'; bord='rgba(245,188,48,.45)';}
          else{              bg='rgba(34,209,134,.28)';tc='#22d186'; bord='rgba(34,209,134,.6)';}
          const ring=(isNR&&isNC)?`outline:2px solid rgba(255,255,255,.7);outline-offset:-2px;`:'';
          t+=`<td style="text-align:center;background:${bg};border:1px solid ${bord};
            font-family:var(--mono);font-size:11.5px;color:${tc};font-weight:700;
            padding:7px 10px;${ring}">${pct}</td>`;
        }
      });
      t+='</tr>';
    });
    return t+'</tbody></table>';
  };

  const g1=document.getElementById('irr-sensG');
  if(g1) g1.innerHTML=buildSensTable(
    [0.03,0.035,0.045,0.055,0.065],[0.01,0.02,0.03,0.05,0.07],
    'rateA','priceUp',
    v=>'кёҲлҰ¬ '+(v*100).toFixed(1)+'%', v=>(v*100).toFixed(0)+'%',
    ov=>calcSensIRR2({...ov, rateB:ov.rateA})
  );

  const g2=document.getElementById('irr-sensG2');
  if(g2) g2.innerHTML=buildSensTable(
    [1.2,1.5,1.8,2.2,2.8],[0.01,0.02,0.03,0.05,0.07],
    'valueMult','priceUp',
    v=>v.toFixed(1)+'x', v=>(v*100).toFixed(0)+'%',
    calcSensIRR2
  );

  /* в”Җв”Җ SVG л§үлҢҖ м°ЁнҠё (мҙҲкё°нҲ¬мһҗ м ңмҷё, мҠӨмјҖмқј м•Ҳм •нҷ”) в”Җв”Җ */
  const ca=document.getElementById('irr-chartArea');
  if(ca){
    // мҙҲкё°нҲ¬мһҗ(-equity)лҠ” мҠӨмјҖмқјм—җм„ң м ңмҷё вҖ” мҡҙмҳҒ CFл§Ң кё°мӨҖмңјлЎң мҠӨмјҖмқј
    const mx=Math.max(...rows.map(r=>Math.abs(r.net)),0.1);
    const barW=64, gap=18, H=280, MID=H*0.58; // лҶ’мқҙ мҰқк°Җ, л§үлҢҖ л„“мқҙ мҰқк°Җ
    const W=Math.max(600, rows.length*(barW+gap)+gap*2);
    let svgBars='',svgXlbl='',svgZero='';
    // мӨ‘мӢ¬м„  к°•мЎ°
    svgZero=`<line x1="0" y1="${MID}" x2="${W}" y2="${MID}" stroke="#4a5270" stroke-width="2" stroke-dasharray="4,3"/>`;
    svgZero+=`<text x="6" y="${MID-5}" font-size="9" fill="#4a5270" font-family="monospace">0</text>`;
    rows.forEach((r,i)=>{
      const x=gap+i*(barW+gap);
      const maxH=MID-28; // л§үлҢҖ мөңлҢҖ лҶ’мқҙ
      const barH=Math.max(Math.abs(r.net)/mx*maxH, 3);
      const isPos=r.net>=0;
      const fill=isPos?'#22c98a':'#e84040';
      const fillDim=isPos?'rgba(34,201,138,.18)':'rgba(232,64,64,.18)';
      const y=isPos?MID-barH:MID;
      const lblY=isPos?y-9:MID-9;  // л§Ҳмқҙл„ҲмҠӨ: кё°мӨҖм„  л°”лЎң мң„ н‘ңмӢң
      const val=fSmall(Math.abs(r.net));
      const lblColor = isPos ? '#22c98a' : '#ffffff';
      // л§үлҢҖ л°°кІҪ (нҲ¬лӘ… к°•мЎ°)
      svgBars+=`<rect x="${x}" y="${isPos?MID-maxH:MID}" width="${barW}" height="${maxH}" fill="${fillDim}" rx="3" opacity=".4"/>`;
      // мӢӨм ң л§үлҢҖ
      svgBars+=`<rect x="${x}" y="${y}" width="${barW}" height="${barH}" fill="${fill}" rx="4" opacity=".9"/>`;
      // к°’ лқјлІЁ
      svgBars+=`<text x="${x+barW/2}" y="${lblY}" text-anchor="middle" font-size="11.5" fill="${lblColor}" font-family="monospace" font-weight="700">${isPos?'+':'вҲ’'}${val}</text>`;
      // м—°лҸ„ лқјлІЁ
      svgXlbl+=`<text x="${x+barW/2}" y="${H-6}" text-anchor="middle" font-size="11" fill="#8890aa" font-family="monospace" font-weight="600">${r.cy}</text>`;
    });
    ca.style.overflowX='auto';
    ca.innerHTML=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"
      style="width:100%;min-width:${W}px;height:${H}px;display:block">
      ${svgZero}${svgBars}${svgXlbl}
    </svg>`;
  }

}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   3. LEASE вҖ” н‘ң кё°л°ҳ В· кұҙл¬јлі„ к·ёлЈ№нҷ”
   вҳ… кө¬кёҖ мӢңнҠё лҚ°мқҙн„° 100% мӢӨмӢңк°„ л°ҳмҳҒ / н•ҳл“ңмҪ”л”© м—ҶмқҢ
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function renderLease(rows){
  const sec=document.getElementById('sec-lease');
  if(!rows||rows.length<2){sec.innerHTML=errHTML('лҚ°мқҙн„° м—ҶмқҢ');return;}

  /* в•җв•җ [лҚ°мқҙн„° л Ҳмқҙм–ҙ] мӢңнҠё мӣҗліё нҢҢмӢұ в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     вҳ… кө¬кёҖ мӢңнҠё fetch вҶ’ parseCSV вҶ’ rows к·ёлҢҖлЎң мң м§Җ
     вҳ… н•ҳл“ңмҪ”л”© м—ҶмқҢ, м»¬лҹј нғҗмғү н—ӨлҚ” кё°л°ҳ
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  const hi=findHdrRow(rows);
  const hdr=rows[hi];

  /* м»¬лҹј мһҗлҸҷ нғҗмғү */
  const addrIdx    =hdr.findIndex(h=>/мЈјмҶҢ|мҶҢмһ¬м§Җ|мң„м№ҳ|л¬јкұҙ|кұҙл¬ј|л¶ҖлҸҷмӮ°/i.test(h));
  const floorIdx   =hdr.findIndex(h=>/мёө|floor/i.test(h));
  const nameIdx    =hdr.findIndex(h=>/мһ„м°Ёмқё|мӮ¬мҡ©мһҗ|нҡҢмӮ¬|м„ұлӘ…|мқҙлҰ„|name|tenant/i.test(h));
  const rentIdx    =hdr.findIndex(h=>/мӣ”м„ё|мӣ”мһ„лҢҖлЈҢ|мһ„лҢҖлЈҢ(?!ліҙ)/i.test(h));
  const depositIdx =hdr.findIndex(h=>/ліҙмҰқкёҲ|deposit/i.test(h));
  const mgmtIdx    =hdr.findIndex(h=>/кҙҖлҰ¬л№„|кҙҖлҰ¬лЈҢ|maintenance/i.test(h));
  const landRentIdx=hdr.findIndex(h=>/нҶ м§Җмһ„лҢҖлЈҢ|нҶ м§ҖлЈҢ|м§ҖлҢҖ/i.test(h));
  const statusIdx  =hdr.findIndex(h=>/мғҒнғң|кі„м•ҪмғҒнғң|нҳ„нҷ©|status/i.test(h));
  const startIdx   =hdr.findIndex(h=>/мӢңмһ‘|кі„м•ҪмӢңмһ‘|мһ„лҢҖмӢңмһ‘|from|start/i.test(h));
  const endIdx     =hdr.findIndex(h=>/мў…лЈҢ|л§ҢлЈҢ|кі„м•Ҫмў…лЈҢ|to|end/i.test(h));
  const areaIdx    =hdr.findIndex(h=>/л©ҙм Ғ|нҸүмҲҳ|гҺЎ|нҸү/i.test(h));

  function amt(r,idx){return idx>=0?parseAmt(r[idx]):0;}
  function str(r,idx){return idx>=0?((r[idx]||'').toString().trim()):'';} 

  /* в•җв•җ [мң нҡЁ н–ү нҢҗлі„] в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     м•„лһҳ мЎ°кұҙ мӨ‘ н•ҳлӮҳлқјлҸ„ л§ҢмЎұн•ҙм•ј "мӢӨм ң кі„м•Ҫ лҚ°мқҙн„° н–ү"мңјлЎң мқём •:
     1. мһ„м°ЁмқёлӘ…мқҙ мЎҙмһ¬ (н•©кі„/мҶҢкі„/н—ӨлҚ” л°ҳліө м ңмҷё)
     2. кі„м•Ҫ мӢңмһ‘мқј лҳҗлҠ” мў…лЈҢмқјмқҙ мЎҙмһ¬
     3. ліҙмҰқкёҲ / мӣ”мһ„лҢҖлЈҢ / кҙҖлҰ¬л№„ / нҶ м§Җмһ„лҢҖлЈҢ мӨ‘ мӢӨм ң кёҲм•Ўмқҙ мһҲмқҢ
     + л°ҳл“ңмӢң м ңмҷё: н•©кі„В·мҶҢкі„В·н—ӨлҚ”л°ҳліөВ·кө¬л¶„В·л№Ҳк°’ н–ү
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  /* м ңмҷё нҢЁн„ҙ: мһ„м°Ёмқё лҳҗлҠ” м–ҙлҠҗ м…Җмқҙл“  м•„лһҳ нӮӨмӣҢл“ңл©ҙ лҚ°мқҙн„° н–үм—җм„ң м ңкұ° */
  const EXCLUDE_PAT=/^(н•©кі„|мҶҢкі„|кі„|subtotal|total|sum|н•ӯлӘ©|мһ„м°Ёмқё|кө¬л¶„|кұҙл¬ј|мЈјмҶҢ|\-|вҖ”|\s*)$/i;

  /* [мҲҳм •] н–ү м „мІҙ м…Җм—җм„ң н•©кі„ нӮӨмӣҢл“ңк°Җ мһҲлҠ”м§Җ кІҖмӮ¬ вҖ” н•©кі„ н–ү мӨ‘ліө м§‘кі„ л°©м§Җ */
  const SUM_ROW_PAT=/^(н•©кі„|мҶҢкі„|кі„|subtotal|total|sum)$/i;
  function isSumRow(r){
    return r.some(c=>{
      const s=(c||'').toString().trim();
      return SUM_ROW_PAT.test(s);
    });
  }

  function isValidRow(r){
    /* лЁјм Җ н•©кі„/мҶҢкі„ н–үмқҙл©ҙ л¬ҙмЎ°кұҙ м ңмҷё */
    if(isSumRow(r)) return false;

    const name=str(r,nameIdx);
    const start=str(r,startIdx);
    const end  =str(r,endIdx);
    const moneySum=amt(r,depositIdx)+amt(r,rentIdx)+amt(r,mgmtIdx)+amt(r,landRentIdx);

    /* мһ„м°ЁмқёлӘ…мқҙ мһҲм–ҙлҸ„ н•©кі„/мҶҢкі„/н—ӨлҚ” нӮӨмӣҢл“ңл©ҙ м ңмҷё */
    if(name&&EXCLUDE_PAT.test(name)) return false;
    /* мІ« лІҲм§ё м…ҖлҸ„ н•©кі„лҘҳл©ҙ м ңмҷё */
    const cell0=(r[0]||'').toString().trim();
    if(EXCLUDE_PAT.test(cell0)&&!name&&!moneySum) return false;
    /* мң нҡЁ мЎ°кұҙ: мһ„м°Ёмқё OR лӮ м§ң OR кёҲм•Ў мӨ‘ н•ҳлӮҳ мқҙмғҒ */
    return !!(name||start||end||moneySum>0);
  }

  /* м „мІҙ лҚ°мқҙн„° н–ү вҖ” н—ӨлҚ” мқҙнӣ„, мң нҡЁ н–үл§Ң */
  const allRows=rows.slice(hi+1);
  const data=allRows.filter(r=>isValidRow(r));

  /* в•җв•җ [к·ёлЈ№н•‘] вҖ” кұҙл¬ј/мЈјмҶҢ кё°мӨҖ, мӨ‘ліө м—Ҷмқҙ в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     мҡ°м„ мҲңмң„:
     1. addrIdx м»¬лҹјм—җ мӢӨм ң мЈјмҶҢк°’мқҙ мһҲмңјл©ҙ к·ёкІғмқ„ к·ёлЈ№лӘ…мңјлЎң мӮ¬мҡ©
     2. м—Ҷмңјл©ҙ мһ„м°ЁмқёлӘ… / кёҲм•Ў нҢЁн„ҙмңјлЎң м¶”м •
     + к·ёлЈ№лӘ…мқҖ л°ҳл“ңмӢң мӢӨм ң кұҙл¬ј/мһҗмӮ°лӘ…мқҙм–ҙм•ј н•Ё
     + н•©кі„В·л№Ҳк°’В·кө¬л¶„ н…ҚмҠӨнҠёлҠ” м ҲлҢҖ к·ёлЈ№лӘ… л¶Ҳк°Җ
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  /* л¬ҙнҡЁ к·ёлЈ№лӘ… нҢЁн„ҙ */
  const INVALID_ADDR=/^(н•©кі„|мҶҢкі„|кі„|total|sum|кұҙл¬ј|мЈјмҶҢ|н•ӯлӘ©|вҖ”|\-|\s*)$/i;

  /* мЈјмҶҢ м •к·ңнҷ”: кіөл°ұ м ңкұ° нӣ„ л№„көҗ */
  function normAddr(a){return String(a||'').replace(/\s/g,'');}

  const groupMap=new Map();
  data.forEach(r=>{
    let addr=str(r,addrIdx).trim();

    /* addrIdxк°Җ м—Ҷкұ°лӮҳ к°’мқҙ л¬ҙнҡЁ к·ёлЈ№лӘ…мқҙл©ҙ м¶”м • */
    if(!addr||INVALID_ADDR.test(addr)){
      const name=str(r,nameIdx);
      const lrent=amt(r,landRentIdx);
      const rent =amt(r,rentIdx);
      /* нҶ м§Җмһ„лҢҖ м„ұкІ©: нҶ м§Җ нӮӨмӣҢл“ң or нҶ м§Җмһ„лҢҖлЈҢл§Ң мһҲкі  мӣ”м„ё 0 */
      if(/нҶ м§Җ/.test(name)||(lrent>0&&rent===0)) addr='нҶ м§Җмһ„лҢҖ';
      else if(/л””нҢҢмқҙл„ҳлІ„|defynumber/i.test(name)) addr='м••кө¬м •лЎң8кёё 3';
      else if(/лё”лЈЁн”јм№ҙ/i.test(name))              addr='м••кө¬м •лЎң8кёё 3';
      else if(name)                                 addr='м••кө¬м •лЎң 112';
      else                                          return; /* мқҙлҰ„лҸ„ м—Ҷмңјл©ҙ мҠӨнӮө */
    }

    /* мөңмў… л¬ҙнҡЁ к·ёлЈ№лӘ… л°©м–ҙ */
    if(INVALID_ADDR.test(addr)) return;

    /* кё°мЎҙ к·ёлЈ№кіј м •к·ңнҷ” л№„көҗн•ҙм„ң к°ҷмқҖ кұҙл¬јмқҙл©ҙ н•©м№ҳкё° (мӨ‘ліө л°©м§Җ) */
    let matchedKey=null;
    for(const [k] of groupMap){
      if(normAddr(k)===normAddr(addr)){matchedKey=k;break;}
    }
    const key=matchedKey||addr;
    if(!groupMap.has(key))groupMap.set(key,[]);
    groupMap.get(key).push(r);
  });

  /* в•җв•җ [м„№м…ҳ мҲңм„ң м •л ¬] в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  const SECTION_ORDER=['м••кө¬м •лЎң112','м••кө¬м •лЎң8кёё3','нҶ м§Җмһ„лҢҖ'];
  const validEntries=[...groupMap.entries()];

  const ordered=[];
  SECTION_ORDER.forEach(key=>{
    const found=validEntries.find(([a])=>
      normAddr(a).includes(normAddr(key))||normAddr(key).includes(normAddr(a))
    );
    if(found&&!ordered.includes(found))ordered.push(found);
  });
  validEntries.forEach(e=>{if(!ordered.includes(e))ordered.push(e);});

  /* в•җв•җ [UI л Ҳмқҙм–ҙ] л§ҢлЈҢ л°°м§Җ в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  function expBadge(r){
    const stTxt=str(r,statusIdx);
    if(stTxt){
      if(/л§ҢлЈҢ|мў…лЈҢ|н•ҙм§Җ/i.test(stTxt))return`<span class="exp-badge exp-done">${stTxt}</span>`;
      if(/мҳҲм •|мһ„л°•|мЈјмқҳ/i.test(stTxt))return`<span class="exp-badge exp-near">${stTxt}</span>`;
      if(/мң нҡЁ|нҷңм„ұ|кі„м•ҪмӨ‘|м§„н–ү/i.test(stTxt))return`<span class="exp-badge exp-ok">${stTxt}</span>`;
    }
    const endTxt=str(r,endIdx);
    if(!endTxt)return`<span class="exp-badge exp-none">вҖ”</span>`;
    const m=endTxt.match(/(\d{4})/);
    if(!m)return`<span class="exp-badge exp-none">${endTxt}</span>`;
    const yr=parseInt(m[1]),diff=yr-new Date().getFullYear();
    if(diff<0) return`<span class="exp-badge exp-done">л§ҢлЈҢ (${yr})</span>`;
    if(diff===0)return`<span class="exp-badge exp-near">мҳ¬н•ҙ л§ҢлЈҢ</span>`;
    if(diff===1)return`<span class="exp-badge exp-warn">лӮҙл…„ л§ҢлЈҢ (${yr})</span>`;
    return`<span class="exp-badge exp-ok">${yr}</span>`;
  }
  function amtCell(v,cls){
    if(!v||v===0)return`<span class="amt-muted">вҖ”</span>`;
    return`<span class="${cls||''}">${fmtBig(v)}мӣҗ</span>`;
  }

  /* в•җв•җ [м„№м…ҳ л ҢлҚ”лҹ¬] в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     gRows: мқҙлҜё isValidRow() н•„н„° нҶөкіјн•ң н–үл“Өл§Ң л“Өм–ҙмҳҙ
     вҶ’ tbodyм—җлҠ” мӢӨм ң кі„м•Ҫ лҚ°мқҙн„°л§Ң л ҢлҚ”л§Ғ
     вҶ’ н•©кі„н–үмқҖ мҪ”л“ңлЎң кі„мӮ°н•ҙм„ң л§Ё м•„лһҳм—җл§Ң м¶”к°Җ
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  function groupSection(addr,gRows){
    /* кёҲм•Ў н•©мӮ° */
    const sumRent =gRows.reduce((a,r)=>a+amt(r,rentIdx),0);
    const sumDep  =gRows.reduce((a,r)=>a+amt(r,depositIdx),0);
    const sumMgmt =gRows.reduce((a,r)=>a+amt(r,mgmtIdx),0);
    const sumLrent=gRows.reduce((a,r)=>a+amt(r,landRentIdx),0);
    const sumMonth=sumRent+sumMgmt;

    /* н–ү л ҢлҚ”л§Ғ */
      const tbody=gRows.map(r=>{
      const rent=amt(r,rentIdx),dep=amt(r,depositIdx);
      const mgmt=amt(r,mgmtIdx);
      const monthly=rent+mgmt;
      return`<tr>
        <td class="name">${str(r,nameIdx)||'вҖ”'}</td>
        <td class="floor">${str(r,floorIdx)||'вҖ”'}</td>
        ${areaIdx>=0?`<td>${str(r,areaIdx)||'вҖ”'}</td>`:''}
        <td>${str(r,startIdx)||'вҖ”'}</td>
        <td>${str(r,endIdx)||'вҖ”'}</td>
        <td>${expBadge(r)}</td>
        <td class="r">${amtCell(dep,'amt-blue')}</td>
        <td class="r">${amtCell(rent,'amt-green')}</td>
        <td class="r">${amtCell(mgmt,'')}</td>
        <td class="r">${monthly>0?`<span class="amt-total">${fmtBig(monthly)}мӣҗ</span>`:`<span class="amt-muted">вҖ”</span>`}</td>
      </tr>`;
    }).join('');

    /* н•©кі„ н–ү вҖ” кёҲм•Ўмқҙ мһҲмқ„ л•Ңл§Ң */
    const colSpanBase=areaIdx>=0?6:5;
    const sumRow=(sumDep||sumRent||sumMgmt)?`<tr class="sum-row">
      <td colspan="${colSpanBase}">н•© кі„</td>
      <td class="r">${amtCell(sumDep,'amt-blue')}</td>
      <td class="r">${amtCell(sumRent,'amt-green')}</td>
      <td class="r">${amtCell(sumMgmt,'')}</td>
      <td class="r">${sumMonth>0?`<span class="amt-total">${fmtBig(sumMonth)}мӣҗ</span>`:`<span class="amt-muted">вҖ”</span>`}</td>
    </tr>`:'';

    /* мҡ”м•Ҫ м№ҙл“ң */
    const summaryItems=[
      sumRent ?`<div class="ls-summary-item"><span class="ls-si-lbl">мӣ” мһ„лҢҖлЈҢ</span><span class="ls-si-val green">${fmtBig(sumRent)}мӣҗ</span></div>`:'',
      sumMgmt ?`<div class="ls-summary-item"><span class="ls-si-lbl">кҙҖлҰ¬л№„</span><span class="ls-si-val">${fmtBig(sumMgmt)}мӣҗ</span></div>`:'',
      sumDep  ?`<div class="ls-summary-item"><span class="ls-si-lbl">ліҙмҰқкёҲ</span><span class="ls-si-val blue">${fmtBig(sumDep)}мӣҗ</span></div>`:'',
      sumMonth?`<div class="ls-summary-item ls-si-total"><span class="ls-si-lbl">мӣ” н•©кі„</span><span class="ls-si-val white">${fmtBig(sumMonth)}мӣҗ</span></div>`:'',
    ].filter(Boolean).join('');

    return`<div class="ls-section">
      <div class="ls-group-head">
        <div class="ls-group-bar"></div>
        <div class="ls-group-title">${addr}</div>
        <div class="ls-group-meta">${gRows.length}кұҙ</div>
      </div>
      ${summaryItems?`<div class="ls-summary-row">${summaryItems}</div>`:''}
      <div class="ls-table-wrap"><div style="overflow-x:auto">
        <table class="ls-table">
          <thead><tr>
            <th>мһ„м°Ёмқё</th><th>мёө</th>${areaIdx>=0?'<th>л©ҙм Ғ (mВІ)</th>':''}
            <th>кі„м•Ҫ мӢңмһ‘</th><th>кі„м•Ҫ мў…лЈҢ</th><th>л§ҢлЈҢ мғҒнғң</th>
            <th class="r">ліҙмҰқкёҲ</th><th class="r">мӣ” мһ„лҢҖлЈҢ</th>
            <th class="r">кҙҖлҰ¬л№„</th><th class="r">мӣ” н•©кі„</th>
          </tr></thead>
          <tbody>${tbody}${sumRow}</tbody>
        </table>
      </div></div>
    </div>`;
  }

  /* в•җв•җ [KPI м§‘кі„] вҖ” мң нҡЁ н–ү(data)л§Ң мӮ¬мҡ©, мӨ‘ліө м—ҶмқҢ в•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  const totalRent =data.reduce((a,r)=>a+amt(r,rentIdx),0);
  const totalLrent=data.reduce((a,r)=>a+amt(r,landRentIdx),0);
  const totalMgmt =data.reduce((a,r)=>a+amt(r,mgmtIdx),0);
  const totalDep  =data.reduce((a,r)=>a+amt(r,depositIdx),0);
  const totalMonth=totalRent+totalMgmt+totalLrent;
  let aC=0,eC=0,wC=0;
  data.forEach(r=>{
    const stTxt=str(r,statusIdx),endTxt=str(r,endIdx);
    if(/л§ҢлЈҢ|мў…лЈҢ|н•ҙм§Җ/i.test(stTxt)){eC++;return;}
    if(/мҳҲм •|мһ„л°•|мЈјмқҳ/i.test(stTxt)){wC++;return;}
    if(/мң нҡЁ|нҷңм„ұ|кі„м•ҪмӨ‘|м§„н–ү/i.test(stTxt)){aC++;return;}
    if(endTxt){
      const m=endTxt.match(/(\d{4})/);
      if(m){
        const diff=parseInt(m[1])-new Date().getFullYear();
        if(diff<0){eC++;return;}
        if(diff<=1){wC++;return;}
      }
      aC++;
    }
  });

  /* в•җв•җ м„№м…ҳ HTML мЎ°лҰҪ в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  const sections=ordered.map(([a,r])=>groupSection(a,r)).join('');

  sec.innerHTML=`
    <div class="notice">рҹ“Ў кө¬кёҖ мӢңнҠё мӢӨмӢңк°„ м—°лҸҷ В· мһ„лҢҖм°Ёкі„м•Ҫнҳ„нҷ©</div>
    <div class="kpi-row">
      <div class="kpi b"><div class="kpi-lbl" style="color:#e5e7eb">мҙқ кі„м•Ҫ</div><div class="kpi-val" style="color:#60a5fa">${data.length}</div><div class="kpi-sub" style="color:#9ca3af">мң нҡЁ кі„м•Ҫ кұҙмҲҳ</div></div>
      ${aC?`<div class="kpi g"><div class="kpi-lbl" style="color:#e5e7eb">кі„м•Ҫ мң нҡЁ</div><div class="kpi-val" style="color:var(--green)">${aC}</div><div class="kpi-sub" style="color:#9ca3af">м§„н–үмӨ‘</div></div>`:''}
      ${eC?`<div class="kpi r"><div class="kpi-lbl" style="color:#e5e7eb">л§ҢлЈҢВ·мў…лЈҢ</div><div class="kpi-val" style="color:var(--red)">${eC}</div><div class="kpi-sub" style="color:#9ca3af">мў…лЈҢ</div></div>`:''}
      ${wC?`<div class="kpi y"><div class="kpi-lbl" style="color:#e5e7eb">мЈјмқҳ</div><div class="kpi-val" style="color:var(--yellow)">${wC}</div><div class="kpi-sub" style="color:#9ca3af">кі§ л§ҢлЈҢ</div></div>`:''}
      ${totalRent?`<div class="kpi p"><div class="kpi-lbl" style="color:#e5e7eb">мӣ” мһ„лҢҖлЈҢ</div><div class="kpi-val" style="color:var(--purple)">${fmtBig(totalRent)}мӣҗ</div><div class="kpi-sub" style="color:#9ca3af">м „мІҙ н•©мӮ°</div></div>`:''}
      ${totalMgmt?`<div class="kpi b"><div class="kpi-lbl" style="color:#e5e7eb">кҙҖлҰ¬л№„</div><div class="kpi-val" style="color:#60a5fa">${fmtBig(totalMgmt)}мӣҗ</div><div class="kpi-sub" style="color:#9ca3af">мӣ” кё°мӨҖ</div></div>`:''}
      ${totalDep?`<div class="kpi b"><div class="kpi-lbl" style="color:#e5e7eb">ліҙмҰқкёҲ</div><div class="kpi-val" style="color:#60a5fa">${fmtBig(totalDep)}мӣҗ</div><div class="kpi-sub" style="color:#9ca3af">м „мІҙ н•©мӮ°</div></div>`:''}
    </div>
    ${sections||`<div class="empty"><div class="empty-i">рҹ“ӯ</div>мһ„м°Ёмқё лҚ°мқҙн„°к°Җ м—ҶмҠөлӢҲлӢӨ</div>`}`;
}
/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   4. PERSONAL COST вҖ” к°ңмқё Cash Flow л¶„м„қ
   вҳ… кө¬кёҖ мӢңнҠё кө¬мЎ°: к°ҖлЎңнҳ• л§ӨнҠёлҰӯмҠӨ (м—ҙ=н•ӯлӘ©, н–ү=мҶҚм„ұ)
     - "1. к°ңмқё мҲҳмһ… н•ӯлӘ©" м„№м…ҳ: к°Ғ м—ҙмқҙ н•ҳлӮҳмқҳ мҲҳмһ… н•ӯлӘ©
     - "2. к°ңмқё м§Җм¶ң н•ӯлӘ©" м„№м…ҳ: к°Ғ м—ҙмқҙ н•ҳлӮҳмқҳ м§Җм¶ң н•ӯлӘ©
     - мІ« лІҲм§ё м—ҙ = мҶҚм„ұлӘ… (н•ӯлӘ© / кёҲм•Ў / мҲҳмһ…кё°к°„ / лӮ©л¶Җкё°к°„)
   вҳ… fetch кө¬мЎ° л°Ҹ м „мІҙ м•ұ нқҗлҰ„ л¬ҙмҲҳм •
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function renderPersonal(rows){
  const sec=document.getElementById('sec-personal');
  if(!rows||rows.length<2){sec.innerHTML=errHTML('лҚ°мқҙн„° м—ҶмқҢ');return;}

  /* в”Җв”Җ л¬ёмһҗм—ҙ м •к·ңнҷ” в”Җв”Җ */
  function nc(s){
    return String(s||'')
      .replace(/\u00a0|\u3000|\u200b/g,' ')
      .replace(/[\r\n\t]+/g,' ')
      .replace(/\s+/g,' ')
      .trim();
  }
  function norm(s){return nc(s).toLowerCase();}

  /* в”Җв”Җ л””лІ„к·ё лЎңк·ё в”Җв”Җ */
  console.log('[к°ңмқёл№„мҡ© raw rows]',{
    мҙқн–үмҲҳ:rows.length,
    мІ«15н–ү:rows.slice(0,15).map((r,i)=>`[${i}] `+r.map(c=>nc(c)).filter(c=>c).join(' | ')),
    м „мІҙн–үлқјлІЁ:rows.map((r,i)=>[i,nc(r[0]||''),nc(r[1]||'')])
  });

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [A] м„ёлЎңнҳ• мғҒм„ё м„№м…ҳ нҢҢм„ң
     1-1 к°ңмқё мҲҳмһ… н•ӯлӘ© мғҒм„ё вҶ’ incDetailRows[]
     2-2 к°ңмқё м§Җм¶ң н•ӯлӘ© мғҒм„ё вҶ’ expDetailRows[]
     к°Ғ н–ү: {building, name, startDate, endDate, rent, mgmt, ...}
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

  /* м„№м…ҳ м ңлӘ© нҢҗлі„ */
  function isSec11(r){ const j=r.map(c=>norm(c)).join(' '); return /1-1|1\.1/.test(j)&&/мҲҳмһ…|мһ„лҢҖ/.test(j); }
  function isSec22(r){ const j=r.map(c=>norm(c)).join(' '); return /2-2|2\.2/.test(j)&&/м§Җм¶ң/.test(j); }
  /* кө¬л¶„м„  / л№Ҳ кө¬л¶„ н–ү */
  function isDivider(r){ return !r.some(c=>nc(c)); }

  /* м„№м…ҳлі„ н–ү л¶„лҰ¬ */
  let sec11Rows=[], sec22Rows=[];
  let inSec11=false, inSec22=false;
  rows.forEach(r=>{
    if(isSec11(r)){ inSec11=true; inSec22=false; return; }
    if(isSec22(r)){ inSec22=true; inSec11=false; return; }
    /* лӢӨлҘё м„№м…ҳ м ңлӘ©мқҙ лӮҳмҳӨл©ҙ мӨ‘лӢЁ (1., 2. мҲ«мһҗлЎң мӢңмһ‘н•ҳкі  нҳ„мһ¬ м„№м…ҳ м•„лӢҳ) */
    const j=r.map(c=>norm(c)).join(' ');
    if(inSec11&&/^\s*[12]\s*[.\-]/.test(nc(r[0]||''))&&!isSec11(r)){inSec11=false;}
    if(inSec22&&/^\s*[12]\s*[.\-]/.test(nc(r[0]||''))&&!isSec22(r)){inSec22=false;}
    if(inSec11) sec11Rows.push(r);
    if(inSec22) sec22Rows.push(r);
  });

  console.log('[мғҒм„ё м„№м…ҳ]',{sec11:sec11Rows.length, sec22:sec22Rows.length});
  console.log('[1-1 мІ«5н–ү]', sec11Rows.slice(0,5).map((r,i)=>`[${i}] `+r.map(c=>nc(c)).join(' | ')));
  console.log('[2-2 мІ«5н–ү]', sec22Rows.slice(0,5).map((r,i)=>`[${i}] `+r.map(c=>nc(c)).join(' | ')));

  /* в”Җв”Җ н—ӨлҚ” н–ү нғҗмғү (м»¬лҹј мқёлҚұмҠӨ м°ҫкё°) в”Җв”Җ */
  function findHdrIdx(sRows, patterns){
    for(let i=0;i<Math.min(sRows.length,5);i++){
      const matched=patterns.filter(p=>sRows[i].some(c=>p.test(norm(c))));
      if(matched.length>=2) return i;
    }
    return 0;
  }

  /* 1-1 мҲҳмһ… мғҒм„ё нҢҢмӢұ */
  function parseIncDetail(sRows){
    if(!sRows.length) return [];
    const hi=findHdrIdx(sRows,[/кұҙл¬ј|building/,/мһ„м°Ёмқё|tenant/,/мһ„лҢҖ.*мӢңмһ‘|start/,/мһ„лҢҖ.*мў…лЈҢ|end/,/мһ„лҢҖлЈҢ|rent/,/кҙҖлҰ¬л№„|mgmt/]);
    const hdr=sRows[hi];
    const bIdx=hdr.findIndex(h=>/кұҙл¬ј|building/i.test(nc(h)));
    const nIdx=hdr.findIndex(h=>/мһ„м°Ёмқё|tenant|мқҙлҰ„|name/i.test(nc(h)));
    const sIdx=hdr.findIndex(h=>/мһ„лҢҖ.*мӢңмһ‘|мӢңмһ‘.*мһ„лҢҖ|start|from/i.test(nc(h)));
    const eIdx=hdr.findIndex(h=>/мһ„лҢҖ.*мў…лЈҢ|мў…лЈҢ.*мһ„лҢҖ|end|to/i.test(nc(h)));
    const rIdx=hdr.findIndex(h=>/мһ„лҢҖлЈҢ|мӣ”мһ„лҢҖ|rent/i.test(nc(h)));
    const mIdx=hdr.findIndex(h=>/кҙҖлҰ¬л№„|mgmt|management/i.test(nc(h)));

    console.log('[1-1 н—ӨлҚ”]',{hi,hdr:hdr.map((h,i)=>`[${i}]${nc(h)}`).join(' '),bIdx,nIdx,sIdx,eIdx,rIdx,mIdx});

    const result=[];
    let lastBuilding='';
    sRows.slice(hi+1).forEach((r,ri)=>{
      if(!r.some(c=>nc(c))) return; /* л№Ҳ н–ү мҠӨнӮө */
      /* кұҙл¬јлӘ… forward-fill */
      const rawB=bIdx>=0?nc(r[bIdx]||''):'';
      if(rawB) lastBuilding=rawB;
      const building=lastBuilding;
      const name=nIdx>=0?nc(r[nIdx]||''):'';
      const startRaw=sIdx>=0?nc(r[sIdx]||''):'';
      const endRaw=eIdx>=0?nc(r[eIdx]||''):'';
      const rent=rIdx>=0?parseAmt(r[rIdx]||''):0;
      const mgmt=mIdx>=0?parseAmt(r[mIdx]||''):0;

      /* н—ӨлҚ”н–ү мһ¬нғҗм§Җ л°©м§Җ */
      if(/кұҙл¬ј|мһ„м°Ёмқё|мһ„лҢҖмӢңмһ‘|мһ„лҢҖлЈҢ/.test(name)) return;
      if(!name&&!rent&&!mgmt) return;

      result.push({building, name, startRaw, endRaw, rent, mgmt});
    });
    return result;
  }

  /* 2-2 м§Җм¶ң мғҒм„ё нҢҢмӢұ */
  function parseExpDetail(sRows){
    if(!sRows.length) return [];
    const hi=findHdrIdx(sRows,[/кұҙл¬ј|building/,/н•ӯлӘ©|item/,/кёҲм•Ў|amount/,/кё°к°„|period/]);
    const hdr=sRows[hi];
    const bIdx=hdr.findIndex(h=>/кұҙл¬ј|building/i.test(nc(h)));
    const iIdx=hdr.findIndex(h=>/н•ӯлӘ©|item|лӮҙмҡ©|лӮҙм—ӯ/i.test(nc(h)));
    const aIdx=hdr.findIndex(h=>/кёҲм•Ў|amount|cost/i.test(nc(h)));
    const pIdx=hdr.findIndex(h=>/кё°к°„|period|лӮ м§ң|date/i.test(nc(h)));

    console.log('[2-2 н—ӨлҚ”]',{hi,hdr:hdr.map((h,i)=>`[${i}]${nc(h)}`).join(' '),bIdx,iIdx,aIdx,pIdx});

    const result=[];
    let lastBuilding='';
    sRows.slice(hi+1).forEach(r=>{
      if(!r.some(c=>nc(c))) return;
      const rawB=bIdx>=0?nc(r[bIdx]||''):'';
      if(rawB&&!/н•ӯлӘ©|кёҲм•Ў|кё°к°„/.test(rawB)) lastBuilding=rawB;
      const building=lastBuilding;
      const item=iIdx>=0?nc(r[iIdx]||''):'';
      const amount=aIdx>=0?parseAmt(r[aIdx]||''):0;
      const period=pIdx>=0?nc(r[pIdx]||''):'';

      if(/н•ӯлӘ©|кёҲм•Ў|кё°к°„/.test(item)) return;
      if(!item&&!amount) return;

      result.push({building, item, amount, period});
    });
    return result;
  }

  const incDetail=parseIncDetail(sec11Rows);
  const expDetail=parseExpDetail(sec22Rows);

  console.log('[мҲҳмһ… мғҒм„ё]', incDetail.length, 'кұҙ', incDetail.slice(0,3));
  console.log('[м§Җм¶ң мғҒм„ё]', expDetail.length, 'кұҙ', expDetail.slice(0,3));

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [B] к°ҖлЎңнҳ• мҡ”м•Ҫ нҢҢм„ң (кё°мЎҙ лЎңм§Ғ вҖ” мғҒлӢЁ мҡ”м•Ҫмҡ©)
     мғҒм„ё нҢҢмӢұ мӢӨнҢЁ мӢң fallbackмңјлЎң мӮ¬мҡ©
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  function getLabelType(r){
    const first=norm(r.find(c=>nc(c))||'');
    if(first==='н•ӯлӘ©')                    return 'item';
    if(first==='кёҲм•Ў')                    return 'amount';
    if(/мҲҳмһ….*кё°к°„|кё°к°„.*мҲҳмһ…/.test(first)) return 'income_period';
    if(/лӮ©л¶Җ.*кё°к°„|кё°к°„.*лӮ©л¶Җ/.test(first)) return 'expense_period';
    if(/кё°к°„/.test(first))                return 'period';
    return null;
  }
  function isSectionTitle(r){
    if(getLabelType(r)!==null) return false;
    const joined=r.map(c=>norm(c)).join(' ');
    if(/^\s*[12]\.\s*(к°ңмқё)/.test(r.map(c=>nc(c)).join(' '))) return true;
    if(/к°ңмқё/.test(joined)&&/мҲҳмһ…|м§Җм¶ң/.test(joined)&&/н•ӯлӘ©/.test(joined)) return true;
    return false;
  }
  function isIncomeTitle(r){ if(!isSectionTitle(r))return false; const j=r.map(c=>norm(c)).join(' '); return /мҲҳмһ…/.test(j)&&!/м§Җм¶ң/.test(j); }
  function isExpenseTitle(r){ if(!isSectionTitle(r))return false; const j=r.map(c=>norm(c)).join(' '); return /м§Җм¶ң/.test(j); }

  let incomeBlock=[], expenseBlock=[];
  let inIncome=false, inExpense=false;
  rows.forEach(r=>{
    if(isIncomeTitle(r)){ inIncome=true; inExpense=false; return; }
    if(isExpenseTitle(r)){ inExpense=true; inIncome=false; return; }
    if(inIncome)  incomeBlock.push(r);
    if(inExpense) expenseBlock.push(r);
  });

  function blockToItems(block,type){
    let itemRow=null,amountRow=null,periodRow=null;
    block.forEach(r=>{
      if(!r.some(c=>nc(c)))return;
      const lt=getLabelType(r);
      if(lt==='item'&&!itemRow)itemRow=r;
      if(lt==='amount'&&!amountRow)amountRow=r;
      if((lt==='period'||lt==='income_period'||lt==='expense_period')&&!periodRow)periodRow=r;
    });
    if(!itemRow&&!amountRow)return[];
    const maxCols=Math.max(itemRow?itemRow.length:0,amountRow?amountRow.length:0,periodRow?periodRow.length:0);
    const filledPeriod=[];let lastPer='';
    for(let col=1;col<maxCols;col++){
      const raw=String(periodRow&&periodRow[col]!=null?periodRow[col]:'').trim();
      if(raw)lastPer=raw;
      filledPeriod[col]=lastPer;
    }
    const items=[];
    for(let col=1;col<maxCols;col++){
      const itemName=nc(itemRow?itemRow[col]:'');
      const amtRaw=nc(amountRow?amountRow[col]:'');
      const perStr=filledPeriod[col]||'';
      if(/^(н•ӯлӘ©|кёҲм•Ў|мҲҳмһ…кё°к°„|лӮ©л¶Җкё°к°„|кё°к°„)$/.test(itemName.replace(/\s/g,'')))continue;
      if(!itemName&&!amtRaw)continue;
      items.push({type,item:itemName||'(н•ӯлӘ©м—ҶмқҢ)',amount:parseAmt(amtRaw)||0,period:perStr});
    }
    return items;
  }

  /* к°ҖлЎңнҳ• мҡ”м•Ҫм—җм„ңлҸ„ лҢҖм¶ң н•ӯлӘ©мқҖ мҲҳмһ…мңјлЎң л¶„лҘҳн•ҳм§Җ м•ҠмқҢ */
  /* summaryIncItems: мһ„лҢҖ/кҙҖлҰ¬л№„ м„ұкІ© н•ӯлӘ©л§Ң нҸ¬н•Ё (нҷ”мқҙнҠёлҰ¬мҠӨнҠё л°©мӢқмңјлЎң к°•нҷ”)
     - лҢҖм¶ң, мҲ«мһҗл§Ң мһҲлҠ” н•ӯлӘ©лӘ…, лқјлІЁ мһ”мһ¬, кёҲм•Ўм—ҶлҠ” н•ӯлӘ© лӘЁл‘җ м ңмҷё */
  const summaryIncItems=blockToItems(incomeBlock,'мҲҳмһ…').filter(o=>{
    const it=(o.item||'').trim();
    if(!it||it==='(н•ӯлӘ©м—ҶмқҢ)') return false;
    if(/лҢҖм¶ң/.test(it)) return false;
    if(/^[\d,\s.]+$/.test(it)) return false;           // мҲ«мһҗ/кёҲм•Ўл§Ң мһҲлҠ” н•ӯлӘ©лӘ… м ңмҷё
    if(/^(кёҲм•Ў|н•ӯлӘ©|кё°к°„|мҲҳмһ…кё°к°„|лӮ©л¶Җкё°к°„)/.test(it)) return false; // лқјлІЁ мһ”мһ¬ м ңмҷё
    if(!o.amount) return false;                         // кёҲм•Ў м—ҶлҠ” н•ӯлӘ© м ңмҷё
    return true;
  });
  const summaryExpItems=blockToItems(expenseBlock,'м§Җм¶ң');

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [C] кё°к°„ нҢҢмӢұ
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  function parsePeriod(s){
    const str=String(s||'').trim();
    if(!str)return null;
    /* лІ”мң„нҳ•: YYYY-MM-DD ~ YYYY-MM-DD лҳҗлҠ” YYYY-MM ~ YYYY-MM */
    const mR=str.match(/(\d{4})[-.\/](\d{1,2})(?:[-.\/]\d{1,2})?\s*[~\u2013\u2014]\s*(\d{4})[-.\/](\d{1,2})/);
    if(mR)return{sy:+mR[1],sm:+mR[2],ey:+mR[3],em:+mR[4],single:false};
    const mR2=str.match(/(\d{4})[-](\d{2})\s*-\s*(\d{4})[-](\d{2})(?!\d)/);
    if(mR2)return{sy:+mR2[1],sm:+mR2[2],ey:+mR2[3],em:+mR2[4],single:false};
    /* лӢЁмқј лӮ м§ңнҳ• */
    const mS=str.match(/(\d{4})[-.\/](\d{1,2})(?:[-.\/](\d{1,2}))?/);
    if(mS)return{sy:+mS[1],sm:+mS[2],ey:+mS[1],em:+mS[2],single:true};
    return null;
  }

  /* лӮ м§ң л¬ёмһҗм—ҙ вҶ’ {y,m} */
  function parseDate(s){
    const str=String(s||'').trim();
    const m=str.match(/(\d{4})[-.\/](\d{1,2})/);
    if(m)return{y:+m[1],m:+m[2]};
    return null;
  }

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [D] мӣ”лі„ мәҗмӢңн”ҢлЎңмҡ° л§ө мғқм„ұ
     мғҒм„ё нҢҢмӢұ м„ұкіө мӢң: incDetail / expDetail кё°л°ҳ
     мғҒм„ё нҢҢмӢұ мӢӨнҢЁ мӢң: summaryIncItems / summaryExpItems fallback
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

  /* кұҙл¬ј л¶„лҘҳ */
  function classifyBuilding(s){
    const v=norm(s||'');
    if(/мјҖмқҙн”„нҳј/.test(v)||/cape/.test(v)) return 'cape';
    if(/8кёё|8-3|8кёё3/.test(v))             return '8gil';
    return '112';
  }

  /* м»¬лҹјлӘ… л§Өн•‘ (мҲҳмһ…) */
  function incColName(building, type){
    const b=classifyBuilding(building);
    if(b==='cape') return type==='rent'?'мһ„лҢҖ(мјҖмқҙн”„нҳј)':'кҙҖлҰ¬л№„(мјҖмқҙн”„нҳј)';
    if(b==='8gil') return type==='rent'?'мһ„лҢҖ(8кёё3)':'кҙҖлҰ¬л№„(8кёё3)';
    return type==='rent'?'мһ„лҢҖ(112)':'кҙҖлҰ¬л№„(112)';
  }

  /* м»¬лҹјлӘ… л§Өн•‘ (м§Җм¶ң) */
  function expColName(building, item){
    const b=classifyBuilding(building);
    const it=norm(item||'');
    if(/нҷҳкёү|ліҙмҰқкёҲ|л°ҳнҷҳ/.test(it)) return 'ліҙмҰқкёҲнҷҳкёү';
    if(/лҢҖм¶ң/.test(it)){
      if(b==='8gil') return 'лҢҖм¶ң(8кёё3)';
      return 'лҢҖм¶ң(112)';
    }
    if(/кі м •л№„/.test(it)){
      if(b==='8gil') return 'кі м •л№„(8кёё3)';
      return 'кі м •л№„(112)';
    }
    /* к·ё мҷё кё°нғҖ м§Җм¶ң */
    return `кё°нғҖм§Җм¶ң(${building||'кё°нғҖ'})`;
  }

  const cfMap={};
  function cfKey(y,m){return `${y}-${String(m).padStart(2,'0')}`;}
  function ensureKey(y,m,cols){
    const k=cfKey(y,m);
    if(!cfMap[k]){cfMap[k]={y,m};cols.forEach(c=>{cfMap[k][c]=0;});}
    return k;
  }

  /* м „мІҙ кё°к°„ мһҗлҸҷ нғҗм§Җмҡ© */
  let minY=9999, maxY=0;
  function trackRange(p){
    if(!p)return;
    if(p.sy&&p.sy<minY)minY=p.sy;
    if(p.ey&&p.ey>maxY)maxY=p.ey;
  }

  /* мғҒм„ё мҲҳмһ… м»¬лҹј */
  const INC_COLS_ORDER=['мһ„лҢҖ(112)','кҙҖлҰ¬л№„(112)','мһ„лҢҖ(8кёё3)','кҙҖлҰ¬л№„(8кёё3)','мһ„лҢҖ(мјҖмқҙн”„нҳј)','кҙҖлҰ¬л№„(мјҖмқҙн”„нҳј)'];
  /* мғҒм„ё м§Җм¶ң м»¬лҹј */
  const EXP_COLS_ORDER=['лҢҖм¶ң(112)','кі м •л№„(112)','лҢҖм¶ң(8кёё3)','кі м •л№„(8кёё3)','ліҙмҰқкёҲнҷҳкёү'];

  const useDetail=(incDetail.length>0||expDetail.length>0);
  let activeIncCols=[], activeExpCols=[];

  if(useDetail){
    /* в”Җв”Җ мҲҳмһ… мғҒм„ё вҶ’ cfMap в”Җв”Җ */
    incDetail.forEach(o=>{
      const p1=parseDate(o.startRaw);
      const p2=parseDate(o.endRaw);
      if(!p1)return;
      const ey=p2?p2.y:(p1.y+5);
      const em=p2?p2.m:12;
      trackRange({sy:p1.y,sm:p1.m,ey,em});
    });
    expDetail.forEach(o=>{
      const p=parsePeriod(o.period);
      trackRange(p);
    });
    if(minY===9999){minY=new Date().getFullYear();maxY=minY+4;}
    maxY=Math.min(maxY,minY+9);

    /* мӮ¬мҡ© м»¬лҹј кІ°м • */
    const usedInc=new Set();
    incDetail.forEach(o=>{
      if(o.rent) usedInc.add(incColName(o.building,'rent'));
      if(o.mgmt) usedInc.add(incColName(o.building,'mgmt'));
    });
    activeIncCols=INC_COLS_ORDER.filter(c=>usedInc.has(c));

    const usedExp=new Set();
    expDetail.forEach(o=>{
      if(o.amount) usedExp.add(expColName(o.building,o.item));
    });
    activeExpCols=EXP_COLS_ORDER.filter(c=>usedExp.has(c));
    /* м •мқҳм—җ м—ҶлҠ” кё°нғҖ м»¬лҹј м¶”к°Җ */
    [...usedExp].forEach(c=>{if(!activeExpCols.includes(c))activeExpCols.push(c);});

    const allCols=[...activeIncCols,...activeExpCols];

    /* cfMapм—җ мҲҳмһ… л°ҳмҳҒ */
    incDetail.forEach(o=>{
      const p1=parseDate(o.startRaw);
      const p2=parseDate(o.endRaw);
      if(!p1)return;
      let cy=p1.y, cm=p1.m;
      const ey=p2?p2.y:(p1.y+5);
      const em=p2?p2.m:12;
      while(cy<ey||(cy===ey&&cm<=em)){
        if(cy>=minY&&cy<=maxY){
          const k=ensureKey(cy,cm,allCols);
          if(o.rent) cfMap[k][incColName(o.building,'rent')]=(cfMap[k][incColName(o.building,'rent')]||0)+o.rent;
          if(o.mgmt) cfMap[k][incColName(o.building,'mgmt')]=(cfMap[k][incColName(o.building,'mgmt')]||0)+o.mgmt;
        }
        cm++;if(cm>12){cm=1;cy++;}
      }
    });

    /* cfMapм—җ м§Җм¶ң л°ҳмҳҒ */
    expDetail.forEach(o=>{
      if(!o.amount)return;
      const p=parsePeriod(o.period);
      const colName=expColName(o.building,o.item);
      console.log(`[м§Җм¶ң] "${o.item}" | building="${o.building}" | col="${colName}" | period="${o.period}" | parsed=`,p);
      if(!p)return;
      if(p.single){
        /* лӢЁмқј лӮ м§ң: н•ҙлӢ№ мӣ” 1нҡҢ (ліҙмҰқкёҲ нҷҳкёү л“ұ) */
        if(p.sy>=minY&&p.sy<=maxY){
          const k=ensureKey(p.sy,p.sm,allCols);
          cfMap[k][colName]=(cfMap[k][colName]||0)+o.amount;
        }
      } else {
        /* кё°к°„нҳ•: л§Өмӣ” л°ҳліө */
        let cy=p.sy,cm=p.sm;
        while(cy<p.ey||(cy===p.ey&&cm<=p.em)){
          if(cy>=minY&&cy<=maxY){
            const k=ensureKey(cy,cm,allCols);
            cfMap[k][colName]=(cfMap[k][colName]||0)+o.amount;
          }
          cm++;if(cm>12){cm=1;cy++;}
        }
      }
    });

  } else {
    /* в”Җв”Җ Fallback: к°ҖлЎңнҳ• мҡ”м•Ҫ кё°л°ҳ (кё°мЎҙ лЎңм§Ғ) в”Җв”Җ */
    console.warn('[к°ңмқёл№„мҡ©] мғҒм„ё м„№м…ҳ нҢҢмӢұ мӢӨнҢЁ вҶ’ мҡ”м•Ҫ н•ӯлӘ© кё°л°ҳ fallback');
    function toColName(n){
      if(/мӣ”мһ„лҢҖлЈҢ.*112|мһ„лҢҖ.*112/i.test(n))    return 'мһ„лҢҖ(112)';
      if(/мӣ”кҙҖлҰ¬л№„.*112|кҙҖлҰ¬л№„.*112/i.test(n))   return 'кҙҖлҰ¬л№„(112)';
      if(/мӣ”мһ„лҢҖлЈҢ.*8кёё3|мһ„лҢҖ.*8кёё3/i.test(n))   return 'мһ„лҢҖ(8кёё3)';
      if(/мӣ”кҙҖлҰ¬л№„.*8кёё3|кҙҖлҰ¬л№„.*8кёё3/i.test(n)) return 'кҙҖлҰ¬л№„(8кёё3)';
      if(/лҢҖм¶ң.*112/i.test(n))                   return 'лҢҖм¶ң(112)';
      if(/кі м •л№„.*112/i.test(n))                 return 'кі м •л№„(112)';
      if(/лҢҖм¶ң.*8кёё3/i.test(n))                  return 'лҢҖм¶ң(8кёё3)';
      if(/кі м •л№„.*8кёё3/i.test(n))                return 'кі м •л№„(8кёё3)';
      return n||'кё°нғҖ';
    }
    summaryIncItems.forEach(o=>{o.col=toColName(o.item);});
    summaryExpItems.forEach(o=>{o.col=toColName(o.item);});
    [...summaryIncItems,...summaryExpItems].forEach(o=>{
      const p=parsePeriod(o.period);
      trackRange(p);
    });
    if(minY===9999){minY=new Date().getFullYear();maxY=minY+4;}
    maxY=Math.min(maxY,minY+9);

    const usedInc=new Set(summaryIncItems.map(o=>o.col));
    const usedExp=new Set(summaryExpItems.filter(o=>!/ліҙмҰқкёҲ/.test(o.item)).map(o=>o.col));
    activeIncCols=INC_COLS_ORDER.filter(c=>usedInc.has(c));
    [...usedInc].forEach(c=>{if(!activeIncCols.includes(c))activeIncCols.push(c);});
    activeExpCols=EXP_COLS_ORDER.filter(c=>usedExp.has(c));
    [...usedExp].forEach(c=>{if(!activeExpCols.includes(c))activeExpCols.push(c);});

    const allCols=[...activeIncCols,...activeExpCols];
    function addItems(items){
      items.forEach(o=>{
        if(!o.amount)return;
        const p=parsePeriod(o.period);
        if(!p){
          const k=ensureKey(minY,1,allCols);
          cfMap[k][o.col]=(cfMap[k][o.col]||0)+o.amount;
          return;
        }
        if(p.single){
          if(p.sy>=minY&&p.sy<=maxY){
            const k=ensureKey(p.sy,p.sm,allCols);
            cfMap[k][o.col]=(cfMap[k][o.col]||0)+o.amount;
          }
        } else {
          let cy=p.sy,cm=p.sm;
          while(cy<p.ey||(cy===p.ey&&cm<=p.em)){
            if(cy>=minY&&cy<=maxY){
              const k=ensureKey(cy,cm,allCols);
              cfMap[k][o.col]=(cfMap[k][o.col]||0)+o.amount;
            }
            cm++;if(cm>12){cm=1;cy++;}
          }
        }
      });
    }
    addItems(summaryIncItems);
    /* м§Җм¶ң мӨ‘ ліҙмҰқкёҲ(мҡ”м•Ҫк°’) м ңмҷё */
    addItems(summaryExpItems.filter(o=>!/ліҙмҰқкёҲ/.test(o.item)));
  }

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [E] cfRows мғқм„ұ + лҲ„м Ғ
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  const allCols=[...activeIncCols,...activeExpCols];

  const cfRows=Object.keys(cfMap).sort().map(k=>{
    const r=cfMap[k];
    const incSum=activeIncCols.reduce((a,c)=>a+(r[c]||0),0);
    const expSum=activeExpCols.reduce((a,c)=>a+(r[c]||0),0);
    return{...r,incSum,expSum,net:incSum-expSum};
  });
  let cumNet=0;
  cfRows.forEach(r=>{r.cum=cumNet+=r.net;});

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [F] KPI вҖ” мғҒм„ё кё°л°ҳ мӣ” кё°мӨҖ мҲҳмһ…/м§Җм¶ң (ліҙмҰқкёҲ м ңмҷё)
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  /* мӣ” м •мғҒ мҲҳмһ…: мһ„лҢҖ+кҙҖлҰ¬л№„ н•©мӮ° (1к°ңмӣ”м№ҳ) */
  const now=new Date();
  const nowKey=cfKey(now.getFullYear(),now.getMonth()+1);
  const nowRow=cfMap[nowKey];
  const curMonthInc=nowRow?activeIncCols.reduce((a,c)=>a+(nowRow[c]||0),0):0;
  const curMonthExp=nowRow?activeExpCols.reduce((a,c)=>a+(nowRow[c]||0),0):0;
  const curMonthNet=curMonthInc-curMonthExp;

  /* ліҙмҰқкёҲ нҷҳкёү мҙқм•Ў (м°ёкі мҡ©) */
  const totalDeposit=useDetail
    ? expDetail.filter(o=>/нҷҳкёү|ліҙмҰқкёҲ|л°ҳнҷҳ/.test(norm(o.item))).reduce((a,o)=>a+o.amount,0)
    : 0;

  /* KPI */
  const kpiHTML=`<div class="kpi-row">
    <div class="kpi g">
      <div class="kpi-lbl" style="color:#e5e7eb">мқҙлІҲ лӢ¬ мҲҳмһ…</div>
      <div class="kpi-val" style="color:#22c55e">${fmtBig(curMonthInc)}мӣҗ</div>
      <div class="kpi-sub" style="color:#9ca3af">${now.getFullYear()}л…„ ${now.getMonth()+1}мӣ” кё°мӨҖ</div>
    </div>
    <div class="kpi r">
      <div class="kpi-lbl" style="color:#e5e7eb">мқҙлІҲ лӢ¬ м§Җм¶ң</div>
      <div class="kpi-val" style="color:#ef4444">${fmtBig(curMonthExp)}мӣҗ</div>
      <div class="kpi-sub" style="color:#9ca3af">лҢҖм¶ң+кі м •л№„ кё°мӨҖ</div>
    </div>
    <div class="kpi b" style="border:1.5px solid rgba(59,127,255,.35)">
      <div class="kpi-lbl" style="color:#e5e7eb">мқҙлІҲ лӢ¬ мҲңнҳ„кёҲнқҗлҰ„</div>
      <div class="kpi-val" style="color:${curMonthNet>=0?'#22c55e':'#ef4444'}">
        ${curMonthNet>=0?'+':''}${fmtBig(curMonthNet)}мӣҗ
      </div>
      <div class="kpi-sub" style="color:#9ca3af">мҲҳмһ… вҲ’ м§Җм¶ң</div>
    </div>
    ${totalDeposit?`<div class="kpi y">
      <div class="kpi-lbl" style="color:#e5e7eb">н–Ҙнӣ„ ліҙмҰқкёҲ нҷҳкёү</div>
      <div class="kpi-val" style="color:var(--yellow)">${fmtBig(totalDeposit)}мӣҗ</div>
      <div class="kpi-sub" style="color:#9ca3af">кі„м•Ҫ мў…лЈҢ мӢң л°ҳнҷҳ мҳҲм •</div>
    </div>`:''}
    <div class="kpi p">
      <div class="kpi-lbl" style="color:#e5e7eb">л¶„м„қ кё°к°„</div>
      <div class="kpi-val" style="color:var(--purple)">${minY}вҖ“${maxY}</div>
      <div class="kpi-sub" style="color:#9ca3af">${cfRows.length}к°ңмӣ” лҚ°мқҙн„°</div>
    </div>
  </div>`;

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [G] мҲҳмһ…/м§Җм¶ң мҡ”м•Ҫ н…Ңмқҙлё”
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  /* в”Җв”Җ мҲҳмһ… мғҒм„ё: лҢҖм¶ң/кёҲм•ЎлқјлІЁ/л№„мһ„лҢҖ н•ӯлӘ© м ңмҷё (л¶„лҘҳ лЎңм§Ғ мҲҳм •) в”Җв”Җ
     - лҢҖм¶ңкёҲмқҖ мһҗкёҲ мЎ°лӢ¬ н•ӯлӘ© вҶ’ мҲҳмһ… мғҒм„ём—җм„ң м ңмҷё
     - nameмқҙ "кёҲм•Ў", "н•ӯлӘ©" л“ұ лқјлІЁ л¬ёмһҗмқё н–үлҸ„ м ңмҷё (нҢҢмӢұ мһ”мһ¬)
     - rent=0мқҙкі  mgmt=0мқё л№Ҳ н–үлҸ„ м ңмҷё */
  const INCOME_LABEL_EXCLUDE = /^(кёҲм•Ў|н•ӯлӘ©|кё°к°„|мҲҳмһ…кё°к°„|лӮ©л¶Җкё°к°„)/;
  const incDetailFiltered = useDetail
    ? incDetail.filter(o => {
        const nameStr = (o.name||'').trim();
        const bldStr  = (o.building||'').trim();
        if(!nameStr) return false;
        if(INCOME_LABEL_EXCLUDE.test(nameStr)) return false;          // лқјлІЁ мһ”мһ¬ н–ү м ңмҷё
        if(/^[\d,\s.]+$/.test(nameStr)) return false;                 // мҲ«мһҗл§Ң мһҲлҠ” н•ӯлӘ©лӘ… м ңмҷё ("кёҲм•Ў 37,000,000" л“ұ)
        if(/лҢҖм¶ң/.test(nameStr+bldStr)) return false;                 // лҢҖм¶ң н•ӯлӘ© м ңмҷё
        if(!o.rent && !o.mgmt) return false;                          // мҲҳмһ… кёҲм•Ў м—ҶлҠ” н–ү м ңмҷё
        return true;
      })
    : incDetail;

  const incSummaryRows=useDetail
    ? incDetailFiltered.map(o=>`<tr><td class="label">${o.building?`<span style="font-size:9px;color:var(--t3);margin-right:4px">${o.building}</span>`:''}${o.name}</td><td class="r">${fmtBig(o.rent)}мӣҗ</td><td class="r">${o.mgmt?fmtBig(o.mgmt)+'мӣҗ':'вҖ”'}</td></tr>`).join('')
    : summaryIncItems.map(o=>`<tr><td class="label">${o.item}</td><td class="r" colspan="2"><span class="inc">${fmtBig(o.amount)}мӣҗ</span></td></tr>`).join('');

  /* в”Җв”Җ м§Җм¶ң мғҒм„ё: 2к°ң к·ёлЈ№мңјлЎң л¶„лҰ¬ в”Җв”Җ
     к·ёлЈ№1: лҢҖм¶ң/кі м •л№„ (кё°к°„нҳ• л°ҳліө м§Җм¶ң)
     к·ёлЈ№2: ліҙмҰқкёҲ нҷҳкёү (кі„м•Ҫ мў…лЈҢ мӢң мқјнҡҢм„ұ нҷҳкёү) */
  function isDepositItem(o){
    return /нҷҳкёү|ліҙмҰқкёҲ|л°ҳнҷҳ/.test((o.item||'')+(o.col||''));
  }
  function buildExpGroupRows(items, isDetailMode){
    const loanItems = items.filter(o => !isDepositItem(o));
    const depItems  = items.filter(o =>  isDepositItem(o));
    const loanTotal = loanItems.reduce((a,o)=>a+(o.amount||0),0);
    const depTotal  = depItems.reduce((a,o)=>a+(o.amount||0),0);

    function rowsDetail(arr){
      return arr.map(o=>`<tr><td class="label">${o.building?`<span style="font-size:9px;color:var(--t3);margin-right:4px">${o.building}</span>`:''}${o.item}</td><td class="r"><span class="exp">${fmtBig(o.amount)}мӣҗ</span></td><td class="r" style="font-size:9.5px;color:var(--t3)">${o.period||'вҖ”'}</td></tr>`).join('');
    }
    function rowsSummary(arr){
      return arr.map(o=>`<tr><td class="label">${o.item}</td><td class="r" colspan="2"><span class="exp">${fmtBig(o.amount)}мӣҗ</span></td></tr>`).join('');
    }

    let html = '';
    /* к·ёлЈ№1: лҢҖм¶ң/кі м •л№„ */
    html += `<tr class="exp-group-head loan-head"><td colspan="3">рҹ’і лҢҖм¶ң / кі м •л№„ <span style="float:right;font-weight:700;color:#7aa4ff;font-family:var(--mono)">${fmtBig(loanTotal)}мӣҗ</span></td></tr>`;
    html += isDetailMode ? rowsDetail(loanItems) : rowsSummary(loanItems);
    if(!loanItems.length) html += `<tr><td colspan="3" style="padding:8px 14px;color:var(--t4);font-size:11px">н•ӯлӘ© м—ҶмқҢ</td></tr>`;

    /* к·ёлЈ№2: ліҙмҰқкёҲ нҷҳкёү */
    html += `<tr class="exp-group-head dep-head"><td colspan="3">рҹ”„ ліҙмҰқкёҲ нҷҳкёү <span style="float:right;font-weight:700;color:#e8a020;font-family:var(--mono)">${fmtBig(depTotal)}мӣҗ</span></td></tr>`;
    html += isDetailMode ? rowsDetail(depItems) : rowsSummary(depItems);
    if(!depItems.length) html += `<tr><td colspan="3" style="padding:8px 14px;color:var(--t4);font-size:11px">н•ӯлӘ© м—ҶмқҢ</td></tr>`;

    /* м „мІҙ н•©кі„ н–ү вҖ” л§Ё м•„лһҳ */
    const grandTotal = loanTotal + depTotal;
    if(grandTotal > 0){
      html += `<tr class="split-subtotal">
        <td colspan="2">м§Җм¶ң м „мІҙ н•©кі„</td>
        <td class="r"><span class="exp">${fmtBig(grandTotal)}мӣҗ</span></td>
      </tr>`;
    }

    return html;
  }

  const expSummaryRows=useDetail
    ? buildExpGroupRows(expDetail, true)
    : buildExpGroupRows(summaryExpItems, false);

  const summaryHTML=`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:#4F7CFF"></div>
      <div class="cf-section-title">мҲҳмһ… В· м§Җм¶ң мғҒм„ё</div>
      <div class="cf-section-sub">${useDetail?'1-1/2-2 мғҒм„ё кё°л°ҳ':'мҡ”м•Ҫ кё°л°ҳ'}</div>
    </div>
    <div class="cf-summary-split">
      <div class="cf-split-panel inc-panel">
        <div class="cf-split-title inc">рҹ“Ҙ мҲҳмһ… мғҒм„ё <span style="font-weight:400;font-size:10px;opacity:.7;margin-left:4px">${useDetail?incDetailFiltered.length:summaryIncItems.filter(o=>/мһ„лҢҖ|кҙҖлҰ¬л№„/.test(o.item)).length}кұҙ</span></div>
        <table class="cf-split-table">
          <thead><tr><th>мһ„м°Ёмқё</th><th class="r">мӣ” мһ„лҢҖлЈҢ</th><th class="r">мӣ” кҙҖлҰ¬л№„</th></tr></thead>
          <tbody>
            ${incSummaryRows||`<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--t4)">мҲҳмһ… н•ӯлӘ© м—ҶмқҢ</td></tr>`}
            ${(()=>{
              const incRentTotal = useDetail

              const incMgmtTotal = useDetail

              return (incMonthTotal>0) ? `<tr class="split-subtotal">

              <tr class="split-subtotal">

      <div class="cf-split-panel exp-panel">

        <table class="cf-split-table">
          <thead><tr><th>н•ӯлӘ©</th><th class="r">кёҲм•Ў</th><th class="r">кё°к°„/лӮ м§ң</th></tr></thead>
          <tbody>${expSummaryRows||`<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--t4)">м§Җм¶ң н•ӯлӘ© м—ҶмқҢ</td></tr>`}</tbody>
        </table>
      </div>
      <div class="cf-net-row">
        <span>рҹ’° мқҙлІҲ лӢ¬ мҲңнҳ„кёҲнқҗлҰ„ <span style="font-size:11px;font-weight:400;color:var(--t3);margin-left:6px">мһ„лҢҖмҲҳмһ… вҲ’ лҢҖм¶ң+кі м •л№„</span></span>
        <span class="cf-net-val" style="color:${curMonthNet>=0?'#22c55e':'#ef4444'}">${curMonthNet>=0?'+':''}${fmtBig(curMonthNet)}мӣҗ</span>
      </div>
    </div>
  </div>`;

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [H] мӣ”лі„ мәҗмӢңн”ҢлЎңмҡ° н…Ңмқҙлё”
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  const totalCols=allCols.length+3;
  const noDataRow=(cols)=>`<tr><td colspan="${cols}" style="text-align:center;padding:30px;color:var(--t4)">н•ҙлӢ№ кё°к°„ лҚ°мқҙн„° м—ҶмқҢ</td></tr>`;
  function fmtW(v){
    if(!v||v===0)return`<span class="dim">вҖ”</span>`;
    const w=Math.round(v/10000);
    if(w===0)return`<span class="dim">вҖ”</span>`;
    return w.toLocaleString('ko-KR')+'л§Ң';
  }

  function buildAllTable(){
    if(!cfRows.length)return noDataRow(totalCols);
    let html='',lastY=null,yrCols={},yrNet=0;
    allCols.forEach(c=>{yrCols[c]=0;});
    cfRows.forEach(({y,m,...r})=>{
      if(y!==lastY){
        if(lastY!==null){
          html+=`<tr class="yr-total">
            <td>${lastY}л…„ мҶҢкі„</td>
            ${activeIncCols.map(c=>`<td class="r">${yrCols[c]?`<span class="inc" style="font-size:11px">${fmtW(yrCols[c])}</span>`:`<span class="dim">вҖ”</span>`}</td>`).join('')}
            ${activeExpCols.map(c=>`<td class="r">${yrCols[c]?`<span class="exp" style="font-size:11px">${fmtW(yrCols[c])}</span>`:`<span class="dim">вҖ”</span>`}</td>`).join('')}
            <td class="r"><span class="${yrNet>=0?'neu':'exp'}" style="font-size:11px">${yrNet>=0?'+':''}${fmtW(yrNet)}</span></td>
            <td></td>
          </tr>`;
          allCols.forEach(c=>{yrCols[c]=0;});yrNet=0;
        }
        html+=`<tr class="yr-group"><td colspan="${totalCols}">${y}л…„</td></tr>`;
        lastY=y;
      }
      allCols.forEach(c=>{yrCols[c]=(yrCols[c]||0)+(r[c]||0);});
      yrNet+=r.net;
      html+=`<tr>
        <td class="ym">${y}.${String(m).padStart(2,'0')}</td>
        ${activeIncCols.map(c=>`<td class="r">${r[c]?`<span class="inc">${fmtW(r[c])}</span>`:`<span class="dim">вҖ”</span>`}</td>`).join('')}
        ${activeExpCols.map(c=>`<td class="r">${r[c]?`<span class="exp">${fmtW(r[c])}</span>`:`<span class="dim">вҖ”</span>`}</td>`).join('')}
        <td class="r"><span class="${r.net>=0?'neu':'exp'}" style="font-weight:700">${r.net>=0?'+':''}${fmtW(r.net)}</span></td>
        <td class="r" style="font-size:11px;color:var(--t3)">${r.cum>=0?'+':''}${fmtW(r.cum)}</td>
      </tr>`;
    });
    if(lastY){
      html+=`<tr class="yr-total">
        <td>${lastY}л…„ мҶҢкі„</td>
        ${activeIncCols.map(c=>`<td class="r">${yrCols[c]?`<span class="inc" style="font-size:11px">${fmtW(yrCols[c])}</span>`:`<span class="dim">вҖ”</span>`}</td>`).join('')}
        ${activeExpCols.map(c=>`<td class="r">${yrCols[c]?`<span class="exp" style="font-size:11px">${fmtW(yrCols[c])}</span>`:`<span class="dim">вҖ”</span>`}</td>`).join('')}
        <td class="r"><span class="${yrNet>=0?'neu':'exp'}" style="font-size:11px">${yrNet>=0?'+':''}${fmtW(yrNet)}</span></td>
        <td></td>
      </tr>`;
    }
    return html;
  }

  function buildIncTable(){
    const rows=cfRows.filter(r=>r.incSum>0);
    if(!rows.length)return noDataRow(activeIncCols.length+3);
    let html='',lastY=null,yrCols={},yrSum=0,cum=0;
    activeIncCols.forEach(c=>{yrCols[c]=0;});
    rows.forEach(({y,m,...r})=>{
      if(y!==lastY){
        if(lastY!==null)html+=`<tr class="yr-total"><td>${lastY}л…„ мҶҢкі„</td>${activeIncCols.map(c=>`<td class="r">${yrCols[c]?`<span class="inc" style="font-size:11px">${fmtW(yrCols[c])}</span>`:`<span class="dim">вҖ”</span>`}</td>`).join('')}<td class="r"><span class="inc" style="font-size:11px">${fmtW(yrSum)}</span></td><td></td></tr>`;
        html+=`<tr class="yr-group"><td colspan="${activeIncCols.length+3}">${y}л…„</td></tr>`;
        lastY=y;activeIncCols.forEach(c=>{yrCols[c]=0;});yrSum=0;
      }
      yrSum+=r.incSum;cum+=r.incSum;
      activeIncCols.forEach(c=>{yrCols[c]=(yrCols[c]||0)+(r[c]||0);});
      html+=`<tr><td class="ym">${y}.${String(m).padStart(2,'0')}</td>${activeIncCols.map(c=>`<td class="r">${r[c]?`<span class="inc">${fmtW(r[c])}</span>`:`<span class="dim">вҖ”</span>`}</td>`).join('')}<td class="r"><span class="inc" style="font-weight:600">${fmtW(r.incSum)}</span></td><td class="r" style="font-size:11px;color:var(--t3)">+${fmtW(cum)}</td></tr>`;
    });
    if(lastY)html+=`<tr class="yr-total"><td>${lastY}л…„ мҶҢкі„</td>${activeIncCols.map(c=>`<td class="r">${yrCols[c]?`<span class="inc" style="font-size:11px">${fmtW(yrCols[c])}</span>`:`<span class="dim">вҖ”</span>`}</td>`).join('')}<td class="r"><span class="inc" style="font-size:11px">${fmtW(yrSum)}</span></td><td></td></tr>`;
    return html;
  }

  function buildExpTable(){
    const rows=cfRows.filter(r=>r.expSum>0);
    if(!rows.length)return noDataRow(activeExpCols.length+3);
    let html='',lastY=null,yrCols={},yrSum=0,cum=0;
    activeExpCols.forEach(c=>{yrCols[c]=0;});
    rows.forEach(({y,m,...r})=>{
      if(y!==lastY){
        if(lastY!==null)html+=`<tr class="yr-total"><td>${lastY}л…„ мҶҢкі„</td>${activeExpCols.map(c=>`<td class="r">${yrCols[c]?`<span class="exp" style="font-size:11px">${fmtW(yrCols[c])}</span>`:`<span class="dim">вҖ”</span>`}</td>`).join('')}<td class="r"><span class="exp" style="font-size:11px">${fmtW(yrSum)}</span></td><td></td></tr>`;
        html+=`<tr class="yr-group"><td colspan="${activeExpCols.length+3}">${y}л…„</td></tr>`;
        lastY=y;activeExpCols.forEach(c=>{yrCols[c]=0;});yrSum=0;

    });
    if(lastY)html+=`<tr class="yr-total"><td>${lastY}л…„ мҶҢкі„</td>${activeExpCols.map(c=>`<td class="r">${yrCols[c]?`<span class="exp" style="font-size:11px">${fmtW(yrCols[c])}</span>`:`<span class="dim">вҖ”</span>`}</td>`).join('')}<td class="r"><span class="exp" style="font-size:11px">${fmtW(yrSum)}</span></td><td></td></tr>`;
    return html;
  }

  if(!document.getElementById('cf-tab-style')){
    const st=document.createElement('style');
    st.id='cf-tab-style';
    st.textContent=`.cf-tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:0}.cf-tab-btn{padding:8px 18px;font-size:12px;font-weight:500;color:var(--t3);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:color .15s,border-color .15s;white-space:nowrap}.cf-tab-btn:hover{color:var(--t1)}.cf-tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}.cf-tab-pane{display:none}.cf-tab-pane.active{display:block}`;
    document.head.appendChild(st);
  }

  const cfHTML=`<div class="cf-section">
    <div class="cf-section-head">
      <div class="cf-section-bar" style="background:var(--blue)"></div>
      <div class="cf-section-title">мӣ”лі„ мәҗмӢңн”ҢлЎңмҡ° В· н•ӯлӘ© л¶„н•ҙ</div>
      <div class="cf-section-sub">${cfRows.length}к°ңмӣ” В· л§Ңмӣҗ лӢЁмң„ В· ${useDetail?'мғҒм„ё кё°л°ҳ':'мҡ”м•Ҫ кё°л°ҳ'}</div>
    </div>
    <div style="background:var(--s1);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r)">
      <div class="cf-tab-bar" id="cf-tabs">
        <button class="cf-tab-btn active" onclick="cfTab('all',this)">н•ӯлӘ© л¶„н•ҙ</button>
        <button class="cf-tab-btn"        onclick="cfTab('inc',this)">мҲҳмһ…</button>
        <button class="cf-tab-btn"        onclick="cfTab('exp',this)">м§Җм¶ң</button>
      </div>
      <div class="cf-tab-pane active" id="cf-pane-all" style="overflow-x:auto">
        <table class="cf-table">
          <thead>
            <tr>
              <th rowspan="2">м—°мӣ”</th>
              ${activeIncCols.length?`<th colspan="${activeIncCols.length}" style="text-align:center;color:var(--green);border-bottom:2px solid var(--green);background:rgba(34,209,134,.05)">рҹ“Ҙ мҲҳмһ…</th>`:''}
              ${activeExpCols.length?`<th colspan="${activeExpCols.length}" style="text-align:center;color:var(--red);border-bottom:2px solid var(--red);background:rgba(240,56,96,.05)">рҹ“Ө м§Җм¶ң</th>`:''}
              <th rowspan="2" class="r" style="color:var(--blue)">мҲңнҳ„кёҲнқҗлҰ„</th>
              <th rowspan="2" class="r">лҲ„м Ғ</th>
            </tr>
            <tr>
              ${activeIncCols.map(c=>`<th class="r" style="color:var(--green);font-size:9.5px;background:rgba(34,209,134,.04)">${c}</th>`).join('')}
              ${activeExpCols.map(c=>`<th class="r" style="color:var(--red);font-size:9.5px;background:rgba(240,56,96,.04)">${c}</th>`).join('')}
            </tr>
          </thead>
          <tbody>${buildAllTable()}</tbody>
        </table>
      </div>
      <div class="cf-tab-pane" id="cf-pane-inc" style="overflow-x:auto">
        <table class="cf-table">
          <thead><tr>
            <th>м—°мӣ”</th>
            ${activeIncCols.map(c=>`<th class="r" style="color:var(--green)">${c}</th>`).join('')}
            <th class="r" style="color:var(--green)">мӣ” мҲҳмһ… кі„</th>
            <th class="r">лҲ„м Ғ мҲҳмһ…</th>
          </tr></thead>
          <tbody>${buildIncTable()}</tbody>
        </table>
      </div>
      <div class="cf-tab-pane" id="cf-pane-exp" style="overflow-x:auto">
        <table class="cf-table">
          <thead><tr>
            <th>м—°мӣ”</th>

            <th class="r" style="color:var(--red)">мӣ” м§Җм¶ң кі„</th>
            <th class="r">лҲ„м Ғ м§Җм¶ң</th>
          </tr></thead>
          <tbody>${buildExpTable()}</tbody>
        </table>
      </div>
    </div>
  </div>`;

  /* нҢҢмӢұ м•ҲлӮҙ */
  const parseNote=(incDetail.length===0&&expDetail.length===0&&summaryIncItems.length===0&&summaryExpItems.length===0)
    ?`<div class="notice" style="background:rgba(245,188,48,.06);border-color:rgba(245,188,48,.2);color:var(--yellow)">
        вҡ пёҸ мӢңнҠём—җм„ң "1-1 к°ңмқё мҲҳмһ… н•ӯлӘ© мғҒм„ё" лҳҗлҠ” "2-2 к°ңмқё м§Җм¶ң н•ӯлӘ© мғҒм„ё" м„№м…ҳмқ„ м°ҫм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.
        F12 мҪҳмҶ”м—җм„ң [мғҒм„ё м„№м…ҳ] лЎңк·ёлҘј нҷ•мқён•ҳм„ёмҡ”.
      </div>`
    :'';

    <div class="notice">рҹ“Ў кө¬кёҖ мӢңнҠё мӢӨмӢңк°„ м—°лҸҷ В· к°ңмқёл№„мҡ© Cash Flow</div>
    ${parseNote}
