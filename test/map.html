function renderModebar(){const html=Object.keys(MODES).map(k=>`<button class="mode-btn ${mode===k?'active':''}" onclick="setMode('${k}')">${MODES[k].label}</button>`).join('');const a=document.getElementById('modebar');if(a)a.innerHTML=html;const b=document.getElementById('panelModes');if(b)b.innerHTML=html;}
function setMode(m){mode=m;subtab=0;selectedId=null;renderModebar();renderShell();clearLayers();if(mode==='lease'){renderLeaseFilter();applyLeaseFilter();drawBuildings();} if(mode==='sangwon'){renderSangwonFilter();applySangwonFilter();drawBuildings();} if(mode==='realtime'){renderRealtimeFilter();drawCircle();renderRealtimePanel();} }

function renderFilter(chips,active,onClick){document.getElementById('filterbar').innerHTML=chips.map(c=>c.divider?'<span class="divider"></span>':`<span class="chip ${active===c.id||active.has?.(c.id)?'active':''}" onclick="${onClick}('${c.id}')">${c.emoji||''} ${c.name}${c.count!=null?`<span class="cnt">${c.count}</span>`:''}</span>`).join('');}
async function loadBuildings(){try{const r=await fetch(MAP_SHEET_URL);const text=await r.text();buildings=rowsToBuildings(parseCSV(text));applyLeaseFilter();if(mode!=='realtime')drawBuildings();}catch(e){console.error(e);buildings=[OUR_BUILDING];applyLeaseFilter();}}
function parseCSV(text){text=String(text||'').replace(/^\uFEFF/,'');const lines=text.trim().split(/\r?\n/).filter(Boolean);if(!lines.length)return[];const h=splitCSV(lines[0]).map(clean);return lines.slice(1).map(l=>{const v=splitCSV(l);const o={};h.forEach((k,i)=>o[k]=clean(v[i]||''));return o}).filter(r=>r['건물명']||r['주소']);}
function splitCSV(line){let a=[],c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){c+='"';i++}else q=!q}else if(ch===','&&!q){a.push(c);c=''}else c+=ch}a.push(c);return a}
function clean(v){return String(v||'').replace(/^\uFEFF/,'').replace(/^["'\s]+|["'\s]+$/g,'').trim()}
function first(r,names){for(const n of names){if(r[n]&&String(r[n]).trim())return String(r[n]).trim()}return''}
function num(v){const n=parseFloat(String(v||'').replace(/,/g,'').replace(/[^0-9.\-]/g,''));return Number.isFinite(n)?n:0}
function normType(t){t=String(t||'').trim();if(!t)return'기타';const m={'음식점':'F&B/음식점','고기':'F&B/음식점','카페':'카페','병원':'병원/의료','치과':'병원/의료','한의원':'병원/의료','피부과':'병원/의료','성형외과':'병원/의료','약국':'약국','미용':'뷰티/미용','네일':'뷰티/미용','뷰티':'뷰티/미용','사무':'사무실/기업','기업':'사무실/기업','컨설팅':'사무실/기업','학원':'학원/교육','교육':'학원/교육','패션':'패션/잡화','의류':'패션/잡화','스포츠':'스포츠/레저','요가':'스포츠/레저','필라테스':'스포츠/레저'};for(const k in m){if(t.includes(k))return m[k]}return TYPE_COLOR[t]?t:'기타'}
function detectDong(address){
  const d=['신사동','논현동','청담동','대치동','삼성동','역삼동','압구정동','잠원동','서초동'];
  for(const x of d){if(String(address||'').includes(x.replace('동',''))||String(address||'').includes(x))return x==='압구정동'?'신사동':x}
  if(String(address||'').includes('압구정'))return '신사동';
  return '기타';
}
function rowsToBuildings(rows){const bm={};rows.forEach((r,i)=>{const name=first(r,['건물명','빌딩명','상호명']);if(!name)return;const lat=num(first(r,['위도','lat','LAT']));const lng=num(first(r,['경도','lng','LNG']));const address=first(r,['주소','도로명주소','지번주소']);const floor=first(r,['층','층수','호실']);const tenant=first(r,['임차인','상호','업체명','tenant']);const rawType=first(r,['업종','업태','분류','type']);const type=normType(rawType);const pdf=first(r,['PDF','pdf','파일URL','상세URL','url','링크']);const key=name+'|'+address;if(!bm[key])bm[key]={id:'b'+Object.keys(bm).length,name,address,lat,lng,dong:detectDong(address),tenants:[],pdf};bm[key].tenants.push({floor,tenant:tenant||'-',type,rawType,pdf});if(pdf&&!bm[key].pdf)bm[key].pdf=pdf;});return [OUR_BUILDING].concat(Object.values(bm).filter(b=>b.lat&&b.lng));}
function renderLeaseFilter(){
  const counts={};
  buildings.filter(b=>!b.isOurs).forEach(b=>(b.tenants||[]).forEach(t=>counts[t.type]=(counts[t.type]||0)+1));
  const chips=LEASE_FILTERS.map(f=>({id:f.id,name:f.name,emoji:f.emoji,count:f.id==='전체'?buildings.filter(b=>!b.isOurs).length:(counts[f.target||f.id]||0)}));

}
function setLeaseType(t){activeLeaseType=t;renderLeaseFilter();applyLeaseFilter();drawBuildings();renderLeasePanel();}
function applyLeaseFilter(){filteredBuildings=buildings.filter(b=>{if(b.isOurs)return false;if(activeLeaseType==='전체')return true;const target=leaseTarget(activeLeaseType);return (b.tenants||[]).some(t=>t.type===target)});}
function renderLeasePanel(){if(subtab===0)return renderBldgList();if(subtab===1)return renderIndustryAnalysis();return renderMarketFilterPanel();}
function renderBldgList(){
  const visible=filteredBuildings.filter(b=>!b.isOurs);
  const groups={};
  visible.forEach(b=>{
    const key=b.dong||'기타';
    if(!groups[key])groups[key]=[];
    groups[key].push(b);
  });
  const order=['신사동','논현동','역삼동','반포동','이태원동','잠원동','청담동','삼성동','대치동','방배동','서초동','기타'];
  const keys=Object.keys(groups).sort((a,b)=>{
    const ia=order.indexOf(a), ib=order.indexOf(b);
    return (ia<0?99:ia)-(ib<0?99:ib) || a.localeCompare(b,'ko');
  });
  const totalTenants=visible.reduce((s,b)=>s+(b.tenants||[]).length,0);
  const head=`<div class="lease-panel-title"><div class="ttl">📍 신사동 529 주변 건물 임차인 현황</div><div class="sub">강남구 신사동 일대 · 총 ${visible.length}개 건물 · 임차인 ${totalTenants} · 기준: 2025.08</div></div>${renderOurCard()}`;
  if(!keys.length){document.getElementById('panelBody').innerHTML=head+'<div class="empty">조건에 맞는 건물이 없습니다.</div>';return;}
  const html=keys.map(k=>{
    const arr=groups[k];
    const tenantCount=arr.reduce((sum,b)=>sum+(b.tenants||[]).length,0);
    const isOpen=openDongs.has(k) || arr.some(b=>b.id===selectedId);
    return `<div class="dong-group ${isOpen?'open':''}" id="dong-${safeId(k)}">
      <div class="dong-head" onclick="toggleDong('${escAttr(k)}')">
        <div class="dong-title">${k}</div>
        <div class="dong-meta">건물 <strong>${arr.length}</strong> · 임차인 <strong>${tenantCount}</strong></div>
        <div class="dong-fold">▼</div>
      </div>
      <div class="dong-body">
        ${arr.map(b=>renderBuildingCard(b)).join('')}
      </div>
    </div>`;
  }).join('');
  document.getElementById('panelBody').innerHTML=head+html;
  scrollSelectedCard();
}

}

function safeId(s){return String(s).replace(/[^가-힣a-zA-Z0-9_-]/g,'_')}

function scrollSelectedCard(){

}
function renderIndustryAnalysis(){
  const source=filteredBuildings.filter(b=>!b.isOurs);
  const counts={}, bldgCounts={};
  source.forEach(b=>(b.tenants||[]).forEach(t=>{
    counts[t.type]=(counts[t.type]||0)+1;
    if(!bldgCounts[t.type])bldgCounts[t.type]=new Set();
    bldgCounts[t.type].add(b.id);
  }));
  const preferred=['병원/의료','사무실/기업','기타','F&B/음식점','패션/잡화','학원/교육','뷰티/미용','카페','약국'];
  const entries=Object.entries(counts).sort((a,b)=>{const ia=preferred.indexOf(a[0]), ib=preferred.indexOf(b[0]); return (ia<0?99:ia)-(ib<0?99:ib) || b[1]-a[1];});
  const max=Math.max(1,...Object.values(counts));
  const totalTenants=Object.values(counts).reduce((a,b)=>a+b,0);
  const top=entries[0];
  const activeCount=activeLeaseType==='전체'?totalTenants:(counts[leaseTarget(activeLeaseType)]||0);
  const insight=top
    ? `${activeLeaseType==='전체'?'전체 기준':leaseLabel(activeLeaseType)+' 기준'} 총 ${source.length}개 건물, ${totalTenants}개 임차인이 표시됩니다. 가장 많은 업종은 ${top[0]} ${top[1]}개입니다.`
    : '현재 조건에서 분석할 업종 데이터가 없습니다.';
  const rows=entries.map(([k,v])=>{
    const pct=totalTenants?Math.round(v/totalTenants*100):0;
    const bcnt=bldgCounts[k]?bldgCounts[k].size:0;
    const related=buildings.filter(b=>!b.isOurs&&(b.tenants||[]).some(t=>t.type===k)).slice(0,12);
    return `<div class="type-row ${leaseTarget(activeLeaseType)===k?'active':''}">
      <div class="type-line" onclick="applyIndustryFilter('${escAttr(k)}')">
        <div class="type-lbl">${k}</div>
        <div class="track"><div class="fill" style="width:${Math.max(12,v/max*100)}%">${v}</div></div>
        <div class="dot-sm"></div>
      </div>
      <div class="type-actions">
        <button class="btn" onclick="applyIndustryFilter('${escAttr(k)}')">지도·리스트 필터</button>
        <button class="btn" onclick="showIndustryBuildings('${escAttr(k)}')">건물 보기 ${bcnt}</button>
      </div>
      <div class="pill-list">${related.map(b=>`<span class="pill" onclick="selectBuilding('${b.id}')">${b.name}</span>`).join('')}</div>
    </div>`;
  }).join('');
  document.getElementById('panelBody').innerHTML=`<div class="section">
    <div class="section-title">업종분석</div>
    <div class="filter-summary">
      <span class="summary-chip">선택: ${leaseLabel(activeLeaseType)}</span>
      <span class="summary-chip">표시 건물 ${source.length}</span>
      <span class="summary-chip">업종 데이터 ${activeCount}</span>
    </div>
    <div class="insight-box"><div class="insight-title">업종 인사이트</div><div class="insight-text">${insight}</div></div>
    <div class="hint">막대 또는 버튼을 누르면 상단 필터, 지도 마커, 건물목록이 같이 변경됩니다.</div>
    ${rows||'<div class="empty">분석할 데이터가 없습니다.</div>'}
    ${activeLeaseType!=='전체'?'<button class="btn full" onclick="resetLeaseIndustry()">전체 업종 다시 보기</button>':''}
  </div>`;
}

function renderMarketFilterPanel(){const total=filteredBuildings.length;const tenants=filteredBuildings.reduce((s,b)=>s+(b.tenants||[]).length,0);document.getElementById('panelBody').innerHTML=`<div class="section"><div class="section-title">상권분석 필터</div><div class="kpi"><div class="kbox"><div class="klabel">건물 수</div><div class="kval">${total}</div></div><div class="kbox"><div class="klabel">업체 수</div><div class="kval">${tenants}</div></div></div><div class="formrow"><label>반경 <span>${radius}m</span></label><input class="range" type="range" min="300" max="3000" step="100" value="${radius}" oninput="radius=this.value;drawCircle();renderMarketFilterPanel()"></div><button class="btn full" onclick="activeLeaseType='인접300m';renderLeaseFilter();applyLeaseFilter();drawBuildings();renderLeasePanel()">인접 300m 보기</button><div class="hint" style="margin-top:12px">기초본에서는 거리/업종 중심으로 먼저 구성했습니다. 기존 market의 면적·임대료·승강기·주차 필터는 다음 단계에서 그대로 붙이면 됩니다.</div></div>`;}

function makePinSvg(fill='#4d7df0',w=24,h=32){
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 32 44">
    <path d="M16 43S3 28.5 3 16.2C3 7.5 8.8 2 16 2s13 5.5 13 14.2C29 28.5 16 43 16 43z" fill="${fill}" stroke="rgba(20,40,90,.45)" stroke-width="1.5"/>
    <circle cx="16" cy="15" r="7.2" fill="white" opacity=".96"/>
    <path d="M12.7 14.3h6.6L16 18.2z" fill="${fill}" opacity=".9"/>
  </svg>`;
  return 'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg);
}
function markerImageFor(b){
  const w=b.isOurs?30:22, h=b.isOurs?41:31;
  return new kakao.maps.MarkerImage(makePinSvg(b.isOurs?'#2f6dff':'#557fe8',w,h),new kakao.maps.Size(w,h),{offset:new kakao.maps.Point(Math.round(w/2),h)});
}

function drawBuildings(){
  markers.forEach(m=>m.setMap(null));markers=[];markerById={};
  filteredBuildings.forEach(b=>{
    if(!b.lat||!b.lng)return;
    const marker=new kakao.maps.Marker({position:new kakao.maps.LatLng(b.lat,b.lng),map,title:b.name,zIndex:b.isOurs?10:3,image:markerImageFor(b)});
    kakao.maps.event.addListener(marker,'click',()=>selectBuilding(b.id,true));
    markers.push(marker);markerById[b.id]=marker;
  });
  syncMarkerSelection();
  if(mode==='lease')renderLeasePanel();if(mode==='sangwon')renderSangwonPanel();
}
function drawPoi(p){const m=new kakao.maps.Marker({position:new kakao.maps.LatLng(p.y,p.x),map,title:p.place_name});kakao.maps.event.addListener(m,'click',()=>info.open(map,m));poiMarkers.push(m)}
function selectBuilding(id,fromMarker=false){
  selectedId=id;
  const b=buildings.find(x=>x.id===id);if(!b)return;
  if(b.dong)openDongs.add(b.dong);
  focusBuilding(id);
  syncMarkerSelection();
  const content=`<div class="infow"><strong>${b.name}</strong>${b.address||''}<br><button onclick="openDetail('${id}')">상세보기</button></div>`;
  const marker=markerById[id];
  if(marker){info.setContent(content);info.open(map,marker);}
  if(mode==='lease')renderBldgList();else if(mode==='sangwon')renderSangwonPanel();
}
function syncMarkerSelection(){
  Object.entries(markerById).forEach(([id,m])=>{
    const img=m.getImage&&m.getImage();
  });
}
function focusBuilding(id){const b=buildings.find(x=>x.id===id);if(!b)return;map.setCenter(new kakao.maps.LatLng(b.lat,b.lng));map.setLevel(3);}
function openDetail(id){const b=buildings.find(x=>x.id===id);if(!b)return;if(b.pdf){window.open(b.pdf,'_blank');return}alert('PDF 링크 컬럼이 확인되지 않았습니다.\n건물명: '+b.name);}
function openInfo(b){selectBuilding(b.id)}
function geocode(){const q=document.getElementById('addr').value||'압구정로 112';ps.keywordSearch(q,(data,status)=>{if(status===kakao.maps.services.Status.OK&&data[0]){map.setCenter(new kakao.maps.LatLng(data[0].y,data[0].x));map.setLevel(4)}})}
function fmtDist(m){return m>=1000?(m/1000).toFixed(1)+'km':Math.round(m)+'m'}
function dist(a,b,c,d){if(!c||!d)return 999999;const R=6371000,la=(c-a)*Math.PI/180,lo=(d-b)*Math.PI/180;const x=Math.sin(la/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(lo/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
</script>
