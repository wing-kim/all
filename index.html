<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLUEPIKA Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08090d; --s1:#0f1118; --s2:#151821; --s3:#1c2030;
  --border:#222636; --border2:#2a3050;
  --blue:#3b7fff; --blue-g:linear-gradient(135deg,#3b7fff,#6c48f5);
  --green:#22d186; --yellow:#f5bc30; --orange:#f07830;
  --red:#f03860; --purple:#9060f0;
  --t1:#eef0f8; --t2:#8890aa; --t3:#4a5270; --t4:#2a3050;
  --mono:'DM Mono',monospace; --sans:'Noto Sans KR',sans-serif;
  --display:'Bebas Neue',sans-serif;
  --r:10px; --r2:6px; --sh:0 4px 32px rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(59,127,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,127,255,.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0}
.page{position:relative;z-index:1;max-width:1520px;margin:0 auto;padding:0 28px 80px}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;
  padding:24px 0 20px;border-bottom:1px solid var(--border);margin-bottom:28px}
.brand{display:flex;align-items:baseline;gap:10px}
.brand-name{font-family:var(--display);font-size:28px;letter-spacing:2px;
  background:var(--blue-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-sub{font-size:11px;color:var(--t3);letter-spacing:3px;text-transform:uppercase}
.header-r{display:flex;align-items:center;gap:12px}
.sync-badge{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--t3)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:blink 2.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn-ref{display:flex;align-items:center;gap:6px;background:var(--s2);
  border:1px solid var(--border2);color:var(--t2);padding:7px 14px;
  border-radius:var(--r2);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .18s}
.btn-ref:hover{background:var(--s3);color:var(--t1);border-color:var(--blue)}
.btn-ref .ico{display:inline-block;transition:transform .6s}
.btn-ref.spin .ico{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:26px;padding:4px;
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow-x:auto}
.tab{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:9px 20px;
  border-radius:7px;border:none;background:transparent;color:var(--t3);
  font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;
  transition:all .18s;white-space:nowrap}
.tab:hover{color:var(--t2);background:var(--s2)}
.tab.on{color:var(--t1);background:var(--s3);box-shadow:0 1px 8px rgba(0,0,0,.4)}
.pip{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* SECTIONS */
.sec{display:none}.sec.on{display:block}

/* LOADER / ERROR */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:300px;gap:14px;color:var(--t3)}
.ring{width:38px;height:38px;border:3px solid var(--border2);
  border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.loader p{font-size:12px}
.err{background:rgba(240,56,96,.07);border:1px solid rgba(240,56,96,.2);
  border-radius:var(--r);padding:18px 22px;color:var(--red);font-size:13px}
.err small{color:var(--t3);display:block;margin-top:6px}

/* NOTICE */
.notice{display:flex;align-items:center;gap:8px;
  background:rgba(59,127,255,.06);border:1px solid rgba(59,127,255,.15);
  border-radius:var(--r2);padding:10px 14px;
  font-size:11px;color:var(--t3);margin-bottom:20px}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:12px;margin-bottom:22px}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
  padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s}
.kpi:hover{border-color:var(--border2);transform:translateY(-2px)}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.b::after{background:var(--blue-g)}
.kpi.g::after{background:linear-gradient(90deg,var(--green),var(--blue))}
.kpi.y::after{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.kpi.p::after{background:linear-gradient(90deg,var(--purple),#f03860)}
.kpi.r::after{background:linear-gradient(90deg,var(--red),var(--orange))}
.kpi-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:9px}
.kpi-val{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--t1)}
.kpi-sub{font-size:11px;color:var(--t3);margin-top:4px}

/* CARD */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.card-head{display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--border)}
.card-title{font-size:13px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:8px}
.chip{background:var(--s3);border:1px solid var(--border2);color:var(--t3);
  font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:20px}
.search{background:var(--s2);border:1px solid var(--border);color:var(--t1);
  padding:6px 12px;border-radius:var(--r2);font-family:var(--sans);font-size:12px;
  width:190px;outline:none;transition:border-color .2s}
.search:focus{border-color:var(--blue)}
.search::placeholder{color:var(--t3)}

/* TABLE */
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:var(--s2);border-bottom:1px solid var(--border)}
th{padding:10px 14px;text-align:left;font-size:10.5px;font-weight:600;color:var(--t3);
  text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;cursor:pointer;
  user-select:none;transition:color .15s}
th:hover{color:var(--t2)}
th.sorted{color:var(--blue)}
td{padding:9px 14px;border-bottom:1px solid rgba(34,38,54,.7);color:var(--t2);
  white-space:nowrap;max-width:240px;overflow:hidden;text-overflow:ellipsis}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--s2);color:var(--t1)}
td:first-child{color:var(--t1);font-weight:500}
.npos{color:var(--green)!important;font-family:var(--mono)}
.nneg{color:var(--red)!important;font-family:var(--mono)}
.nnum{color:var(--blue)!important;font-family:var(--mono)}
.npct{color:var(--yellow)!important;font-family:var(--mono)}
.ndash{color:var(--t4)!important}

/* PAGER */
.pager{display:flex;align-items:center;justify-content:flex-end;gap:6px;
  padding:12px 18px;border-top:1px solid var(--border);font-size:12px;color:var(--t3)}
.pg{background:var(--s2);border:1px solid var(--border);color:var(--t2);
  padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;
  transition:all .15s;font-family:var(--sans)}
.pg:hover:not([disabled]){border-color:var(--blue);color:var(--blue)}
.pg[disabled]{opacity:.3;cursor:default}
.pg.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* ══════════════════════════════════════════════
   TIMELINE — 연도 눈금 + 기간 표시 GANTT
══════════════════════════════════════════════ */
.tl-wrap{padding:0 24px 24px}

/* 연도 헤더 눈금 */
.tl-year-ruler{
  display:grid;
  margin-bottom:0;
  border-bottom:1px solid var(--border2);
  padding-bottom:8px;
  margin-bottom:10px;
}
.tl-year-cell{
  text-align:center;
  font-family:var(--mono);
  font-size:10px;
  font-weight:600;
  color:var(--t3);
  letter-spacing:1px;
  position:relative;
}
.tl-year-cell.cur{color:var(--blue)}
.tl-year-cell::before{
  content:'';position:absolute;left:0;top:-6px;
  width:1px;height:6px;background:var(--border2);
}
.tl-ruler-bar{
  display:flex;
  align-items:center;
  margin-bottom:8px;
  border-bottom:1px solid var(--border);
  padding-bottom:10px;
}
.tl-ruler-lbl{
  width:220px;flex-shrink:0;
  font-size:10px;color:var(--t3);
  text-transform:uppercase;letter-spacing:1px;font-weight:600;
  padding-right:16px;
}
.tl-ruler-track{flex:1;position:relative;height:20px}
.tl-ruler-years{display:flex;width:100%;height:100%;position:relative}
.tl-year-marker{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:10px;color:var(--t3);
  border-left:1px solid var(--border);
  position:relative;
}
.tl-year-marker:first-child{border-left:none}
.tl-year-marker.now{color:var(--blue);font-weight:600}
.tl-year-marker.now::after{
  content:'NOW';position:absolute;top:-12px;
  font-size:8px;color:var(--blue);letter-spacing:1px;
}

/* Gantt row */
.gantt-row-new{
  display:flex;align-items:center;gap:0;
  padding:10px 0;border-bottom:1px solid var(--border);
  transition:background .15s;
}
.gantt-row-new:last-child{border-bottom:none}
.gantt-row-new:hover{background:rgba(59,127,255,.03)}
.g-info{width:220px;flex-shrink:0;padding-right:16px}
.g-name{font-size:13px;font-weight:500;color:var(--t1)}
.g-period{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:3px}
.g-note{font-size:10px;color:var(--t4);margin-top:2px}
.g-bar-area{flex:1;position:relative;height:38px;display:flex;align-items:center}
.g-bar-bg{
  position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);
  height:8px;background:var(--s3);border-radius:4px;
  border:1px solid var(--border);overflow:hidden;
}
.g-bar-fill{height:100%;border-radius:4px;position:absolute;left:0;
  transition:width .9s cubic-bezier(.4,0,.2,1),left .9s cubic-bezier(.4,0,.2,1)}
.g-bar-label{
  position:absolute;right:-4px;top:50%;transform:translateY(-50%);
  background:var(--s3);border:1px solid var(--border2);
  border-radius:3px;padding:2px 6px;
  font-family:var(--mono);font-size:10px;color:var(--t2);
  white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .3s;
}
.gantt-row-new:hover .g-bar-label{opacity:1}
.g-dur-new{
  width:80px;flex-shrink:0;text-align:right;
  font-family:var(--mono);font-size:12px;color:var(--t2);padding-left:12px;
}
.g-date-badge{
  display:inline-block;margin-top:4px;
  background:rgba(59,127,255,.1);border:1px solid rgba(59,127,255,.2);
  border-radius:4px;padding:2px 7px;
  font-family:var(--mono);font-size:9px;color:var(--blue);
}

/* color classes reused */
.gc0{background:linear-gradient(90deg,#3b7fff,#6c48f5)}
.gc1{background:linear-gradient(90deg,#22d186,#3b7fff)}
.gc2{background:linear-gradient(90deg,#f5bc30,#f07830)}
.gc3{background:linear-gradient(90deg,#9060f0,#f03860)}
.gc4{background:linear-gradient(90deg,#f07830,#f03860)}
.gc5{background:linear-gradient(90deg,#22d186,#f5bc30)}
.gc6{background:linear-gradient(90deg,#3b7fff,#22d186)}
.gc7{background:linear-gradient(90deg,#f03860,#9060f0)}
.gc8{background:linear-gradient(90deg,#f5bc30,#22d186)}

/* ══════════════════════════════════════════════
   IRR — 두 주소 카드 레이아웃
══════════════════════════════════════════════ */
.irr-addr-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:16px;margin-bottom:22px;
}
.irr-addr-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  position:relative;
}
.irr-addr-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
}
.irr-addr-card:first-child::before{background:linear-gradient(90deg,#3b7fff,#6c48f5)}
.irr-addr-card:last-child::before{background:linear-gradient(90deg,#22d186,#3b7fff)}
.irr-addr-head{
  padding:16px 20px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
}
.irr-addr-title{
  font-size:14px;font-weight:600;color:var(--t1);
  display:flex;align-items:center;gap:8px;
}
.irr-addr-tag{
  font-size:9px;padding:2px 8px;border-radius:20px;
  border:1px solid;font-weight:600;letter-spacing:.8px;text-transform:uppercase;
}
.tag-a{color:#6c48f5;border-color:rgba(108,72,245,.3);background:rgba(108,72,245,.1)}
.tag-b{color:var(--green);border-color:rgba(34,209,134,.3);background:rgba(34,209,134,.1)}
.irr-addr-sub{font-size:11px;color:var(--t3);margin-top:4px}
.irr-addr-body{padding:20px}
.irr-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.irr-metric{
  background:var(--s2);border:1px solid var(--border);
  border-radius:8px;padding:14px 16px;
}
.irr-metric-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.irr-metric-val{font-family:var(--mono);font-size:20px;font-weight:500}
.irr-metric-val.pos{color:var(--green)}
.irr-metric-val.neg{color:var(--red)}
.irr-metric-val.neu{color:var(--blue)}
.irr-metric-val.ylw{color:var(--yellow)}
.irr-metric-sub{font-size:10px;color:var(--t3);margin-top:3px}
.land-price-box{
  background:rgba(245,188,48,.05);border:1px solid rgba(245,188,48,.15);
  border-radius:8px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
}
.land-price-lbl{font-size:11px;color:var(--yellow);display:flex;align-items:center;gap:6px}
.land-price-lbl::before{content:'🏛️'}
.land-price-val{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--yellow)}
.irr-divider{height:1px;background:var(--border);margin:16px 0}
.irr-rows-title{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.irr-row-item{
  display:flex;justify-content:space-between;align-items:center;
  padding:7px 0;border-bottom:1px solid rgba(34,38,54,.5);
  font-size:12px;
}
.irr-row-item:last-child{border-bottom:none}
.irr-row-key{color:var(--t2)}
.irr-row-val{font-family:var(--mono);font-size:12px;color:var(--t1)}

/* IRR full table below */
.irr-tbl-wrap{margin-top:22px}

/* ── STATUS BADGES ── */
.sbadge{display:inline-flex;align-items:center;gap:4px;
  padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.sb-active{background:rgba(34,209,134,.12);color:var(--green);border:1px solid rgba(34,209,134,.25)}
.sb-expire{background:rgba(240,56,96,.12);color:var(--red);border:1px solid rgba(240,56,96,.25)}
.sb-warn{background:rgba(245,188,48,.12);color:var(--yellow);border:1px solid rgba(245,188,48,.25)}
.sb-neutral{background:rgba(59,127,255,.12);color:var(--blue);border:1px solid rgba(59,127,255,.25)}

/* ══════════════════════════════════════════════
   LEASE — 주소별 + 임차인별 카드
══════════════════════════════════════════════ */
.lease-addr-tabs{
  display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;
}
.lease-addr-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:8px;border:1px solid var(--border2);
  background:var(--s2);color:var(--t3);font-family:var(--sans);
  font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;
}
.lease-addr-btn.on{
  background:rgba(59,127,255,.12);border-color:rgba(59,127,255,.3);color:var(--blue);
}
.lease-addr-btn:hover:not(.on){color:var(--t2);background:var(--s3)}

.lease-section{margin-bottom:24px}
.lease-section-head{
  display:flex;align-items:center;gap:12px;
  padding:12px 18px;background:var(--s2);
  border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;
  border-bottom:none;
}
.lease-section-addr{font-size:14px;font-weight:600;color:var(--t1)}
.lease-section-meta{font-size:11px;color:var(--t3)}
.lease-kpi-row{
  display:grid;grid-template-columns:repeat(3,1fr);gap:0;
  border:1px solid var(--border);border-top:none;margin-bottom:1px;
}
.lease-kpi-cell{
  padding:14px 18px;border-right:1px solid var(--border);
  position:relative;
}
.lease-kpi-cell:last-child{border-right:none}
.lease-kpi-cell::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.lkpi-rent::before{background:linear-gradient(90deg,var(--green),var(--blue))}
.lkpi-deposit::before{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.lkpi-land::before{background:linear-gradient(90deg,var(--purple),var(--red))}
.lease-kpi-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.lease-kpi-val{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--t1)}
.lease-kpi-sub{font-size:10px;color:var(--t3);margin-top:3px}

/* 임차인 카드 그리드 */
.tenant-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:12px;margin-top:16px;
}
.tenant-card{
  background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;transition:border-color .2s,transform .2s;
}
.tenant-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.tenant-card-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border);
  background:var(--s2);
}
.tenant-name{font-size:13px;font-weight:600;color:var(--t1)}
.tenant-card-body{padding:14px 16px}
.tenant-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid rgba(34,38,54,.5);font-size:12px;
}
.tenant-row:last-child{border-bottom:none}
.tenant-key{color:var(--t3);flex-shrink:0;width:90px}
.tenant-val{font-family:var(--mono);font-size:11.5px;color:var(--t2);text-align:right}
.tenant-val.pos{color:var(--green)}
.tenant-val.warn{color:var(--yellow)}
.tenant-val.exp{color:var(--red)}

/* full table fallback */
.lease-full-tbl{margin-top:12px}

/* EMPTY */
.empty{text-align:center;padding:60px;color:var(--t3);font-size:13px}
.empty-i{font-size:36px;margin-bottom:12px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

@media(max-width:900px){
  .irr-addr-grid,.two-col{grid-template-columns:1fr}
  .lease-kpi-row{grid-template-columns:1fr}
  .lease-kpi-cell{border-right:none;border-bottom:1px solid var(--border)}
  .gantt-row-new{flex-wrap:wrap}
  .g-info{width:100%}
}
@media(max-width:600px){
  .page{padding:0 14px 60px}
  .kpi-row{grid-template-columns:1fr 1fr}
  .brand-name{font-size:22px}
  .irr-metrics{grid-template-columns:1fr}
  .tenant-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="page">

<header>
  <div class="brand">
    <span class="brand-name">BLUEPIKA</span>
    <span class="brand-sub">Dashboard</span>
  </div>
  <div class="header-r">
    <div class="sync-badge">
      <div class="dot"></div>
      <span id="syncTime">—</span>
    </div>
    <button class="btn-ref" id="btnRef" onclick="refreshCurrent()">

<script>
/* ══ CONFIG ══════════════════════════════════════════════════════ */
const SID = '17lL6O55R56PGODOu-iM5EBH4a6ZbWEJfkypcdWzlGHA';
const TABS = {
  timeline: {gid:'835667947',  label:'프로젝트 타임라인'},
  irr:      {gid:'1343029023', label:'신축 IRR'},
  lease:    {gid:'0',          label:'임대차계약현황'},
  personal: {gid:'662143448',  label:'개인비용'},
  corp:     {gid:'551803703',  label:'법인비용'},
};
const PG = 50;

/* ══ STATE ═══════════════════════════════════════════════════════ */
const CACHE = {}, LOADED = new Set(), TS = {};
let CUR = 'timeline';

/* ══ CSV ═════════════════════════════════════════════════════════ */
async function fetchSheet(k) {
  const url = `https://docs.google.com/spreadsheets/d/${SID}/export?format=csv&gid=${TABS[k].gid}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return parseCSV(await r.text());
}
function parseCSV(txt) {
  const rows = []; let inQ=false, row=[], cell='';
  for (let i=0; i<txt.length; i++) {
    const c=txt[i];
    if (c==='"') { inQ=!inQ; continue; }
    if (!inQ && c===',') { row.push(cell.trim()); cell=''; continue; }
    if (!inQ && (c==='\n' || (c==='\r' && txt[i+1]==='\n'))) {
      if (c==='\r') i++;
      row.push(cell.trim()); cell='';
      if (row.some(x=>x)) rows.push(row);
      row=[]; continue;
    }
    cell += c;
  }
  if (cell||row.length) { row.push(cell.trim()); if(row.some(x=>x)) rows.push(row); }
  return rows;
}

/* ══ CELL FORMAT ═════════════════════════════════════════════════ */
function fc(v) {
  if (v===null||v===undefined||v==='') return '<span class="ndash">—</span>';
  const s = String(v).trim();
  if (!s) return '<span class="ndash">—</span>';
  if (s.endsWith('%')) {
    const n=parseFloat(s);
    if (!isNaN(n)) return `<span class="${n<0?'nneg':'npct'}">${s}</span>`;
  }
  const clean = s.replace(/[,\s₩원]/g,'');
  if (!isNaN(Number(clean)) && clean!=='' && /^[\d,.\-\+]+$/.test(clean)) {
    const n=Number(clean);
    return `<span class="${n<0?'nneg':n>0?'npos':'nnum'}">${s}</span>`;
  }
  return s;
}

/* ══ TABLE ═══════════════════════════════════════════════════════ */
function initTS(k) { if (!TS[k]) TS[k]={search:'',sortCol:-1,sortAsc:true,page:1}; }

function drawTable(k, rows, cid, customCell) {
  const el = document.getElementById(cid); if (!el) return;
  if (!rows||rows.length<2) { el.innerHTML=`<div class="empty"><div class="empty-i">📭</div>데이터 없음</div>`; return; }
  initTS(k);
  const hdr = rows[0];
  let data = rows.slice(1).filter(r=>r.some(c=>c));

  const q = (TS[k].search||'').toLowerCase();
  if (q) data=data.filter(r=>r.some(c=>(c||'').toLowerCase().includes(q)));

  const {sortCol:sc, sortAsc:sa} = TS[k];
  if (sc>=0) {
    data=[...data].sort((a,b)=>{
      const av=(a[sc]||'').replace(/__SB_\w+__/g,''),bv=(b[sc]||'').replace(/__SB_\w+__/g,'');
      const an=parseFloat(av.replace(/[,%\s₩원]/g,'')),bn=parseFloat(bv.replace(/[,%\s₩원]/g,''));
      if (!isNaN(an)&&!isNaN(bn)) return sa?an-bn:bn-an;
      return sa?av.localeCompare(bv,'ko'):bv.localeCompare(av,'ko');
    });
  }

  const total=data.length, p=Math.max(1,Math.min(TS[k].page,Math.ceil(total/PG)||1));
  TS[k].page=p;
  const totalP=Math.max(1,Math.ceil(total/PG));
  const slice=data.slice((p-1)*PG, p*PG);

  const cfn = customCell||fc;
  const ths=hdr.map((h,i)=>`<th onclick="tSort('${k}','${cid}',${i})" ${sc===i?'class="sorted"':''}>${h||'—'} ${sc===i?(sa?'↑':'↓'):''}</th>`).join('');
  const tbs=slice.map(r=>`<tr>${hdr.map((_,i)=>`<td>${cfn(r[i])}</td>`).join('')}</tr>`).join('');

  let pgH='';
  if (totalP>1) {
    const s=Math.max(1,Math.min(p-2,totalP-4)), e=Math.min(totalP,s+4);
    let btns=''; for(let i=s;i<=e;i++) btns+=`<button class="pg${i===p?' on':''}" onclick="tPage('${k}','${cid}',${i})">${i}</button>`;
    pgH=`<div class="pager"><span>${total}건 · ${p}/${totalP}페이지</span>
      <button class="pg" onclick="tPage('${k}','${cid}',${p-1})" ${p<=1?'disabled':''}>‹</button>${btns}
      <button class="pg" onclick="tPage('${k}','${cid}',${p+1})" ${p>=totalP?'disabled':''}>›</button></div>`;
  } else {
    pgH=`<div class="pager"><span>${total}건</span></div>`;
  }

  el.innerHTML=`<div class="card">
    <div class="card-head">
      <div class="card-title">데이터 <span class="chip">${total}행</span></div>
      <input class="search" placeholder="검색…" value="${TS[k].search||''}" oninput="tSearch('${k}','${cid}',this.value)">
    </div>
    <div class="tscroll"><table><thead><tr>${ths}</tr></thead><tbody>${tbs}</tbody></table></div>
    ${pgH}
  </div>`;
}

function tSort(k,cid,col){
  initTS(k);
  if(TS[k].sortCol===col) TS[k].sortAsc=!TS[k].sortAsc;
  else { TS[k].sortCol=col; TS[k].sortAsc=true; }
  TS[k].page=1;
  drawTable(k, CACHE[k], cid, CACHE[k+'_cfn']);
}
function tSearch(k,cid,val){
  initTS(k); TS[k].search=val; TS[k].page=1;
  drawTable(k, CACHE[k], cid, CACHE[k+'_cfn']);
}
function tPage(k,cid,p){
  initTS(k); TS[k].page=p;
  drawTable(k, CACHE[k], cid, CACHE[k+'_cfn']);
}

/* ══ UTILS ═══════════════════════════════════════════════════════ */
function fmtBig(n) {
  if (isNaN(n)) return '—';
  if (Math.abs(n)>=1e8) return (n/1e8).toFixed(1)+'억';
  if (Math.abs(n)>=1e4) return Math.round(n/1e4).toLocaleString()+'만';
  if (Math.abs(n)>=1000) return n.toLocaleString();
  return Number(n.toFixed(1)).toString();
}
function fmtNum(n) {
  if (isNaN(n)||n===0) return '—';
  return n.toLocaleString('ko-KR');
}
function findHdrRow(rows) {
  for(let i=0;i<Math.min(rows.length,6);i++){
    if(rows[i].filter(c=>c).length>=2) return i;
  }
  return 0;
}
function numCols(header, data) {
  return header.map((h,i)=>({h,i})).filter(({h,i})=>{
    if(!h) return false;
    const vals=data.map(r=>parseFloat((r[i]||'').replace(/[,\s₩원%]/g,''))).filter(x=>!isNaN(x));
    return vals.length>0;
  });
}
function sumCol(data, i) {
  return data.map(r=>parseFloat((r[i]||'').replace(/[,\s₩원%]/g,''))).filter(x=>!isNaN(x)).reduce((a,b)=>a+b,0);
}
function errHTML(msg) {
  return `<div class="err">⚠️ ${msg}<small>구글 시트 공유를 "링크 있는 모든 사용자 · 뷰어"로 설정해주세요.</small></div>`;
}
function parseAmt(v) {
  return parseFloat(String(v||'').replace(/[,\s₩원]/g,''))||0;
}

/* ══════════════════════════════════════════════════════════════
   1. TIMELINE — 연도 눈금 + 기간 표시 Gantt
══════════════════════════════════════════════════════════════ */
function renderTimeline(rows) {
  const sec = document.getElementById('sec-timeline');
  const hi = findHdrRow(rows);
  const data = rows.slice(hi+1).filter(r=>r.some(c=>c));

  // col layout: col0=blank, col1=항목, col2=기간(텍스트 날짜), col3=소요, col4=기타
  const ni=1, pi=2, di=3, oi=4;

  // 전체 타임라인 범위: 2026.01 ~ 2030.12 (고정 눈금)
  const YEAR_START = 2026;
  const YEAR_END   = 2030;
  const TOTAL_MONTHS = (YEAR_END - YEAR_START + 1) * 12; // 60개월

  // 기간 문자열 파싱: "2026.03~2027.06", "2026.03 ~ 2027.06", "2026년 3월~..." 등
  function parsePeriod(s) {
    if (!s) return null;
    s = String(s).trim();
    // 패턴 1: YYYY.MM~YYYY.MM or YYYY.MM - YYYY.MM
    let m = s.match(/(\d{4})[.\s년]?\s*(\d{1,2})[월]?\s*[~\-～–]\s*(\d{4})[.\s년]?\s*(\d{1,2})/);
    if (m) return { sy:+m[1], sm:+m[2], ey:+m[3], em:+m[4] };
    // 패턴 2: YYYY.MM~ (종료 없음)
    m = s.match(/(\d{4})[.\s년]?\s*(\d{1,2})/);
    if (m) return { sy:+m[1], sm:+m[2], ey:+m[1], em:+m[2]+1 };
    return null;
  }

  // 소요 개월 파싱
  function parseDur(s) {
    const n = parseInt(String(s||'').replace(/[^0-9]/g,''));
    return isNaN(n) ? 0 : n;
  }

  // 각 행에서 시작월 오프셋, 소요 계산
  const items = data.map((r, idx) => {
    const name    = r[ni]||'—';
    const period  = r[pi]||'';
    const durRaw  = r[di]||'';
    const note    = r[oi]||'';
    const parsed  = parsePeriod(period);
    const durMo   = parseDur(durRaw);

    let startOff = 0, barWidth = 0;
    let startLabel = '', endLabel = '';

    if (parsed) {
      startOff = (parsed.sy - YEAR_START)*12 + (parsed.sm - 1);
      const endOff = (parsed.ey - YEAR_START)*12 + (parsed.em - 1);
      barWidth = Math.max(endOff - startOff, 1);
      startLabel = `${parsed.sy}.${String(parsed.sm).padStart(2,'0')}`;
      endLabel   = `${parsed.ey}.${String(parsed.em).padStart(2,'0')}`;
    } else if (durMo > 0) {
      // 소요개월만 있을 때: 이전 항목 끝부분 추정
      const prev = idx > 0 ? items[idx-1] : null;
      startOff = prev ? (prev.startOff + prev.barWidth) : 0;
      barWidth = durMo;
    }

    // 클램프
    startOff = Math.max(0, Math.min(startOff, TOTAL_MONTHS-1));
    barWidth = Math.max(1, Math.min(barWidth, TOTAL_MONTHS - startOff));

    const leftPct  = (startOff / TOTAL_MONTHS * 100).toFixed(2);
    const widthPct = (barWidth / TOTAL_MONTHS * 100).toFixed(2);
    const durLabel = durMo ? `${durMo}개월` : (barWidth ? `${barWidth}개월` : durRaw||'—');

    return { name, period, note, durLabel, startOff, barWidth, leftPct, widthPct, startLabel, endLabel, colorIdx: idx };
  });

  const totalM = items.reduce((a,b)=>a+(b.barWidth||0),0);

  // 연도 눈금 HTML
  const years = [];
  const curYear = new Date().getFullYear();
  for (let y=YEAR_START; y<=YEAR_END; y++) {
    years.push(`<div class="tl-year-marker${y===curYear?' now':''}">${y}</div>`);
  }
  const yearRuler = `<div class="tl-ruler-bar">
    <div class="tl-ruler-lbl">연도 기준</div>
    <div class="tl-ruler-track">
      <div class="tl-ruler-years">${years.join('')}</div>
    </div>
    <div style="width:80px;flex-shrink:0"></div>
  </div>`;

  // 분기 눈금 (반투명 세로선)
  const quarterLines = [];
  for (let y=YEAR_START; y<=YEAR_END; y++) {
    for (let q=1; q<=4; q++) {
      const mo = (y - YEAR_START)*12 + (q-1)*3;
      const pct = (mo/TOTAL_MONTHS*100).toFixed(2);
      quarterLines.push(`<div style="position:absolute;left:${pct}%;top:0;bottom:0;width:1px;background:rgba(42,48,80,.5);pointer-events:none"></div>`);
    }
  }

  // Gantt rows
  const gRows = items.map(it => {
    const badgeHtml = it.startLabel
      ? `<span class="g-date-badge">${it.startLabel} → ${it.endLabel}</span>`
      : '';
    return `<div class="gantt-row-new">
      <div class="g-info">
        <div class="g-name">${it.name}</div>
        ${it.period ? `<div class="g-period">${it.period}</div>` : ''}
        ${badgeHtml}
        ${it.note ? `<div class="g-note">${it.note}</div>` : ''}
      </div>
      <div class="g-bar-area">
        ${quarterLines.join('')}
        <div class="g-bar-bg" style="position:relative">
          <div class="g-bar-fill gc${it.colorIdx%9}"
            data-left="${it.leftPct}" data-w="${it.widthPct}"
            style="left:${it.leftPct}%;width:0"></div>
        </div>
        <div class="g-bar-label">${it.durLabel}</div>
      </div>
      <div class="g-dur-new">${it.durLabel}</div>
    </div>`;
  }).join('');

  sec.innerHTML = `
    <div class="notice">📡 구글 시트 실시간 연동 · 프로젝트 타임라인</div>
    <div class="kpi-row">
      <div class="kpi b"><div class="kpi-lbl">총 단계</div><div class="kpi-val">${data.length}</div><div class="kpi-sub">프로젝트 항목</div></div>
      <div class="kpi g"><div class="kpi-lbl">총 소요 기간</div><div class="kpi-val">${totalM}개월</div><div class="kpi-sub">예상 전체 기간</div></div>
      <div class="kpi y"><div class="kpi-lbl">타임라인 범위</div><div class="kpi-val">${YEAR_START}–${YEAR_END}</div><div class="kpi-sub">5개년 계획</div></div>
      <div class="kpi p"><div class="kpi-lbl">착공 예정</div><div class="kpi-val">2029</div><div class="kpi-sub">공사 시작 연도</div></div>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-title">프로젝트 타임라인 <span class="chip">${data.length}단계</span></div>
        <span style="font-size:11px;color:var(--t3)">2026 · 2027 · 2028 · 2029 · 2030</span>
      </div>
      <div class="tl-wrap">
        ${yearRuler}
        ${gRows}
      </div>
    </div>`;

  // Animate bars
  requestAnimationFrame(() => {
    sec.querySelectorAll('[data-w]').forEach(el => {
      setTimeout(() => { el.style.width = el.dataset.w + '%'; }, 120);
    });
  });
}

/* ══════════════════════════════════════════════════════════════
   2. IRR — 두 주소 카드 + 공시지가 토지가격 + 전체 테이블
══════════════════════════════════════════════════════════════ */
function renderIRR(rows) {
  const sec = document.getElementById('sec-irr');
  if (!rows||rows.length<2) { sec.innerHTML=errHTML('데이터 없음'); return; }

  const hi = findHdrRow(rows);
  const hdr = rows[hi];
  const data = rows.slice(hi+1).filter(r=>r.some(c=>c));

  // ── 주소 컬럼 찾기 (주소|소재지|위치|address|물건)
  const addrIdx = hdr.findIndex(h=>/주소|소재지|위치|address|물건|대지/i.test(h));

  // ── IRR·수익률 컬럼
  const pctCols = hdr.map((h,i)=>({h,i})).filter(({h})=>/irr|수익률|yield|return|rate/i.test(h));
  // ── 금액 컬럼
  const amtCols = hdr.map((h,i)=>({h,i})).filter(({h})=>/금액|비용|투자|매출|revenue|cost|수입|지출|분양|매각/i.test(h));
  // ── 공시지가 컬럼
  const landPriceIdx = hdr.findIndex(h=>/공시지가|토지가|공시가/i.test(h));

  // ── 두 주소 그룹 분리
  // 주소 컬럼이 있으면 그룹핑, 없으면 데이터를 절반씩
  let groups = [];
  if (addrIdx >= 0) {
    const addrMap = {};
    data.forEach(r => {
      const addr = (r[addrIdx]||'').trim() || '기타';
      if (!addrMap[addr]) addrMap[addr] = [];
      addrMap[addr].push(r);
    });
    groups = Object.entries(addrMap).slice(0,2).map(([addr, rows]) => ({addr, rows}));
  }

  // 주소 구분이 안 될 경우 전체를 하나의 그룹으로
  if (!groups.length) {
    groups = [{ addr: '압구정로 112', rows: data.slice(0, Math.ceil(data.length/2)) },
              { addr: '압구정로8길 3', rows: data.slice(Math.ceil(data.length/2)) }];
  }
  if (groups.length === 1) {
    groups.push({ addr: '(데이터 없음)', rows: [] });
  }

  const ADDR_TAGS = ['tag-a','tag-b'];
  const ADDR_LABELS = ['A동','B동'];

  function buildAddrCard(g, idx) {
    const { addr, rows: gdata } = g;

    // IRR 값 계산
    let irrHtml = '<span class="ndash">—</span>';
    if (pctCols.length) {
      const c0 = pctCols[0];
      const vals = gdata.map(r=>parseFloat((r[c0.i]||'').replace(/[,%]/g,''))).filter(x=>!isNaN(x));
      if (vals.length) {
        const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
        const mx = Math.max(...vals), mn = Math.min(...vals);
        const cls = avg>0?'pos':avg<0?'neg':'neu';
        irrHtml = `<div class="irr-metric-val ${cls}">${avg.toFixed(2)}%</div>
          <div class="irr-metric-sub">최고 ${mx.toFixed(2)}% · 최저 ${mn.toFixed(2)}%</div>`;
      }
    }

    // 투자·수익 금액
    const metricBoxes = pctCols.slice(1,3).map((c,j) => {
      const vals = gdata.map(r=>parseFloat((r[c.i]||'').replace(/[,%]/g,''))).filter(x=>!isNaN(x));
      const av = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2) : null;
      const cls = ['ylw','neu'][j];
      return `<div class="irr-metric">
        <div class="irr-metric-lbl">${c.h}</div>
        <div class="irr-metric-val ${cls}">${av!==null?av+'%':'—'}</div>
        <div class="irr-metric-sub">${vals.length}건 평균</div>
      </div>`;
    }).join('');

    const amtBoxes = amtCols.slice(0,2).map((c,j) => {
      const vals = gdata.map(r=>parseAmt(r[c.i])).filter(x=>x>0);
      const s = vals.reduce((a,b)=>a+b,0);
      const cls = ['pos','neu'][j];
      return `<div class="irr-metric">
        <div class="irr-metric-lbl">${c.h}</div>
        <div class="irr-metric-val ${cls}">${s?fmtBig(s):'—'}</div>
        <div class="irr-metric-sub">${vals.length}건 합계</div>
      </div>`;
    }).join('');

    // 공시지가 반영 토지가격
    let landHtml = '';
    if (landPriceIdx >= 0) {
      const landVals = gdata.map(r=>parseAmt(r[landPriceIdx])).filter(x=>x>0);
      const landSum = landVals.reduce((a,b)=>a+b,0);
      if (landSum) {
        landHtml = `<div class="land-price-box">
          <div class="land-price-lbl">공시지가 반영 현재 토지 가격</div>
          <div class="land-price-val">${fmtBig(landSum)}원</div>
        </div>`;
      }
    } else {
      // 공시지가 컬럼이 없어도 UI 표시 (빈 값)
      landHtml = `<div class="land-price-box">
        <div class="land-price-lbl">공시지가 반영 현재 토지 가격</div>
        <div class="land-price-val" style="color:var(--t3)">시트에 공시지가 컬럼 추가 필요</div>
      </div>`;
    }

    // 상세 행 목록 (주요 컬럼 5개)
    const showCols = hdr.map((h,i)=>({h,i}))
      .filter(({h,i})=>i!==addrIdx && h && i<hdr.length)
      .slice(0,6);
    const detailRows = gdata.slice(0,5).map(r => {
      return `<div class="irr-row-item">
        ${showCols.map(c=>`<span class="irr-row-key" style="font-size:10px;color:var(--t3);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis">${c.h}</span>
        <span class="irr-row-val" style="flex:1;text-align:right">${r[c.i]||'—'}</span>`).slice(0,2).join('<span style="color:var(--border2);margin:0 6px">|</span>')}
      </div>`;
    }).join('');

    return `<div class="irr-addr-card">
      <div class="irr-addr-head">
        <div>
          <div class="irr-addr-title">
            <span>${addr}</span>
            <span class="irr-addr-tag ${ADDR_TAGS[idx]}">${ADDR_LABELS[idx]}</span>
          </div>
          <div class="irr-addr-sub">${gdata.length}건 데이터</div>
        </div>
      </div>
      <div class="irr-addr-body">
        <div class="irr-metrics">
          <div class="irr-metric">
            <div class="irr-metric-lbl">${pctCols[0]?.h||'IRR'}</div>
            ${irrHtml}
          </div>
          ${metricBoxes}${amtBoxes}
        </div>
        ${landHtml}
        ${gdata.length > 0 ? `
        <div class="irr-divider"></div>
        <div class="irr-rows-title">주요 항목 요약</div>
        ${detailRows}` : ''}
      </div>
    </div>`;
  }

  const addrCards = groups.slice(0,2).map((g,i) => buildAddrCard(g,i)).join('');

  // 전체 데이터 테이블
  CACHE['irr_cfn'] = null;
  initTS('irr'); TS['irr']={search:'',sortCol:-1,sortAsc:true,page:1};
  CACHE['irr'] = [hdr, ...data];

  sec.innerHTML = `
    <div class="notice">📡 구글 시트 실시간 연동 · 신축 IRR</div>
    <div class="irr-addr-grid">${addrCards}</div>
    <div class="irr-tbl-wrap">
      <div class="card-head" style="padding:12px 18px 12px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;border-bottom:none">
        <div style="font-size:12px;font-weight:600;color:var(--t2)">📋 전체 데이터 테이블</div>
      </div>
      <div id="irr-tbl"></div>
    </div>`;

  drawTable('irr', [hdr, ...data], 'irr-tbl');
}

/* ══════════════════════════════════════════════════════════════
   3. LEASE — 주소별 임대료 + 임차인 카드
══════════════════════════════════════════════════════════════ */
function renderLease(rows) {
  const sec = document.getElementById('sec-lease');
  if (!rows||rows.length<2) { sec.innerHTML=errHTML('데이터 없음'); return; }

  const hi = findHdrRow(rows);
  const hdr = rows[hi];
  const data = rows.slice(hi+1).filter(r=>r.some(c=>c));

  // ── 핵심 컬럼 인덱스
  const addrIdx    = hdr.findIndex(h=>/주소|소재지|위치|물건|건물|부동산/i.test(h));
  const nameIdx    = hdr.findIndex(h=>/임차인|사용자|회사|성명|이름|name|tenant/i.test(h));
  const rentIdx    = hdr.findIndex(h=>/월세|월임대료|임대료(?!보)|rent(?!al)/i.test(h));
  const depositIdx = hdr.findIndex(h=>/보증금|deposit/i.test(h));
  const landRentIdx= hdr.findIndex(h=>/토지임대료|토지료|지대/i.test(h));
  const statusIdx  = hdr.findIndex(h=>/상태|계약|현황|status/i.test(h));
  const startIdx   = hdr.findIndex(h=>/시작|계약시작|임대시작|from|start/i.test(h));
  const endIdx     = hdr.findIndex(h=>/종료|만료|계약종료|to|end/i.test(h));

  // ── 두 주소 정의 (시트에 있는 주소 컬럼 기준)
  const KNOWN_ADDRS = ['압구정로112', '압구정로8길3', '압구정로 112', '압구정로8길 3'];
  const ADDR_DISPLAY = ['압구정로 112', '압구정로8길 3'];

  // 주소 그룹핑
  function normalizeAddr(s) {
    return String(s||'').replace(/\s/g,'');
  }

  let addrGroups = {};
  if (addrIdx >= 0) {
    data.forEach(r => {
      const raw = (r[addrIdx]||'').trim();
      const norm = normalizeAddr(raw);
      // 어느 known addr에 속하는지 체크
      let key = raw;
      if (/압구정로8길/.test(norm)) key = ADDR_DISPLAY[1];
      else if (/압구정로/.test(norm)) key = ADDR_DISPLAY[0];
      if (!addrGroups[key]) addrGroups[key] = [];
      addrGroups[key].push(r);
    });
  } else {
    // 주소 컬럼 없으면 반으로
    const half = Math.ceil(data.length/2);
    addrGroups[ADDR_DISPLAY[0]] = data.slice(0, half);
    addrGroups[ADDR_DISPLAY[1]] = data.slice(half);
  }

  // 두 known addr 우선 정렬
  const groupEntries = [
    [ADDR_DISPLAY[0], addrGroups[ADDR_DISPLAY[0]]||[]],
    [ADDR_DISPLAY[1], addrGroups[ADDR_DISPLAY[1]]||[]],
    ...Object.entries(addrGroups).filter(([k])=>!ADDR_DISPLAY.includes(k))
  ].filter(([,v])=>v&&v.length);

  const totalContracts = data.length;
  const statusCounts = {active:0, expire:0, warn:0};
  if (statusIdx>=0) {
    data.forEach(r=>{
      const v=(r[statusIdx]||'').trim();
      if(/유효|계약중|활성|진행/i.test(v)) statusCounts.active++;
      else if(/만료|종료|해지/i.test(v)) statusCounts.expire++;
      else if(/예정|임박|주의/i.test(v)) statusCounts.warn++;
    });
  }

  // ── 임차인 카드 빌더
  function buildTenantCard(r, idx) {
    const name = nameIdx>=0 ? (r[nameIdx]||'임차인 '+(idx+1)) : '임차인 '+(idx+1);
    const rent = rentIdx>=0 ? parseAmt(r[rentIdx]) : 0;
    const deposit = depositIdx>=0 ? parseAmt(r[depositIdx]) : 0;
    const landRent = landRentIdx>=0 ? parseAmt(r[landRentIdx]) : 0;
    const status = statusIdx>=0 ? (r[statusIdx]||'') : '';
    const startDate = startIdx>=0 ? (r[startIdx]||'') : '';
    const endDate   = endIdx>=0   ? (r[endIdx]||'')   : '';

    const statusBadge = (() => {
      if (/유효|계약중|활성|진행/i.test(status)) return `<span class="sbadge sb-active">${status||'유효'}</span>`;
      if (/만료|종료|해지/i.test(status)) return `<span class="sbadge sb-expire">${status||'만료'}</span>`;
      if (/예정|임박|주의/i.test(status)) return `<span class="sbadge sb-warn">${status||'주의'}</span>`;
      return status ? `<span class="sbadge sb-neutral">${status}</span>` : '';
    })();

    // 나머지 컬럼들 (주요 표시 외 컬럼)
    const extraCols = hdr.map((h,i)=>({h,i})).filter(({i})=>
      ![addrIdx, nameIdx, rentIdx, depositIdx, landRentIdx, statusIdx, startIdx, endIdx].includes(i)
    ).slice(0,4);

    const extraRows = extraCols.map(c => {
      const v = r[c.i];
      if (!v) return '';
      return `<div class="tenant-row">
        <span class="tenant-key">${c.h}</span>
        <span class="tenant-val">${v}</span>
      </div>`;
    }).filter(Boolean).join('');

    return `<div class="tenant-card">
      <div class="tenant-card-head">
        <div class="tenant-name">${name}</div>
        <div>${statusBadge}</div>
      </div>
      <div class="tenant-card-body">
        ${rent ? `<div class="tenant-row"><span class="tenant-key">월 임대료</span><span class="tenant-val pos">${fmtBig(rent)}원</span></div>` : ''}
        ${deposit ? `<div class="tenant-row"><span class="tenant-key">보증금</span><span class="tenant-val">${fmtBig(deposit)}원</span></div>` : ''}
        ${landRent ? `<div class="tenant-row"><span class="tenant-key">토지임대료</span><span class="tenant-val warn">${fmtBig(landRent)}원</span></div>` : ''}
        ${startDate ? `<div class="tenant-row"><span class="tenant-key">계약 시작</span><span class="tenant-val">${startDate}</span></div>` : ''}
        ${endDate ? `<div class="tenant-row"><span class="tenant-key">계약 종료</span><span class="tenant-val ${/만료|종료/i.test(status)?'exp':''}">${endDate}</span></div>` : ''}
        ${extraRows}
      </div>
    </div>`;
  }

  // ── 주소별 섹션 빌더
  function buildAddrSection(addr, gdata, idx) {
    const totalRent    = gdata.map(r=>rentIdx>=0?parseAmt(r[rentIdx]):0).filter(x=>x>0).reduce((a,b)=>a+b,0);
    const totalDeposit = gdata.map(r=>depositIdx>=0?parseAmt(r[depositIdx]):0).filter(x=>x>0).reduce((a,b)=>a+b,0);
    const totalLand    = gdata.map(r=>landRentIdx>=0?parseAmt(r[landRentIdx]):0).filter(x=>x>0).reduce((a,b)=>a+b,0);

    const colors = [
      {head:'rgba(34,209,134,.15)',border:'rgba(34,209,134,.2)'},
      {head:'rgba(59,127,255,.15)',border:'rgba(59,127,255,.2)'}
    ];
    const c = colors[idx%2];

    const tenantCards = gdata.map((r,i)=>buildTenantCard(r,i)).join('');

    return `<div class="lease-section">
      <div class="lease-section-head" style="background:${c.head};border-color:${c.border}">
        <div style="width:4px;height:24px;border-radius:2px;background:${idx===0?'var(--green)':'var(--blue)'};flex-shrink:0"></div>
        <div>
          <div class="lease-section-addr">${addr}</div>
          <div class="lease-section-meta">${gdata.length}건 계약</div>
        </div>
      </div>
      <div class="lease-kpi-row">
        <div class="lease-kpi-cell lkpi-rent">
          <div class="lease-kpi-lbl">월 임대료 합계</div>
          <div class="lease-kpi-val">${totalRent?fmtBig(totalRent)+'원':'—'}</div>
          <div class="lease-kpi-sub">월 기준</div>
        </div>
        <div class="lease-kpi-cell lkpi-deposit">
          <div class="lease-kpi-lbl">보증금 합계</div>
          <div class="lease-kpi-val">${totalDeposit?fmtBig(totalDeposit)+'원':'—'}</div>
          <div class="lease-kpi-sub">합산</div>
        </div>
        <div class="lease-kpi-cell lkpi-land">
          <div class="lease-kpi-lbl">토지임대료 합계</div>
          <div class="lease-kpi-val">${totalLand?fmtBig(totalLand)+'원':'—'}</div>
          <div class="lease-kpi-sub">월 기준</div>
        </div>
      </div>
      <div class="tenant-grid">${tenantCards||'<div class="empty"><div class="empty-i">📭</div>임차인 데이터 없음</div>'}</div>
    </div>`;
  }

  // status 배지 패치
  const pRows = [hdr, ...data.map(r=>{
    if (statusIdx<0) return r;
    const pr=[...r], v=(pr[statusIdx]||'').trim();
    if(/유효|계약중|활성|진행/i.test(v)) pr[statusIdx]=`__SB_active__${v}`;
    else if(/만료|종료|해지/i.test(v)) pr[statusIdx]=`__SB_expire__${v}`;
    else if(/예정|임박|주의/i.test(v)) pr[statusIdx]=`__SB_warn__${v}`;
    return pr;
  })];
  const cfn = v => {
    if (!v) return '<span class="ndash">—</span>';
    const m=String(v).match(/^__SB_(\w+)__(.*)$/);
    if (m) return `<span class="sbadge sb-${m[1]}">${m[2]}</span>`;
    return fc(v);
  };
  CACHE['lease'] = pRows;
  CACHE['lease_cfn'] = cfn;
  initTS('lease'); TS['lease']={search:'',sortCol:-1,sortAsc:true,page:1};

  const addrSections = groupEntries.map(([addr, gdata], i) => buildAddrSection(addr, gdata, i)).join('');

  const totalRentAll = data.map(r=>rentIdx>=0?parseAmt(r[rentIdx]):0).filter(x=>x>0).reduce((a,b)=>a+b,0);
  const totalDepAll  = data.map(r=>depositIdx>=0?parseAmt(r[depositIdx]):0).filter(x=>x>0).reduce((a,b)=>a+b,0);

  sec.innerHTML = `
    <div class="notice">📡 구글 시트 실시간 연동 · 임대차계약현황</div>
    <div class="kpi-row">
      <div class="kpi b"><div class="kpi-lbl">총 계약 건수</div><div class="kpi-val">${totalContracts}</div><div class="kpi-sub">임대차 계약</div></div>
      ${statusCounts.active?`<div class="kpi g"><div class="kpi-lbl">계약 유효</div><div class="kpi-val">${statusCounts.active}</div><div class="kpi-sub">진행중</div></div>`:''}
      ${statusCounts.expire?`<div class="kpi r"><div class="kpi-lbl">만료 / 종료</div><div class="kpi-val">${statusCounts.expire}</div><div class="kpi-sub">종료된 계약</div></div>`:''}
      ${statusCounts.warn?`<div class="kpi y"><div class="kpi-lbl">주의 필요</div><div class="kpi-val">${statusCounts.warn}</div><div class="kpi-sub">임박 / 예정</div></div>`:''}
      ${totalRentAll?`<div class="kpi g"><div class="kpi-lbl">월 임대료 총합</div><div class="kpi-val">${fmtBig(totalRentAll)}원</div><div class="kpi-sub">전체 합산</div></div>`:''}
      ${totalDepAll?`<div class="kpi y"><div class="kpi-lbl">보증금 총합</div><div class="kpi-val">${fmtBig(totalDepAll)}원</div><div class="kpi-sub">전체 합산</div></div>`:''}
    </div>

    ${addrSections}

    <div style="margin-top:28px">
      <div class="card-head" style="padding:12px 18px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;border-bottom:none">
        <div style="font-size:12px;font-weight:600;color:var(--t2)">📋 전체 계약 데이터 테이블</div>
        <input class="search" placeholder="검색…" oninput="tSearch('lease','lease-tbl-full',this.value)">
      </div>
      <div id="lease-tbl-full"></div>
    </div>`;

  drawTable('lease', pRows, 'lease-tbl-full', cfn);
}

/* ── 4 & 5. COST ────────────────────────────────────────────── */
function renderCost(k, rows) {
  const sec = document.getElementById(`sec-${k}`);
  if (!rows||rows.length<2) { sec.innerHTML=errHTML('데이터 없음'); return; }

  const hi = findHdrRow(rows);
  const hdr = rows[hi];
  const data = rows.slice(hi+1).filter(r=>r.some(c=>c));

  const preferCols = hdr.map((h,i)=>({h,i})).filter(({h})=>/금액|비용|합계|총액|cost|amount|total/i.test(h));
  const nc = (preferCols.length ? preferCols : numCols(hdr,data)).slice(0,4);

  const cards = nc.map((c,i)=>{
    const vals=data.map(r=>parseFloat((r[c.i]||'').replace(/[,\s₩원]/g,''))).filter(x=>!isNaN(x));
    if (!vals.length) return '';
    const s=vals.reduce((a,b)=>a+b,0), avg=s/vals.length;
    return `<div class="kpi ${['b','g','y','p'][i]}">
      <div class="kpi-lbl">${c.h}</div>
      <div class="kpi-val">${fmtBig(s)}</div>
      <div class="kpi-sub">평균 ${fmtBig(avg)} · ${vals.length}건</div>
    </div>`;
  }).filter(Boolean).join('');

  CACHE[k+'_cfn'] = null;
  initTS(k); TS[k]={search:'',sortCol:-1,sortAsc:true,page:1};

  sec.innerHTML = `
    <div class="notice">📡 구글 시트 실시간 연동 · ${TABS[k].label}</div>
    ${cards?`<div class="kpi-row">${cards}</div>`:''}
    <div id="${k}-tbl"></div>`;

  drawTable(k, rows, `${k}-tbl`);
}

/* ══ LOAD / ROUTE ════════════════════════════════════════════════ */
function showLoader(id) {
  document.getElementById(id).innerHTML=`<div class="loader"><div class="ring"></div><p>데이터 불러오는 중…</p></div>`;
}
function stamp() {
  document.getElementById('syncTime').textContent = new Date().toLocaleTimeString('ko-KR');
}

async function load(k) {
  showLoader(`sec-${k}`);
  try {
    const rows = await fetchSheet(k);
    CACHE[k] = rows;
    if (k==='timeline') renderTimeline(rows);
    else if (k==='irr') renderIRR(rows);
    else if (k==='lease') renderLease(rows);
    else renderCost(k, rows);
    stamp();
  } catch(e) {
    document.getElementById(`sec-${k}`).innerHTML = errHTML(e.message);
  }
}

function go(k, btn) {
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById(`sec-${k}`).classList.add('on');
  CUR = k;
  if (!LOADED.has(k)) { LOADED.add(k); load(k); }
}

async function refreshCurrent() {
  const btn = document.getElementById('btnRef');
  btn.classList.add('spin');
  LOADED.delete(CUR);
  await load(CUR);
  LOADED.add(CUR);
  btn.classList.remove('spin');
}

/* ══ INIT ════════════════════════════════════════════════════════ */
LOADED.add('timeline');
load('timeline');
setInterval(()=>{ LOADED.delete(CUR); load(CUR); }, 5*60*1000);
</script>
