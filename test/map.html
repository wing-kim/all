<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BLUEPICA — 통합 상권맵</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08090d;--s1:#0f1118;--s2:#151821;--s3:#1c2030;
  --border:#222636;--border2:#2a3050;
  --blue:#3b7fff;--green:#22d186;--red:#f03860;--orange:#f97316;
  --t1:#eef0f8;--t2:#8890aa;--t3:#4a5270;
  --mono:'DM Mono',monospace;--sans:'Noto Sans KR',sans-serif;--disp:'Bebas Neue',sans-serif;
  --r:8px;--r2:6px;--panel:380px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--sans)}

/* ── 지도 ── */
#map{position:fixed;inset:0;z-index:0}

/* ── 탑바 ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:52px;background:rgba(8,9,13,.88);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
}
.brand-name{font-family:var(--disp);font-size:22px;letter-spacing:2px;color:var(--t1)}
.brand-sub{font-size:9px;color:var(--t3);letter-spacing:1.5px;font-family:var(--mono);margin-top:-2px}
.topbar-r{display:flex;align-items:center;gap:10px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-back{
  font-family:var(--mono);font-size:11px;color:var(--t2);
  background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);
  padding:5px 12px;cursor:pointer;text-decoration:none;transition:.15s;
}
.btn-back:hover{color:var(--t1);border-color:var(--blue)}

/* ── 패널 ── */
.panel{
  position:fixed;top:52px;right:0;bottom:0;z-index:50;
  width:var(--panel);
  background:rgba(10,11,16,.94);backdrop-filter:blur(14px);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.panel-head{padding:16px 16px 0;flex-shrink:0}
.panel-title{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:2px}
.panel-sub{font-size:11px;color:var(--t3)}

/* ── 탭 ── */
.tab-row{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;margin-top:12px}
.tab-btn{
  flex:1;padding:10px 0;font-size:12px;font-weight:700;color:var(--t3);
  background:none;border:none;cursor:pointer;transition:.15s;font-family:var(--sans);
  border-bottom:2px solid transparent;margin-bottom:-1px;
}
.tab-btn.on{color:var(--blue);border-bottom-color:var(--blue)}

/* ── 탭 콘텐츠 ── */
.tab-pane{display:none;flex:1;overflow-y:auto;padding:14px 14px 80px}
.tab-pane.on{display:block}
.tab-pane::-webkit-scrollbar{width:3px}
.tab-pane::-webkit-scrollbar-track{background:transparent}
.tab-pane::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── 섹션 타이틀 ── */
.sec-title{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}

/* ── 임대건물 탭 ── */
.layer-toggle{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
  padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:.15s;
}
.layer-toggle:hover{border-color:var(--border2)}
.lt-left{display:flex;align-items:center;gap:10px}
.lt-icon{font-size:18px}
.lt-name{font-size:13px;font-weight:700;color:var(--t1)}
.lt-desc{font-size:10px;color:var(--t3);margin-top:1px}
.toggle-sw{
  width:36px;height:20px;border-radius:10px;background:var(--s3);border:1px solid var(--border2);
  position:relative;transition:.2s;flex-shrink:0;
}
.toggle-sw.on{background:var(--blue);border-color:var(--blue)}
.toggle-sw::after{
  content:'';position:absolute;top:2px;left:2px;
  width:14px;height:14px;border-radius:50%;background:#fff;
  transition:.2s;
}
.toggle-sw.on::after{left:18px}

.bldg-count{font-family:var(--mono);font-size:10px;color:var(--t3);margin-bottom:12px;padding:6px 10px;background:var(--s2);border-radius:var(--r2)}
.bldg-count span{color:var(--green);font-weight:600}

/* 건물 목록 */
.bldg-list{display:flex;flex-direction:column;gap:6px}
.bldg-item{
  background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
  padding:10px 12px;cursor:pointer;transition:.15s;
}
.bldg-item:hover,.bldg-item.active{border-color:var(--blue);background:rgba(59,127,255,.06)}
.bldg-item.ours{border-color:rgba(245,188,48,.4);background:rgba(245,188,48,.04)}
.bi-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.bi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bi-name{font-size:12px;font-weight:700;color:var(--t1);flex:1}
.bi-dist{font-family:var(--mono);font-size:10px;color:var(--t3)}
.bi-addr{font-size:10.5px;color:var(--t3);margin-bottom:5px}
.bi-tags{display:flex;flex-wrap:wrap;gap:3px}
.bi-tag{font-size:9.5px;padding:2px 7px;border-radius:10px;border:1px solid;font-weight:600}

/* ── 인프라 탭 ── */
.addr-row{display:flex;gap:6px;margin-bottom:8px}
.addr-input{
  flex:1;background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);
  padding:9px 12px;font-size:12px;color:var(--t1);font-family:var(--sans);outline:none;transition:.15s;
}
.addr-input:focus{border-color:var(--blue)}
.addr-input::placeholder{color:var(--t3)}
.btn-geo{
  background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);
  padding:9px 12px;font-size:11px;font-weight:700;color:var(--blue);
  cursor:pointer;transition:.15s;font-family:var(--sans);white-space:nowrap;
}
.btn-geo:hover{border-color:var(--blue);background:rgba(59,127,255,.1)}

.radius-row{display:flex;gap:5px;margin-bottom:14px}
.r-chip{
  flex:1;text-align:center;padding:7px 0;border-radius:16px;font-size:11px;font-weight:700;
  background:var(--s2);border:1px solid var(--border);color:var(--t3);cursor:pointer;transition:.15s;
}
.r-chip.on{background:rgba(59,127,255,.15);border-color:var(--blue);color:var(--blue)}

.cat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cat-reset{font-size:10px;color:var(--t3);cursor:pointer;transition:.15s}
.cat-reset:hover{color:var(--blue)}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:14px}
.cat-item{
  background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);
  padding:8px 6px;cursor:pointer;transition:.15s;text-align:center;position:relative;
}
.cat-item.on{background:rgba(59,127,255,.1);border-color:rgba(59,127,255,.4)}
.cat-check{
  position:absolute;top:4px;right:4px;font-size:8px;font-weight:700;
  color:var(--blue);opacity:0;transition:.1s;
}
.cat-item.on .cat-check{opacity:1}
.cat-emoji{font-size:16px;margin-bottom:2px}
.cat-name{font-size:9.5px;color:var(--t2);font-weight:600}
.cat-cnt{font-family:var(--mono);font-size:8.5px;color:var(--green);display:block;margin-top:1px;min-height:11px}

.btn-run{
  width:100%;padding:13px;border-radius:var(--r);border:none;cursor:pointer;
  background:var(--blue);color:#fff;font-size:13px;font-weight:700;
  font-family:var(--sans);transition:.15s;margin-bottom:12px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-run:hover{background:#2f6de0}
.btn-run:disabled{opacity:.5;cursor:not-allowed}

.result-wrap{flex:1;overflow-y:auto}
.result-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px;color:var(--t3);text-align:center;gap:10px;font-size:12px;line-height:1.7;
}
.e-ico{font-size:28px}
.result-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 0;margin-bottom:6px;
}
.result-count{font-size:12px;color:var(--t2)}
.result-count span{color:var(--green);font-weight:700;font-family:var(--mono)}
.btn-sel-all{
  font-size:10px;color:var(--t3);background:var(--s2);border:1px solid var(--border);
  border-radius:var(--r2);padding:4px 9px;cursor:pointer;font-family:var(--sans);transition:.15s;
}
.btn-sel-all:hover{color:var(--t1);border-color:var(--border2)}
.result-list{list-style:none}
.result-item{
  display:flex;align-items:center;gap:8px;padding:8px 10px;
  border-radius:var(--r2);cursor:pointer;transition:.12s;margin-bottom:3px;
  border:1px solid transparent;
}
.result-item:hover{background:var(--s2);border-color:var(--border)}
.result-item.selected{background:rgba(59,127,255,.08);border-color:rgba(59,127,255,.3)}
.ri-chk{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;transition:.12s}
.result-item.selected .ri-chk{background:var(--blue);border-color:var(--blue)}
.ri-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ri-info{flex:1;min-width:0}
.ri-name{font-size:12px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-cat{font-size:10px;color:var(--t3)}
.ri-dist{font-family:var(--mono);font-size:10px;color:var(--t3);flex-shrink:0}

.export-bar{
  position:sticky;bottom:0;background:var(--s1);border-top:1px solid var(--border);
  padding:10px 14px;display:flex;align-items:center;gap:8px;
}
.export-bar.hidden{display:none}
.export-sel-cnt{font-family:var(--mono);font-size:11px;color:var(--t2);flex:1}
.btn-export-all,.btn-export-sel{
  font-size:10px;font-weight:700;padding:6px 12px;border-radius:var(--r2);
  cursor:pointer;border:1px solid;font-family:var(--sans);transition:.15s;
}
.btn-export-all{background:transparent;border-color:var(--border2);color:var(--t2)}
.btn-export-all:hover{border-color:var(--blue);color:var(--blue)}
.btn-export-sel{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-export-sel:disabled{opacity:.4;cursor:not-allowed}

/* ── 범례 ── */
.legend-box{
  position:fixed;bottom:16px;left:16px;z-index:60;
  background:rgba(10,11,16,.9);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;
  min-width:150px;
}
.legend-box.hidden{display:none}
.leg-title{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:11px}
.leg-item:last-child{margin-bottom:0}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-name{color:var(--t2);flex:1}
.leg-cnt{font-family:var(--mono);font-size:10px;color:var(--t3)}

/* ── 건물 팝업 (카카오 인포윈도우) ── */
.bldg-popup{
  font-family:'Noto Sans KR',sans-serif;
  min-width:200px;max-width:260px;
  background:#0f1118;border-radius:8px;overflow:hidden;
}
.bp-head{padding:12px 14px 8px;border-bottom:1px solid #222636}
.bp-tag{font-size:9px;font-weight:700;color:#f5bc30;letter-spacing:1px;margin-bottom:4px}
.bp-name{font-size:14px;font-weight:700;color:#eef0f8}
.bp-addr{font-size:10.5px;color:#4a5270;margin-top:3px}
.bp-body{padding:8px 14px 12px}
.bp-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #151821}
.bp-row:last-child{border-bottom:none}
.bp-label{font-size:10px;color:#4a5270}
.bp-val{font-size:11px;font-weight:600;color:#8890aa;font-family:'DM Mono',monospace}
.bp-tenants{margin-top:6px}
.bp-tenant-row{font-size:10.5px;color:#8890aa;padding:3px 0;display:flex;gap:6px}
.bp-tenant-floor{color:#4a5270;width:28px;flex-shrink:0}
.bp-tenant-name{color:#eef0f8;font-weight:600}
.bp-tenant-type{color:#4a5270;font-size:9.5px}

/* ── 버전 배지 ── */
.ver-badge{
  position:fixed;bottom:12px;right:calc(var(--panel) + 12px);z-index:60;
  font-family:var(--mono);font-size:9px;color:var(--t3);
  background:rgba(10,11,16,.8);border:1px solid var(--border);
  border-radius:4px;padding:3px 7px;
}

/* ── 모바일 ── */
@media(max-width:640px){
  :root{--panel:100%}
  .panel{top:auto;bottom:0;left:0;right:0;height:55vh;border-left:none;border-top:1px solid var(--border);border-radius:14px 14px 0 0}
  .ver-badge{right:12px;bottom:calc(55vh + 8px)}
}
</style>
</head>
<body>

<!-- 지도 -->
<div id="map"></div>

<!-- 탑바 -->
<div class="topbar">
  <div>
    <div class="brand-name">BLUEPICA</div>
    <div class="brand-sub">INTEGRATED MAP</div>
  </div>
  <div class="topbar-r">
    <div class="sync-dot"></div>
    <a href="index.html" class="btn-back">← 허브로</a>
  </div>
</div>

<!-- 우측 패널 -->
<div class="panel" id="mainPanel">
  <div class="panel-head">
    <div class="panel-title">🗺️ 통합 상권맵</div>
    <div class="panel-sub">임대건물 + 실시간 인프라 분석</div>
  </div>

  <!-- 탭 -->
  <div class="tab-row">
    <button class="tab-btn on" id="tab-bldg" onclick="switchTab('bldg')">🏢 임대건물</button>
    <button class="tab-btn" id="tab-infra" onclick="switchTab('infra')">📍 인프라</button>
  </div>

  <!-- ── 임대건물 탭 ── -->
  <div class="tab-pane on" id="pane-bldg">
    <div style="margin-bottom:12px">
      <div class="layer-toggle" onclick="toggleBldgLayer()">
        <div class="lt-left">
          <div class="lt-icon">🏢</div>
          <div>
            <div class="lt-name">임대건물 레이어</div>
            <div class="lt-desc">Google Sheets CSV 실시간 연동</div>
          </div>
        </div>
        <div class="toggle-sw on" id="bldgToggleSw"></div>
      </div>
    </div>
    <div class="bldg-count" id="bldgCount">로딩 중…</div>
    <div class="sec-title">건물 목록</div>
    <div class="bldg-list" id="bldgList">
      <div class="result-empty"><div class="e-ico">⏳</div><div>데이터 로딩 중…</div></div>
    </div>
  </div>

  <!-- ── 인프라 탭 ── -->
  <div class="tab-pane" id="pane-infra">
    <!-- 위치 및 반경 -->
    <div class="sec-title">위치 및 반경</div>
    <div class="addr-row">
      <input class="addr-input" id="addrInput" type="text" placeholder="주소 입력 후 Enter" autocomplete="off">
      <button class="btn-geo" id="btnGeo" onclick="geocodeAddress()">📍 설정</button>
    </div>
    <div class="radius-row" id="radiusRow">
      <div class="r-chip" data-r="500" onclick="setRadius(500)">500m</div>
      <div class="r-chip on" data-r="1000" onclick="setRadius(1000)">1km</div>
      <div class="r-chip" data-r="2000" onclick="setRadius(2000)">2km</div>
      <div class="r-chip" data-r="3000" onclick="setRadius(3000)">3km</div>
    </div>

    <!-- 카테고리 -->
    <div class="cat-top">
      <div class="sec-title" style="margin-bottom:0">카테고리</div>
      <span class="cat-reset" onclick="toggleAllCats()">전체 토글</span>
    </div>
    <div class="cat-grid" id="catGrid"></div>

    <!-- 검색 버튼 -->
    <button class="btn-run" id="btnRun" onclick="runSearch()">
      <span id="runIco">🔍</span>
      <span id="runTxt">인프라 검색</span>
    </button>

    <!-- 결과 -->
    <div class="result-wrap" id="resultWrap">
      <div class="result-empty">
        <div class="e-ico">🗺️</div>
        <div>카테고리를 선택 후<br>검색하세요</div>
      </div>
    </div>

    <!-- 추출 바 -->
    <div class="export-bar hidden" id="exportBar">
      <div class="export-sel-cnt"><span id="selCnt">0</span>개 선택됨</div>
      <button class="btn-export-all" onclick="exportCSV(false)">전체 CSV</button>
      <button class="btn-export-sel" id="btnExportSel" onclick="exportCSV(true)" disabled>선택 추출</button>
    </div>
  </div>
</div>

<!-- 범례 -->
<div class="legend-box hidden" id="legendBox">
  <div class="leg-title">범례</div>
  <div id="legendItems"></div>
</div>

<!-- 버전 배지 -->
<div class="ver-badge">v0624.1200</div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const OUR_LAT = 37.5232, OUR_LNG = 127.0212;
const MAP_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSqODQv0J98AN_VrhIpdXr8pUYfcgEH_2Fvxfgq_g0z3sCR49t0heYBC0k4Za3hxQiAr9bwVNRtWGxe/pub?gid=1985638477&single=true&output=csv';

const CATEGORIES = [
  { id:'SW8', name:'지하철역',  emoji:'🚇', color:'#3b7fff' },
  { id:'HP8', name:'병원',      emoji:'🏥', color:'#f03860' },
  { id:'PM9', name:'약국',      emoji:'💊', color:'#ff6b9d' },
  { id:'BK9', name:'은행',      emoji:'🏦', color:'#f5bc30' },
  { id:'MT1', name:'대형마트',  emoji:'🛒', color:'#22d186' },
  { id:'CS2', name:'편의점',    emoji:'🏪', color:'#00d4ff' },
  { id:'CE7', name:'카페',      emoji:'☕', color:'#9060f0' },
  { id:'PS3', name:'어린이집',  emoji:'🧒', color:'#ffa94d' },
  { id:'PK6', name:'주차장',    emoji:'🅿️', color:'#748ffc' },
  { id:'AG2', name:'부동산',    emoji:'🏠', color:'#63e6be' },
  { id:'OL7', name:'주유소',    emoji:'⛽', color:'#f07830' },
  { id:'AC5', name:'숙박',      emoji:'🏨', color:'#c084fc' },
];

const TYPES = {
  'F&B/음식점':'#ef4444','병원/의료':'#06b6d4','뷰티/미용':'#ec4899',
  '사무실/기업':'#3b82f6','학원/교육':'#f59e0b','패션/잡화':'#8b5cf6',
  '스포츠/레저':'#10b981','약국':'#f97316','편의점':'#6b7280',
  '공유오피스':'#0ea5e9','스튜디오/공간':'#a855f7','카페':'#92400e',
  '주점/노래방':'#be185d','기타':'#64748b',
};

const OUR_BUILDING = {
  id:'ours', isOurs:true,
  name:'케이프혼타워 (신축예정)', short:'우리건물',
  address:'서울 강남구 압구정로 112',
  lat:OUR_LAT, lng:OUR_LNG,
  price:null, dong:'신사동', distance:'core', tenants:[]
};

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let map, ps, infowindow;
let currentLat = OUR_LAT, currentLng = OUR_LNG;
let currentRadius = 1000;
let activeCats = new Set(CATEGORIES.map(c => c.id));
let infraMarkers = [], overlays = [], circles = [];

window.initKakaoMap = function() {
  kakao.maps.load(() => {
    const container = document.getElementById('map');
    map = new kakao.maps.Map(container, {
      center: new kakao.maps.LatLng(OUR_LAT, OUR_LNG),
      level: 4
    });
    map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.BOTTOMLEFT);
    ps = new kakao.maps.services.Places();
    infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

    placeCenterMarker(OUR_LAT, OUR_LNG);
    drawCircle(OUR_LAT, OUR_LNG, currentRadius);
    buildCatGrid();
    bindEnterKey();

    // 임대건물 CSV 로드

// 기준 마커 (케이프혼타워)
// ══════════════════════════════════════════════
function placeCenterMarker(lat, lng) {
  if (centerMarker) centerMarker.setMap(null);
  const pos = new kakao.maps.LatLng(lat, lng);
  const content = `<div style="width:22px;height:22px;border-radius:50%;background:#f5bc30;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.6);transform:translateX(-50%) translateY(-50%);cursor:pointer;position:relative;">
    <span style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:10px;">⭐</span>
  </div>`;
  centerMarker = new kakao.maps.CustomOverlay({ position:pos, content, zIndex:9999 });
  centerMarker.setMap(map);
}

// ══════════════════════════════════════════════
// 반경 원
// ══════════════════════════════════════════════
function drawCircle(lat, lng, r) {
  circles.forEach(c => c.setMap(null)); circles = [];
  const c = new kakao.maps.Circle({
    center: new kakao.maps.LatLng(lat, lng), radius: r,
    strokeWeight:1.5, strokeColor:'#3b7fff', strokeOpacity:.5,
    strokeStyle:'shortdash', fillColor:'#3b7fff', fillOpacity:.03
  });
  c.setMap(map); circles.push(c);
}

function setRadius(r) {
  currentRadius = r;
  document.querySelectorAll('.r-chip').forEach(el => el.classList.toggle('on', el.dataset.r == r));
  drawCircle(currentLat, currentLng, r);
}

// ══════════════════════════════════════════════
// 임대건물 CSV 로드
// ══════════════════════════════════════════════
async function loadBldgData() {
  const countEl = document.getElementById('bldgCount');
  const listEl = document.getElementById('bldgList');
  try {
    const res = await fetch(MAP_SHEET_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    const valid = rowsToBuildings(rows);
    buildings = [OUR_BUILDING, ...valid];
    countEl.innerHTML = `총 <span>${valid.length}</span>개 건물 로드됨`;
    if (bldgVisible) renderBldgMarkers();
    renderBldgList();
  } catch(e) {
    countEl.innerHTML = `<span style="color:#f03860">로드 실패</span> — 시트 확인 필요`;
    listEl.innerHTML = `<div class="result-empty"><div class="e-ico">⚠️</div><div>데이터를 불러오지 못했습니다</div></div>`;
  }
}

function parseCSV(text) {
  text = text.replace(/^\uFEFF/, '');
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',').map(h => h.replace(/^["'\s\uFEFF]+|["'\s]+$/g,'').trim());
  return lines.slice(1).map(line => {
    const vals=[]; let cur='', inQ=false;
    for(const ch of line){
      if(ch==='"') inQ=!inQ;
      else if(ch===','&&!inQ){ vals.push(cur.trim()); cur=''; }
      else cur+=ch;
    }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i) => { obj[h]=(vals[i]||'').replace(/^"|"$/g,''); });
    return obj;
  }).filter(r => r['건물명']&&r['건물명'].trim());
}

function calcDist(lat1,lng1,lat2,lng2){
  const R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function normalizeType(raw){
  if(!raw) return '기타';
  const t=raw.trim();
  const map={
    '음식점':'F&B/음식점','고기요리':'F&B/음식점','카페':'카페',
    '병원':'병원/의료','치과':'병원/의료','한의원':'병원/의료',
    '피부과':'병원/의료','성형외과':'병원/의료','통증의학과':'병원/의료',
    '미용실':'뷰티/미용','네일아트':'뷰티/미용','에스테틱':'뷰티/미용',
    '사무실':'사무실/기업','경영컨설팅':'사무실/기업','업무시설':'사무실/기업',
    '학원':'학원/교육','약국':'약국','편의점':'편의점',
    '공유오피스':'공유오피스','스튜디오':'스튜디오/공간',
    '근린생활':'기타','공실':'기타',
  };
  return map[t]||t||'기타';
}

function rowsToBuildings(rows){
  const bmap={};
  rows.forEach(row => {
    const key=row['건물명'].trim();
    if(!bmap[key]){
      const lat=parseFloat(row['위도'])||0, lng=parseFloat(row['경도'])||0;
      const dist=lat&&lng ? calcDist(OUR_LAT,OUR_LNG,lat,lng) : 9999;
      const distance=dist<300?'core':dist<700?'mid':'far';
      bmap[key]={
        id:key.replace(/[^\w가-힣]/g,'_'),
        name:row['건물명'], short:row['건물명'].length>6?row['건물명'].slice(0,6):row['건물명'],
        address:row['주소']||'', lat, lng,
        price:(row['매매가(억)']||row['매매가 (억)']||'').trim()||null,
        dong:row['동']||'기타', distance,
        builtYear:parseInt(row['준공년도']||'0')||0,
        elevator:row['승강기']||'', parking:row['주차대수']||'',
        tenants:[]
      };
    }
    if(row['임차인']&&row['임차인'].trim()){
      bmap[key].tenants.push({
        floor:row['층']||'',
        name:row['임차인'].trim(),
        type:normalizeType(row['업종']||''),
      });
    }
  });
  return Object.values(bmap).filter(b=>b.lat&&b.lng);
}

// ══════════════════════════════════════════════
// 임대건물 마커 (카카오 CustomOverlay)
// ══════════════════════════════════════════════
function renderBldgMarkers() {
  // 기존 제거
  Object.values(bldgOverlays).forEach(o => o.setMap(null));
  bldgOverlays = {};
  if (!bldgVisible) return;

  buildings.forEach(b => {
    const isOurs = b.isOurs;
    const color = isOurs ? '#f5bc30' : getDomColor(b);
    const content = `<div onclick="selectBldg('${b.id}')" style="
      cursor:pointer;transform:translateX(-50%) translateY(-100%);
      filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));
    ">
      <div style="
        background:${color};color:${isOurs?'#000':'#fff'};
        font-size:${isOurs?'10px':'9.5px'};font-weight:700;
        padding:3px 7px;border-radius:4px;white-space:nowrap;
        font-family:'Noto Sans KR',sans-serif;
        border:${isOurs?'2px solid #fff':'1.5px solid rgba(255,255,255,.3)'};
      ">${isOurs?'⭐ '+b.short:b.short}</div>
      <div style="
        width:0;height:0;margin:0 auto;
        border-left:5px solid transparent;border-right:5px solid transparent;
        border-top:6px solid ${color};
      "></div>
    </div>`;
    const overlay = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(b.lat, b.lng),
      content, zIndex: isOurs ? 999 : 10, yAnchor:1
    });
    overlay.setMap(map);
    bldgOverlays[b.id] = overlay;
  });
}

function getDomColor(b) {
  const types = b.tenants.map(t=>t.type);
  if (!types.length) return '#4a5270';
  const cnt = {};
  types.forEach(t => cnt[t]=(cnt[t]||0)+1);
  const dom = Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0][0];
  return TYPES[dom]||'#4a5270';
}

function toggleBldgLayer() {
  bldgVisible = !bldgVisible;
  document.getElementById('bldgToggleSw').classList.toggle('on', bldgVisible);
  if (bldgVisible) renderBldgMarkers();
  else { Object.values(bldgOverlays).forEach(o=>o.setMap(null)); bldgOverlays={}; }
}

// ══════════════════════════════════════════════
// 건물 선택 → 인포윈도우
// ══════════════════════════════════════════════
function selectBldg(id) {
  selectedBldgId = id;
  const b = buildings.find(b=>b.id===id);
  if (!b) return;

  // 목록 하이라이트
  document.querySelectorAll('.bldg-item').forEach(el => el.classList.remove('active'));
  const itemEl = document.getElementById('bitem-'+id);
  if (itemEl) { itemEl.classList.add('active'); itemEl.scrollIntoView({behavior:'smooth',block:'nearest'}); }

  // 지도 이동
  map.setCenter(new kakao.maps.LatLng(b.lat, b.lng));

  // 인포윈도우 내용
  const tenantRows = b.tenants.slice(0,6).map(t =>
    `<div class="bp-tenant-row">
      <span class="bp-tenant-floor">${t.floor}</span>
      <span class="bp-tenant-name">${t.name}</span>
      <span class="bp-tenant-type">${t.type}</span>
    </div>`).join('');
  const moreTxt = b.tenants.length > 6 ? `<div style="font-size:10px;color:#4a5270;margin-top:4px">외 ${b.tenants.length-6}개</div>` : '';

  const popupHtml = `<div class="bldg-popup">
    <div class="bp-head">
      <div class="bp-tag">${b.isOurs?'⭐ 우리 건물':'🏢 임대건물'}</div>
      <div class="bp-name">${b.name}</div>
      <div class="bp-addr">${b.address}</div>
    </div>
    <div class="bp-body">
      ${b.price?`<div class="bp-row"><span class="bp-label">매매가</span><span class="bp-val">${b.price}</span></div>`:''}
      ${b.builtYear?`<div class="bp-row"><span class="bp-label">준공</span><span class="bp-val">${b.builtYear}년</span></div>`:''}
      ${b.elevator?`<div class="bp-row"><span class="bp-label">승강기</span><span class="bp-val">${b.elevator}</span></div>`:''}
      ${b.parking?`<div class="bp-row"><span class="bp-label">주차</span><span class="bp-val">${b.parking}대</span></div>`:''}
      ${b.tenants.length?`<div class="bp-tenants">${tenantRows}${moreTxt}</div>`:''}
    </div>
  </div>`;

  // 임시 마커로 인포윈도우 열기
  const tmpMarker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(b.lat, b.lng), map });
  tmpMarker.setVisible(false);
  infowindow.setContent(popupHtml);
  infowindow.open(map, tmpMarker);
  setTimeout(() => tmpMarker.setMap(null), 100);
}

// ══════════════════════════════════════════════
// 건물 목록 렌더
// ══════════════════════════════════════════════
function renderBldgList() {
  const listEl = document.getElementById('bldgList');
  const nonOurs = buildings.filter(b=>!b.isOurs);
  if (!nonOurs.length) {
    listEl.innerHTML = `<div class="result-empty"><div class="e-ico">🏢</div><div>건물 데이터 없음</div></div>`;
    return;
  }
  listEl.innerHTML = nonOurs.map(b => {
    const color = getDomColor(b);
    const typeSet = [...new Set(b.tenants.map(t=>t.type))].slice(0,3);
    return `<div class="bldg-item" id="bitem-${b.id}" onclick="selectBldg('${b.id}')">
      <div class="bi-top">
        <div class="bi-dot" style="background:${color}"></div>
        <div class="bi-name">${b.name}</div>
        <div class="bi-dist">${b.dong}</div>
      </div>
      <div class="bi-addr">${b.address||'-'}</div>
      <div class="bi-tags">
        ${typeSet.map(t=>`<span class="bi-tag" style="color:${TYPES[t]||'#64748b'};border-color:${TYPES[t]||'#64748b'}20;background:${TYPES[t]||'#64748b'}10">${t}</span>`).join('')}
        ${b.tenants.length?`<span class="bi-tag" style="color:#4a5270;border-color:#2a305080;background:transparent">${b.tenants.length}개 임차인</span>`:''}
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════════════════════
// 인프라: 카테고리 UI
// ══════════════════════════════════════════════
function buildCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const el = document.createElement('div');
    el.className = 'cat-item' + (activeCats.has(cat.id)?' on':'');
    el.id = 'cat-'+cat.id;
    el.onclick = () => toggleCat(cat.id);
    el.innerHTML = `<div class="cat-check">✓</div>
      <div class="cat-emoji">${cat.emoji}</div>
      <div class="cat-name">${cat.name}</div>
      <span class="cat-cnt" id="cnt-${cat.id}"></span>`;
    grid.appendChild(el);
  });
}

function toggleCat(id) {
  activeCats.has(id) ? activeCats.delete(id) : activeCats.add(id);
  document.getElementById('cat-'+id)?.classList.toggle('on', activeCats.has(id));
  if (allResults.length > 0) filterMarkersAndList();
}

function filterMarkersAndList() {
  overlays.forEach(o=>o.setMap(null)); infraMarkers.forEach(m=>m.setMap(null));
  overlays=[]; infraMarkers=[];
  const filtered = allResults.filter(it=>activeCats.has(it._cat.id));
  filtered.forEach(p=>addInfraMarker(p,p._cat));
  renderResultList(filtered);
  renderLegend(filtered);
}

function toggleAllCats() {
  const allOn = activeCats.size === CATEGORIES.length;
  activeCats = allOn ? new Set() : new Set(CATEGORIES.map(c=>c.id));
  CATEGORIES.forEach(cat => {
    document.getElementById('cat-'+cat.id)?.classList.toggle('on', activeCats.has(cat.id));
  });
  if (allResults.length > 0) filterMarkersAndList();
}

// ══════════════════════════════════════════════
// 인프라: 주소 검색
// ══════════════════════════════════════════════
function geocodeAddress() {
  const addr = document.getElementById('addrInput').value.trim();
  if (!addr) return;
  const geocoder = new kakao.maps.services.Geocoder();
  geocoder.addressSearch(addr, (result, status) => {
    if (status === kakao.maps.services.Status.OK) {
      currentLat = parseFloat(result[0].y);
      currentLng = parseFloat(result[0].x);
      applyNewCenter(); runSearch();
    } else {
      const ps2 = new kakao.maps.services.Places();
      ps2.keywordSearch(addr, (result2, status2) => {
        if (status2 === kakao.maps.services.Status.OK) {
          currentLat = parseFloat(result2[0].y);
          currentLng = parseFloat(result2[0].x);
          applyNewCenter(); runSearch();
        } else alert('주소를 찾을 수 없습니다.');
      }, { size:1 });
    }
  });
}

function applyNewCenter() {
  const pos = new kakao.maps.LatLng(currentLat, currentLng);
  map.setCenter(pos);
  placeCenterMarker(currentLat, currentLng);
  drawCircle(currentLat, currentLng, currentRadius);
}

function bindEnterKey() {
  document.getElementById('addrInput')?.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    geocodeAddress();
  });
}

// ══════════════════════════════════════════════
// 인프라: 메인 검색
// ══════════════════════════════════════════════
function runSearch() {
  if (activeCats.size === 0) { alert('카테고리를 최소 1개 선택해주세요'); return; }
  if (!ps) { alert('지도가 아직 로딩 중입니다.'); return; }

  const btn = document.getElementById('btnRun');
  btn.disabled = true;
  document.getElementById('runTxt').textContent = '검색 중…';
  document.getElementById('runIco').textContent = '⏳';

  clearInfraMarkers();
  allResults = [];
  CATEGORIES.forEach(c => { const el=document.getElementById('cnt-'+c.id); if(el) el.textContent=''; });

  const cats = CATEGORIES.filter(c=>activeCats.has(c.id));
  let done = 0;

  function searchPage(cat, page) {
    ps.categorySearch(cat.id, (data, status, pagination) => {
      if (status === kakao.maps.services.Status.OK) {
        data.forEach(p => { p._cat=cat; allResults.push(p); addInfraMarker(p,cat); });
        if (pagination.hasNextPage) {
          setTimeout(() => searchPage(cat, page+1), 100);
        } else {
          const cnt = allResults.filter(r=>r._cat.id===cat.id).length;
          const el = document.getElementById('cnt-'+cat.id);
          if (el&&cnt) el.textContent=cnt;
          done++; if(done===cats.length) finishSearch();
        }
      } else { done++; if(done===cats.length) finishSearch(); }
    }, { location:new kakao.maps.LatLng(currentLat,currentLng), radius:currentRadius, size:15, page });
  }

  cats.forEach((cat,i) => setTimeout(() => searchPage(cat,1), i*200));
}

function finishSearch() {
  allResults.sort((a,b)=>parseInt(a.distance)-parseInt(b.distance));
  renderResultList(allResults);
  renderLegend(allResults);
  map.setCenter(new kakao.maps.LatLng(currentLat,currentLng));
  const level = currentRadius<=500?4:currentRadius<=1000?5:currentRadius<=2000?6:7;
  map.setLevel(level);
  const btn = document.getElementById('btnRun');
  btn.disabled=false;
  document.getElementById('runTxt').textContent='다시 검색';
  document.getElementById('runIco').textContent='🔄';

  if (!allResults.length) {
    document.getElementById('resultWrap').innerHTML=`<div class="result-empty"><div class="e-ico">🔍</div><div>결과 없음<br>반경을 넓혀보세요</div></div>`;
    document.getElementById('exportBar').classList.add('hidden');
  }
}

// ══════════════════════════════════════════════
// 인프라 마커
// ══════════════════════════════════════════════
function addInfraMarker(place, cat) {
  const pos = new kakao.maps.LatLng(place.y, place.x);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="28" viewBox="0 0 20 28">
    <path d="M10 0C4.477 0 0 4.477 0 10c0 7.5 10 18 10 18S20 17.5 20 10C20 4.477 15.523 0 10 0z"
      fill="${cat.color}" stroke="white" stroke-width="1.5"/>
    <circle cx="10" cy="10" r="4" fill="white" opacity="0.9"/>
  </svg>`;
  const encoded = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
  const markerImg = new kakao.maps.MarkerImage(encoded, new kakao.maps.Size(20,28), {offset:new kakao.maps.Point(10,28)});
  const m = new kakao.maps.Marker({ position:pos, image:markerImg, map, title:place.place_name, zIndex:3 });
  kakao.maps.event.addListener(m, 'click', () => {
    infowindow.setContent(`<div style="padding:10px 14px;font-family:'Noto Sans KR',sans-serif;min-width:160px;max-width:220px">
      <div style="font-size:9px;color:${cat.color};font-weight:700;letter-spacing:1px;margin-bottom:3px">${cat.emoji} ${cat.name}</div>
      <div style="font-size:13px;font-weight:700;color:#222;margin-bottom:4px">${place.place_name}</div>
      <div style="font-size:11px;color:#666;margin-bottom:4px">${place.road_address_name||place.address_name||''}</div>
      ${place.distance?`<div style="font-size:11px;color:${cat.color};font-weight:600">📏 ${formatDist(parseInt(place.distance))}</div>`:''}
    </div>`);
    infowindow.open(map, m);
  });
  infraMarkers.push(m);
}

function clearInfraMarkers() {
  overlays.forEach(o=>o.setMap(null)); infraMarkers.forEach(m=>m.setMap(null));
  overlays=[]; infraMarkers=[]; selectedItems.clear(); allSelected=false;
  const btn=document.querySelector('.btn-sel-all'); if(btn) btn.textContent='전체 선택';
  infowindow.close();
  document.getElementById('resultWrap').innerHTML=`<div class="result-empty"><div class="e-ico">⏳</div><div>검색 중…</div></div>`;
  document.getElementById('legendBox').classList.add('hidden');
}

// ══════════════════════════════════════════════
// 결과 목록
// ══════════════════════════════════════════════
function renderResultList(items) {
  selectedItems.clear(); updateExportBar();
  const wrap = document.getElementById('resultWrap');
  if (!items.length) {
    wrap.innerHTML=`<div class="result-empty"><div class="e-ico">🔍</div><div>결과 없음</div></div>`;
    document.getElementById('exportBar').classList.add('hidden');
    return;
  }
  let h=`<div class="result-header">
    <div class="result-count"><span>${items.length}</span>개 시설</div>
    <div class="result-hd-r"><button class="btn-sel-all" onclick="toggleSelectAll()">전체 선택</button></div>
  </div><ul class="result-list">`;
  items.forEach((it,idx) => {
    const cat=it._cat, dist=it.distance?formatDist(parseInt(it.distance)):'';
    h+=`<li class="result-item" id="ri-${idx}" onclick="toggleSelect(event,${idx},${parseFloat(it.y)},${parseFloat(it.x)})">
      <div class="ri-chk"></div>
      <div class="ri-dot" style="background:${cat.color}"></div>
      <div class="ri-info">
        <div class="ri-name">${it.place_name}</div>
        <div class="ri-cat">${cat.emoji} ${cat.name}</div>
      </div>
      <div class="ri-dist">${dist}</div>
    </li>`;
  });
  h+='</ul>';
  wrap.innerHTML=h;
  document.getElementById('exportBar').classList.remove('hidden');
}

function toggleSelect(e,idx,lat,lng) {
  if(selectedItems.has(idx)){ selectedItems.delete(idx); document.getElementById('ri-'+idx)?.classList.remove('selected'); }
  else { selectedItems.add(idx); document.getElementById('ri-'+idx)?.classList.add('selected'); flyTo(lat,lng); }
  updateExportBar();
}

function toggleSelectAll() {
  allSelected=!allSelected;
  allResults.forEach((_,idx) => {
    if(allSelected) selectedItems.add(idx); else selectedItems.delete(idx);
    document.getElementById('ri-'+idx)?.classList.toggle('selected',allSelected);
  });
  const btn=document.querySelector('.btn-sel-all'); if(btn) btn.textContent=allSelected?'전체 해제':'전체 선택';
  updateExportBar();
}

function updateExportBar() {
  const cnt=selectedItems.size;
  const el=document.getElementById('selCnt'); if(el) el.textContent=cnt;
  const btn=document.getElementById('btnExportSel'); if(btn) btn.disabled=cnt===0;
}

function flyTo(lat,lng) { map.setCenter(new kakao.maps.LatLng(lat,lng)); map.setLevel(3); }

// ══════════════════════════════════════════════
// 범례
// ══════════════════════════════════════════════
function renderLegend(items) {
  const box=document.getElementById('legendBox'), inner=document.getElementById('legendItems');
  if(!items.length){ box.classList.add('hidden'); return; }
  const bycat={};
  items.forEach(it => { const id=it._cat.id; bycat[id]=(bycat[id]||0)+1; });
  inner.innerHTML=CATEGORIES.filter(c=>bycat[c.id]).map(cat =>
    `<div class="leg-item"><div class="leg-dot" style="background:${cat.color}"></div>
    <div class="leg-name">${cat.emoji} ${cat.name}</div><div class="leg-cnt">${bycat[cat.id]}</div></div>`
  ).join('');
  box.classList.remove('hidden');
}

// ══════════════════════════════════════════════
// CSV 내보내기
// ══════════════════════════════════════════════
function exportCSV(selOnly) {
  const target=selOnly?allResults.filter((_,i)=>selectedItems.has(i)):allResults;
  if(!target.length) return;
  const rows=[['카테고리','시설명','도로명주소','지번주소','거리(m)','위도','경도']];
  target.forEach(it=>rows.push([it._cat.name,it.place_name,it.road_address_name||'',it.address_name||'',it.distance||'',it.y,it.x]));
  const csv=rows.map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`인프라분석_${selOnly?`선택${selectedItems.size}건`:`전체${target.length}건`}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ══════════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════════
function formatDist(m){ return m>=1000?(m/1000).toFixed(1)+'km':m+'m'; }
