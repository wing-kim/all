const MAP_SHEET_URL = 'https://docs.google.com/spreadsheets/d/1OWnkwwtMv38I8gnTLfguwkRSLEO6eUsgk0kCs1IJTCk/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent('임대상권데이터');

const OUR_BUILDING = {
  id:'ours', isOurs:true,
  name:'케이프혼타워 (신축예정)', short:'우리건물',
  address:'신사동 529 외 2필지',
  lat:37.5232, lng:127.0212,
  price:null, dong:'신사동', distance:'core', tenants:[]
};

let buildings = [OUR_BUILDING];

function parseMapCSV(text){
  const lines=text.trim().split('\n');
  const headers=lines[0].split(',').map(h=>h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).map(line=>{
    const vals=[]; let cur='',inQ=false;
    for(const ch of line){
      if(ch==='"')inQ=!inQ;
      else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}
      else cur+=ch;
    }
    vals.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>{obj[h]=(vals[i]||'').replace(/^"|"$/g,'');});
    return obj;
  }).filter(r=>r['건물명']&&r['건물명'].trim());
}

function rowsToBuildings(rows){
  const bmap={};
  rows.forEach(row=>{
    const key=row['건물명'].trim();
    if(!bmap[key]){
      bmap[key]={
        id:key.replace(/[^\w가-힣]/g,'_'),
        name:row['건물명'],
        short:row['건물명'].length>6?row['건물명'].slice(0,6):row['건물명'],
        address:row['주소']||'',
        lat:parseFloat(row['위도'])||0,
        lng:parseFloat(row['경도'])||0,
        price:row['매매가']||null,
        dong:row['동']||'기타',
        distance:'mid',
        source:row['파일명']||'',
        tenants:[]
      };
    }
    if(row['임차인']&&row['임차인'].trim()){
      bmap[key].tenants.push({floor:row['층']||'',name:row['임차인'].trim(),type:row['업종']||'기타'});
    }
  });
  return Object.values(bmap).filter(b=>b.lat!==0&&b.lng!==0);
}

async function loadMapData(){
  const el=document.getElementById('map-loader');
  if(el)el.style.display='flex';
  try{
    const res=await fetch(MAP_SHEET_URL);
    if(!res.ok) throw new Error('시트 로딩 실패');
    const rows=parseMapCSV(await res.text());
    buildings=rows.length>0?[OUR_BUILDING,...rowsToBuildings(rows)]:[OUR_BUILDING];
  }catch(e){
    console.warn('지도 데이터 로딩 실패:',e.message);
    buildings=[OUR_BUILDING];
  }finally{
    if(el)el.style.display='none';
  }
}

function getDominantColor(b) {

function selectBuilding(id) {
  // 이전 선택 해제
  if (selectedId) {
    document.querySelectorAll('.mk-wrap').forEach(el => el.classList.remove('selected'));
    const prev = document.getElementById('card-'+selectedId);
    if (prev) prev.classList.remove('active');
  }

  if (selectedId === id) { selectedId = null; return; }
  selectedId = id;

  // 마커 하이라이트
  const mkw = document.getElementById('mkw-'+id);
  if (mkw) mkw.classList.add('selected');

  // 카드 열기 및 스크롤
  const card = document.getElementById('card-'+id);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }

  // 업종 필터 초기화
  if (selectedType) resetTypeFilter();

  // 탭이 건물목록이 아니면 전환
  const buildingsPane = document.getElementById('map-tab-buildings');
  if (!buildingsPane.classList.contains('active')) mapShowTab('buildings');

  // 지도 이동
  const b = buildings.find(x=>x.id===id);
  if (b) map.flyTo([b.lat, b.lng], Math.max(map.getZoom(), 16), { duration:0.8 });
}

function toggleCard(id) {
  const card = document.getElementById('card-'+id);

  // 모든 카드 닫기
  document.querySelectorAll('.bldg-card').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.mk-wrap').forEach(el => el.classList.remove('selected'));
  selectedId = null;

  if (!isActive) selectBuilding(id);
}

// 업종 차트 렌더링 (클릭 필터 포함)
// ══════════════════════════════════════════════
function renderChart() {
  // 업종별 건물 목록 사전 계산
  const typeBuildings = {}; // type -> [{building, tenants:[]}]
  buildings.forEach(b => {
    if (b.isOurs) return;
    const seen = {};
    b.tenants.forEach(t => {
      if (!typeBuildings[t.type]) typeBuildings[t.type] = [];
      if (!seen[b.id]) {
        seen[b.id] = { b, floors: [] };
        typeBuildings[t.type].push(seen[b.id]);
      }
      seen[b.id].floors.push(t.floor);
    });
  });

  const cnt = {};
  Object.entries(typeBuildings).forEach(([type, list]) => {
    cnt[type] = list.reduce((s, x) => s + x.floors.length, 0);
  });

  const sorted = Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
  const maxVal = sorted[0]?.[1]||1;

  const rows = sorted.map(([type, n]) => {
    const color = TYPES[type]||'#888';
    const pct   = Math.round(n / maxVal * 100);
    const numInside = pct >= 22; // 막대가 충분히 넓으면 안에, 좁으면 바깥

    const bldgList = (typeBuildings[type]||[]).map(({b, floors}) => `
      <div class="type-bldg-item" style="border-color:${color}40"
           onmouseover="this.style.background='${color}';this.style.borderColor='${color}';this.style.color='#fff'"
           onmouseout="this.style.background='';this.style.borderColor='${color}40';this.style.color=''"
           onclick="event.stopPropagation(); flyToBuilding('${b.id}')">
        ${b.name} <span class="bldg-arrow">→</span>
      </div>`).join('');

    return `
      <div class="type-row" id="tyrow-${type.replace(/\//g,'_')}" onclick="selectType('${type}')">
        <div class="type-bar-row">
          <div class="type-lbl">${type}</div>
          <div class="type-track" style="position:relative;">
            <div class="type-fill" style="width:${pct}%;background:linear-gradient(90deg,${color}bb,${color});">
              ${numInside ? `<span class="type-cnt">${n}</span>` : ''}
            </div>
            ${!numInside ? `<span style="position:absolute;left:calc(${pct}% + 8px);top:50%;transform:translateY(-50%);font-size:14px;font-weight:800;color:${color};">${n}</span>` : ''}
          </div>
        </div>
        <div class="type-bldg-list" id="tblist-${type.replace(/\//g,'_')}" style="display:none">
          ${bldgList}
        </div>
      </div>`;
  }).join('');

  document.getElementById('type-chart').innerHTML =
    `<div class="type-hint">👆 업종 클릭 → 해당 건물을 지도에서 확인</div>` + rows;

  document.getElementById('insight-box').innerHTML = `
    <div class="insight-title">💡 주목할 인사이트</div>
    <ul>
      <li><b style="color:#3b82f6">사무실/기업</b> 임차인이 가장 많아 오피스 수요가 탄탄한 상권</li>
      <li><b style="color:#06b6d4">병원/의료</b> 클러스터 형성 — 메디컬 빌딩 전층 임대 사례 다수</li>
      <li><b style="color:#ef4444">F&B/음식점</b> 저층 집중, 가로수길 상권 특성상 외식 수요 안정적</li>
      <li><b style="color:#ec4899">뷰티/미용</b> (네일·피부·속눈썹) 2~3층 다수 — 젊은 여성 유동인구</li>
      <li><b style="color:#f59e0b">학원/교육</b> 중층에서 장기 임차 — 안정적 수익원 역할</li>
    </ul>`;
}

// ══════════════════════════════════════════════
// 업종 필터 선택 / 해제
// ══════════════════════════════════════════════
function typeKey(type) { return type.replace(/\//g,'_'); }

function resetTypeFilter() {
  selectedType = null;
  document.querySelectorAll('.type-row').forEach(r => r.classList.remove('t-selected'));
  document.querySelectorAll('[id^="tblist-"]').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.mk-wrap').forEach(el => el.classList.remove('dimmed','type-match'));
  const rb = document.getElementById('reset-btn-el');
  if (rb) rb.remove();
}

function selectType(type) {
  if (selectedType === type) { resetTypeFilter(); return; }
  selectedType = type;

  // 차트 바 스타일 갱신
  document.querySelectorAll('.type-row').forEach(r => r.classList.remove('t-selected'));
  document.querySelectorAll('[id^="tblist-"]').forEach(el => el.style.display='none');
  const row = document.getElementById('tyrow-'+typeKey(type));
  if (row) row.classList.add('t-selected');
  const list = document.getElementById('tblist-'+typeKey(type));
  if (list) list.style.display = 'block';

  // 초기화 버튼 삽입 (한 번만)
  const existing = document.getElementById('reset-btn-el');
  if (existing) existing.remove();
  const btn = document.createElement('div');
  btn.id = 'reset-btn-el';
  btn.className = 'reset-filter';
  btn.textContent = '✕ 필터 해제';
  btn.onclick = () => resetTypeFilter();
  document.getElementById('type-chart').prepend(btn);

  // 해당 업종이 있는 건물 ID 목록
  const matchIds = new Set(
    buildings.filter(b => !b.isOurs && b.tenants.some(t => t.type === type)).map(b=>b.id)
  );

  // 마커 dim / highlight
  buildings.forEach(b => {
    if (b.isOurs) return;
    const mkw = document.getElementById('mkw-'+b.id);
    if (!mkw) return;
    if (matchIds.has(b.id)) {
      mkw.classList.remove('dimmed');
      mkw.classList.add('type-match');
    } else {
      mkw.classList.add('dimmed');
      mkw.classList.remove('type-match');
    }
  });

  // 지도 범위를 해당 건물들로 맞춤
  const matched = buildings.filter(b => matchIds.has(b.id));
  if (matched.length > 0) {
    const bounds = L.latLngBounds(matched.map(b=>[b.lat,b.lng]));
    map.fitBounds(bounds, { padding:[60,60], maxZoom:17, animate:true });
  }
}

// 업종 필터에서 건물 클릭 → 지도 이동만 (탭 전환/아코디언 없음)
function flyToBuilding(id) {
  const b = buildings.find(x => x.id === id);
  if (!b) return;

  // 기존 선택 마커 효과 초기화 후 해당 마커만 강조
  document.querySelectorAll('.mk-wrap').forEach(el => el.classList.remove('selected'));
  const mkw = document.getElementById('mkw-' + id);
  if (mkw) mkw.classList.add('selected');

  // 지도 이동
  map.flyTo([b.lat, b.lng], 17, { duration: 0.8 });
}

function selectBuildingFromType(id) {
  resetTypeFilter();
  selectBuilding(id);
}

  const typeSorted = Object.entries(typeCnt).sort((a,b)=>b[1]-a[1]);

  const top2 = typeSorted[1] || ['—', 0];

  const vacantCnt = allTenants.filter(t =>
    t.name.includes('공실')||t.name.includes('명도')||t.name.includes('퇴거')

        ${type} <b style="margin-left:2px;font-weight:700;color:#1e293b">${n}</b>

  // ── 종합 스택바 ──

    {
      key: '신사동',
      label: '신사동',
      color: '#1e40af',
      colorLight: '#eff6ff',
      icon: '📍',
      desc: '강남구 신사동 · 가로수길 · 압구정로 일대',
      note: '케이프혼타워 사업지가 위치한 핵심 상권. 업종 다양성이 가장 높고 임대 데이터 밀도가 높음.',
      strategy: '압구정로 접면부 F&B(저층)·오피스(중고층) 조합이 검증된 패턴. 뷰티·학원 중층 유치로 공실 리스크 분산 권장.',
    },
    {
      key: '논현동',
      label: '논현동',
      color: '#065f46',
      colorLight: '#f0fdf4',
      icon: '🏥',
      desc: '강남구 논현동 · 언주로·학동로 일대',
      note: '메디컬 특화 상권. 병원·의원의 전층 통임대 사례가 두드러짐. 안정적 장기 임차 수요 확인.',
      strategy: '전층 메디컬 통임대 시 임대수익 안정성 최고. 단, 업종 다양성 포기 & 계약 종료 후 공실 리스크 주의.',
    },
    {
      key: '삼성동',
      label: '삼성동',
      color: '#7c3aed',
      colorLight: '#faf5ff',
      icon: '🏛️',
      desc: '강남구 삼성동 · 삼성로 일대',
      note: '청담 인접 메디컬·스포츠 복합 사례. 전층 병원 통임대 구조로 임대인 개입 최소화.',
      strategy: '대형 병원 단독 통임대 시 관리 부담 최소. 고가 의료장비 입주 특성상 장기 계약 유리.',
    },
  ];

  // ── 동별 섹션 HTML ──
  // 실제 데이터가 있는 동만 렌더링 + 데이터 없는 동은 "업로드 대기" 표시
  const allDongs = [...new Set(buildings.filter(b=>!b.isOurs).map(b=>b.dong))];
  
  // dongDefs 순서대로 + 데이터가 있지만 정의 없는 동은 뒤에 자동 추가
  const dongsToRender = [
    ...dongDefs,
    ...allDongs
      .filter(d => !dongDefs.find(dd=>dd.key===d))
      .map(d => ({
        key: d, label: d, color: '#64748b', colorLight: '#f8fafc',
        icon: '📌', desc: `강남구 ${d} 일대`,
        note: `${d} 데이터가 추가되었습니다.`,
        strategy: '추가 분석 예정',
      }))
  ];

  const areaSections = dongsToRender.map(def => {
    const bldgs = buildings.filter(b => !b.isOurs && b.dong === def.key);
    
    // 데이터 없는 동 → 업로드 대기 UI
    if (bldgs.length === 0) {
      return `
        <div class="rp-area" id="rp-area-${def.key}">
          <div class="rp-area-header rp-area-empty">
            <span class="rp-area-badge" style="background:#cbd5e1;color:#64748b">${def.label}</span>
            <div>
              <div class="rp-area-title" style="color:#94a3b8">데이터 업로드 예정</div>
              <div class="rp-area-sub">${def.desc}</div>
            </div>
            <span style="font-size:10px;color:#cbd5e1;margin-left:auto">준비중</span>
          </div>
        </div>`;
    }

    const tenants = bldgs.flatMap(b=>b.tenants);
    const { segs, legend } = makeStackBar(tenants);
    const bCnt = bldgs.length;
    const tCnt = tenants.length;
    const vacCnt = tenants.filter(t=>
      t.name.includes('공실')||t.name.includes('퇴거')||t.name.includes('명도')
    ).length;
    const prices = bldgs.filter(b=>b.price).map(b=>parseInt(b.price.replace(/[^0-9]/g,'')));
    const totalPrice = prices.reduce((a,b)=>a+b,0);

    // 건물별 상세 테이블
    const bldgRows = bldgs.map(b => {
      const tRows = b.tenants.map(t => {
        const isVacant = t.name.includes('공실');
        const isLeaving = t.name.includes('퇴거')||t.name.includes('명도');
        return `<tr>
          <td class="fl">${t.floor}</td>
          <td class="${isVacant?'rp-vacant':isLeaving?'rp-leaving':''}">${t.name}${isLeaving?' ⚠️':''}</td>
          <td><span class="type-badge" style="background:${TYPES[t.type]||'#888'};font-size:9px;padding:2px 5px">${t.type}</span></td>
        </tr>`;
      }).join('');
      return `
        <div class="rp-table-title" style="cursor:pointer" onclick="flyToBuilding('${b.id}');mapShowTab('buildings')">
          <span class="rp-bldg-dot" style="background:${def.color}"></span>
          ${b.name}
          <span class="rp-bldg-meta">${b.price ? b.price+' ·' : ''} 지도에서 보기 →</span>
        </div>
        <table class="rp-table">
          <thead><tr><th>층</th><th>임차인</th><th>업종</th></tr></thead>
          <tbody>${tRows}</tbody>
        </table>`;
    }).join('');

    return `
      <div class="rp-area" id="rp-area-${def.key}">
        <div class="rp-area-header" onclick="toggleArea('${def.key}')">
          <div class="rp-dong-badge-wrap">
            <span class="rp-area-badge" style="background:${def.color}">${def.icon} ${def.label}</span>
          </div>
          <div style="flex:1;min-width:0">
            <div class="rp-area-title">건물 ${bCnt}개 · 임차인 ${tCnt}건${vacCnt>0?` · <span style="color:#ef4444">공실·퇴거 ${vacCnt}건</span>`:''}</div>
            <div class="rp-area-sub">${def.desc}</div>
          </div>
          <span class="rp-area-chevron">▼</span>
        </div>
        <div class="rp-area-body">
          <div class="rp-area-inner">

            <div class="rp-kpi-row">
              <div class="rp-kpi">
                <div class="rp-kpi-val" style="color:${def.color}">${bCnt}</div>
                <div class="rp-kpi-unit">분석 건물</div>
              </div>
              <div class="rp-kpi">
                <div class="rp-kpi-val">${tCnt}</div>
                <div class="rp-kpi-unit">임차인 수</div>
              </div>
              <div class="rp-kpi">
                <div class="rp-kpi-val" style="color:${vacCnt>0?'#ef4444':'#10b981'}">${vacCnt}</div>
                <div class="rp-kpi-unit">공실·퇴거</div>
              </div>
            </div>

            <div class="rp-stack-wrap">
              <div class="rp-stack-label">업종 구성 비율</div>
              <div class="rp-stack-bar">${segs}</div>
              <div class="rp-stack-legend">${legend}</div>
            </div>

            <div style="height:1px;background:#f1f5f9;margin:12px 0"></div>

            <div class="rp-table-section-title">건물별 임차인 상세</div>
            ${bldgRows}

            <div class="rp-memo" style="border-left-color:${def.color}">
              <div class="rp-memo-title">📋 ${def.label} 분석 메모</div>
              ${def.note}<br>
              <b>전략 포인트:</b> ${def.strategy}
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  // ── 층별 전략 제안 ──
  const strategies = [
    { icon:'🏪', name:'저층 (B1~1F)', tag:'F&B · 편의점 · 약국', tagColor:'#ef4444',
      body:'<b>F&B·편의점·약국</b>이 압도적. 압구정로 유동인구 흡입력 활용. 보증금 높고 단기 위험 낮음. 메가커피·도미노피자 등 프랜차이즈 유치 시 공실 리스크 최소화.' },
    { icon:'💆', name:'2~3층', tag:'뷰티 · 학원 · 스튜디오', tagColor:'#ec4899',
      body:'<b>뷰티(네일·피부·속눈썹)</b>와 <b>학원·교육</b>이 가장 많이 분포. 젊은 여성 유동인구 기반. 장기 임차 경향 강해 안정적. 층당 1~2개 소규모 업종 믹스 권장.' },
    { icon:'🏢', name:'4층 이상', tag:'사무실 · 의료', tagColor:'#3b82f6',
      body:'<b>사무실/기업</b>(스타트업·에이전시 多)이 중심. <b>병원·의료</b> 고층 진출 사례 증가 추세. 논현·삼성동 전층 병원 통임대 시 월세 수익 극대화 가능하나 유연성 감소.' },
  ];
  const strategyHtml = strategies.map(s=>`
    <div class="rp-strategy-card">
      <div class="rp-strategy-head">
        <span class="rp-strategy-icon">${s.icon}</span>
        <span class="rp-strategy-name">${s.name}</span>
        <span class="rp-strategy-tag" style="background:${s.tagColor}">${s.tag}</span>
      </div>
      <div class="rp-strategy-body">${s.body}</div>
    </div>`).join('');

  // ── 최종 리포트 HTML ──
  document.getElementById('report-wrap').innerHTML = `
    <div class="rp-summary-header">
      <div class="rp-summary-title">📊 케이프혼타워 상권 임대 리포트</div>
      <div class="rp-summary-sub">강남구 신사동·논현동·삼성동 · 분석 기준: 2025.08 · ${totalBuildings}개 건물</div>
    </div>

    <div class="rp-total-kpi">
      <div class="rp-total-card accent">
        <div class="rp-total-card-label">전체 임차인</div>
        <div class="rp-total-card-val">${totalTenants}건</div>
        <div class="rp-total-card-sub">${totalBuildings}개 건물 합산</div>
      </div>
      <div class="rp-total-card accent">
        <div class="rp-total-card-label">공실·퇴거 예정</div>
        <div class="rp-total-card-val">${vacantCnt}건</div>
        <div class="rp-total-card-sub">임박한 임차 기회</div>
      </div>
      <div class="rp-total-card">
        <div class="rp-total-card-label">1위 업종</div>
        <div class="rp-total-card-val" style="font-size:13px;color:${TYPES[top1[0]]||'#1e293b'}">${top1[0]}</div>
        <div class="rp-total-card-sub">${top1[1]}건 (${Math.round(top1[1]/totalTenants*100)}%)</div>
      </div>
      <div class="rp-total-card">
        <div class="rp-total-card-label">2위 업종</div>
        <div class="rp-total-card-val" style="font-size:13px;color:${TYPES[top2[0]]||'#1e293b'}">${top2[0]}</div>
        <div class="rp-total-card-sub">${top2[1]}건 (${Math.round(top2[1]/totalTenants*100)}%)</div>
      </div>
    </div>

    <div class="rp-dist-wrap">
      <div class="rp-stack-label" style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:6px">전체 업종 분포 (3개 동 합산)</div>
      <div class="rp-stack-bar" style="height:24px">${allSegs}</div>
      <div class="rp-stack-legend" style="margin-top:8px">${allLegend}</div>
    </div>

    <div class="rp-strategy-wrap">
      <div class="rp-stack-label" style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:8px">🏗️ 층별 임대 전략 제안</div>
      ${strategyHtml}
    </div>

    <div class="rp-upload-notice">
      <b>📂 지역별 임대자료 추가 업로드 예정</b>
      새 지역 자료가 업로드되면 동별 섹션에 자동으로 추가됩니다.<br>
      현재 <b>신사동 11개 · 논현동 2개 · 삼성동 1개</b> 건물 데이터 적용 중
    </div>

    <div class="rp-dong-section-header">
      <div class="rp-dong-section-title">동별 상세 데이터</div>
      <div class="rp-dong-section-sub">각 동 탭을 클릭하면 건물별 임차인 내역을 확인할 수 있습니다</div>
    </div>

    ${areaSections}`;
}

// ── 권역 아코디언 토글 ──
function toggleArea(key) {
  const el = document.getElementById('rp-area-' + key);
  if (el) el.classList.toggle('open');
}



function mapShowTab(name) {
  const names = ['buildings','chart','report','legend'];
  document.querySelectorAll('#sec-mapview .map-tab').forEach((t,i)=>t.classList.toggle('active', names[i]===name));
  document.querySelectorAll('#sec-mapview .map-tab-pane').forEach(p=>p.classList.toggle('active', p.id==='tab-'+name));
  if (name !== 'chart' && selectedType) resetTypeFilter();
}

// ══════════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════════
loadMapData().then(()=>{
  renderBuildingList();
  renderChart();
  renderReport();
  renderLegend();
});
  };
})();
</script>
</body>
</html>
