function renderCost(k,rows){
  /* personal мқҖ renderPersonal лЎң л¶„кё° */
  if(k==='personal'){renderPersonal(rows);return;}
  /* corp лҠ” renderCorp лЎң л¶„кё° */
  if(k==='corp'){renderCorp(rows);return;}

  /* к·ё мҷё нғӯ вҖ” кё°мЎҙ лІ”мҡ© лЎңм§Ғ мң м§Җ */
  const sec=document.getElementById(`sec-${k}`);
  if(!rows||rows.length<2){sec.innerHTML=errHTML('лҚ°мқҙн„° м—ҶмқҢ');return;}
  const hi=findHdrRow(rows);const hdr=rows[hi];const data=rows.slice(hi+1).filter(r=>r.some(c=>c));
  const pc=hdr.map((h,i)=>({h,i})).filter(({h})=>/кёҲм•Ў|л№„мҡ©|н•©кі„|мҙқм•Ў|cost|amount|total/i.test(h));
  const nc=(pc.length?pc:numCols(hdr,data)).slice(0,4);
  const cards=nc.map((c,i)=>{
    const vals=data.map(r=>parseFloat((r[c.i]||'').replace(/[,\sвӮ©мӣҗ]/g,''))).filter(x=>!isNaN(x));
    if(!vals.length)return'';
    const s=vals.reduce((a,b)=>a+b,0),avg=s/vals.length;
    return`<div class="kpi b"><div class="kpi-lbl">${c.h}</div><div class="kpi-val">${fmtBig(s)}</div><div class="kpi-sub">нҸүк·  ${fmtBig(avg)} В· ${vals.length}кұҙ</div></div>`;
  }).filter(Boolean).join('');
  CACHE[k+'_cfn']=null;initTS(k);TS[k]={search:'',sortCol:-1,sortAsc:true,page:1};
  sec.innerHTML=`<div class="notice">рҹ“Ў кө¬кёҖ мӢңнҠё мӢӨмӢңк°„ м—°лҸҷ В· ${TABS[k].label}</div>${cards?`<div class="kpi-row">${cards}</div>`:''}<div id="${k}-tbl"></div>`;
  drawTable(k,rows,`${k}-tbl`);
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   renderCorp вҖ” лІ•мқёл№„мҡ© Cash Flow м „мҡ© л ҢлҚ”лҹ¬ (v5)
   вҳ… мӢңнҠё 3к°ң кө¬м—ӯ м •нҷ• л¶„лҰ¬ нҢҢмӢұ
   вҳ… м»¬лҹј мҲңм„ң: н•ӯлӘ©|кёҲм•Ў|кі„м•Ҫкё°к°„|мҶҢмҡ”кё°к°„|лӮ©л¶Җл°©лІ•|лӮ©л¶Җл°©лІ•мғҒм„ё
   вҳ… кёҲм•Ў м»¬лҹј м •нҷ• нғҗмғү (н•©кі„н–ү м ңмҷё, мҲ«мһҗ м»¬лҹј мҡ°м„ )
   вҳ… лӮ©л¶Җл°©лІ•лі„ мәҗмӢңн”ҢлЎңмҡ°: л§Өмӣ”/4нҡҢл¶„н• /мқјмӢңлӮ© м •нҷ• л°ҳмҳҒ
   вҳ… мғҒм„ё н•ӯлӘ©лі„ мәҗмӢңн”ҢлЎңмҡ° (нҒ° лҚ©м–ҙлҰ¬ X, м„ёл¶Җ н•ӯлӘ©лі„)
   вҳ… 2026-01 ~ 2030-12 м „мІҙ кё°к°„ н‘ңмӢң
   вҳ… кө¬кёҖмӢңнҠё м—°лҸҷ мң м§Җ (fetch л°©мӢқ к·ёлҢҖлЎң)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function renderCorp(rows){
  const sec=document.getElementById('sec-corp');
  if(!rows||rows.length<2){sec.innerHTML=errHTML('лҚ°мқҙн„° м—ҶмқҢ');return;}

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [STEP 1] мӢңнҠёлҘј 3к°ң кө¬м—ӯмңјлЎң л¶„лҰ¬
     кө¬м—ӯ кІҪкі„: н–үмқҳ м–ҙлҠҗ м…Җмқҙл“  кө¬м—ӯлӘ… нҢЁн„ҙкіј мқјм№ҳн•ҳлҠ” н–ү кё°мӨҖ
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  const SECT_SUMMARY=/мӢ м¶•.*м „мІҙ.*л№„мҡ©.*мҡ”м•Ҫ|м „мІҙ.*л№„мҡ©.*мҡ”м•Ҫ|1\.*мӢ м¶•|^1\./i;
  const SECT_DETAIL =/мӢ м¶•.*м „мІҙ.*л№„мҡ©.*мғҒм„ё|м „мІҙ.*л№„мҡ©.*мғҒм„ё|2\.*мӢ м¶•|^2\./i;
  const SECT_LAND   =/нҶ м§Җ.*мһ„лҢҖлЈҢ|лІ•мқё.*нҶ м§Җ|3\.*лІ•мқё|^3\./i;

  let summarySecStart=-1, detailSecStart=-1, landSecStart=-1;
  rows.forEach((r,i)=>{
    const rowText = r.map(c=>String(c||'').trim()).join(' ');
    if(summarySecStart<0 && SECT_SUMMARY.test(rowText)) summarySecStart=i;
    else if(detailSecStart<0 && SECT_DETAIL.test(rowText)) detailSecStart=i;
    else if(landSecStart<0 && SECT_LAND.test(rowText)) landSecStart=i;
  });

  console.log('[лІ•мқёл№„мҡ© v5] кө¬м—ӯ мӢңмһ‘ н–ү:', {summarySecStart,detailSecStart,landSecStart});
  console.log('[лІ•мқёл№„мҡ© v5] м „мІҙ н–ү мҲҳ:', rows.length);
  rows.slice(0,5).forEach((r,i)=>console.log(`[н–ү${i}]`, r.slice(0,6).join(' | ')));

  function sliceSec(start, ...nextStarts){
    if(start<0) return [];
    const nexts=nextStarts.filter(n=>n>start).sort((a,b)=>a-b);
    const end=nexts.length>0?nexts[0]:rows.length;
    return rows.slice(start+1, end).filter(r=>r.some(c=>String(c||'').trim()));
  }

  const summaryRows_raw = sliceSec(summarySecStart, detailSecStart, landSecStart);
  const detailRows_raw  = sliceSec(detailSecStart, landSecStart);
  const landRows_raw    = sliceSec(landSecStart);

  const fallbackMode = (summarySecStart<0 && detailSecStart<0 && landSecStart<0);

  console.log('[лІ•мқёл№„мҡ© v5] кө¬м—ӯ н–ү мҲҳ:', {
    мҡ”м•Ҫ:summaryRows_raw.length, мғҒм„ё:detailRows_raw.length,
    нҶ м§Җмһ„лҢҖлЈҢ:landRows_raw.length, fallback:fallbackMode
  });
  if(summaryRows_raw.length>0) console.log('[мҡ”м•Ҫ мІ«н–ү]', summaryRows_raw[0]);
  if(detailRows_raw.length>0) console.log('[мғҒм„ё мІ«н–ү]', detailRows_raw[0]);
  if(landRows_raw.length>0) console.log('[нҶ м§Җ мІ«н–ү]', landRows_raw[0]);

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [STEP 2] кіөнҶө н—¬нҚј
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  const SUMMARY_KW=/^(н•©кі„|мҶҢкі„|кі„$|н•©мӮ°|total|sum|subtotal|grand|м „мІҙ|мҙқкі„)/i;
  const DATE_LIKE=/^\d{4}[.\-\/]\d{2}|^\d{8}$/;

  function sv(r,i){return i>=0&&i<r.length?String(r[i]||'').trim():'';}
  function numVal(s){return parseFloat(String(s||'').replace(/[,\sвӮ©мӣҗ]/g,''))||0;}

  /* н—ӨлҚ” м°ҫкё°: н…ҚмҠӨнҠё м…Җмқҙ 2к°ң мқҙмғҒмқё мІ« н–ү */
  function findHdr(secRows){
    for(let i=0;i<Math.min(secRows.length,5);i++){
      const filled=secRows[i].filter(c=>String(c||'').trim()&&isNaN(Number(String(c||'').replace(/[,]/g,'')))).length;
      if(filled>=2) return i;
    }
    return 0;
  }

  /* м»¬лҹј мқёлҚұмҠӨ нғҗмғү
     мӢңнҠё мғҒм„ё м„№м…ҳ м»¬лҹј мҲңм„ң: кө¬л¶„ | н•ӯлӘ© | кёҲм•Ў | кі„м•Ҫкё°к°„ | мҶҢмҡ”кё°к°„ | лӮ©л¶Җл°©лІ• | лӮ©л¶Җл°©лІ• мғҒм„ё
     мӢңнҠё мҡ”м•Ҫ/нҶ м§Җ м„№м…ҳ м»¬лҹј мҲңм„ң: н•ӯлӘ© | кёҲм•Ў | кі„м•Ҫкё°к°„ | мҶҢмҡ”кё°к°„ | лӮ©л¶Җл°©лІ• | л№„кі 
  */
  function getColIdx(hdr){
    const idx={amt:undefined,item:undefined,cat:undefined,
               contract:undefined,period:undefined,
               method:undefined,methodDet:undefined,note:undefined};
    hdr.forEach((h,i)=>{
      const s=String(h||'').trim();
      if(!s) return;
      if(/^н•ӯлӘ©$|^кө¬л¶„лӘ…$|^лӮҙм—ӯ$|^л№„лӘ©$/i.test(s))               idx.item=i;
      else if(/^кө¬л¶„$|^лҢҖл¶„лҘҳ$/i.test(s))                         idx.cat=i;
      else if(/^кёҲм•Ў$/i.test(s))                                  idx.amt=i;
      else if(/^кі„м•Ҫкё°к°„$/i.test(s))                              idx.contract=i;
      else if(/^мҶҢмҡ”кё°к°„$/i.test(s))                              idx.period=i;
      else if(/лӮ©л¶Җл°©лІ•.*мғҒм„ё|лӮ©л¶Җ.*мғҒм„ё|лӮ©л¶Җл°©лІ•\sмғҒм„ё/i.test(s)) idx.methodDet=i;
      else if(/^лӮ©л¶Җл°©лІ•$|^лӮ©л¶Җ\s*л°©лІ•$/i.test(s))                idx.method=i;
      else if(/^л№„кі $|^л©”лӘЁ$/i.test(s))                           idx.note=i;
    });
    /* fallback вҖ” itemмқҙ м—Ҷмңјл©ҙ мң„м№ҳ кё°л°ҳ: кө¬л¶„ лӢӨмқҢ н…ҚмҠӨнҠё м»¬лҹј */
    if(idx.item===undefined){
      const catI=idx.cat!==undefined?idx.cat:-1;
      for(let i=0;i<Math.min(hdr.length,5);i++){
        if(i===catI) continue; /* кө¬л¶„ м»¬лҹј кұҙл„ҲлңҖ */
        const s=String(hdr[i]||'').trim();
        if(s && !/^\d/.test(s) && !/н•©кі„|sum|total|кёҲм•Ў|кё°к°„|лӮ©л¶Җ|л№„кі /i.test(s)){
          idx.item=i; break;
        }
      }
    }
    console.log('[м»¬лҹјнғҗмғү] hdr:', hdr.map((h,i)=>`[${i}]"${h}"`).join('|'));
    console.log('[м»¬лҹјнғҗмғү] кІ°кіј:', JSON.stringify(idx));
    return idx;
  }

  /* кёҲм•Ў нҢҢмӢұ: н•ҙлӢ№ м»¬лҹјмқҙ лӘ…нҷ•н•ҳл©ҙ мӮ¬мҡ©, м—Ҷмңјл©ҙ н–үм—җм„ң мң нҡЁ мҲ«мһҗ м°ҫкё° */
  function getAmt(r, idx){
    /* amt м»¬лҹјмқҙ мһҲмңјл©ҙ мөңмҡ°м„  */
    if(idx.amt>=0){
      const v=numVal(r[idx.amt]);
      if(v>0) return v;
    }
    /* м—Ҷмңјл©ҙ мҲ«мһҗ м»¬лҹј нғҗмғү (лӮ м§ң, н…ҚмҠӨнҠё, кё°к°„ м ңмҷё) */
    const skip=new Set(Object.values(idx).filter(x=>x>=0));
    for(let i=0;i<r.length;i++){
      if(skip.has(i)) continue;
      const raw=String(r[i]||'').trim();
      if(!raw||DATE_LIKE.test(raw)) continue;
      const v=numVal(raw);
      /* мөңмҶҢ 10л§Ңмӣҗ мқҙмғҒ, 100мЎ° лҜёл§Ң (мқјл°ҳ л№„мҡ© лІ”мң„) */
      if(v>=100000 && v<1e14) return v;
    }
    return 0;
  }

  /* кі„м•Ҫкё°к°„ нҢҢмӢұ
     вҳ… [мҲҳм •] YYYY-MM-DD ~ YYYY-MM-DD нҳ•мӢқ м§Җмӣҗ (мқј нҸ¬н•Ё)
        кё°мЎҙ м •к·ңмӢқмқҖ "2026-05-01 ~ 2027-08-31" к°ҷмқҖ нҳ•мӢқмқ„ null л°ҳнҷҳн•Ё
        вҶ’ мқј(DD) нҸ¬н•Ё нҢЁн„ҙмқ„ лЁјм Җ мӢңлҸ„, мқҙнӣ„ мӣ”к№Ңм§Җл§Ң мһҲлҠ” нҢЁн„ҙ мӢңлҸ„ */
  function parseContract(s){
    s=String(s||'').trim();
    if(!s||s==='-'||s==='вҖ”') return null;
    /* 1мҲңмң„: YYYY-MM-DD ~ YYYY-MM-DD (мқј нҸ¬н•Ё) */
    let m=s.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/]\d{1,2}\s*[~пҪһвҖ“]+\s*(\d{4})[.\-\/](\d{1,2})[.\-\/]\d{1,2}/);
    if(m) return{sy:+m[1],sm:+m[2],ey:+m[3],em:+m[4]};
    /* 2мҲңмң„: YYYY-MM ~ YYYY-MM (мқј м—ҶмқҢ) */
    m=s.match(/(\d{4})[.\-\/](\d{1,2})\s*[~пҪһвҖ“]+\s*(\d{4})[.\-\/](\d{1,2})(?!\d)/);
    if(m) return{sy:+m[1],sm:+m[2],ey:+m[3],em:+m[4]};
    return null;
  }

  /* мҶҢмҡ”кё°к°„(к°ңмӣ”мҲҳ) нҢҢмӢұ */
  function parsePeriodMo(s){
    s=String(s||'').trim();
    const m=s.match(/(\d+)\s*к°ңмӣ”/);
    if(m){const p=+m[1];if(p>0&&p<=240)return p;}
    if(/^\d{1,3}$/.test(s)){const p=+s;if(p>0&&p<=240)return p;}
    return 0;
  }

  /* кі„м•Ҫкё°к°„ л¬ёмһҗм—ҙ мғқм„ұ */
  function contractStr(r, idx){
    if(idx.contract!==undefined&&idx.contract>=0){
      const s=sv(r,idx.contract);
      if(s&&s!=='-'&&s!='вҖ”') return s;
    }
    return 'вҖ”';
  }

  /* мҶҢмҡ”кё°к°„ л¬ёмһҗм—ҙ */
  function periodStr(r, idx){
    if(idx.period!==undefined&&idx.period>=0){
      const s=sv(r,idx.period);
      if(s&&s!=='-'&&s!='вҖ”') return s;
    }
    /* кі„м•Ҫкё°к°„м—җм„ң кі„мӮ° */
    const cp=parseContract(contractStr(r,idx));
    if(cp){const d=(cp.ey-cp.sy)*12+(cp.em-cp.sm)+1;if(d>0)return d+'к°ңмӣ”';}
    return 'вҖ”';
  }

  /* мҶҢмҡ”кё°к°„(мҲ«мһҗ) */
  function periodMonths(r, idx){
    if(idx.period!==undefined&&idx.period>=0){
      const p=parsePeriodMo(sv(r,idx.period));
      if(p>0) return p;
    }
    const cp=parseContract(contractStr(r,idx));
    if(cp){const d=(cp.ey-cp.sy)*12+(cp.em-cp.sm)+1;if(d>0&&d<=240)return d;}
    return 1;
  }

  /* лӮ©л¶Җл°©лІ• */
  function methodStr(r, idx){
    if(idx.method!==undefined&&idx.method>=0){const s=sv(r,idx.method);if(s&&s!=='-'&&s!=='вҖ”')return s;}
    return 'вҖ”';
  }

  /* лӮ©л¶Җл°©лІ• мғҒм„ё */
  function methodDetStr(r, idx){
    if(idx.methodDet!==undefined&&idx.methodDet>=0){const s=sv(r,idx.methodDet);if(s&&s!=='-'&&s!=='вҖ”')return s;}
    return '';
  }

  /* н•©кі„н–ү м—¬л¶Җ */
  function isSumRow(r, idx){
    const name=(sv(r,idx.item)||sv(r,idx.cat)||r.slice(0,4).map(c=>String(c||'')).join('')).trim();
    if(SUMMARY_KW.test(name)) return true;
    for(let i=0;i<Math.min(r.length,5);i++){
      if(SUMMARY_KW.test(String(r[i]||'').trim())) return true;
    }
    return false;
  }

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [STEP 3] лӮ©л¶Җ мҠӨмјҖмӨ„ нҢҢмӢұ (YY-MM / YYYY-MM / л§Өмӣ” / мқјмӢңлӮ©)
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  function parseYM(s){
    s=String(s||'').trim();
    const m1=s.match(/^(\d{4})[.\-\/](\d{1,2})/);
    if(m1)return{y:+m1[1],m:+m1[2]};
    const m2=s.match(/^(\d{2})[.\-\/](\d{2})$/);
    if(m2){const y=+m2[1];return{y:y<50?2000+y:1900+y,m:+m2[2]};}
    return null;
  }

  function parseSchedule(r, idx){
    /* лӮ©л¶Җл°©лІ• мғҒм„ё мҡ°м„  */
    const det=methodDetStr(r,idx);
    if(det){
      /* "YY-MM / YY-MM / ..." нҳ•мӢқ вҖ” нҠ№м • лӮ м§ң лӘ©лЎқ */
      if(/\//.test(det)){
        const parts=det.split('/').map(p=>p.trim()).filter(Boolean);
        const dates=parts.map(parseYM).filter(Boolean);
        if(dates.length>=2) return{type:'dates',dates};
      }
      /* кё°к°„ лІ”мң„ */
      const rng=det.match(/(\d{4})[.\-\/](\d{1,2})[^\d]*[~пҪһвҖ“\-]+[^\d]*(\d{4})[.\-\/](\d{1,2})/);
      if(rng) return{type:'range',sy:+rng[1],sm:+rng[2],ey:+rng[3],em:+rng[4]};
      /* лӢЁмқј лӮ м§ң (мқјмӢңлӮ©) вҖ” YYYY-MM-DD лҳҗлҠ” YYYY-MM */
      const ym=parseYM(det.replace(/\d{4}-\d{2}-(\d{2})/,(_,dd)=>'').trim()||det);
      const ymFull=det.match(/(\d{4})[.\-\/](\d{1,2})/);
      if(ymFull&&!/\//.test(det)) return{type:'lump',ym:{y:+ymFull[1],m:+ymFull[2]}};
      if(/л§Өмӣ”/i.test(det)) return{type:'monthly'};
    }
    /* лӮ©л¶Җл°©лІ• м»¬лҹј кё°л°ҳ */
    const meth=String(sv(r,idx.method)||'').trim();
    const ml=meth.toLowerCase();
    /* NнҡҢ л¶„н•  вҖ” мҲ«мһҗк°Җ лӘ…мӢңлҗң кІҪмҡ° */
    const nMatch=meth.match(/(\d+)\s*нҡҢ/);
    if(nMatch){const n=+nMatch[1];if(n>1) return{type:'installment',count:n};}
    /* л§Өмӣ” лӮ©л¶Җ */
    if(/л§Өмӣ”|monthly|мӣ”лӮ©/i.test(ml)) return{type:'monthly'};
    /* мқјмӢңлӮ© */
    if(/мқјмӢңлӮ©|lump|once|м „м•Ў/i.test(ml)) return{type:'lump',ym:null};
    /* л¶„н•  лӮ©л¶Җ (N лҜём§Җм •) вҶ’ monthly лЎң мІҳлҰ¬ (кі„м•Ҫкё°к°„ к· л“ұ л¶„л°°) */
    if(/л¶„н• /i.test(ml)) return{type:'monthly'};
    return{type:'monthly'}; /* кё°ліё: л§Өмӣ” к· л“ұ */
  }

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [STEP 4] кө¬м—ӯлі„ н•ӯлӘ© нҢҢмӢұ
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  function parseSec(secRows, secName){
    if(!secRows.length) return [];
    const hi=findHdr(secRows);
    const hdr=secRows[hi];
    const idx=getColIdx(hdr);
    const data=secRows.slice(hi+1).filter(r=>r.some(c=>String(c||'').trim()));

    const items=[];
    data.forEach(r=>{
      if(isSumRow(r,idx)) return;
      /* н•ӯлӘ©лӘ…: item м»¬лҹј мҡ°м„ , м—Ҷмңјл©ҙ cat м»¬лҹј мӮ¬мҡ© */
      const itemVal = (idx.item!==undefined ? sv(r,idx.item) : '') ||
                      (idx.cat!==undefined  ? sv(r,idx.cat)  : '');
      if(!itemVal) return;
      const amt=getAmt(r,idx);
      if(amt<=0) return;
      const cp=parseContract(contractStr(r,idx));
      const sch=parseSchedule(r,idx);
      items.push({
        item: itemVal,
        cat: idx.cat!==undefined ? sv(r,idx.cat) : '',
        amt,
        contractRaw: contractStr(r,idx),
        periodRaw:   periodStr(r,idx),
        periodMo:    periodMonths(r,idx),
        methodRaw:   methodStr(r,idx),
        methodDetRaw:methodDetStr(r,idx),
        cp, sch,
      });
      console.log(`[${secName}] "${itemVal}" amt=${amt} contract=${contractStr(r,idx)} period=${periodStr(r,idx)} method=${methodStr(r,idx)} det=${methodDetStr(r,idx)}`);
    });
    return items;
  }

  let summaryItems=[], detailItems=[], landItems=[];

  if(fallbackMode){
    /* кө¬м—ӯ кө¬л¶„ м—ҶлҠ” кІҪмҡ° м „мІҙлҘј мғҒм„ёлЎң мІҳлҰ¬ */
    const hi=findHdrRow(rows);
    const hdr=rows[hi];
    const idx=getColIdx(hdr);
    const data=rows.slice(hi+1).filter(r=>r.some(c=>c));
    data.forEach(r=>{
      if(isSumRow(r,idx)) return;
      const itemVal=(idx.item!==undefined?sv(r,idx.item):'')||(idx.cat!==undefined?sv(r,idx.cat):'');
      if(!itemVal) return;
      const amt=getAmt(r,idx);
      if(amt<=0) return;
      const cp=parseContract(contractStr(r,idx));
      const sch=parseSchedule(r,idx);
      detailItems.push({item:itemVal,cat:idx.cat!==undefined?sv(r,idx.cat):'',amt,
        contractRaw:contractStr(r,idx),periodRaw:periodStr(r,idx),
        periodMo:periodMonths(r,idx),methodRaw:methodStr(r,idx),
        methodDetRaw:methodDetStr(r,idx),cp,sch});
    });
  } else {
    summaryItems = parseSec(summaryRows_raw, 'мҡ”м•Ҫ');
    detailItems  = parseSec(detailRows_raw, 'мғҒм„ё');
    landItems    = parseSec(landRows_raw, 'нҶ м§Җмһ„лҢҖлЈҢ');
  }

  console.log('[лІ•мқёл№„мҡ© v5] нҢҢмӢұмҷ„лЈҢ:', {мҡ”м•Ҫ:summaryItems.length, мғҒм„ё:detailItems.length, нҶ м§Җмһ„лҢҖлЈҢ:landItems.length});

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [STEP 5] м№ҙн…Ңкі лҰ¬ л¶„лҘҳ
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  /* мғҒм„ё м„№м…ҳмқҳ кө¬л¶„(cat) м»¬лҹј вҶ’ к·ёлЈ№ л§Өн•‘ */
  function getGroup(o){
    const c=String(o.cat||'').toLowerCase();
    const name=String(o.item||'').toLowerCase();

    /* вҳ… н•ӯлӘ©лӘ… кё°л°ҳ мҡ°м„  мІҙнҒ¬ вҖ” catліҙлӢӨ лЁјм Җ мӢӨн–ү
       кІҪкі„ліөмӣҗмёЎлҹү, л©ҙн—Ҳм„ё/мұ„к¶ҢмқҖ catмқҙ м„Өкі„л№„/к°җлҰ¬л№„м—¬лҸ„ кё°нғҖл№„мҡ©мңјлЎң л¶„лҘҳ */
    if(/кІҪкі„ліөмӣҗ|л©ҙн—Ҳм„ё|мұ„к¶Ң/.test(name)) return 'кё°нғҖл№„мҡ©';

    /* кө¬л¶„(cat) м»¬лҹј кё°л°ҳ */
    if(/кұҙм¶•м„Өкі„л№„/i.test(c)) return 'м„Өкі„л№„';
    if(/нҶ лӘ©м„Өкі„л№„/i.test(c)) return 'м„Өкі„л№„';
    if(/н•ҙмІҙм„Өкі„л№„/i.test(c)) return 'м„Өкі„л№„';
    if(/мғҒмЈјк°җлҰ¬л№„/i.test(c)) return 'к°җлҰ¬л№„';
    if(/н•ҙмІҙк°җлҰ¬л№„/i.test(c)) return 'к°җлҰ¬л№„';
    if(/кё°нғҖ.*л№„мҡ©|кё°нғҖл№„/i.test(c)) return 'кё°нғҖл№„мҡ©';
    if(/кіөмӮ¬л№„/i.test(c)) return 'кіөмӮ¬л№„';

    /* н•ӯлӘ©лӘ… кё°л°ҳ м¶”к°Җ л¶„лҘҳ */
    if(/м„Өкі„|мёЎлҹү(?!кІҪкі„)|м§Җл°ҳ|көҙнҶ |н•ҙмІҙ.*мӢ¬мқҳ|н•ҙмІҙ.*н—Ҳк°Җ|н•ҙмІҙ.*мӢ кі |м§Җн•ҳ.*м•Ҳм „|нқҷл§үмқҙ/i.test(name)) return 'м„Өкі„л№„';
    if(/к°җлҰ¬/i.test(name)) return 'к°җлҰ¬л№„';
    if(/кё°нғҖ.*л№„мҡ©|кё°нғҖл№„/i.test(name)) return 'кё°нғҖл№„мҡ©';
    if(/кіөмӮ¬|мӢңкіө/i.test(name)) return 'кіөмӮ¬л№„';
    if(/нҶ м§Җ.*мһ„лҢҖ|нҶ м§ҖлЈҢ|м§ҖлҢҖ/i.test(name)) return 'нҶ м§Җмһ„лҢҖлЈҢ';
    return 'кё°нғҖл№„мҡ©';
  }

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [STEP 6] мҙқм•Ў кі„мӮ°
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  const detailGrand=detailItems.reduce((a,o)=>a+o.amt,0);
  const landGrand  =landItems.reduce((a,o)=>a+o.amt,0);
  const grandTotal =detailGrand+landGrand;

  /* к·ёлЈ№лі„ н•©кі„ (мғҒм„ё кё°л°ҳ) */
  const grpMap=new Map();
  [...detailItems,...landItems].forEach(o=>{
    const g=o===landItems[0]&&landItems.includes(o)?'нҶ м§Җмһ„лҢҖлЈҢ':getGroup(o);
    grpMap.set(g,(grpMap.get(g)||0)+o.amt);
  });
  /* нҶ м§Җмһ„лҢҖлЈҢ лі„лҸ„ */
  if(landGrand>0) grpMap.set('нҶ м§Җмһ„лҢҖлЈҢ',(grpMap.get('нҶ м§Җмһ„лҢҖлЈҢ')||0)+landGrand);

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [STEP 7] мӣ”лі„ мәҗмӢңн”ҢлЎңмҡ° вҖ” 2026.01 ~ 2030.12 кі м •
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  const CF_START_Y=2026, CF_END_Y=2030;
  const months=[];
  for(let y=CF_START_Y;y<=CF_END_Y;y++) for(let m=1;m<=12;m++) months.push({y,m});

  /* нҶ м§Җмһ„лҢҖлЈҢ н•ӯлӘ© л№ лҘё мЎ°нҡҢмҡ© Set вҖ” amtInMonthліҙлӢӨ лЁјм Җ м„ м–ё */
  const landItemSet=new Set(landItems);

  /* н•ӯлӘ©лі„ мӣ” л°°л¶„
     вҳ… [мәҗмӢңн”ҢлЎңмҡ° мҲҳм •] кі„м•Ҫкё°к°„(cp) кё°мӨҖ м—„кІ© м Ғмҡ©
        - cp мһҲмңјл©ҙ кі„м•Ҫкё°к°„ мҷё мӣ”м—җлҠ” л°ҳл“ңмӢң 0
        - installment: base мӣ” кі„мӮ° лІ„к·ё мҲҳм • (12м§„лІ• м—°мӮ°)
        - monthly/л¶„н• лӮ©л¶Җ: кі„м•Ҫкё°к°„ к°ңмӣ”мҲҳлЎң лӮҳлҲ” (periodMo м•„лӢҢ cp кё°л°ҳ)
        - мқјмӢңлӮ©: кі„м•Ҫкё°к°„ мӢңмһ‘ мӣ” 1нҡҢ
  */
  function amtInMonth(o, y, m){
    const{amt,cp,sch}=o;
    const cur=y*100+m;

    /* вҳ… [нҶ м§Җмһ„лҢҖлЈҢ мҳҲмҷё] landItemsм—җ мҶҚн•ң н•ӯлӘ©мқҖ кі„м•Ҫкё°к°„ лҸҷм•Ҳ amtлҘј л§Өмӣ” к·ёлҢҖлЎң л°ҳмҳҒ
       мҙқм•Ўмқ„ к°ңмӣ”мҲҳлЎң лӮҳлҲ„м§Җ м•Ҡкі  мӣ” кі м • кёҲм•ЎмңјлЎң мІҳлҰ¬ */
    if(landItemSet.has(o)){
      if(!cp) return 0;
      const sYM=cp.sy*100+cp.sm;
      const eYM=cp.ey*100+cp.em;
      return(cur>=sYM&&cur<=eYM)?amt:0;
    }

    /* кі„м•Ҫкё°к°„ мӢңмһ‘/мў…лЈҢ кІ°м • */
    let sY,sM,eY,eM;
    if(cp){
      sY=cp.sy; sM=cp.sm; eY=cp.ey; eM=cp.em;
    } else {
      /* cp м—Ҷмңјл©ҙ кі„мӮ° л¶Ҳк°Җ вҶ’ 0 л°ҳнҷҳ (кі„м•Ҫкё°к°„ мҷё) */
      return 0;
    }
    const sYM=sY*100+sM;
    const eYM=eY*100+eM;

    /* кі„м•Ҫкё°к°„ лӮҙ к°ңмӣ” мҲҳ */
    const totalMo=(eY-sY)*12+(eM-sM)+1;

    switch(sch.type){

      /* нҠ№м • лӮ м§ң лӘ©лЎқ (26-05/26-09/вҖҰ) */
      case'dates':{
        /* лӮ м§ңк°Җ кі„м•Ҫкё°к°„ лӮҙм—җ мһҲлҠ” кІҪмҡ°л§Ң */
        const f=sch.dates.find(d=>d.y===y&&d.m===m);
        if(!f) return 0;
        return amt/sch.dates.length;
      }

      /* мқјмӢңлӮ© */
      case'lump':{
        if(sch.ym) return(sch.ym.y===y&&sch.ym.m===m)?amt:0;
        /* лӮ©л¶Җ лӮ м§ң лҜём§Җм • вҶ’ кі„м•Ҫ мӢңмһ‘ мӣ” */
        return(cur===sYM)?amt:0;
      }

      /* NнҡҢ л¶„н•  лӮ©л¶Җ вҖ” кі„м•Ҫкё°к°„ мӢңмһ‘мӣ”л¶Җн„° Nк°ңмӣ” к°„кІ© м—Ҷмқҙ мҲңм°Ё л°°л¶„ */
      case'installment':{
        if(cur<sYM||cur>eYM) return 0;
        const n=sch.count;
        /* кі„м•Ҫкё°к°„мқ„ nл“ұл¶„: к°Ғ кө¬к°„ мІ« лӢ¬м—җ м§Җкёү */
        const interval=Math.max(1,Math.floor(totalMo/n));
        for(let i=0;i<n;i++){
          /* iлІҲм§ё лӮ©л¶Җ мӣ” кі„мӮ° */
          const absM=(sY*12+sM-1)+(i*interval);
          const py=Math.floor(absM/12);
          const pm=(absM%12)+1;
          if(py===y&&pm===m) return amt/n;
        }
        return 0;
      }

      /* кё°к°„ лІ”мң„ м§Җм • */
      case'range':{
        const rS=sch.sy*100+sch.sm, rE=sch.ey*100+sch.em;
        if(cur<rS||cur>rE) return 0;
        const mc=(sch.ey-sch.sy)*12+(sch.em-sch.sm)+1;
        return mc>0?amt/mc:amt;
      }

      /* л§Өмӣ” / л¶„н• лӮ©л¶Җ (N лҜём§Җм •) вҶ’ кі„м•Ҫкё°к°„ лӮҙ к· л“ұ л¶„л°° */
      case'monthly':
      default:{
        if(cur<sYM||cur>eYM) return 0;
        return totalMo>0?amt/totalMo:amt;
      }
    }
  }

  /* мәҗмӢңн”ҢлЎңмҡ°м—җ мӮ¬мҡ©н•  н•ӯлӘ© лӘ©лЎқ (мғҒм„ё + нҶ м§Җмһ„лҢҖлЈҢ) */
  const cfItems=[...detailItems,...landItems];

  /* мӣ”лі„ н•©кі„ кі„мӮ° */
  const monthlyData=months.map(({y,m})=>{
    const byItem={};
    cfItems.forEach((o,i)=>{
      byItem[i]=amtInMonth(o,y,m);
    });
    const total=Object.values(byItem).reduce((a,b)=>a+b,0);
    return{y,m,byItem,total};
  });

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [STEP 8] KPI мғқм„ұ
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  const nonZeroMo=monthlyData.filter(d=>d.total>0).length;
  const totalCfSum=monthlyData.reduce((a,d)=>a+d.total,0);
  const avgMonthly=nonZeroMo>0?totalCfSum/nonZeroMo:0;
  const maxMo=monthlyData.reduce((b,d)=>d.total>b.total?d:b,{total:0,y:0,m:0});

  /* к·ёлЈ№лі„ KPI (м„Өкі„л№„/к°җлҰ¬л№„/кіөмӮ¬л№„/нҶ м§Җмһ„лҢҖлЈҢ) */
  const KPI_GROUPS=['м„Өкі„л№„','к°җлҰ¬л№„','кё°нғҖл№„мҡ©','кіөмӮ¬л№„','нҶ м§Җмһ„лҢҖлЈҢ'];
  const KPI_COLORS=[['r','#ef4444'],['p','#a78bfa'],['b','#60a5fa'],['o','#fb923c'],['y','#fbbf24']];
  const kpiGrpHTML=KPI_GROUPS.map((g,i)=>{
    const v=(()=>{
      if(g==='нҶ м§Җмһ„лҢҖлЈҢ') return landGrand;
      return [...detailItems].filter(o=>getGroup(o)===g).reduce((a,o)=>a+o.amt,0);
    })();
    if(!v) return '';
    const[cls,color]=KPI_COLORS[i];
    const cnt=g==='нҶ м§Җмһ„лҢҖлЈҢ'?landItems.length:detailItems.filter(o=>getGroup(o)===g).length;
    const lbl={м„Өкі„л№„:'рҹҸ—пёҸ м„Өкі„л№„',к°җлҰ¬л№„:'рҹ‘· к°җлҰ¬л№„',кё°нғҖл№„мҡ©:'рҹ“Ӣ кё°нғҖл№„мҡ©',кіөмӮ¬л№„:'рҹҸў кіөмӮ¬л№„',нҶ м§Җмһ„лҢҖлЈҢ:'рҹҸӣпёҸ нҶ м§Җмһ„лҢҖлЈҢ'}[g]||g;
    return`<div class="kpi ${cls}">
      <div class="kpi-lbl" style="color:#e5e7eb">${lbl}</div>
      <div class="kpi-val" style="color:${color}">${fmtBig(v)}мӣҗ</div>
      <div class="kpi-sub" style="color:#9ca3af">${cnt}кұҙ</div>
    </div>`;
  }).filter(Boolean).join('');

  const kpiHTML=`<div class="kpi-row">
    <div class="kpi b">
      <div class="kpi-lbl" style="color:#e5e7eb">мҙқ лІ•мқёл№„мҡ©</div>
      <div class="kpi-val" style="color:#ef4444">${fmtBig(grandTotal)}мӣҗ</div>
      <div class="kpi-sub" style="color:#9ca3af">мӢ м¶•л№„ ${fmtBig(detailGrand)}мӣҗ + мһ„лҢҖлЈҢ ${fmtBig(landGrand)}мӣҗ</div>
    </div>
    <div class="kpi g">
      <div class="kpi-lbl" style="color:#e5e7eb">нҸүк·  мӣ” м§Җм¶ң</div>
      <div class="kpi-val" style="color:#34d399">${fmtBig(avgMonthly)}мӣҗ</div>
      <div class="kpi-sub" style="color:#9ca3af">м§Җм¶ң л°ңмғқ ${nonZeroMo}к°ңмӣ” кё°мӨҖ</div>
    </div>
    ${maxMo.total>0?`<div class="kpi y">
      <div class="kpi-lbl" style="color:#e5e7eb">мөңлҢҖ м§Җм¶ң мӣ”</div>
      <div class="kpi-val" style="color:#fbbf24">${maxMo.y}.${String(maxMo.m).padStart(2,'0')}</div>
      <div class="kpi-sub" style="color:#9ca3af">${fmtBig(maxMo.total)}мӣҗ</div>
    </div>`:''}
    ${kpiGrpHTML}
  </div>`;

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [STEP 9] мӢ м¶• м „мІҙ л№„мҡ© мҡ”м•Ҫ HTML
     вҖ” мҡ”м•Ҫ м„№м…ҳ лҚ°мқҙн„° кё°л°ҳ, м—Ҷмңјл©ҙ мғҒм„ё к·ёлЈ№ м§‘кі„
       н‘ңмӢң м»¬лҹј: н•ӯлӘ© / кі„м•Ҫкё°к°„ / мҶҢмҡ”кё°к°„ / лӮ©л¶Җл°©лІ• / кёҲм•Ў
     вҳ… [мҲҳм •1] м»¬лҹј width кіөнҶө кё°мӨҖ (3к°ң н‘ң лҸҷмқј м Ғмҡ©)
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  /* в”Җв”Җ кіөнҶө colgroup вҖ” 3к°ң н‘ңм—җ лҸҷмқј м Ғмҡ©
       table-layout:fixed + % л№„мңЁлЎң м „мІҙ л„Ҳл№„ к· л“ұ л¶„л°°
       н•ӯлӘ©: 25%, кі„м•Ҫкё°к°„: 28%, мҶҢмҡ”кё°к°„: 10%, лӮ©л¶Җл°©лІ•: 15%, кёҲм•Ў: 12% в”Җв”Җ */
  const CORP_TABLE_STYLE='style="width:100%;table-layout:fixed"';
  const CORP_COLGROUP=`<colgroup>
    <col style="width:25%">
    <col style="width:28%">
    <col style="width:10%">
    <col style="width:15%">
    <col style="width:12%">
  </colgroup>`;
  /* кіөнҶө th мҠӨнғҖмқј */
  const TH_CONTRACT='style="text-align:left"';
  const TH_PERIOD  ='style="text-align:center"';
  const TH_METHOD  ='style="text-align:center"';
  const TH_AMT     ='class="r"';
  /* кіөнҶө td мҠӨнғҖмқј */
  const TD_CONTRACT='style="font-family:var(--mono);font-size:11px;color:#8890aa"';
  const TD_PERIOD  ='style="font-size:11px;color:#a0a8c0;text-align:center"';
  const TD_METHOD  ='style="font-size:10.5px;color:#8890aa;text-align:center"';

  function buildSummaryHTML(){
    const src = summaryItems.length>0 ? summaryItems : detailItems;
    const useSummaryData = summaryItems.length>0;
    let rowsHTML='', sTotal=0;

    src.forEach(o=>{
      sTotal+=o.amt;
      rowsHTML+=`<tr>
        <td class="label" style="color:#c9d1e8">${o.item}</td>
        <td ${TD_CONTRACT}>${o.contractRaw||'вҖ”'}</td>
        <td ${TD_PERIOD}>${o.periodRaw||'вҖ”'}</td>
        <td ${TD_METHOD}>${o.methodRaw||'вҖ”'}</td>
        <td class="r"><span class="exp" style="font-weight:600">${fmtBig(o.amt)}мӣҗ</span></td>
      </tr>`;
    });

    return`<div class="cf-section">
      <div class="cf-section-head">
        <div class="cf-section-bar" style="background:#4F7CFF"></div>
        <div class="cf-section-title">мӢ м¶• м „мІҙ л№„мҡ© мҡ”м•Ҫ</div>
        <div class="cf-section-sub">${useSummaryData?'мҡ”м•Ҫ м„№м…ҳ кё°л°ҳ':'мғҒм„ё лҚ°мқҙн„° кё°л°ҳ'} В· мҙқ ${fmtBig(grandTotal)}мӣҗ</div>
      </div>
      <div class="cf-table-wrap"><div style="overflow-x:auto">
        <table class="cf-table">
          ${CORP_COLGROUP}
          <thead><tr>
            <th>н•ӯлӘ©</th>
            <th ${TH_CONTRACT}>кі„м•Ҫкё°к°„</th>
            <th ${TH_PERIOD}>мҶҢмҡ”кё°к°„</th>
            <th ${TH_METHOD}>лӮ©л¶Җл°©лІ•</th>
            <th ${TH_AMT}>кёҲм•Ў</th>
          </tr></thead>
          <tbody>
            ${rowsHTML||'<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--t4)">лҚ°мқҙн„° м—ҶмқҢ</td></tr>'}
            <tr class="subtotal-row">
              <td colspan="4" style="font-weight:700">н•© кі„</td>
              <td class="r"><span class="exp" style="font-weight:700">${fmtBig(grandTotal)}мӣҗ</span></td>
            </tr>
          </tbody>
        </table>
      </div></div>
    </div>`;
  }

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [STEP 10] мӢ м¶• м „мІҙ л№„мҡ© мғҒм„ё HTML
     к·ёлЈ№: м„Өкі„л№„ / к°җлҰ¬л№„В·мқён—Ҳк°Җ / кіөмӮ¬л№„
     вҳ… [мҲҳм •1] CORP_COLGROUP л°Ҹ кіөнҶө TD/TH мҠӨнғҖмқј мһ¬мӮ¬мҡ©
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  function buildDetailHTML(){
    const GROUPS=[
      {label:'рҹҸ—пёҸ кұҙм¶• & нҶ лӘ© м„Өкі„л№„', filter:o=>getGroup(o)==='м„Өкі„л№„'},
      {label:'рҹ‘· к°җлҰ¬л№„', filter:o=>getGroup(o)==='к°җлҰ¬л№„'},
      {label:'рҹ“Ӣ кё°нғҖл№„мҡ©', filter:o=>getGroup(o)==='кё°нғҖл№„мҡ©'},
      {label:'рҹҸў кіөмӮ¬л№„', filter:o=>getGroup(o)==='кіөмӮ¬л№„'},
    ];

    let bodyHTML='';
    const assigned=new Set();

    GROUPS.forEach(g=>{
      const matched=detailItems.filter((o,i)=>!assigned.has(i)&&g.filter(o));
      matched.forEach(o=>assigned.add(detailItems.indexOf(o)));
      if(!matched.length) return;
      const gTot=matched.reduce((a,o)=>a+o.amt,0);
      bodyHTML+=`<tr class="yr-group"><td colspan="5" style="font-weight:700;letter-spacing:.3px">${g.label}</td></tr>`;
      matched.forEach(o=>{
        bodyHTML+=`<tr>
          <td class="label" style="padding-left:20px;color:#d6daf0;font-weight:500">${o.item}</td>
          <td ${TD_CONTRACT}>${o.contractRaw||'вҖ”'}</td>
          <td ${TD_PERIOD}>${o.periodRaw||'вҖ”'}</td>
          <td ${TD_METHOD}>${o.methodRaw||'вҖ”'}</td>
          <td class="r"><span class="exp">${fmtBig(o.amt)}мӣҗ</span></td>
        </tr>`;
      });
      bodyHTML+=`<tr class="yr-total">
        <td colspan="4" style="font-size:11px">мҶҢ кі„</td>
        <td class="r"><span class="exp" style="font-size:11px">${fmtBig(gTot)}мӣҗ</span></td>
      </tr>`;
    });

    /* лҜёл¶„лҘҳ */
    const unassigned=detailItems.filter((_,i)=>!assigned.has(i));
    if(unassigned.length){
      const uTot=unassigned.reduce((a,o)=>a+o.amt,0);
      bodyHTML+=`<tr class="yr-group"><td colspan="5">кё°нғҖ</td></tr>`;
      unassigned.forEach(o=>{
        bodyHTML+=`<tr>
          <td class="label" style="padding-left:20px;color:#d6daf0">${o.item}</td>
          <td ${TD_CONTRACT}>${o.contractRaw||'вҖ”'}</td>
          <td ${TD_PERIOD}>${o.periodRaw||'вҖ”'}</td>
          <td ${TD_METHOD}>${o.methodRaw||'вҖ”'}</td>
          <td class="r"><span class="exp">${fmtBig(o.amt)}мӣҗ</span></td>
        </tr>`;
      });
      bodyHTML+=`<tr class="yr-total"><td colspan="4" style="font-size:11px">мҶҢ кі„</td><td class="r"><span class="exp" style="font-size:11px">${fmtBig(uTot)}мӣҗ</span></td></tr>`;
    }

    return`<div class="cf-section">
      <div class="cf-section-head">
        <div class="cf-section-bar" style="background:var(--red)"></div>
        <div class="cf-section-title">мӢ м¶• м „мІҙ л№„мҡ© мғҒм„ё</div>
        <div class="cf-section-sub">${detailItems.length}кұҙ В· к·ёлЈ№лі„ кө¬м„ұ</div>
      </div>
      <div class="cf-table-wrap"><div style="overflow-x:auto">
        <table class="cf-table">
          ${CORP_COLGROUP}
          <thead><tr>
            <th>н•ӯлӘ©</th>
            <th ${TH_CONTRACT}>кі„м•Ҫкё°к°„</th>
            <th ${TH_PERIOD}>мҶҢмҡ”кё°к°„</th>
            <th ${TH_METHOD}>лӮ©л¶Җл°©лІ•</th>
            <th ${TH_AMT}>кёҲм•Ў</th>
          </tr></thead>
          <tbody>
            ${bodyHTML||'<tr><td colspan="5" style="text-align:center;padding:20px;color:var(--t4)">н•ӯлӘ© м—ҶмқҢ</td></tr>'}
            <tr class="subtotal-row">
              <td colspan="4" style="font-weight:700">мӢ м¶•л№„ н•©кі„</td>
              <td class="r"><span class="exp" style="font-weight:700">${fmtBig(detailGrand)}мӣҗ</span></td>
            </tr>
          </tbody>
        </table>
      </div></div>
    </div>`;
  }

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [STEP 11] лІ•мқё нҶ м§Җмһ„лҢҖлЈҢ HTML
     вҳ… [мҲҳм •1] CORP_COLGROUP л°Ҹ кіөнҶө TD/TH мҠӨнғҖмқј мһ¬мӮ¬мҡ©
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  function buildLandHTML(){
    if(!landItems.length) return '';
    const rowsHTML=landItems.map(o=>`<tr>
      <td class="label" style="color:#fbbf24;font-weight:600">${o.item}</td>
      <td ${TD_CONTRACT}>${o.contractRaw||'вҖ”'}</td>
      <td ${TD_PERIOD}>${o.periodRaw||'вҖ”'}</td>
      <td ${TD_METHOD}>${o.methodRaw||'л§Өмӣ” лӮ©л¶Җ'}</td>
      <td class="r"><span style="color:#fbbf24;font-family:var(--mono);font-weight:600">${fmtBig(o.amt)}мӣҗ</span></td>
    </tr>`).join('');

    return`<div class="cf-section">
      <div class="cf-section-head">
        <div class="cf-section-bar" style="background:#fbbf24"></div>
        <div class="cf-section-title">рҹҸӣпёҸ лІ•мқё нҶ м§Җмһ„лҢҖлЈҢ</div>
        <div class="cf-section-sub">мӢ м¶•л№„мҷҖ лі„лҸ„ кө¬л¶„ В· ${landItems.length}кұҙ В· мҙқ ${fmtBig(landGrand)}мӣҗ</div>
      </div>

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [STEP 12] мӣ”лі„ мәҗмӢңн”ҢлЎңмҡ° HTML
     вҳ… н•ӯлӘ©лӘ… м „мІҙ н‘ңмӢң + кёҲм•Ў мӣҗ лӢЁмң„ м „мІҙ н‘ңмӢң + к°ҖлЎң мҠӨнҒ¬лЎӨ н—Ҳмҡ©
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  function buildMonthlyHTML(){
    /* нҷңм„ұ н•ӯлӘ©: мӢӨм ң м§Җм¶ң л°ңмғқ н•ӯлӘ©л§Ң */
    const activeItems=cfItems.filter((_,i)=>monthlyData.some(d=>(d.byItem[i]||0)>0));

    if(!activeItems.length){
      return`<div class="cf-section">
        <div class="cf-section-head">
          <div class="cf-section-bar" style="background:var(--t4)"></div>
          <div class="cf-section-title">мӣ”лі„ л№„мҡ© мәҗмӢңн”ҢлЎңмҡ°</div>
        </div>
        <div class="cf-table-wrap" style="padding:30px;text-align:center;color:var(--t4)">
          мӢңнҠём—җ кі„м•Ҫкё°к°„/мҶҢмҡ”кё°к°„/лӮ©л¶Җл°©лІ• м»¬лҹјмқ„ мһ…л Ҙн•ҳл©ҙ мӣ”лі„ мғҒм„ёк°Җ мһҗлҸҷмңјлЎң н‘ңмӢңлҗ©лӢҲлӢӨ
        </div>
      </div>`;
    }

    /* н•ӯлӘ© м»¬лҹј к·ёлЈ№ мғүмғҒ */
    function itemColor(o){
      const g=getGroup(o);
      if(g==='м„Өкі„л№„') return '#60a5fa';
      if(g==='к°җлҰ¬л№„') return '#a78bfa';
      if(g==='кё°нғҖл№„мҡ©') return '#60a5fa';
      if(g==='кіөмӮ¬л№„') return '#fb923c';
      if(g==='нҶ м§Җмһ„лҢҖлЈҢ') return '#fbbf24';
      return '#8890aa';
    }

    /* кёҲм•Ў н•ңкөӯмӢқ м¶•м•Ҫ н‘ңкё° (м–ө/л§Ң лӢЁмң„, нҷ”л©ҙ н‘ңмӢң м „мҡ© вҖ” кі„мӮ°мқҖ мӣҗ лӢЁмң„ мң м§Җ) */
    function fmtFull(n){
      if(!n||isNaN(n)) return 'вҖ”';
      const abs=Math.abs(n);
      const sign=n<0?'-':'';
      if(abs>=1e8){
        const ok=Math.floor(abs/1e8);
        const man=Math.round((abs%1e8)/1e4);
        return sign+(man>0?ok+'м–ө '+man.toLocaleString('ko-KR')+'л§Ң':ok+'м–ө')+'мӣҗ';
      }
      if(abs>=1e4){
        return sign+Math.round(abs/1e4).toLocaleString('ko-KR')+'л§Ңмӣҗ';
      }
      return sign+Math.round(abs).toLocaleString('ko-KR')+'мӣҗ';
    }

    /* н•ӯлӘ©лі„ м „мІҙ н•©кі„ */
    const itemTotals=activeItems.map((_,ai)=>{
      const oi=cfItems.indexOf(activeItems[ai]);
      return monthlyData.reduce((s,d)=>s+(d.byItem[oi]||0),0);
    });

    let bodyHTML='',lastY=null,yrSum=0,cumTotal=0;
    const yrByItem=new Array(activeItems.length).fill(0);

    monthlyData.forEach(({y,m,byItem,total})=>{
      if(y!==lastY){
        if(lastY!==null&&yrSum>0){
          bodyHTML+=`<tr class="yr-total">
            <td>${lastY}л…„ мҶҢкі„</td>
            ${activeItems.map((_,ai)=>{
              const v=yrByItem[ai];
              return`<td class="r">${v>0?`<span class="exp">${fmtFull(v)}</span>`:`<span class="dim">вҖ”</span>`}</td>`;
            }).join('')}
            <td class="r"><span class="exp">${fmtFull(yrSum)}</span></td>
            <td class="r"></td>
          </tr>`;
        }
        bodyHTML+=`<tr class="yr-group"><td colspan="${activeItems.length+3}">${y}л…„</td></tr>`;
        lastY=y; yrSum=0;
        yrByItem.fill(0);
      }
      if(total===0) return;
      yrSum+=total; cumTotal+=total;
      activeItems.forEach((_,ai)=>{
        const oi=cfItems.indexOf(activeItems[ai]);
        yrByItem[ai]=(yrByItem[ai]||0)+(byItem[oi]||0);
      });
      bodyHTML+=`<tr>
        <td class="ym" style="min-width:70px">${y}.${String(m).padStart(2,'0')}</td>
        ${activeItems.map((_,ai)=>{
          const oi=cfItems.indexOf(activeItems[ai]);
          const v=byItem[oi]||0;
          return`<td class="r" style="min-width:90px">${v>0?`<span class="exp">${fmtFull(v)}</span>`:`<span class="dim">вҖ”</span>`}</td>`;
        }).join('')}
        <td class="r" style="min-width:100px"><span class="exp" style="font-weight:600">${fmtFull(total)}</span></td>
        <td class="r" style="min-width:100px"><span class="neu">${fmtFull(cumTotal)}</span></td>
      </tr>`;
    });

    /* л§Ҳм§Җл§ү м—°лҸ„ мҶҢкі„ */
    if(lastY&&yrSum>0){
      bodyHTML+=`<tr class="yr-total">
        <td>${lastY}л…„ мҶҢкі„</td>
        ${activeItems.map((_,ai)=>{
          const v=yrByItem[ai];
          return`<td class="r">${v>0?`<span class="exp">${fmtFull(v)}</span>`:`<span class="dim">вҖ”</span>`}</td>`;
        }).join('')}
        <td class="r"><span class="exp">${fmtFull(yrSum)}</span></td>
        <td class="r"></td>
      </tr>`;
    }

    /* м „мІҙ н•©кі„ н–ү */
    bodyHTML+=`<tr class="subtotal-row">
      <td style="font-weight:700">м „мІҙ н•©кі„</td>
      ${activeItems.map((_,ai)=>`<td class="r"><span class="exp" style="font-weight:600">${fmtFull(itemTotals[ai])}</span></td>`).join('')}
      <td class="r"><span class="exp" style="font-weight:700">${fmtFull(cumTotal)}</span></td>
      <td class="r"></td>
    </tr>`;

    /* н—ӨлҚ”: н•ӯлӘ©лӘ… м „мІҙ н‘ңмӢң, к·ёлЈ№ мғүмғҒ кө¬л¶„ */
    const theadCols=activeItems.map(o=>{
      const color=itemColor(o);
      const fullName=String(o.item||'');
      return`<th class="r" style="color:${color};font-size:11px;min-width:90px;padding:10px 12px">${fullName}</th>`;
    }).join('');

    return`<div class="cf-section cf-section-monthly">
      <div class="cf-section-head">
        <div class="cf-section-bar" style="background:var(--orange)"></div>
        <div class="cf-section-title">мӣ”лі„ л№„мҡ© мәҗмӢңн”ҢлЎңмҡ°</div>
        <div class="cf-section-sub">${CF_START_Y}вҖ“${CF_END_Y} В· мҙқ ${fmtFull(cumTotal)}</div>
      </div>
      <div class="cf-table-wrap">
        <div class="corp-cf-scroll" id="corpCfScroll">
        <table class="cf-table" style="width:max-content;min-width:100%">
          <thead>
            <tr>
              <th class="ym" style="color:#9ca3af;font-weight:700;min-width:80px;position:sticky;left:0;z-index:2;background:var(--s2)">м—°мӣ”</th>
              ${theadCols}
              <th class="r" style="color:#ef4444;font-weight:700;min-width:100px">мӣ” н•©кі„</th>
              <th class="r" style="color:#60a5fa;font-weight:700;min-width:100px">лҲ„м Ғ</th>
            </tr>
          </thead>
          <tbody>${bodyHTML}</tbody>
        </table>
        </div>
      </div>
    </div>`;
  }

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [STEP 13] мөңмў… л ҢлҚ”л§Ғ
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
  CACHE['corp_cfn']=null;
  initTS('corp');TS['corp']={search:'',sortCol:-1,sortAsc:true,page:1};

  sec.innerHTML=`
    <div class="notice">рҹ“Ў кө¬кёҖ мӢңнҠё мӢӨмӢңк°„ м—°лҸҷ В· лІ•мқёл№„мҡ© Cash Flow (v5)</div>
    ${kpiHTML}
    ${buildSummaryHTML()}
    ${buildDetailHTML()}
    ${buildLandHTML()}
    ${buildMonthlyHTML()}
    <div id="corp-raw" style="display:none"><div id="corp-tbl"></div></div>`;
  drawTable('corp',rows,'corp-tbl');

  /* вҳ… [мҲҳм •3] лІ•мқёл№„мҡ© мӣ”лі„ мәҗмӢңн”ҢлЎңмҡ° л“ңлһҳк·ё мҠӨнҒ¬лЎӨ мҙҲкё°нҷ”
     вҖ” лІ•мқёл№„мҡ© нғӯ лӮҙл¶Җ #corpCfScroll мҡ”мҶҢм—җл§Ң м Ғмҡ©, м „м—ӯ мҳҒн–Ҙ м—ҶмқҢ */
  (function initCorpDragScroll(){
    const el=document.getElementById('corpCfScroll');
    if(!el) return;
    let isDown=false, startX=0, scrollLeft=0, moved=false;
    el.addEventListener('mousedown',e=>{
      /* лІ„нҠј нҒҙлҰӯ(мўҢнҒҙлҰӯл§Ң) */
      if(e.button!==0) return;
      isDown=true; moved=false;
      startX=e.pageX-el.offsetLeft;
      scrollLeft=el.scrollLeft;
      el.classList.add('dragging');
    });
    window.addEventListener('mouseup',()=>{
      if(!isDown) return;
      isDown=false;
      el.classList.remove('dragging');
    });
    window.addEventListener('mousemove',e=>{
      if(!isDown) return;
      e.preventDefault();
      const x=e.pageX-el.offsetLeft;
      const walk=(x-startX)*1.2;
      if(Math.abs(walk)>3) moved=true;
      el.scrollLeft=scrollLeft-walk;
    });
    /* л“ңлһҳк·ё мӨ‘ click мқҙлІӨнҠё м–өм ң (н…ҚмҠӨнҠё м„ нғқ л°©м§Җ) */
    el.addEventListener('click',e=>{if(moved){e.stopPropagation();moved=false;}});
    /* н„°м№ҳ м§Җмӣҗ */
    let touchStartX=0, touchScrollLeft=0;
    el.addEventListener('touchstart',e=>{
      touchStartX=e.touches[0].pageX;
      touchScrollLeft=el.scrollLeft;
    },{passive:true});
    el.addEventListener('touchmove',e=>{
      const dx=touchStartX-e.touches[0].pageX;
      el.scrollLeft=touchScrollLeft+dx;
    },{passive:true});
  })();
}




/* в•җв•җ к°ңмқёл№„мҡ© мәҗмӢңн”ҢлЎңмҡ° нғӯ м „нҷҳ в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function cfTab(id,btn){
  document.querySelectorAll('.cf-tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.cf-tab-pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  const pane=document.getElementById('cf-pane-'+id);
  if(pane)pane.classList.add('active');
}

/* в•җв•җ LOAD / ROUTE в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function showLoader(id){document.getElementById(id).innerHTML=`<div class="loader"><div class="ring"></div><p>лҚ°мқҙн„° л¶Ҳлҹ¬мҳӨлҠ” мӨ‘вҖҰ</p></div>`;}
function stamp(){document.getElementById('syncTime').textContent=new Date().toLocaleTimeString('ko-KR');}

async function load(k){
  showLoader(`sec-${k}`);
  try{
    const rows=await fetchSheet(k);  /* вҶҗ л§ӨлІҲ кө¬кёҖ мӢңнҠём—җм„ң мғҲлЎң fetch */
    CACHE[k]=rows;
    if(k==='timeline')renderTimeline(rows);
    else if(k==='irr')renderIRR(rows);
    else if(k==='lease')renderLease(rows);
    else renderCost(k,rows);
    stamp();
  }catch(e){document.getElementById(`sec-${k}`).innerHTML=errHTML(e.message);}
}

function go(k,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById(`sec-${k}`).classList.add('on');
  CUR=k;
  if(!LOADED.has(k)){LOADED.add(k);load(k);}
}

async function refreshCurrent(){
  const btn=document.getElementById('btnRef');
  btn.classList.add('spin');
  LOADED.delete(CUR);
  await load(CUR);
  LOADED.add(CUR);
  btn.classList.remove('spin');
}

/* в•җв•җ [мҲҳм •] м „мІҙ нғӯ лҚ°мқҙн„° мқјкҙ„ мғҲлЎңкі м№Ё в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   мғҲлЎңкі м№Ё лІ„нҠј нҒҙлҰӯ мӢң лӘЁл“  нғӯ fetch вҶ’ cache м—…лҚ°мқҙнҠё вҶ’ нҳ„мһ¬ нғӯ render
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
async function reloadAll(){
  const btn=document.getElementById('btnRef');
  btn.classList.add('spin');
  /* лӘЁл“  нғӯ LOADED мәҗмӢң мҙҲкё°нҷ” */
  Object.keys(TABS).forEach(k=>LOADED.delete(k));
  /* м „мІҙ нғӯ лі‘л ¬ fetch */
  const keys=Object.keys(TABS);
  await Promise.allSettled(keys.map(k=>load(k)));
  /* нҳ„мһ¬ нғӯ лӢӨмӢң render (loadм—җм„ң мқҙлҜё мІҳлҰ¬лҗҳм§Җл§Ң CURмқҙ нҷ•мӢӨнһҲ on мғҒнғңмқём§Җ ліҙмһҘ) */
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById(`sec-${CUR}`).classList.add('on');
  btn.classList.remove('spin');
}

/* в•җв•җ [мҲҳм •] лёҢлһңл“ң нҒҙлҰӯ вҖ” нҷҲ(нғҖмһ„лқјмқё) мқҙлҸҷ + м „мІҙ мғҲлЎңкі м№Ё в•җв•җ
   1. нғҖмһ„лқјмқё нғӯ нҷңм„ұнҷ”
   2. м „мІҙ лҚ°мқҙн„° мғҲлЎңкі м№Ё
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
async function goHome(){
  /* нғҖмһ„лқјмқё нғӯ лІ„нҠј м°ҫм•„ нҷңм„ұнҷ” */
  const tabBtns=document.querySelectorAll('.tab');
  tabBtns.forEach(b=>b.classList.remove('on'));
  tabBtns[0].classList.add('on'); /* мІ« лІҲм§ё нғӯ = н”„лЎңм қнҠё нғҖмһ„лқјмқё */
  document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
  document.getElementById('sec-timeline').classList.add('on');
  CUR='timeline';
  /* м „мІҙ лҚ°мқҙн„° мғҲлЎңкі м№Ё */
  await reloadAll();
}

/* в•җв•җ INIT в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
LOADED.add('timeline');
load('timeline');
/* 15л¶„л§ҲлӢӨ нҳ„мһ¬ нғӯ мһҗлҸҷ к°ұмӢ  вҖ” кө¬кёҖ мӢңнҠё ліҖкІҪмӮ¬н•ӯ мһҗлҸҷ л°ҳмҳҒ */
setInterval(()=>{LOADED.delete(CUR);load(CUR);},15*60*1000);

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   мӢңмһҘ лҰ¬нҸ¬нҠё нғӯ вҖ” localStorage кё°л°ҳ лёҢлҰ¬н•‘ мқҙл Ҙ кҙҖлҰ¬
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
const RPT_KEY = 'bluepika_reports_v1';

/* м ҖмһҘмҶҢ мқҪкё° */
function rptLoad() {
  try { return JSON.parse(localStorage.getItem(RPT_KEY) || '[]'); }
  catch(e) { return []; }
}

/* м ҖмһҘмҶҢ м“°кё° */
function rptSave(list) {
  localStorage.setItem(RPT_KEY, JSON.stringify(list));
}

/* лёҢлҰ¬н•‘ н…ҚмҠӨнҠёлҘј HTMLлЎң ліҖнҷҳ (мқҙлӘЁм§Җ м„№м…ҳ н—ӨлҚ” к°•мЎ°) */
function rptToHTML(text) {
  const lines = text.split('\n');
  let html = '';
  const sectionRx = /^(вҡ–пёҸ|рҹҸ—пёҸ|рҹ“Қ|рҹҸў|вӯҗ|рҹӣҚпёҸ|рҹ”‘|рҹ”ә|рҹ’Ў)/;
  for (const line of lines) {
    if (sectionRx.test(line.trim())) {
      html += `<span class="rpt-section-head">${escH(line)}</span>`;
    } else {
      // URL л§ҒнҒ¬нҷ”
      const linked = escH(line).replace(
        /https?:\/\/[^\s<>"]+/g,
        u => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`
      );
      html += linked + '\n';
    }
  }
  return html;
}

function escH(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* лҰ¬нҸ¬нҠё нғӯ л ҢлҚ” */
function renderReport() {
  const sec = document.getElementById('sec-report');
  const list = rptLoad();
  let searchVal = '';

  function getFiltered() {
    if (!searchVal.trim()) return list;
    const q = searchVal.trim().toLowerCase();
    return list.filter(r =>
      r.date.includes(q) || r.title.toLowerCase().includes(q) || r.content.toLowerCase().includes(q)
    );
  }

  function render() {
    const filtered = getFiltered();
    const countEl = sec.querySelector('#rptCount');
    if (countEl) countEl.textContent = `мҙқ ${list.length}кұҙ В· н‘ңмӢң ${filtered.length}кұҙ`;

    const listEl = sec.querySelector('#rptList');
    if (!listEl) return;

    if (filtered.length === 0) {
      listEl.innerHTML = `
        <div class="rpt-empty">
          <div class="rpt-empty-i">рҹ“Ӣ</div>
          <h3>${list.length === 0 ? 'м ҖмһҘлҗң лёҢлҰ¬н•‘мқҙ м—ҶмҠөлӢҲлӢӨ' : 'кІҖмғү кІ°кіјк°Җ м—ҶмҠөлӢҲлӢӨ'}</h3>
          <p>${list.length === 0
            ? 'Claudeм—җм„ң "мҳӨлҠҳ лёҢлҰ¬н•‘" мҡ”мІӯ нӣ„<br>нҷ”л©ҙ мҡ°н•ҳлӢЁ м ҖмһҘ лІ„нҠјмқ„ нҒҙлҰӯн•ҳл©ҙ<br>м—¬кё°м—җ мқҙл Ҙмқҙ лҲ„м Ғлҗ©лӢҲлӢӨ.'
            : 'лӢӨлҘё нӮӨмӣҢл“ңлЎң кІҖмғүн•ҙліҙм„ёмҡ”.'}</p>
        </div>`;
      return;
    }

    listEl.innerHTML = filtered.map((r, i) => {
      const realIdx = list.indexOf(r);
      return `
      <div class="rpt-card" id="rpt-card-${realIdx}">
        <div class="rpt-card-head" onclick="rptToggle(${realIdx})">
          <div class="rpt-card-meta">
            <span class="rpt-date">${r.date}</span>
            <span class="rpt-title">${escH(r.title)}</span>
          </div>
          <div class="rpt-card-actions">
            <span class="rpt-toggle" id="rpt-tog-${realIdx}">нҺјм№ҳкё° в–ҫ</span>
            <span class="rpt-del" onclick="event.stopPropagation();rptDelete(${realIdx})">рҹ—‘</span>
          </div>
        </div>
        <div class="rpt-card-body" id="rpt-body-${realIdx}">
          <div class="rpt-content">${rptToHTML(r.content)}</div>
        </div>
      </div>`;
    }).join('');
  }

  sec.innerHTML = `
    <div class="notice">рҹ“Ӣ мӢңмһҘ лҰ¬нҸ¬нҠё мқҙл Ҙ В· лёҢлҰ¬н•‘ м ҖмһҘ мӢң мһҗлҸҷ лҲ„м Ғ В· localStorage м ҖмһҘ</div>
    <div class="rpt-toolbar">
      <div class="rpt-toolbar-l">
        <span class="rpt-count" id="rptCount">мҙқ 0кұҙ</span>
        <input class="rpt-search" id="rptSearch" type="text" placeholder="лӮ м§ңВ·нӮӨмӣҢл“ң кІҖмғүвҖҰ"
          oninput="rptSearchInput(this.value)">
      </div>
      <div class="rpt-toolbar-l">
        <button class="rpt-btn" onclick="rptExport()">в¬Ү м „мІҙ лӮҙліҙлӮҙкё°</button>
        <button class="rpt-btn danger" onclick="rptClearAll()">м „мІҙ мӮӯм ң</button>
      </div>
    </div>
    <div id="rptList" class="rpt-list"></div>`;

  render();

  /* кІҖмғү мһ…л Ҙ н•ёл“Өлҹ¬ л“ұлЎқ */
  window.rptSearchInput = function(val) {
    searchVal = val;
    render();
  };
}

/* м№ҙл“ң м—ҙкё°/лӢ«кё° */
window.rptToggle = function(idx) {
  const body = document.getElementById(`rpt-body-${idx}`);
  const tog  = document.getElementById(`rpt-tog-${idx}`);
  if (!body) return;
  const isOpen = body.classList.toggle('open');
  tog.textContent = isOpen ? 'м ‘кё° в–ҙ' : 'нҺјм№ҳкё° в–ҫ';
};

/* к°ңлі„ мӮӯм ң */
window.rptDelete = function(idx) {
  if (!confirm('мқҙ лёҢлҰ¬н•‘мқ„ мӮӯм ңн• к№Ңмҡ”?')) return;
  const list = rptLoad();
  list.splice(idx, 1);
  rptSave(list);
  renderReport();
};

/* м „мІҙ мӮӯм ң */
window.rptClearAll = function() {
  if (!confirm(`м ҖмһҘлҗң лёҢлҰ¬н•‘ ${rptLoad().length}кұҙмқ„ лӘЁл‘җ мӮӯм ңн• к№Ңмҡ”?\nмқҙ мһ‘м—…мқҖ лҗҳлҸҢлҰҙ мҲҳ м—ҶмҠөлӢҲлӢӨ.`)) return;
  rptSave([]);
  renderReport();
};

/* JSON лӮҙліҙлӮҙкё° */
window.rptExport = function() {
  const list = rptLoad();
  if (!list.length) { alert('м ҖмһҘлҗң лёҢлҰ¬н•‘мқҙ м—ҶмҠөлӢҲлӢӨ.'); return; }
  const blob = new Blob([JSON.stringify(list, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `bluepika_reports_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
};

/* в”Җв”Җ лёҢлҰ¬н•‘ м ҖмһҘ л°°л„Ҳ (мҷёл¶Җм—җм„ң нҳём¶ң) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
/* мӮ¬мҡ©лІ•: rptShowSaveBanner('рҹ“… лё”лЈЁн”јм№ҙ л¶ҖлҸҷмӮ° мў…н•© лҰ¬нҸ¬нҠё 2026-05-20', 'м „мІҙ лёҢлҰ¬н•‘ н…ҚмҠӨнҠё...') */
window.rptShowSaveBanner = function(title, content) {
  let banner = document.getElementById('rptSaveBanner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'rptSaveBanner';
    banner.className = 'rpt-save-banner';
    document.body.appendChild(banner);
  }
  banner.innerHTML = `
    <span>рҹ“° <strong>мғҲ лёҢлҰ¬н•‘</strong>мқ„ лҰ¬нҸ¬нҠё нғӯм—җ м ҖмһҘн• к№Ңмҡ”?</span>
    <button class="rpt-save-btn" onclick="rptDoSave()">м ҖмһҘн•ҳкё°</button>
    <button class="rpt-save-dismiss" onclick="rptDismissBanner()">лӢ«кё°</button>`;
  banner.classList.add('show');
  banner._pending = { title, content };
};

window.rptDoSave = function() {
  const banner = document.getElementById('rptSaveBanner');
  if (!banner || !banner._pending) return;
  const { title, content } = banner._pending;
  const list = rptLoad();
  const now = new Date();
  const date = now.toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'})
    .replace(/\. /g,'-').replace('.','');
  list.unshift({ id: Date.now(), date, title, content, savedAt: now.toISOString() });
  rptSave(list);
  banner.classList.remove('show');
  banner._pending = null;
  /* лҰ¬нҸ¬нҠё нғӯмқҙ м—ҙл ӨмһҲмңјл©ҙ мҰүмӢң к°ұмӢ  */
  if (CUR === 'report') renderReport();
  alert('вң… лёҢлҰ¬н•‘мқҙ мӢңмһҘ лҰ¬нҸ¬нҠё нғӯм—җ м ҖмһҘлҗҳм—ҲмҠөлӢҲлӢӨ!');
};

window.rptDismissBanner = function() {
  const banner = document.getElementById('rptSaveBanner');
  if (banner) { banner.classList.remove('show'); banner._pending = null; }
};

/* в”Җв”Җ go() н•ЁмҲҳ нҷ•мһҘ вҖ” report нғӯ мІҳлҰ¬ м¶”к°Җ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
const _goOrig = go;
window.go = function(k, btn) {
  if (k === 'report') {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
    document.getElementById('sec-report').classList.add('on');
    CUR = 'report';
    renderReport();
    return;
  }
  _goOrig(k, btn);
};
</script>
