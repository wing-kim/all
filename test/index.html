<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>мӢ м¶•лҢҖмӢңліҙл“ң</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08090d; --s1:#0f1118; --s2:#151821; --s3:#1c2030;
  --border:#222636; --border2:#2a3050;
  --blue:#3b7fff; --blue-g:linear-gradient(135deg,#3b7fff,#6c48f5);
  --green:#22d186; --yellow:#f5bc30; --orange:#f07830;
  --red:#f03860; --purple:#9060f0;
  --t1:#eef0f8; --t2:#8890aa; --t3:#4a5270; --t4:#2a3050;
  --mono:'DM Mono',monospace; --sans:'Noto Sans KR',sans-serif;
  --display:'Bebas Neue',sans-serif;
  --r:10px; --r2:6px; --sh:0 4px 32px rgba(0,0,0,.5);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(59,127,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,127,255,.025) 1px,transparent 1px);
  background-size:48px 48px;pointer-events:none;z-index:0}
.page{position:relative;z-index:1;max-width:1520px;margin:0 auto;padding:0 28px 80px}

header{display:flex;align-items:center;justify-content:space-between;
  padding:24px 0 20px;border-bottom:1px solid var(--border);margin-bottom:28px}
.brand{display:flex;align-items:baseline;gap:10px}
.brand-name{font-family:var(--display);font-size:28px;letter-spacing:2px;
  background:var(--blue-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-sub{font-size:11px;color:var(--t3);letter-spacing:3px;text-transform:uppercase}
.header-r{display:flex;align-items:center;gap:12px}
.sync-badge{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:var(--t3)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:blink 2.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn-ref{display:flex;align-items:center;gap:6px;background:var(--s2);
  border:1px solid var(--border2);color:var(--t2);padding:7px 14px;
  border-radius:var(--r2);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .18s}
.btn-ref:hover{background:var(--s3);color:var(--t1);border-color:var(--blue)}
.btn-ref .ico{display:inline-block}
.btn-ref.spin .ico{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.tabs{display:flex;gap:2px;margin-bottom:26px;padding:4px;
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow-x:auto}
.tab{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:9px 20px;
  border-radius:7px;border:none;background:transparent;color:var(--t3);
  font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;
  transition:all .18s;white-space:nowrap}
.tab:hover{color:var(--t2);background:var(--s2)}
.tab.on{color:var(--t1);background:var(--s3);box-shadow:0 1px 8px rgba(0,0,0,.4)}
.pip{width:5px;height:5px;border-radius:50%;flex-shrink:0}

.sec{display:none}.sec.on{display:block}

.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:300px;gap:14px;color:var(--t3)}
.ring{width:38px;height:38px;border:3px solid var(--border2);
  border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
.loader p{font-size:12px}
.err{background:rgba(240,56,96,.07);border:1px solid rgba(240,56,96,.2);
  border-radius:var(--r);padding:18px 22px;color:var(--red);font-size:13px}
.err small{color:var(--t3);display:block;margin-top:6px}

.notice{display:flex;align-items:center;gap:8px;
  background:rgba(59,127,255,.06);border:1px solid rgba(59,127,255,.15);
  border-radius:var(--r2);padding:10px 14px;
  font-size:11px;color:var(--t3);margin-bottom:20px}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:16px}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 18px;position:relative;overflow:hidden;transition:border-color .2s,transform .18s;
  min-height:80px}
.kpi:hover{transform:translateY(-2px)}
/* мғҒлӢЁ м»¬лҹ¬ л°”: нҒҙлһҳмҠӨлі„ лӢЁмғү кө¬л¶„ вҖ” к·ёлқјлҚ°мқҙм…ҳ/нҳ•кҙ‘ м—ҶмқҢ */
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.b::after{background:#4F7CFF}   /* лё”лЈЁ */
.kpi.g::after{background:#22c98a}   /* к·ёлҰ° */
.kpi.y::after{background:#e8a020}   /* м•°лІ„ */
.kpi.p::after{background:#8b5cf6}   /* нҚјн”Ң */
.kpi.r::after{background:#e84040}   /* л Ҳл“ң */
.kpi.o::after{background:#d97706}   /* мҳӨл Ңм§Җ */
/* hoverмӢң н…Ңл‘җлҰ¬лҠ” н•ҙлӢ№ мғүмЎ° */
.kpi.b:hover{border-color:rgba(79,124,255,.35)}
.kpi.g:hover{border-color:rgba(34,201,138,.35)}
.kpi.y:hover{border-color:rgba(232,160,32,.35)}
.kpi.p:hover{border-color:rgba(139,92,246,.35)}
.kpi.r:hover{border-color:rgba(232,64,64,.35)}
.kpi-lbl{font-size:10px;color:#e5e7eb;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:600}
.kpi-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--t1);letter-spacing:-.3px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi-sub{font-size:10px;color:#9ca3af;margin-top:5px;font-weight:400}

.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.card-title{font-size:13px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:8px}
.chip{background:var(--s3);border:1px solid var(--border2);color:var(--t3);
  font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:20px}

.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:var(--s2);border-bottom:1px solid var(--border)}
th{padding:10px 14px;text-align:left;font-size:10.5px;font-weight:600;color:var(--t3);
  text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;cursor:pointer;user-select:none;transition:color .15s}
th:hover{color:var(--t2)}
th.sorted{color:var(--blue)}
td{padding:9px 14px;border-bottom:1px solid rgba(34,38,54,.7);color:var(--t2);
  white-space:nowrap;max-width:240px;overflow:hidden;text-overflow:ellipsis}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--s2);color:var(--t1)}
td:first-child{color:var(--t1);font-weight:500}
.npos{color:var(--green)!important;font-family:var(--mono)}
.nneg{color:var(--red)!important;font-family:var(--mono)}
.nnum{color:var(--blue)!important;font-family:var(--mono)}
.npct{color:var(--yellow)!important;font-family:var(--mono)}
.ndash{color:var(--t4)!important}

.sbadge{display:inline-flex;align-items:center;gap:4px;
  padding:2px 9px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.sb-active{background:rgba(34,209,134,.12);color:var(--green);border:1px solid rgba(34,209,134,.25)}
.sb-expire{background:rgba(240,56,96,.12);color:var(--red);border:1px solid rgba(240,56,96,.25)}
.sb-warn{background:rgba(245,188,48,.12);color:var(--yellow);border:1px solid rgba(245,188,48,.25)}
.sb-neutral{background:rgba(59,127,255,.12);color:var(--blue);border:1px solid rgba(59,127,255,.25)}

.empty{text-align:center;padding:60px;color:var(--t3);font-size:13px}
.empty-i{font-size:36px;margin-bottom:12px}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   TIMELINE вҖ” к°„нҠё м°ЁнҠё мҠӨнғҖмқј (лӢЁмғү л°” + м—¬мң  н–үк°„)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.tl-wrap{padding:0 24px 24px}
.tl-ruler-row{display:flex;align-items:stretch;padding-bottom:22px;
  border-bottom:1px solid var(--border2);margin-bottom:0}
.tl-ruler-lbl{width:260px;flex-shrink:0;display:flex;align-items:flex-end;
  font-size:9px;color:var(--t4);text-transform:uppercase;letter-spacing:1px;
  padding-right:14px;padding-bottom:4px}
.tl-ruler-track{flex:1;position:relative;height:30px}
.tl-ruler-years{display:flex;height:100%;position:absolute;inset:0}
.tl-year-seg{flex:1;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;color:var(--t3);
  border-left:1px solid var(--border);position:relative}
.tl-year-seg:first-child{border-left:none}
.tl-year-seg.cur-y{color:var(--blue);font-weight:700}
.tl-dur-head{width:72px;flex-shrink:0;display:flex;align-items:flex-end;
  justify-content:flex-end;font-size:9px;color:var(--t4);text-transform:uppercase;
  letter-spacing:1px;padding-left:10px;padding-bottom:4px}
.tl-now-line{position:absolute;top:0;bottom:-1px;width:2px;
  background:var(--blue);box-shadow:0 0 6px rgba(59,127,255,.5);z-index:10;border-radius:1px}
.tl-now-tag{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);
  font-family:var(--mono);font-size:8px;color:var(--blue);
  background:rgba(8,9,13,.95);padding:2px 6px;border-radius:3px;
  white-space:nowrap;letter-spacing:.3px;font-weight:600;
  border:1px solid rgba(59,127,255,.25)}
.g-row{display:flex;align-items:center;padding:10px 0;
  border-bottom:1px solid rgba(34,38,54,.5);transition:background .12s;min-height:44px}
.g-row:last-child{border-bottom:none}
.g-row:hover{background:rgba(59,127,255,.03)}
/* [мҲҳм •4] н•ӯлӘ©лӘ… мҳҒм—ӯ нҷ•мһҘ вҖ” кёҙ мқҙлҰ„ н•ң мӨ„ мң м§Җ */
.g-info{width:260px;flex-shrink:0;padding-right:14px;min-width:0}
.g-name{font-size:12.5px;font-weight:500;color:var(--t1);line-height:1.35;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:-.01em}
.g-name[title]{cursor:default}
.g-period-txt{font-family:var(--mono);font-size:9.5px;color:var(--t3);margin-top:2px;
  white-space:nowrap}
/* [мҲҳм •1] л°” мҳҒм—ӯ лҶ’мқҙ мң м§Җ (track л‘җк»ҳлЎң м ңм–ҙ) */
.g-bar-area{flex:1;position:relative;height:38px;display:flex;align-items:center}
.g-vline{position:absolute;top:0;bottom:0;width:1px;
  background:rgba(42,48,80,.32);pointer-events:none}
.g-now-line{position:absolute;top:0;bottom:0;width:2px;
  background:rgba(59,127,255,.2);z-index:4;pointer-events:none;border-radius:1px}
/* [мҲҳм •1] track лҶ’мқҙ 14вҶ’16px (+14%) вҖ” л‘”нғҒн•ҳм§Җ м•ҠкІҢ */
.g-track{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);
  height:16px;background:rgba(18,22,36,.95);border-radius:4px;
  border:1px solid rgba(42,48,80,.5)}
.g-fill{height:100%;border-radius:4px;position:absolute;
  transition:width .8s cubic-bezier(.4,0,.2,1)}
.g-dur{width:72px;flex-shrink:0;text-align:right;padding-left:10px;
  font-family:var(--mono);font-size:11px;color:#8890aa;white-space:nowrap;font-weight:500}
/* лӢЁкі„лі„ кө¬лі„ мғүмғҒ вҖ” м Ҳм ңлҗң нҶӨ, нҳ•кҙ‘/к·ёлқјлҚ°мқҙм…ҳ м—ҶмқҢ */
.gc0{background:#4F7CFF}  /* лё”лЈЁ */
.gc1{background:#22c98a}  /* м—җл©”лһ„л“ң */
.gc2{background:#e8a020}  /* м•°лІ„ */
.gc3{background:#8b5cf6}  /* нҚјн”Ң */
.gc4{background:#e84040}  /* л Ҳл“ң */
.gc5{background:#0ea5e9}  /* мҠӨм№ҙмқҙ */
.gc6{background:#d97706}  /* мҳӨл Ңм§Җ */
.gc7{background:#10b981}  /* нӢё */
.gc8{background:#6366f1}  /* мқёл””кі  */

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   TIMELINE нҲҙнҢҒ вҖ” л§Ҳмҡ°мҠӨ нҳёлІ„ лӮ м§ң н‘ңмӢң
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.tl-tooltip{position:fixed;pointer-events:none;z-index:9999;
  background:rgba(8,9,13,.95);border:1px solid #2a3050;
  border-radius:5px;padding:5px 10px;
  font-family:var(--mono);font-size:11px;color:#eef0f8;
  white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.5);
  transition:opacity .1s;opacity:0;letter-spacing:.3px}
.tl-tooltip.show{opacity:1}
.g-bar-area{cursor:crosshair}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   TIMELINE HOVER GUIDE LINE вҖ” л§Ҳмҡ°мҠӨ hover м„ёлЎң кё°мӨҖм„ 
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.tl-hover-line{
  position:absolute;
  top:0;bottom:0;
  width:1px;
  /* NOW лқјмқё(нҢҢлһҖмғү)кіј кө¬л¶„: мІӯлЎқ/мӢңм•Ҳ кі„м—ҙ, мқҖмқҖн•ҳкІҢ */
  background:rgba(34,211,238,.45);
  box-shadow:0 0 5px rgba(34,211,238,.25);
  pointer-events:none;
  z-index:20;
  border-radius:1px;
  opacity:0;
  transition:opacity .12s;
  will-change:left;
}
.tl-hover-line.show{opacity:1}
/* hover lineмқ„ лӢҙлҠ” м»Ён…Ңмқҙл„Ҳ: нғҖмһ„лқјмқё м „мІҙ rows лҶ’мқҙлҘј кҙҖнҶө */
.tl-gantt-body{position:relative}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   IRR
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.irr-addr-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px}
.irr-addr-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;position:relative}
.irr-addr-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.irr-addr-card:first-child::before{background:linear-gradient(90deg,#3b7fff,#6c48f5)}
.irr-addr-card:last-child::before{background:linear-gradient(90deg,#22d186,#3b7fff)}
.irr-addr-head{padding:16px 20px 14px;border-bottom:1px solid var(--border)}
.irr-addr-title{font-size:14px;font-weight:600;color:var(--t1);display:flex;align-items:center;gap:8px}
.irr-addr-tag{font-size:9px;padding:2px 8px;border-radius:20px;border:1px solid;font-weight:600;letter-spacing:.8px;text-transform:uppercase}
.tag-a{color:#6c48f5;border-color:rgba(108,72,245,.3);background:rgba(108,72,245,.1)}
.tag-b{color:var(--green);border-color:rgba(34,209,134,.3);background:rgba(34,209,134,.1)}
.irr-addr-sub{font-size:11px;color:var(--t3);margin-top:4px}
.irr-addr-body{padding:18px 20px}
.irr-metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.irr-metric{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:13px 15px}
.irr-metric-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.irr-metric-val{font-family:var(--mono);font-size:20px;font-weight:500}
.irr-metric-val.pos{color:var(--green)} .irr-metric-val.neg{color:var(--red)}
.irr-metric-val.neu{color:var(--blue)} .irr-metric-val.ylw{color:var(--yellow)}

/* кёҲм•Ў мғүмғҒ */
.inc{color:var(--green)!important}
.exp{color:var(--red)!important}
.neu{color:var(--blue)!important}
.dim{color:var(--t4)!important}

/* кө¬л¶„ нғңк·ё */
.type-badge{display:inline-block;padding:1px 7px;border-radius:3px;
  font-size:10px;font-weight:600;letter-spacing:.4px;border:1px solid}
.type-in {background:rgba(0,184,148,.08);color:#00b894;border-color:rgba(0,184,148,.18)}
.type-out{background:rgba(240,56,96,.08);color:#e04060;border-color:rgba(240,56,96,.18)}
.type-etc{background:rgba(59,127,255,.08);color:var(--blue);border-color:rgba(59,127,255,.18)}

/* в•җв•җв•җ мҲҳмһ…В·м§Җм¶ң мўҢмҡ° л¶„лҰ¬ мҡ”м•Ҫ в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.cf-summary-split{display:grid;grid-template-columns:1fr 1fr;
  border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--r) var(--r);overflow:hidden}
.cf-split-panel{overflow-x:auto}
.cf-split-panel.inc-panel{border-right:1px solid var(--border2)}
.cf-split-title{display:flex;align-items:center;gap:8px;padding:8px 14px;
  font-size:11px;font-weight:700;letter-spacing:.5px;border-bottom:1px solid var(--border2)}
.cf-split-title.inc{background:rgba(34,209,134,.07);color:#22c55e;border-left:3px solid #22c55e}
.cf-split-title.exp{background:rgba(240,56,96,.07);color:#ef4444;border-left:3px solid #ef4444}
.cf-split-table{width:100%;border-collapse:collapse;font-size:12.5px}
.cf-split-table th{padding:7px 14px;text-align:left;font-size:9.5px;font-weight:600;
  color:#e5e7eb;text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;
  background:var(--s2);border-bottom:1px solid var(--border)}
.cf-split-table th.r{text-align:right}
.cf-split-table td{padding:8px 14px;border-bottom:1px solid rgba(34,38,54,.5);
  color:var(--t2);white-space:nowrap;vertical-align:middle}
.cf-split-table tbody tr:last-child td{border-bottom:none}
.cf-split-table tbody tr:hover td{background:rgba(59,127,255,.03);color:var(--t1)}
.cf-split-table td.label{color:var(--t1);font-weight:500}
.cf-split-table td.r{text-align:right;font-family:var(--mono);font-size:12px}
.cf-split-table tr.split-subtotal td{background:rgba(26,31,46,.6);
  border-top:1px solid var(--border2);font-weight:700;padding:8px 14px;color:var(--t1)}
/* м§Җм¶ң к·ёлЈ№ н—ӨлҚ” н–ү */
.cf-split-table tr.exp-group-head td{
  background:rgba(22,26,40,.9);
  border-top:2px solid var(--border2);
  padding:6px 14px;
  font-size:10px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;color:var(--t3);
}
.cf-split-table tr.exp-group-head.loan-head td{
  border-left:3px solid #4F7CFF;color:#7aa4ff;
}
.cf-split-table tr.exp-group-head.dep-head td{
  border-left:3px solid #f5bc30;color:#e8a020;
}
.cf-net-row{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;
  padding:10px 18px;background:rgba(59,127,255,.07);
  border-top:2px solid rgba(59,127,255,.35);font-size:13px;font-weight:700;color:var(--t1)}
.cf-net-val{font-family:var(--mono);font-size:15px;font-weight:700}

.pg{background:var(--s2);border:1px solid var(--border);color:var(--t2);
  padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;
  transition:all .15s;font-family:var(--sans)}
.pg:hover:not([disabled]){border-color:var(--blue);color:var(--blue)}
.pg[disabled]{opacity:.3;cursor:default}
.pg.on{background:var(--blue);border-color:var(--blue);color:#fff}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   IRR кі„мӮ°кё° вҖ” н•„м§Җ м№ҙл“ң + кі„мӮ°кё° UI мҠӨнғҖмқј
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.prop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:24px}
.prop-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;position:relative}
.prop-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--blue-g))}
.prop-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
  padding:14px 18px 12px;border-bottom:1px solid var(--border);background:var(--s2)}
.prop-addr{font-size:15px;font-weight:700;color:var(--t1)}
.prop-meta{font-size:11px;color:var(--t3);margin-top:3px}
.prop-body{padding:14px 18px}
.prop-row{display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid rgba(34,38,54,.5);font-size:12.5px}
.prop-row:last-child{border-bottom:none}
.prop-key{color:var(--t3)}
.prop-val{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--t1)}
.pv-red{color:var(--red)!important}.pv-blue{color:var(--blue)!important}
.pv-green{color:var(--green)!important}.pv-yellow{color:var(--yellow)!important}
.prop-land-box{margin-top:12px;padding:10px 14px;
  background:rgba(245,188,48,.06);border:1px solid rgba(245,188,48,.18);
  border-radius:7px;display:flex;align-items:center;justify-content:space-between}
.prop-land-lbl{font-size:11px;color:var(--yellow)}
.prop-land-val{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--yellow)}

.irr-calc-section{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.irr-calc-section-head{display:flex;align-items:center;gap:10px;
  padding:12px 18px;background:var(--s2);border-bottom:1px solid var(--border)}
.irr-calc-wrap{padding:20px}

.calc-scenario-bar{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.calc-scen-btn{padding:7px 18px;border-radius:var(--r2);border:1px solid var(--border2);
  background:var(--s2);color:var(--t3);font-family:var(--sans);font-size:12px;
  font-weight:500;cursor:pointer;transition:all .15s}
.calc-scen-btn:hover{background:var(--s3);color:var(--t2)}
.calc-scen-btn.active{background:rgba(34,209,134,.12);border-color:rgba(34,209,134,.3);color:var(--green)}

.calc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-bottom:4px}
.calc-block{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px}
.calc-block-title{font-size:11px;font-weight:600;color:var(--t2);
  text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.calc-field{margin-bottom:12px}
.calc-field:last-child{margin-bottom:0}
.calc-field label{display:flex;justify-content:space-between;align-items:center;
  font-size:11px;color:var(--t3);margin-bottom:5px}
/* м§Ғм ‘мһ…л Ҙ(calc-num-input)мқҙ к°’мқ„ н‘ңмӢңн•ҳлҜҖлЎң label лӮҙ лұғм§ҖлҠ” мҲЁк№Җ */
.calc-field label .calc-val-badge{display:none}
.calc-val-badge{font-family:var(--mono);font-size:11px;color:var(--blue);
  background:rgba(59,127,255,.1);border:1px solid rgba(59,127,255,.2);
  padding:1px 7px;border-radius:3px;white-space:nowrap}
.calc-field input[type=range]{width:100%;height:4px;border-radius:2px;
  -webkit-appearance:none;appearance:none;
  background:var(--border2);outline:none;cursor:pointer}
.calc-field input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:var(--blue);box-shadow:0 0 6px rgba(59,127,255,.4);
  border:2px solid var(--bg);cursor:pointer}
.calc-field input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
  background:var(--blue);border:2px solid var(--bg);cursor:pointer}

/* мҠ¬лқјмқҙлҚ” + м§Ғм ‘мһ…л Ҙ лһҳнҚј */
.calc-slider-row{display:flex;align-items:center;gap:7px;margin-top:2px}
.calc-slider-row input[type=range]{flex:1;height:4px;border-radius:2px;
  -webkit-appearance:none;appearance:none;
  background:var(--border2);outline:none;cursor:pointer}
.calc-slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:var(--blue);box-shadow:0 0 6px rgba(59,127,255,.4);
  border:2px solid var(--bg);cursor:pointer}
.calc-num-input{width:72px;flex-shrink:0;background:var(--s3);
  border:1px solid var(--border2);border-radius:5px;
  color:var(--blue);font-family:var(--mono);font-size:11px;font-weight:600;
  padding:3px 7px;text-align:right;outline:none;transition:border-color .15s}
.calc-num-input:focus{border-color:var(--blue);background:var(--s2)}


.irr-run-btn{display:inline-flex;align-items:center;gap:8px;
  padding:12px 36px;border-radius:var(--r);border:none;
  background:linear-gradient(135deg,var(--green),#3b7fff);
  color:#fff;font-family:var(--sans);font-size:14px;font-weight:600;
  cursor:pointer;letter-spacing:.3px;transition:opacity .2s,transform .15s;
  box-shadow:0 4px 20px rgba(34,209,134,.25)}
.irr-run-btn:hover{opacity:.9;transform:translateY(-1px)}
.irr-run-btn:active{transform:translateY(0)}

.irr-result-card{margin-top:20px;background:var(--s2);
  border:1px solid var(--border2);border-radius:var(--r);overflow:hidden}
.irr-res-head{display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;border-bottom:1px solid var(--border);background:var(--s3)}
.irr-res-body{padding:20px}
.irr-res-warn{background:rgba(240,56,96,.08);border:1px solid rgba(240,56,96,.2);
  border-radius:7px;padding:10px 14px;color:var(--red);font-size:12px;margin-bottom:16px}
.irr-res-big{text-align:center;padding:16px 0 20px;border-bottom:1px solid var(--border)}
.irr-res-big-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.irr-res-big-num{font-family:var(--mono);font-size:48px;font-weight:500;line-height:1}
.irr-res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px;margin-top:16px}
.irr-res-row{display:flex;justify-content:space-between;align-items:center;
  background:var(--s1);border:1px solid var(--border);border-radius:6px;
  padding:8px 12px;font-size:12px}
.irr-res-key{color:var(--t3)}.irr-res-val{font-family:var(--mono);font-size:12.5px;font-weight:500}
.irr-res-assumptions{margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.irr-assum-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.irr-assum-tags span{font-size:10px;padding:2px 9px;border-radius:20px;
  background:var(--s3);border:1px solid var(--border2);color:var(--t3);font-family:var(--mono)}

/* в•җв•җв•җ лІ•мқёл№„мҡ© мәҗмӢңн”ҢлЎңмҡ° в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   мҡ”м•Ҫ/мғҒм„ё/нҶ м§Җ н‘ң: fixed layout (кё°мЎҙ мң м§Җ)
   мӣ”лі„ мәҗмӢңн”ҢлЎңмҡ°(.cf-section-monthly): к°ҖлЎңмҠӨнҒ¬лЎӨ + лӮҙмҡ© м „мІҙ н‘ңмӢң
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
#sec-corp .cf-section:not(.cf-section-monthly) .cf-table-wrap{overflow-x:auto}
#sec-corp .cf-section:not(.cf-section-monthly) .cf-table{table-layout:fixed!important;width:100%!important}
#sec-corp .cf-section:not(.cf-section-monthly) .cf-table td,
#sec-corp .cf-section:not(.cf-section-monthly) .cf-table th{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* мӣ”лі„ л№„мҡ© мәҗмӢңн”ҢлЎңмҡ° м „мҡ© */
#sec-corp .cf-section-monthly .cf-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
#sec-corp .cf-section-monthly .cf-table{table-layout:auto!important;width:max-content!important;min-width:100%}
#sec-corp .cf-section-monthly .cf-table td,
#sec-corp .cf-section-monthly .cf-table th{overflow:visible!important;white-space:nowrap!important;text-overflow:clip!important;max-width:none!important}
#sec-corp .cf-section-monthly .cf-table td.ym{position:sticky;left:0;z-index:1;background:var(--s1)}
#sec-corp .cf-section-monthly .cf-table thead th:first-child{position:sticky;left:0;z-index:3;background:var(--s2)}
/* м „м—ӯ td max-width мҳӨлІ„лқјмқҙл“ң */
#sec-corp .cf-section-monthly td{max-width:none!important;overflow:visible!important;text-overflow:unset!important;white-space:nowrap!important}

@media(max-width:900px){
  .prop-grid,.calc-grid,.irr-res-grid{grid-template-columns:1fr}
  .irr-addr-grid{grid-template-columns:1fr}
  .g-row{flex-wrap:wrap}.g-info{width:100%}
  .ls-group-sum{display:none}
}
@media(max-width:600px){
  .page{padding:0 14px 60px}.kpi-row{grid-template-columns:1fr 1fr}
  .brand-name{font-size:22px}.irr-metrics{grid-template-columns:1fr}
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   мӢңмһҘ лҰ¬нҸ¬нҠё нғӯ
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.rpt-toolbar{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;flex-wrap:wrap;gap:10px}
.rpt-toolbar-l{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.rpt-count{font-family:var(--mono);font-size:11px;color:var(--t3);
  background:var(--s2);border:1px solid var(--border);
  border-radius:20px;padding:3px 12px}
.rpt-search{background:var(--s2);border:1px solid var(--border2);
  color:var(--t1);font-family:var(--sans);font-size:12px;
  padding:7px 12px;border-radius:var(--r2);outline:none;width:200px;transition:border-color .15s}
.rpt-search:focus{border-color:var(--blue)}
.rpt-search::placeholder{color:var(--t4)}
.rpt-btn{display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:var(--r2);border:1px solid var(--border2);
  background:var(--s2);color:var(--t2);font-family:var(--sans);
  font-size:12px;cursor:pointer;transition:all .15s}
.rpt-btn:hover{background:var(--s3);color:var(--t1);border-color:var(--blue)}
.rpt-btn.danger:hover{border-color:var(--red);color:var(--red)}
.rpt-empty{text-align:center;padding:80px 20px;color:var(--t3)}
.rpt-empty-i{font-size:48px;margin-bottom:16px}
.rpt-empty h3{font-size:15px;font-weight:500;color:var(--t2);margin-bottom:8px}
.rpt-empty p{font-size:12px;line-height:1.7}
.rpt-list{display:flex;flex-direction:column;gap:12px}
.rpt-card{background:var(--s1);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;transition:border-color .18s}
.rpt-card:hover{border-color:var(--border2)}
.rpt-card-head{display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;cursor:pointer;user-select:none}
.rpt-card-head:hover{background:rgba(59,127,255,.03)}
.rpt-card-meta{display:flex;align-items:center;gap:10px}
.rpt-date{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--blue)}
.rpt-title{font-size:13px;font-weight:500;color:var(--t1)}
.rpt-card-actions{display:flex;align-items:center;gap:8px}
.rpt-toggle{font-size:11px;color:var(--t3);padding:3px 8px;
  background:var(--s2);border:1px solid var(--border);border-radius:4px;
  cursor:pointer;transition:all .15s;white-space:nowrap}
.rpt-toggle:hover{color:var(--t1);border-color:var(--border2)}
.rpt-del{font-size:11px;color:var(--t3);padding:3px 8px;
  background:transparent;border:1px solid transparent;border-radius:4px;
  cursor:pointer;transition:all .15s;white-space:nowrap}
.rpt-del:hover{color:var(--red);border-color:rgba(240,56,96,.3)}
.rpt-card-body{display:none;padding:0 18px 18px;border-top:1px solid var(--border)}
.rpt-card-body.open{display:block}
.rpt-content{padding-top:16px;font-size:13px;line-height:1.85;color:var(--t2);
  white-space:pre-wrap;font-family:var(--sans)}
.rpt-content strong{color:var(--t1)}
.rpt-content a{color:var(--blue);text-decoration:none}
.rpt-content a:hover{text-decoration:underline}
/* м„№м…ҳ мқҙлӘЁм§Җ н—ӨлҚ” к°•мЎ° */
.rpt-content .rpt-section-head{
  display:block;margin-top:18px;margin-bottom:4px;
  font-weight:700;font-size:13px;color:var(--t1);
  border-bottom:1px solid var(--border);padding-bottom:6px}
.rpt-content .rpt-section-head:first-child{margin-top:0}
.rpt-cape-horn{background:rgba(245,188,48,.04);
  border:1px solid rgba(245,188,48,.15);border-radius:var(--r2);
  padding:10px 14px;margin-top:12px;font-size:12px}
.rpt-cape-horn-title{font-size:10px;color:var(--yellow);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:700}

/* м ҖмһҘ н”ҢлЎңнҢ… л°°л„Ҳ */
.rpt-save-banner{
  position:fixed;bottom:28px;right:28px;z-index:9000;
  display:none;align-items:center;gap:10px;

<script>
/* в•җв•җ CONFIG в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
const SID='17lL6O55R56PGODOu-iM5EBH4a6ZbWEJfkypcdWzlGHA';
const TABS={
  timeline:{gid:'835667947', label:'н”„лЎңм қнҠё нғҖмһ„лқјмқё'},
  irr:     {gid:'1343029023',label:'мӢ м¶• IRR'},
  lease:   {gid:'0',         label:'мһ„лҢҖм°Ёкі„м•Ҫнҳ„нҷ©'},
  personal:{gid:'662143448', label:'к°ңмқёл№„мҡ©'},
  corp:    {gid:'551803703', label:'лІ•мқёл№„мҡ©'},
};
const PG=50;
const CACHE={},LOADED=new Set(),TS={};
let CUR='timeline';

/* в•җв•җ CSV в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
async function fetchSheet(k){
  /* в”Җв”Җ Google Sheets CSV export
     кө¬кёҖ мӢңнҠёлҠ” export мҡ”мІӯ мӢң лҰ¬л””л үм…ҳмқҙ л°ңмғқн•©лӢҲлӢӨ.
     redirect:'follow' + credentials:'omit' мңјлЎң CORS мҡ°нҡҢ
     мӢңнҠёк°Җ "л§ҒнҒ¬ мһҲлҠ” лӘЁл“  мӮ¬мҡ©мһҗ В· л·°м–ҙ" кіөмң  мғҒнғңм—¬м•ј н•©лӢҲлӢӨ. */
  const url=`https://docs.google.com/spreadsheets/d/${SID}/export?format=csv&gid=${TABS[k].gid}`;
  let r;
  try{
    r=await fetch(url,{redirect:'follow',credentials:'omit'});
  }catch(e){
    /* CORS м°ЁлӢЁ мӢң JSONP-style мҡ°нҡҢ: exportLinks м—”л“ңнҸ¬мқёнҠё мӢңлҸ„ */
    throw new Error(`fetch мӢӨнҢЁ: ${e.message} вҖ” мӢңнҠё кіөмң  м„Өм •мқ„ нҷ•мқён•ҳм„ёмҡ” (л§ҒнҒ¬ мһҲлҠ” лӘЁл“  мӮ¬мҡ©мһҗВ·л·°м–ҙ)`);
  }
  if(!r.ok) throw new Error(`HTTP ${r.status} вҖ” мӢңнҠё кіөмң  м„Өм • нҷ•мқё н•„мҡ”`);
  const txt=await r.text();
  if(!txt||txt.trim().startsWith('<')){
    /* HTML мқ‘лӢө = лЎңк·ёмқё нҺҳмқҙм§Җ вҶ’ кіөмң  м„Өм • л¬ём ң */
    throw new Error('мӢңнҠё мқ‘лӢөмқҙ HTMLмһ…лӢҲлӢӨ вҖ” "л§ҒнҒ¬ мһҲлҠ” лӘЁл“  мӮ¬мҡ©мһҗ" кіөмң лЎң м„Өм •н•ҙмЈјм„ёмҡ”');
  }
  return parseCSV(txt);
}
function parseCSV(txt){
  const rows=[];let inQ=false,row=[],cell='';
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(c==='"'){inQ=!inQ;continue;}
    if(!inQ&&c===','){row.push(cell.trim());cell='';continue;}
    if(!inQ&&(c==='\n'||(c==='\r'&&txt[i+1]==='\n'))){
      if(c==='\r')i++;
      row.push(cell.trim());cell='';
      if(row.some(x=>x))rows.push(row);
      row=[];continue;
    }
    cell+=c;
  }
  if(cell||row.length){row.push(cell.trim());if(row.some(x=>x))rows.push(row);}
  return rows;
}

/* в•җв•җ FORMAT / UTILS в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function fc(v){
  if(v===null||v===undefined||v==='') return '<span class="ndash">вҖ”</span>';
  const s=String(v).trim();
  if(!s) return '<span class="ndash">вҖ”</span>';
  if(s.endsWith('%')){const n=parseFloat(s);if(!isNaN(n)) return `<span class="${n<0?'nneg':'npct'}">${s}</span>`;}
  const clean=s.replace(/[,\sвӮ©мӣҗ]/g,'');
  if(!isNaN(Number(clean))&&clean!==''&&/^[\d,.\-\+]+$/.test(clean)){
    const n=Number(clean);return `<span class="${n<0?'nneg':n>0?'npos':'nnum'}">${s}</span>`;
  }
  return s;
}
function fmtBig(n){
  if(isNaN(n))return 'вҖ”';
  if(Math.abs(n)>=1e8)return (n/1e8).toFixed(1)+'м–ө';
  if(Math.abs(n)>=1e4)return Math.round(n/1e4).toLocaleString()+'л§Ң';
  if(Math.abs(n)>=1000)return n.toLocaleString();
  return Number(n.toFixed(1)).toString();
}
function findHdrRow(rows){
  for(let i=0;i<Math.min(rows.length,6);i++){if(rows[i].filter(c=>c).length>=2)return i;}
  return 0;
}
function numCols(hdr,data){
  return hdr.map((h,i)=>({h,i})).filter(({h,i})=>{
    if(!h)return false;
    return data.map(r=>parseFloat((r[i]||'').replace(/[,\sвӮ©мӣҗ%]/g,''))).filter(x=>!isNaN(x)).length>0;
  });
}
function errHTML(msg){return `<div class="err">
  вҡ пёҸ ${msg}
  <small style="display:block;margin-top:8px;line-height:1.6">
    <strong>мІҙнҒ¬лҰ¬мҠӨнҠё:</strong><br>
    1. кө¬кёҖ мӢңнҠё вҶ’ кіөмң  вҶ’ "л§ҒнҒ¬ мһҲлҠ” лӘЁл“  мӮ¬мҡ©мһҗ" вҶ’ л·°м–ҙ м„Өм •<br>
    2. F12 мҪҳмҶ”м—җм„ң мӢӨм ң мҳӨлҘҳ л©”мӢңм§Җ нҷ•мқё<br>
    3. CORS мҳӨлҘҳлқјл©ҙ: мӢңнҠёлҘј "нҢҢмқј вҶ’ кіөмң  вҶ’ мӣ№м—җ кІҢмӢң"лҸ„ м¶”к°ҖлЎң м„Өм •
  </small>
</div>`;}
function parseAmt(v){return parseFloat(String(v||'').replace(/[,\sвӮ©мӣҗ]/g,''))||0;}

/* в•җв•җ TABLE в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function initTS(k){if(!TS[k])TS[k]={search:'',sortCol:-1,sortAsc:true,page:1};}
function drawTable(k,rows,cid,customCell){
  const el=document.getElementById(cid);if(!el)return;
  if(!rows||rows.length<2){el.innerHTML=`<div class="empty"><div class="empty-i">рҹ“ӯ</div>лҚ°мқҙн„° м—ҶмқҢ</div>`;return;}
  initTS(k);
  const hdr=rows[0];let data=rows.slice(1).filter(r=>r.some(c=>c));
  const q=(TS[k].search||'').toLowerCase();
  if(q)data=data.filter(r=>r.some(c=>(c||'').toLowerCase().includes(q)));
  const{sortCol:sc,sortAsc:sa}=TS[k];
  if(sc>=0){data=[...data].sort((a,b)=>{
    const av=(a[sc]||'').replace(/__SB_\w+__/g,''),bv=(b[sc]||'').replace(/__SB_\w+__/g,'');
    const an=parseFloat(av.replace(/[,%\sвӮ©мӣҗ]/g,'')),bn=parseFloat(bv.replace(/[,%\sвӮ©мӣҗ]/g,''));
    if(!isNaN(an)&&!isNaN(bn))return sa?an-bn:bn-an;
    return sa?av.localeCompare(bv,'ko'):bv.localeCompare(av,'ko');
  });}
  const total=data.length,p=Math.max(1,Math.min(TS[k].page,Math.ceil(total/PG)||1));
  TS[k].page=p;const totalP=Math.max(1,Math.ceil(total/PG));
  const slice=data.slice((p-1)*PG,p*PG);
  const cfn=customCell||fc;
  const ths=hdr.map((h,i)=>`<th onclick="tSort('${k}','${cid}',${i})" ${sc===i?'class="sorted"':''}>${h||'вҖ”'}${sc===i?(sa?' вҶ‘':' вҶ“'):''}</th>`).join('');
  const tbs=slice.map(r=>`<tr>${hdr.map((_,i)=>`<td>${cfn(r[i])}</td>`).join('')}</tr>`).join('');
  let pgH='';
  if(totalP>1){
    const s=Math.max(1,Math.min(p-2,totalP-4)),e=Math.min(totalP,s+4);
    let btns='';for(let i=s;i<=e;i++)btns+=`<button class="pg${i===p?' on':''}" onclick="tPage('${k}','${cid}',${i})">${i}</button>`;
    pgH=`<div style="display:flex;align-items:center;justify-content:flex-end;gap:6px;padding:10px 18px;border-top:1px solid var(--border);font-size:12px;color:var(--t3)">
      <span>${total}кұҙ</span><button class="pg" onclick="tPage('${k}','${cid}',${p-1})" ${p<=1?'disabled':''}>вҖ№</button>${btns}
      <button class="pg" onclick="tPage('${k}','${cid}',${p+1})" ${p>=totalP?'disabled':''}>вҖә</button></div>`;
  }else pgH=`<div style="padding:8px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--t3)">${total}кұҙ</div>`;
  el.innerHTML=`<div class="card"><div class="tscroll"><table><thead><tr>${ths}</tr></thead><tbody>${tbs}</tbody></table></div>${pgH}</div>`;
}
function tSort(k,cid,col){initTS(k);if(TS[k].sortCol===col)TS[k].sortAsc=!TS[k].sortAsc;else{TS[k].sortCol=col;TS[k].sortAsc=true;}TS[k].page=1;drawTable(k,CACHE[k],cid,CACHE[k+'_cfn']);}
function tSearch(k,cid,val){initTS(k);TS[k].search=val;TS[k].page=1;drawTable(k,CACHE[k],cid,CACHE[k+'_cfn']);}
function tPage(k,cid,p){initTS(k);TS[k].page=p;drawTable(k,CACHE[k],cid,CACHE[k+'_cfn']);}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   1. TIMELINE вҖ” м»ҙнҢ©нҠё + нҳ„мһ¬мӢңм җ л§Ҳм»Ө
   вҳ… кө¬кёҖ мӢңнҠё лҚ°мқҙн„° 100% мӢӨмӢңк°„ л°ҳмҳҒ
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function renderTimeline(rows){
  const sec=document.getElementById('sec-timeline');
  const hi=findHdrRow(rows);
  const data=rows.slice(hi+1).filter(r=>r.some(c=>c));

  // м»¬лҹј: col1=н•ӯлӘ©, col2=кё°к°„, col3=мҶҢмҡ”, col4=кё°нғҖ
  const ni=1,pi=2,di=3,oi=4;
  const YEAR_START=2026,YEAR_END=2030;
  const TOTAL_MONTHS=(YEAR_END-YEAR_START+1)*12; // 60к°ңмӣ”

  // нҳ„мһ¬ мӢңм җ кі„мӮ° вҖ” мқј(day) лӢЁмң„к№Ңм§Җ м •л°Җ кі„мӮ°
  const now=new Date();
  const curYear=now.getFullYear();
  // нғҖмһ„лқјмқё м „мІҙ мӢңмһ‘/мў…лЈҢлҘј Date к°қмІҙлЎң м •мқҳ
  const tlStart=new Date(YEAR_START,0,1);          // 2026-01-01
  const tlEnd=new Date(YEAR_END+1,0,1);            // 2031-01-01 (exclusive)
  const tlTotalMs=tlEnd.getTime()-tlStart.getTime();
  const nowElapsedMs=now.getTime()-tlStart.getTime();
  // нғҖмһ„лқјмқё лІ”мң„ лӮҙмқём§Җ нҷ•мқё
  const nowInRange=now>=tlStart && now<tlEnd;
  // м •л°Җ л№„мңЁ кі„мӮ° (лІ”мң„ л°–мқҙл©ҙ 0мңјлЎң м„Өм •, н‘ңмӢңлҠ” мҲЁк№Җ)
  const nowPctRaw=nowInRange?(nowElapsedMs/tlTotalMs*100):0;
  const nowPct=nowPctRaw.toFixed(4);

  function parsePeriod(s){
    if(!s)return null; s=String(s).trim();
    let m=s.match(/(\d{4})[.\sл…„]?\s*(\d{1,2})[мӣ”]?\s*[~\-пҪһвҖ“]\s*(\d{4})[.\sл…„]?\s*(\d{1,2})/);
    if(m)return{sy:+m[1],sm:+m[2],ey:+m[3],em:+m[4]};
    m=s.match(/(\d{4})[.\sл…„]?\s*(\d{1,2})/);
    if(m)return{sy:+m[1],sm:+m[2],ey:+m[1],em:+m[2]+1};
    return null;
  }
  function parseDur(s){const n=parseInt(String(s||'').replace(/[^0-9]/g,''));return isNaN(n)?0:n;}

  const items=[];
  data.forEach((r,idx)=>{
    const name=r[ni]||'вҖ”';
    const period=r[pi]||'';
    const durRaw=r[di]||'';
    const parsed=parsePeriod(period);
    const durMo=parseDur(durRaw);
    let startOff=0,barWidth=0,startLabel='',endLabel='';
    if(parsed){
      startOff=(parsed.sy-YEAR_START)*12+(parsed.sm-1);
      const endOff=(parsed.ey-YEAR_START)*12+(parsed.em-1);
      barWidth=Math.max(endOff-startOff,1);
      startLabel=`${parsed.sy}.${String(parsed.sm).padStart(2,'0')}`;
      endLabel=`${parsed.ey}.${String(parsed.em).padStart(2,'0')}`;
    }else if(durMo>0){
      const prev=idx>0?items[idx-1]:null;
      startOff=prev?(prev.startOff+prev.barWidth):0;
      barWidth=durMo;
    }
    startOff=Math.max(0,Math.min(startOff,TOTAL_MONTHS-1));
    barWidth=Math.max(1,Math.min(barWidth,TOTAL_MONTHS-startOff));
    const leftPct=(startOff/TOTAL_MONTHS*100).toFixed(2);
    const widthPct=(barWidth/TOTAL_MONTHS*100).toFixed(2);
    const durLabel=durMo?`${durMo}к°ңмӣ”`:(barWidth?`${barWidth}к°ңмӣ”`:durRaw||'вҖ”');
    const periodTxt=startLabel?`${startLabel} вҶ’ ${endLabel}`:period;
    items.push({name,periodTxt,durLabel,startOff,barWidth,leftPct,widthPct,colorIdx:idx});
  });

  const totalM=items.reduce((a,b)=>a+(b.barWidth||0),0);

  // м—°лҸ„ м„ёк·ёлЁјнҠё
  const yearSegs=[];
  for(let y=YEAR_START;y<=YEAR_END;y++)
    yearSegs.push(`<div class="tl-year-seg${y===curYear?' cur-y':''}">${y}</div>`);

  // м—°лҸ„лі„ м„ёлЎңм„  мң„м№ҳ (2027~2030 мӢңмһ‘м җ)
  const vLinePcts=[];
  for(let y=YEAR_START+1;y<=YEAR_END;y++)
    vLinePcts.push(((y-YEAR_START)*12/TOTAL_MONTHS*100).toFixed(2));

  function makeOverlays(){
    const nowLineHTML=nowInRange
      ?`<div class="g-now-line" style="left:${nowPct}%"></div>`
      :'';
    return vLinePcts.map(p=>`<div class="g-vline" style="left:${p}%"></div>`).join('')
      +nowLineHTML;
  }

  // лҲҲкёҲ н—ӨлҚ” вҖ” NOW лқјмқё: tl-ruler-track лӮҙл¶Җ, % мўҢн‘ң лҸҷмқј кё°мӨҖ
  const nowLineRuler=nowInRange
    ?`<div class="tl-now-line" style="left:${nowPct}%">
        <div class="tl-now-tag">NOW В· ${now.getFullYear()}л…„ ${now.getMonth()+1}мӣ”</div>
      </div>`
    :'';
  const rulerHTML=`<div class="tl-ruler-row">
    <div class="tl-ruler-lbl">м—°лҸ„</div>
    <div class="tl-ruler-track">
      <div class="tl-ruler-years">${yearSegs.join('')}</div>
      ${nowLineRuler}
    </div>
    <div class="tl-dur-head">кё°к°„</div>
  </div>`;

  // Gantt rows
  const gRows=items.map(it=>`<div class="g-row">
    <div class="g-info">
      <div class="g-name" title="${it.name}">${it.name}</div>
      ${it.periodTxt?`<div class="g-period-txt">${it.periodTxt}</div>`:''}
    </div>
    <div class="g-bar-area">
      ${makeOverlays()}
      <div class="g-track">
        <div class="g-fill gc${it.colorIdx%9}" style="left:${it.leftPct}%;width:0" data-w="${it.widthPct}"></div>
      </div>
    </div>
    <div class="g-dur">${it.durLabel}</div>
  </div>`).join('');

  sec.innerHTML=`
    <div class="notice">рҹ“Ў кө¬кёҖ мӢңнҠё мӢӨмӢңк°„ м—°лҸҷ В· н”„лЎңм қнҠё нғҖмһ„лқјмқё</div>
    <div class="kpi-row">
      <div class="kpi b"><div class="kpi-lbl" style="color:#e5e7eb">мҙқ лӢЁкі„</div><div class="kpi-val" style="color:#60a5fa">${data.length}</div><div class="kpi-sub" style="color:#9ca3af">н”„лЎңм қнҠё н•ӯлӘ©</div></div>
      <div class="kpi g"><div class="kpi-lbl" style="color:#e5e7eb">мҙқ мҶҢмҡ” кё°к°„</div><div class="kpi-val" style="color:#34d399">${totalM}к°ңмӣ”</div><div class="kpi-sub" style="color:#9ca3af">мҳҲмғҒ м „мІҙ кё°к°„</div></div>
      <div class="kpi y"><div class="kpi-lbl" style="color:#e5e7eb">нғҖмһ„лқјмқё лІ”мң„</div><div class="kpi-val" style="color:#fbbf24">${YEAR_START}вҖ“${YEAR_END}</div><div class="kpi-sub" style="color:#9ca3af">5к°ңл…„ кі„нҡҚ</div></div>
      <div class="kpi p"><div class="kpi-lbl" style="color:#e5e7eb">м°©кіө мҳҲм •</div><div class="kpi-val" style="color:#a78bfa">2029</div><div class="kpi-sub" style="color:#9ca3af">кіөмӮ¬ мӢңмһ‘ м—°лҸ„</div></div>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-title">н”„лЎңм қнҠё нғҖмһ„лқјмқё <span class="chip">${data.length}лӢЁкі„</span></div>
        <span style="font-size:10px;color:var(--t3);display:flex;align-items:center;gap:5px">
          <span style="display:inline-block;width:12px;height:2px;background:var(--blue);border-radius:1px;box-shadow:0 0 4px rgba(59,127,255,.8)"></span>нҳ„мһ¬ мӢңм җ (${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')})
        </span>
      </div>
      <div class="tl-wrap">
        ${rulerHTML}
        <div class="tl-gantt-body" id="tl-gantt-body">
          <div class="tl-hover-line" id="tl-hover-line"></div>
          ${gRows}
        </div>
      </div>
    </div>`;

  requestAnimationFrame(()=>{
    sec.querySelectorAll('[data-w]').forEach(el=>{
      setTimeout(()=>{el.style.width=el.dataset.w+'%';},60);
    });
  });

  /* в”Җв”Җ [UI м „мҡ©] нғҖмһ„лқјмқё л°” л§Ҳмҡ°мҠӨ нҳёлІ„ лӮ м§ң нҲҙнҢҒ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
     вҳ… лҚ°мқҙн„° лЎңм§Ғ(YEAR_START, TOTAL_MONTHS л“ұ) мқҪкё° м „мҡ© м°ёмЎ°
     вҳ… лӮ м§ң кі„мӮ°: л§Ҳмҡ°мҠӨ X мң„м№ҳ л№„мңЁ вҶ’ м—°лҸ„/мӣ” ліҖнҷҳ
  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
  (()=>{
    /* нҲҙнҢҒ м—ҳлҰ¬лЁјнҠё (м „м—ӯ 1к°ң, мһ¬мӮ¬мҡ©) */
    let tip=document.getElementById('tl-tip-global');
    if(!tip){
      tip=document.createElement('div');
      tip.id='tl-tip-global';
      tip.className='tl-tooltip';
      document.body.appendChild(tip);
    }

    /* hover к°Җмқҙл“ңлқјмқё м—ҳлҰ¬лЁјнҠё (tl-gantt-body лӮҙл¶Җ, 1к°ң мһ¬мӮ¬мҡ©) */
    const ganttBody=sec.querySelector('#tl-gantt-body');
    const hoverLine=sec.querySelector('#tl-hover-line');

    /* л°” мҳҒм—ӯм—җм„ң л№„мңЁ вҶ’ лӮ м§ң л¬ёмһҗм—ҙ */
    function pctToDate(pct){
      const totalMonths=TOTAL_MONTHS;
      const mOff=Math.round(pct/100*totalMonths);
      const y=YEAR_START+Math.floor(mOff/12);
      const m=(mOff%12)+1;
      return y+'л…„ '+m+'мӣ”';
    }

    sec.querySelectorAll('.g-bar-area').forEach((area,rowIdx)=>{
      const item=items[rowIdx];

      area.addEventListener('mousemove',e=>{
        const rect=area.getBoundingClientRect();
        const pct=Math.max(0,Math.min(100,(e.clientX-rect.left)/rect.width*100));
        const dateStr=pctToDate(pct);

        /* н•ӯлӘ© кё°к°„ м •ліҙлҸ„ к°ҷмқҙ н‘ңмӢң вҖ” кё°мЎҙ tooltip мң м§Җ */
        const periodInfo=item&&item.periodTxt?` (${item.periodTxt})`:'';
        tip.textContent=dateStr+periodInfo;
        tip.classList.add('show');
        tip.style.left=(e.clientX+14)+'px';
        tip.style.top =(e.clientY-32)+'px';

        /* hover к°Җмқҙл“ңлқјмқё: g-bar-area кё°мӨҖ X вҶ’ ganttBody кё°мӨҖ XлЎң ліҖнҷҳ
           лӘЁл“  н–үмқҳ bar-areaлҠ” лҸҷмқјн•ң left offsetмқ„ к°Җм§ҖлҜҖлЎң
           мІ« лІҲм§ё bar-area rectлҘј кё°мӨҖмңјлЎң мӮјм•„ мқјкҙҖлҗң мўҢн‘ң мң м§Җ */
        if(hoverLine&&ganttBody){
          const bodyRect=ganttBody.getBoundingClientRect();
          const lineLeft=e.clientX-bodyRect.left;
          hoverLine.style.left=lineLeft+'px';
          hoverLine.classList.add('show');
        }
      });

      area.addEventListener('mouseleave',()=>{
        tip.classList.remove('show');
        if(hoverLine) hoverLine.classList.remove('show');
      });
    });

    /* мҠӨнҒ¬лЎӨ мӢң нҲҙнҢҒВ·к°Җмқҙл“ңлқјмқё мҲЁк№Җ */
    window.addEventListener('scroll',()=>{
      tip.classList.remove('show');
      if(hoverLine) hoverLine.classList.remove('show');
    },{passive:true});
  })();
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   2. IRR вҖ” мғҒлӢЁ: кө¬кёҖ мӢңнҠё кё°л°ҳ н•„м§Җ м •ліҙ м№ҙл“ң (мһҗлҸҷм—°лҸҷ)
             н•ҳлӢЁ: мӢңлӮҳлҰ¬мҳӨ IRR кі„мӮ°кё° (UI state, н•ҳл“ңмҪ”л”© м—ҶмқҢ)
   вҳ… лҚ°мқҙн„° л Ҳмқҙм–ҙ: м ҲлҢҖ мҲҳм • кёҲм§Җ (fetch/parse к·ёлҢҖлЎң)
   вҳ… кі„мӮ°кё° мғҒнғңлҠ” лі„лҸ„ ліҖмҲҳлЎң кҙҖлҰ¬ (мӣҗліё мӢңнҠё л¶ҲліҖ)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function renderIRR(rows){
  const sec=document.getElementById('sec-irr');
  if(!rows||rows.length<2){sec.innerHTML=errHTML('лҚ°мқҙн„° м—ҶмқҢ');return;}

  /* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
     [лҚ°мқҙн„° л Ҳмқҙм–ҙ] IRR мӢңнҠё нҢҢмӢұ
     вҳ… мӢңнҠё кө¬мЎ°: н–ү=н•ӯлӘ©лӘ…, м—ҙ=н•„м§Җлі„к°’ (л§ӨнҠёлҰӯмҠӨнҳ•)
       н—ӨлҚ”: н•ӯлӘ© | м••кө¬м •лЎң 112 | м••кө¬м •лЎң 8кёё 3 | л№„кі 
       лҚ°мқҙн„°: л§Өмһ…м—°лҸ„ | 2021 | 2025 | ...
     вҳ… н—ӨлҚ” нғҗмғү мӢӨнҢЁ мӢң м „мІҙ н–ү мҠӨмә”мңјлЎң ліҙмҷ„
     вҳ… м ҲлҢҖ н•ҳл“ңмҪ”л”© м—ҶмқҢ
  в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

  const sv=(r,i)=>i>=0?(r[i]||''):'';
  const av=(r,i)=>i>=0?parseAmt(r[i]):0;

  /* в”Җв”Җ кіөл°ұВ·кҙ„нҳё м ңкұ° мҶҢл¬ёмһҗ м •к·ңнҷ” в”Җв”Җ */
  /* м •к·ңнҷ”: кіөл°ұВ·кҙ„нҳёВ·мҠ¬лһҳмӢңВ·нҠ№мҲҳл¬ёмһҗ м ңкұ° + мҶҢл¬ёмһҗ */
  function nc(s){return String(s||'').replace(/[\sгҖҖ\t\(\)пјҲпјү\-В·\/гҺЎ]/g,'').toLowerCase();}

  /* в”Җв”Җ м••кө¬м •лЎң 112 / м••кө¬м •лЎң 8кёё 3 нҢҗлі„ н•ЁмҲҳ в”Җв”Җ */
  function is112(s){const v=nc(s);return /м••кө¬м •.*112/.test(v)||/112.*м••кө¬м •/.test(v);}
  function is8gil(s){const v=nc(s);return /м••кө¬м •.*8кёё/.test(v)||/8кёё.*м••кө¬м •/.test(v);}

  /* в”Җв”Җ rows м „мІҙ мҠӨмә”мңјлЎң н—ӨлҚ” н–ү м°ҫкё° в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
     findHdrRowлҠ” "к°ҖмһҘ л§ҺмқҖ м…Җмқҙ мұ„мӣҢм§„ н–ү"мқ„ м°ҫлҠ”лҚ°
     IRR мӢңнҠёлҠ” н—ӨлҚ”м—җ н•„м§ҖлӘ…мқҙ мһҲмңјлҜҖлЎң м§Ғм ‘ нғҗмғү
  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
  let irrHdrIdx=-1, irrCol112=-1, irrCol8=-1;

  /* лЁјм Җ к°Ғ н–үмқ„ кІҖмӮ¬н•ҙм„ң 112/8кёё м»¬лҹјмқҙ мһҲлҠ” н–үмқ„ н—ӨлҚ”лЎң нҠ№м • */
  for(let ri=0;ri<Math.min(rows.length,10);ri++){
    const r=rows[ri];
    const c112=r.findIndex(c=>is112(c));
    const c8  =r.findIndex(c=>is8gil(c));
    if(c112>=0||c8>=0){
      irrHdrIdx=ri;
      irrCol112=c112;
      irrCol8  =c8;
      break;
    }
  }

  /* н—ӨлҚ”лҘј лӘ» м°ҫмңјл©ҙ findHdrRow кІ°кіјлЎң fallback */
  if(irrHdrIdx<0){
    irrHdrIdx=findHdrRow(rows);
  }

  const irrHdr =rows[irrHdrIdx];
  /* н—ӨлҚ” мқҙнӣ„ мӢӨм ң лҚ°мқҙн„° н–үл§Ң м¶”м¶ң
     вҖ” л№Ҳ н–ү м ңкұ° + лӢЁмқј м ңлӘ© н–ү(н•©кі„/мҶҢкі„/мЈјм„қ л“ұ) м ңкұ° */
  const irrData=rows.slice(irrHdrIdx+1).filter(r=>{
    const filled=r.filter(c=>String(c||'').trim());
    if(filled.length<2) return false; // мң нҡЁ м…Җмқҙ 2к°ң лҜёл§Ңмқҙл©ҙ м ңлӘ©/л№Ҳн–ү
    return true;
  });

  /* н—ӨлҚ” нғҗмғү мқҙнӣ„м—җлҸ„ м»¬лҹјмқ„ лӘ» м°ҫм•ҳмңјл©ҙ н—ӨлҚ” мһ¬мҠӨмә” */
  if(irrCol112<0) irrCol112=irrHdr.findIndex(h=>is112(h));
  if(irrCol8  <0) irrCol8  =irrHdr.findIndex(h=>is8gil(h));

  /* н•ӯлӘ©лӘ… м—ҙ: н•„м§Җ м—ҙмқҙ м•„лӢҢ мІ« лІҲм§ё мң нҡЁ м—ҙ */
  const irrLabelCol=[0,1,2,3,4].find(i=>
    i!==irrCol112 && i!==irrCol8 &&
    irrHdr[i]!==undefined && irrHdr[i]!==''
  )??0;

  /* л№„кі  м—ҙ */
  const irrNoteCol=irrHdr.findIndex((h,i)=>
    i!==irrCol112&&i!==irrCol8&&i!==irrLabelCol&&
    /л№„кі |л©”лӘЁ|note|remark/i.test(h)
  );

  /* м§„лӢЁ лЎңк·ё вҖ” F12 мҪҳмҶ”м—җм„ң нҷ•мқё */
  console.log('[IRR мӢңнҠё нҢҢмӢұ]',{
    irrHdrIdx,
    irrCol112,irrCol8,irrLabelCol,irrNoteCol,
    headerRow : irrHdr.map((h,i)=>`[${i}]"${h}"`).join(' | '),
    totalRows : irrData.length,
    sample3   : irrData.slice(0,3).map(r=>r.map((c,i)=>`[${i}]${c}`).join(' | '))
  });

  /* в”Җв”Җ н–ү лқјлІЁ + м—ҙ мқёлҚұмҠӨлЎң к°’ м¶”м¶ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
     propPats: н•ӯлӘ©лӘ… м •к·ңмӢқ л°°м—ҙ
     colIdx:   irrCol112 лҳҗлҠ” irrCol8
  в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
  function irrGetVal(propPats, colIdx){
    if(colIdx<0) return '';
    /* irrDataм—җм„ң н•ӯлӘ©лӘ…мқҙ мқјм№ҳн•ҳлҠ” н–ү нғҗмғү
       labelColкіј м—ҙ0 л‘ҳ лӢӨ нҷ•мқё (labelCol мҳӨнғҗ л°©м§Җ) */
    const row=irrData.find(r=>{
      const lbl0=nc(r[0]||'');
      const lblN=irrLabelCol!==0?nc(r[irrLabelCol]||''):'';
      return propPats.some(p=>p.test(lbl0)||p.test(lblN));
    });
    if(!row) return '';
    return (row[colIdx]||'').toString().trim();
  }
  function irrGetNum(propPats, colIdx){
    const raw=irrGetVal(propPats,colIdx);
    if(!raw||raw==='-'||raw==='') return 0;
    return parseAmt(raw);
  }

  /* в”Җв”Җ н•„м§Җлі„ м „мІҙ к°’ м¶”м¶ң в”Җв”Җ */
  function irrExtract(colIdx){
    if(colIdx<0) return null;
    return{
      year    : irrGetVal([/л§Өмһ…м—°лҸ„|л§Өмһ…л…„|м·Ёл“қл…„|м·Ёл“қмқј|л§Өмһ…мқј/],colIdx),

/* мҠ¬лқјмқҙлҚ” к°’ н‘ңмӢң м—…лҚ°мқҙнҠё */
function irrSlider(key,val,unit){
  const el=document.getElementById('lbl_'+key);
  if(!el)return;
  const n=parseFloat(val);
  if(unit==='м–ө')       el.textContent=n.toFixed(key==='newRent'?2:0)+'м–ө';
  else if(unit==='л§Ң')  el.textContent=n.toLocaleString()+'л§Ң';
  else if(unit==='%')   el.textContent=n.toFixed(1)+'%';
  else if(unit==='x')   el.textContent=n.toFixed(1)+'x';
  else if(unit==='к°ңмӣ”') el.textContent=n+'к°ңмӣ”';
  else if(unit==='л…„')  el.textContent=n+'л…„';
  else                  el.textContent=val+unit;
}

/* м ҲлҢҖ кёҲм•Ў мҠ¬лқјмқҙлҚ” (м–өмӣҗ лӢЁмң„ н‘ңмӢң) */
function irrSliderAmt(key,val){
  const el=document.getElementById('lbl_'+key);
  if(!el)return;
  const n=parseFloat(val);
  if(n>=1e8) el.textContent=(n/1e8).toFixed(0)+'м–ө';
  else if(n>=1e4) el.textContent=Math.round(n/1e4).toLocaleString()+'л§Ң';
  else el.textContent=n.toLocaleString()+'мӣҗ';
}

/* в”Җв”Җ мҠ¬лқјмқҙлҚ”вҶ’н…ҚмҠӨнҠё лҸҷкё°нҷ” в”Җв”Җ */
function irrSyncNum(key, numId, fmt){
  const sl=document.getElementById('sl_'+key);
  const el=document.getElementById(numId);
  if(!sl||!el) return;
  if(document.activeElement!==el) el.value=fmt(sl.value);
}

/* в”Җв”Җ н…ҚмҠӨнҠёвҶ’мҠ¬лқјмқҙлҚ” лҸҷкё°нҷ” (мқјл°ҳ мҠ¬лқјмқҙлҚ”) в”Җв”Җ */
function irrNumToSlider(slId, key, numId, cfg, fmt){
  const raw=document.getElementById(numId).value.replace(/[^\d.\-]/g,'');
  let v=parseFloat(raw);
  if(isNaN(v)) v=parseFloat(document.getElementById(slId).value);
  v=Math.round(v/cfg.step)*cfg.step;
  v=Math.max(cfg.min,Math.min(cfg.max,v));
  v=Math.round(v*1e6)/1e6;
  document.getElementById(slId).value=v;
  document.getElementById(numId).value=fmt(v);
  const lbl=document.getElementById('lbl_'+key);
  if(lbl) lbl.textContent=document.getElementById(numId).value;
}

/* в”Җв”Җ н…ҚмҠӨнҠёвҶ’мҠ¬лқјмқҙлҚ” лҸҷкё°нҷ” (м ҲлҢҖкёҲм•Ў мҠ¬лқјмқҙлҚ”, м–ө лӢЁмң„ мһ…л Ҙ) в”Җв”Җ */
function irrNumToSliderAmt(slId, key, numId, cfg){
  const raw=document.getElementById(numId).value.replace(/[^\d.]/g,'');
  let v=parseFloat(raw)*1e8; // м–өвҶ’мӣҗ
  if(isNaN(v)) v=parseFloat(document.getElementById(slId).value);
  v=Math.round(v/cfg.step)*cfg.step;
  v=Math.max(cfg.min,Math.min(cfg.max,v));
  document.getElementById(slId).value=v;
  const displayVal=(v/1e8).toFixed(0)+'м–ө';
  document.getElementById(numId).value=displayVal;
  const lbl=document.getElementById('lbl_'+key);
  if(lbl) lbl.textContent=displayVal;
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

   - мҙҲкё° мһҗкё°мһҗліё, ліҙмң м„ё, м–‘лҸ„м„ё(лҲ„м§„+мһҘнҠ№кіө), IRR/EM/CoC
   - кІ°кіј л ҢлҚ”л§Ғ кө¬мЎ° лҸҷмқј
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */

/* IRR Newton-Raphson */
function irrNR(cf,g=0.1){
  let r=g;
  for(let i=0;i<2000;i++){
    let n=0,d=0;
    for(let t=0;t<cf.length;t++){let pw=Math.pow(1+r,t);n+=cf[t]/pw;d-=t*cf[t]/Math.pow(1+r,t+1);}
    if(Math.abs(d)<1e-14)break;
    let nr=r-n/d;if(Math.abs(nr-r)<1e-9)return nr;
    r=nr;if(r<-0.99)r=-0.99;if(r>10)r=10;
  }
  return r;
}

/* м–өмӣҗ нҸ¬л§· (кІ°кіј н‘ңмӢңмҡ©) */
function fBig(v){
  const a=Math.abs(v);
  if(a>=10000)return(v/10000).toFixed(1)+'мЎ°';
  if(a>=1)return v.toFixed(2)+'м–ө';
  return(v*10000).toFixed(0)+'л§Ң';
}
function fSmall(v){
  const a=Math.abs(v);
  if(a>=1)return v.toFixed(1)+'м–ө';
  if(a>=0.01)return(v*10000).toFixed(0)+'л§Ң';
  return'0';
}

/* мһҘкё°ліҙмң нҠ№лі„кіөм ңмңЁ */
function lthdRateCalc(y){return y<3?0:Math.min(y*2,30)/100;}

/* м–‘лҸ„мҶҢл“қм„ё лҲ„м§„м„ёмңЁ (м–ө лӢЁмң„ мһ…л Ҙ) */
function progressiveTaxCalc(ti){
  const a=ti*10000; // л§Ңмӣҗ лӢЁмң„лЎң ліҖнҷҳ
  const b=[
    {l:1400,r:0.06,d:0},{l:5000,r:0.15,d:126},{l:8800,r:0.24,d:576},
    {l:15000,r:0.35,d:1544},{l:30000,r:0.38,d:1994},{l:50000,r:0.40,d:2594},
    {l:100000,r:0.42,d:3594},{l:Infinity,r:0.45,d:6594}
  ];
  if(a<=0)return 0;
  for(const x of b){if(a<=x.l)return(a*x.r-x.d)/10000;}
  return 0;
}

/* ліҙмң м„ё кі„мӮ° вҖ” нҶ м§Җ/кұҙл¬ј л¶„лҰ¬ лҲ„м§„м„ёмңЁ м Ғмҡ©
   landPrice: кіөмӢңм§Җк°Җ(мӣҗ), buildingValue: кұҙл¬јк°Җм№ҳ(мӣҗ), isNew: мӢ м¶•м—¬л¶Җ
   л°ҳнҷҳ: мһ¬мӮ°м„ё + лҸ„мӢңм§Җм—ӯл¶„(14%) + көҗмңЎм„ё(20%) н•©кі„ (мӣҗ) */
function calcPropertyTax(landPrice, buildingValue, isNew){
  /* нҶ м§Җ мһ¬мӮ°м„ё (лҲ„м§„) */
  const landBase = landPrice * 0.7;
  let landTax = 0;
  if      (landBase <= 60000000)  landTax = landBase * 0.001;
  else if (landBase <= 150000000) landTax = 60000000*0.001 + (landBase-60000000)*0.0015;
  else if (landBase <= 300000000) landTax = 60000000*0.001 + 90000000*0.0015 + (landBase-150000000)*0.0025;
  else                            landTax = 60000000*0.001 + 90000000*0.0015 + 150000000*0.0025 + (landBase-300000000)*0.004;

  /* кұҙл¬ј мһ¬мӮ°м„ё (мӢ м¶•: лӢЁмқјм„ёмңЁ 0.25%, кё°мЎҙ: лҲ„м§„) */
  const buildingBase = buildingValue * 0.7;
  let buildingTax = 0;
  if (isNew) {
    buildingTax = buildingBase * 0.0025;
  } else {
    if      (buildingBase <= 60000000)  buildingTax = buildingBase * 0.001;
    else if (buildingBase <= 150000000) buildingTax = 60000000*0.001 + (buildingBase-60000000)*0.0015;
    else if (buildingBase <= 300000000) buildingTax = 60000000*0.001 + 90000000*0.0015 + (buildingBase-150000000)*0.0025;
    else                                buildingTax = 60000000*0.001 + 90000000*0.0015 + 150000000*0.0025 + (buildingBase-300000000)*0.004;
  }

  /* н•©кі„ + лҸ„мӢңм§Җм—ӯл¶„(14%) + көҗмңЎм„ё(20%) */
  const propertyTax = landTax + buildingTax;
  return propertyTax * 1.34;  /* Г—(1 + 0.14 + 0.20) */
}

function irrCalcRun(){
  const box=document.getElementById('irr-result-box');
  if(!box)return;

  /* в”Җв”Җ мҠ¬лқјмқҙлҚ” к°’ мҲҳм§‘ в”Җв”Җ */
  const g=id=>parseFloat(document.getElementById(id)?.value||0);

  /* мӢ м¶• мӣ” мһ„лҢҖлЈҢ/ліҙмҰқкёҲ: м–ө лӢЁмң„ мҠ¬лқјмқҙлҚ” */
  const newRentAok = g('sl_newRent');   // м–ө/мӣ”
  const newDepAok  = g('sl_newDep');    // м–ө

  const S={
    priceUp    : g('sl_priceUp')/100,
    rentUp     : g('sl_rentUp')/100,
    vacancy    : g('sl_vacancy')/100,
    rateA      : g('sl_rateA')/100,
    rateB      : g('sl_rateB')/100,
    acqTaxRate : g('sl_acqTax')/100,
    constCost  : g('sl_constCost'),          // мӣҗ(м ҲлҢҖкёҲм•Ў)
    designCost : g('sl_designCost'),         // мӣҗ(м ҲлҢҖкёҲм•Ў)
    constMo    : g('sl_constMo'),
    valueMult  : g('sl_valueMult'),
    pfRatio    : g('sl_pfRatio')/100,
    pfRate     : g('sl_pfRate')/100,
    newRentMon : newRentAok * 1e8,           // м–өвҶ’мӣҗ/мӣ”
    newDep     : newDepAok  * 1e8,           // м–өвҶ’мӣҗ
    newVacancy : g('sl_newVacancy')/100,
    holdYrs    : g('sl_holdYrs'),
    totalYrs   : g('sl_totalYrs'),
  };

  /* в”Җв”Җ кө¬кёҖ мӢңнҠё лҚ°мқҙн„° (л‘җ н•„м§Җ н•©мӮ°) в”Җв”Җ */
  const sd = window._irrSheetData;
  if(!sd){
    box.style.display='block';
    box.innerHTML=irrErrBox('мӢңнҠё лҚ°мқҙн„° м—ҶмқҢ вҖ” мғҲлЎңкі м№Ё нӣ„ лӢӨмӢң мӢңлҸ„н•ҳм„ёмҡ”');
    return;
  }

  let totalBuy=0, totalLoan=0, totalDep=0, totalRent=0, totalArea=0, totalLandVal=0;
  const av=(r,i)=>i>=0?parseAmt(r[i]):0;
  const sv=(r,i)=>i>=0?(r[i]||''):'';

  if(sd._isStructureB){
    totalBuy    = sd._totalBuy    ||0;
    totalLoan   = sd._totalLoan   ||0;
    totalDep    = sd._totalDep    ||0;
    totalRent   = sd._totalRent   ||0;
    totalArea   = sd._totalAreaNum||0;
    totalLandVal= sd._totalLandVal||0;
  } else {
    sd.groups.forEach(grp=>{
      grp.rows.forEach(r=>{
        totalBuy    += av(r,sd.buyPriceIdx);
        totalLoan   += av(r,sd.loanIdx);
        totalDep    += av(r,sd.depositIdx);
        totalRent   += av(r,sd.rentIdx);
        const a=parseFloat(String(sv(r,sd.areaIdx)).replace(/[^0-9.]/g,''))||0;
        totalArea   += a;
        const lp=av(r,sd.landPrIdx), lt=av(r,sd.landTotIdx);
        totalLandVal+= lt||(lp*a);
      });
    });
  }

  if(!totalBuy){
    box.style.display='block';
    box.innerHTML=irrErrBox('л§Өмһ…к°Җ лҚ°мқҙн„° м—ҶмқҢ вҖ” мӢңнҠёлҘј нҷ•мқён•ҳм„ёмҡ”');
    return;
  }

  /* в”Җв”Җ лӢЁмң„ нҶөмқј: лӘЁл“  кёҲм•Ўмқ„ м–ө(е„„)мңјлЎң в”Җв”Җ
     мӢңнҠё лҚ°мқҙн„°лҠ” мӣҗ(еҺҹ) лӢЁмң„, м–өмңјлЎң ліҖнҷҳ */
  const W = 1e8; // 1м–ө = 1e8мӣҗ

  /* в”Җв”Җ н•„м§Җлі„ лҢҖм¶ң/кёҲлҰ¬ л¶„лҰ¬ м¶”м¶ң в”Җв”Җ */
  const loanA_raw = sd._loanA    || (window._irrProps?.A?.loan    || 0);   // мӣҗ лӢЁмң„
  const loanB_raw = sd._loanB    || (window._irrProps?.B?.loan    || 0);   // мӣҗ лӢЁмң„
  /* _loanA/B лҜёмЎҙмһ¬ мӢң sd._totalLoan л№„мӨ‘мңјлЎң л¶„н•  fallback */
  const loanA_ok  = (loanA_raw || (sd._isStructureB ? (window._irrProps?.A?.loan||0) : 0)) / W;
  const loanB_ok  = (loanB_raw || (sd._isStructureB ? (window._irrProps?.B?.loan||0) : 0)) / W;

  const buyOk   = (sd._totalBuy    ||0) / W;
  const loanOk  = (sd._totalLoan   ||0) / W;
  const depOk   = (sd._totalDep    ||0) / W;
  const rentOkM = (sd._totalRent   ||0) / W;
  const landOk  = (sd._totalLandVal||0) / W;

  /* в”Җв”Җ н•„м§Җлі„ м—° мқҙмһҗ н•©мӮ° (н•өмӢ¬ мҲҳм •: нҸүк· кёҲлҰ¬ м ңкұ°) в”Җв”Җ
     annualInterest = loanA * rateA + loanB * rateB */
  const annualInterest = loanA_ok * S.rateA + loanB_ok * S.rateB;

  /* loanA+loanBк°Җ мӢңнҠём—җ м—Ҷмңјл©ҙ м „мІҙ лҢҖм¶ңм—җ лӢЁмҲң нҸүк·  fallback */
  const _annualInterestFallback = loanOk * (S.rateA + S.rateB) / 2;
  const annualInt = (loanA_ok + loanB_ok > 0) ? annualInterest : _annualInterestFallback;

  /* в”Җв”Җ [н•өмӢ¬ кі„мӮ° - мӢңл®¬л Ҳмқҙн„° 16 л°©мӢқ] в”Җв”Җ */
  const constCostOk  = (S.constCost + S.designCost) / W; // мӢ м¶• мҙқл№„мҡ© (м–ө)
  const constY       = Math.ceil(S.constMo / 12);        // кіөмӮ¬кё°к°„ (л…„)
  const acqTax       = buyOk * S.acqTaxRate;             // м·Ёл“қм„ё (м–ө)

  /* мҙҲкё° мһҗкё°мһҗліё: л§Өмһ…к°Җ - лҢҖм¶ң - кё°мЎҙліҙмҰқкёҲ + м·Ёл“қм„ё */
  const equity = buyOk - loanOk - depOk + acqTax;
  if(equity <= 0){
    box.style.display='block';
    box.innerHTML=irrErrBox('мһҗкё°мһҗліёмқҙ 0 мқҙн•ҳ вҖ” лҢҖм¶ңВ·ліҙмҰқкёҲ нҷ•мқё');
    return;
  }

  /* м—° мһ„лҢҖмҲҳмқө (м–ө/л…„) - кіөмӢӨ м „ */
  const annualRent = rentOkM * 12;

  /* мӢ м¶•лҢҖм¶ң */
  const constLoan      = constCostOk * S.pfRatio;
  const constEquity    = constCostOk - constLoan;
  const constLoanInt   = constLoan * S.pfRate;   // мӢ м¶•лҢҖм¶ң м—° мқҙмһҗ (м–ө)

  /* в”Җв”Җ ліҙмң м„ё кі„мӮ° (нҶ м§Җ/кұҙл¬ј л¶„лҰ¬, лҲ„м§„м„ёмңЁ м Ғмҡ©) в”Җв”Җ
     landValRaw  : кіөмӢңм§Җк°Җ н•©кі„ (мӣҗ)
     bldgValRaw  : кё°мЎҙ кұҙл¬јк°Җм№ҳ = л§Өмһ…к°Җ - нҶ м§Җк°Җм№ҳ (мӣҗ)
     newBldgRaw  : мӢ м¶• кұҙл¬ј мӢңк°Җн‘ңмӨҖм•Ў = кіөмӮ¬л№„ Г— 0.4 (мӣҗ) */
  const landValRaw  = sd._totalLandVal || 0;
  const bldgValRaw  = Math.max(0, (sd._totalBuy || 0) - landValRaw);
  const newBldgRaw  = (S.constCost + S.designCost) * 0.4;

  /* л°ҳнҷҳк°’мқҖ мӣҗ(еҺҹ) лӢЁмң„ мҙқм•Ў */
  const holdTaxTotal    = calcPropertyTax(landValRaw, bldgValRaw, false);
  const newHoldTaxTotal = calcPropertyTax(landValRaw, newBldgRaw,  true);

  /* м–ө лӢЁмң„ ліҖнҷҳ (CF кі„мӮ°мҡ©) */
  const holdTaxOk    = { totalTax: holdTaxTotal    / W };
  const newHoldTaxOk = { totalTax: newHoldTaxTotal / W };

  /* в”Җв”Җ мһҘкё°ліҙмң нҠ№лі„кіөм ң к°ҖмӨ‘м№ҳ вҖ” мӢңнҠё мӢӨм ң л§Өмһ…к°Җ л№„мңЁ мӮ¬мҡ© (н•ҳл“ңмҪ”л”© м ңкұ°) в”Җв”Җ
     buyA_ok, buyB_ok: н•„м§Җлі„ л§Өмһ…к°Җ (м–ө)
     w1 = buyA / (buyA+buyB), w2 = buyB / (buyA+buyB) */
  /* propA/propBлҠ” renderIRRм—җм„ң window._irrPropsлЎң л…ём¶ң */
  const _propA = window._irrProps?.A;
  const _propB = window._irrProps?.B;
  const buyA_ok = (sd._loanA != null ? (_propA?.buyP||0) : (sd._totalBuy||0)/2) / W;
  const buyB_ok = (sd._loanB != null ? (_propB?.buyP||0) : (sd._totalBuy||0)/2) / W;
  const _buyA = (_propA?.buyP || 0) / W  || buyA_ok;
  const _buyB = (_propB?.buyP || 0) / W  || buyB_ok;
  const _totalBuyOk = (_buyA + _buyB) || buyOk;
  const _w1 = _buyA / _totalBuyOk;
  const _w2 = _buyB / _totalBuyOk;

  /* мӢ м¶• нӣ„ м—° мһ„лҢҖмҲҳмқө (м–ө/л…„) */
  const newAnnualRent = newRentAok * 12;  // м–ө/мӣ” Г— 12

  /* в”Җв”Җ мһҘкё°ліҙмң нҠ№лі„кіөм ңмңЁ мӮ¬м „ кі„мӮ° (лҜјк°җлҸ„м—җм„ңлҸ„ лҸҷмқј мӮ¬мҡ©) в”Җв”Җ */
  const _holdYrs529  = 2025 + S.totalYrs - 2021;
  const _holdYrs5298 = 2025 + S.totalYrs - 2025;
  const _lthd529     = lthdRateCalc(_holdYrs529);
  const _lthd5298    = lthdRateCalc(_holdYrs5298);
  /* к°ҖмӨ‘м№ҳ: н•ҳл“ңмҪ”л”© м ңкұ° вҶ’ мӢңнҠё мӢӨм ң л§Өмһ…к°Җ л№„мңЁ мӮ¬мҡ© */
  const lthdAvg = _lthd529 * _w1 + _lthd5298 * _w2;

  /* в”Җв”Җ м—°лҸ„лі„ нҳ„кёҲнқҗлҰ„ л°°м—ҙ кө¬м„ұ (м–ө лӢЁмң„) в”Җв”Җ */
  const rows = [];
  const cf   = [-equity];
  let cum    = -equity;

  for(let yr=1; yr<=S.totalYrs; yr++){
    const row = {yr, phase:'', rental:0, interest:0, htax:0, ccost:0, constInt:0, net:0, cum:0, asset:0, cy:2025+yr};

    if(yr <= S.holdYrs){
      /* мһ„лҢҖ ліҙмң  кё°к°„ */
      row.phase   = 'ліҙмң В·мһ„лҢҖ';
      row.rental  = annualRent * Math.pow(1+S.rentUp, yr-1) * (1-S.vacancy);
      row.interest= -annualInt;
      row.htax    = -holdTaxOk.totalTax;
      row.net     = row.rental + row.interest + row.htax;
      row.asset   = buyOk * Math.pow(1+S.priceUp, yr);

    } else if(yr <= S.holdYrs + constY){
      /* мІ кұ°В·мӢ м¶• кё°к°„ */
      row.phase    = 'мІ кұ°В·мӢ м¶•';
      row.interest = -annualInt;
      row.constInt = -constLoanInt;
      row.htax     = -holdTaxOk.totalTax * 0.5;  // кіөмӮ¬ мӨ‘ ліҙмң м„ё 50% к°җл©ҙ
      row.ccost    = -(constEquity / constY);      // мӢ м¶• мһҗкё°мһҗліё л¶„н•  нҲ¬мһ…
      row.net      = row.interest + row.constInt + row.htax + row.ccost;
      row.asset    = buyOk * Math.pow(1+S.priceUp, yr);

    } else {
      /* мӢ м¶• мҡҙмҳҒ кё°к°„ */
      const yac    = yr - S.holdYrs - constY;
      row.phase    = 'мӢ м¶• мҡҙмҳҒ';
      row.asset    = buyOk * S.valueMult * Math.pow(1+S.priceUp, yac);
      row.rental   = newAnnualRent * Math.pow(1+S.rentUp, yac-1) * (1-S.newVacancy);
      row.interest = -annualInt;
      row.constInt = -constLoanInt;
      row.htax     = -newHoldTaxOk.totalTax;
      row.net      = row.rental + row.interest + row.constInt + row.htax;
    }

    cum += row.net;
    row.cum = cum;
    rows.push(row);

    if(yr < S.totalYrs){
      cf.push(row.net);
    } else {
      /* EXIT м—°лҸ„: м–‘лҸ„м„ё + мҲң нҡҢмҲҳкёҲ кі„мӮ° */
      const sp   = row.asset;
      const gain = sp - buyOk - constCostOk - acqTax;  // м–‘лҸ„м°Ёмқө

      /* мһҘкё°ліҙмң нҠ№лі„кіөм ң вҖ” лЈЁн”„ мҷёл¶Җм—җм„ң мӮ¬м „ кі„мӮ°лҗң lthdAvg мӮ¬мҡ© */
      const lthdAmt  = Math.max(0, gain) * lthdAvg;
      const taxableGain   = Math.max(0, gain - lthdAmt);
      const taxableIncome = Math.max(0, taxableGain - 0.025); // кё°ліёкіөм ң 250л§Ң
      const cgt           = progressiveTaxCalc(taxableIncome);
      const totalTaxAmt   = cgt * 1.1;  // +м§Җл°©мҶҢл“қм„ё 10%

      /* мҲң нҡҢмҲҳкёҲ: л§Өк°Ғ - л§Өмһ…лҢҖм¶ңмғҒнҷҳ - мӢ м¶•лҢҖм¶ңмғҒнҷҳ - м–‘лҸ„м„ё + кё°мЎҙліҙмҰқкёҲнҡҢмҲҳ */
      const ns = sp - loanOk - constLoan - totalTaxAmt + depOk;

      cf.push(row.net + ns);

      row.sp               = sp;
      row.ns               = ns;
      row.gain             = gain;
      row.lthdAmt          = lthdAmt;
      row.lthdAvg          = lthdAvg;
      row.lthd529          = _lthd529;
      row.lthd5298         = _lthd5298;
      row.holdYrs529       = _holdYrs529;
      row.holdYrs5298      = _holdYrs5298;
      row.taxableGain      = taxableGain;
      row.progressiveTaxOnly = cgt;
      row.cgt              = totalTaxAmt;
      row.constLoan        = constLoan;
    }
  }

  /* в”Җв”Җ IRR / EM / CoC в”Җв”Җ */
  let irr = null;
  try {
    irr = irrNR(cf);
    if(isNaN(irr)||!isFinite(irr)) irr = null;
  } catch(e){ irr = null; }

  const lastR  = rows[rows.length-1];
  const cumCF  = rows.reduce((s,r)=>s+r.net, 0);
  const em     = lastR.ns != null ? (lastR.ns + cumCF) / equity : 0;
  const holdRows = rows.filter(r=>r.phase==='ліҙмң В·мһ„лҢҖ');
  const cocR   = holdRows.length > 0
    ? holdRows.reduce((s,r)=>s+r.net,0) / S.holdYrs / equity * 100
    : 0;
  const totalProfit = (lastR.ns||0) + cumCF - equity;

  /* в”Җв”Җ кІ°кіј л ҢлҚ”л§Ғ в”Җв”Җ */
  box.style.display = 'block';
  const irrColor = irr&&irr>0?'var(--green)':irr&&irr<0?'var(--red)':'var(--t2)';

  /* н–ү н—¬нҚј вҖ” кё°мЎҙ CSS нҒҙлһҳмҠӨ мӮ¬мҡ© */
  const ri=(lbl,val,cls='')=>`<div class="irr-item">
    <span class="ik">${lbl}</span>
    <span class="iv ${cls}">${val}</span>
  </div>`;
  const ris=(lbl,val)=>`<span class="ik">${lbl}</span><span class="iv">${val}</span>`;

  box.innerHTML = `

  <!-- в‘  IRR лҢҖнҳ• + KPI -->
  <div style="margin-top:20px">
    <div style="display:flex;align-items:center;gap:10px;padding:11px 18px;
      background:var(--s2);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;border-bottom:none">
      <div style="width:3px;height:18px;border-radius:2px;background:var(--green);flex-shrink:0"></div>
      <div style="font-size:13px;font-weight:600;color:var(--t1)">рҹ“Ҡ IRR мӢңл®¬л Ҳмқҙм…ҳ кІ°кіј</div>
      <div style="font-size:11px;color:var(--t3);margin-left:auto">мӢңнҠё мӣҗліё + кі„мӮ°кё° мЎ°м •к°’ кё°мӨҖ В· л¶„м„қ кё°к°„ ${S.totalYrs}л…„</div>
    </div>
    <div style="border:1px solid var(--border);border-radius:0 0 var(--r) var(--r);padding:16px">
      <div style="text-align:center;padding:20px 0 16px;border-bottom:1px solid var(--border);margin-bottom:16px">
        <div style="font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px">мҳҲмғҒ IRR</div>
        <div style="font-family:var(--mono);font-size:52px;font-weight:700;color:${irrColor};line-height:1">${irr!=null?(irr*100).toFixed(2)+'%':'кі„мӮ° л¶Ҳк°Җ'}</div>
        <div style="font-size:11px;color:var(--t3);margin-top:6px">${S.totalYrs}л…„ кё°мӨҖ В· Newton-Raphson мҲҳл ҙ</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px">
        <div class="kpi r">
          <div class="kpi-lbl" style="color:var(--t2)">IRR</div>
          <div class="kpi-val" style="color:${irrColor}">${irr!=null?(irr*100).toFixed(1)+'%':'N/A'}</div>
          <div class="kpi-sub" style="color:var(--t3)">${S.totalYrs}л…„ кё°мӨҖ</div>
        </div>
        <div class="kpi ${em>=1?'g':'y'}">
          <div class="kpi-lbl" style="color:var(--t2)">Equity Multiple</div>
          <div class="kpi-val" style="color:${em>=1?'var(--green)':'var(--yellow)'}">${em.toFixed(2)}x</div>
          <div class="kpi-sub" style="color:var(--t3)">нҲ¬мһҗмӣҗкёҲ лҢҖл№„</div>
        </div>
        <div class="kpi ${cocR>=0?'g':'r'}">
          <div class="kpi-lbl" style="color:var(--t2)">Cash-on-Cash</div>
          <div class="kpi-val" style="color:${cocR>=0?'var(--green)':'var(--red)'}">${cocR.toFixed(1)}%</div>
          <div class="kpi-sub" style="color:var(--t3)">ліҙмң кё°к°„ м—°нҸүк· </div>
        </div>
        <div class="kpi b">
          <div class="kpi-lbl" style="color:var(--t2)">мһҗкё°мһҗліё нҲ¬мһ…</div>
          <div class="kpi-val" style="color:var(--t1)">${fSmall(equity)}</div>
          <div class="kpi-sub" style="color:var(--t3)">л§Өмһ…мӢң мҲңнҲ¬мһ…</div>
        </div>
        <div class="kpi ${totalProfit>=0?'g':'r'}">
          <div class="kpi-lbl" style="color:var(--t2)">мҙқ мҲҳмқө</div>
          <div class="kpi-val" style="color:${totalProfit>=0?'var(--green)':'var(--red)'}">${fSmall(totalProfit)}</div>
          <div class="kpi-sub" style="color:var(--t3)">EXIT+мһ„лҢҖ-нҲ¬мһҗмӣҗкёҲ</div>
        </div>
        <div class="kpi ${(lastR.ns||0)>=0?'g':'r'}">
          <div class="kpi-lbl" style="color:var(--t2)">мҲң нҡҢмҲҳкёҲ</div>
          <div class="kpi-val" style="color:${(lastR.ns||0)>=0?'var(--green)':'var(--red)'}">${fSmall(lastR.ns||0)}</div>
          <div class="kpi-sub" style="color:var(--t3)">EXIT л§Өк°Ғ кё°мӨҖ</div>
        </div>
      </div>
    </div>
  </div>

  <!-- в‘Ў нғҖмһ„лқјмқё -->
  <div style="margin-top:16px">
    <div style="display:flex;align-items:center;gap:10px;padding:11px 18px;

      <div style="width:3px;height:18px;border-radius:2px;background:var(--blue);flex-shrink:0"></div>
