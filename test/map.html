<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>통합 상권지도 · 케이프혼타워</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#08090d; --s1:#0f1118; --s2:#151821; --s3:#1c2030;
  --border:#222636; --border2:#2a3050;
  --blue:#3b7fff; --blue-g:linear-gradient(135deg,#3b7fff,#6c48f5);
  --green:#22d186; --yellow:#f5bc30; --orange:#f07830;
  --red:#f03860; --purple:#9060f0;
  --t1:#eef0f8; --t2:#8890aa; --t3:#4a5270; --t4:#2a3050;
  --mono:'DM Mono',monospace; --sans:'Noto Sans KR',sans-serif;
  --display:'Bebas Neue',sans-serif;
  --r:10px; --r2:6px;
  --panel-w:400px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--sans)}

/* ── 지도 풀스크린 ── */
#map{position:fixed;inset:0;z-index:0;width:100%;height:100%}

/* ── 헤더 ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:800;height:52px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;
  background:rgba(8,9,13,.88);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(59,127,255,.15);
}
.brand{display:flex;align-items:baseline;gap:10px}
.brand-name{font-family:var(--display);font-size:22px;letter-spacing:2px;
  background:var(--blue-g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.brand-sub{font-size:10px;color:var(--t3);letter-spacing:3px;text-transform:uppercase}
.topbar-r{display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);
  box-shadow:0 0 6px var(--green);animation:blink 2.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn-nav{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.06);border:1px solid var(--border2);
  color:var(--t2);padding:5px 12px;border-radius:var(--r2);
  font-size:11px;cursor:pointer;transition:.18s;text-decoration:none
}
.btn-nav:hover{background:rgba(59,127,255,.15);color:var(--t1);border-color:var(--blue)}

/* ── 우측 패널 ── */
.panel{
  position:fixed;top:62px;right:14px;bottom:14px;z-index:700;
  width:var(--panel-w);display:flex;flex-direction:column;
  border-radius:14px;border:1px solid rgba(59,127,255,.18);
  background:rgba(10,11,16,.92);backdrop-filter:blur(20px);
  box-shadow:0 8px 40px rgba(0,0,0,.65);overflow:hidden;
}

/* 패널 헤더 */
.panel-head{
  padding:14px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
  background:linear-gradient(135deg,rgba(59,127,255,.06),rgba(108,72,245,.04));
}
.panel-title{font-size:15px;font-weight:700;color:var(--t1);margin-bottom:2px}
.panel-sub{font-size:11px;color:var(--t3)}

/* ── 레이어 토글 ── */
.layer-wrap{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.layer-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:8px}
.layer-row{display:flex;gap:6px}
.layer-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 8px;border-radius:8px;cursor:pointer;transition:.18s;
  border:1.5px solid var(--border2);background:var(--s2);
  font-size:11px;font-weight:600;color:var(--t3);
}
.layer-btn:hover{border-color:var(--border2);background:var(--s3)}
.layer-btn.on{border-color:var(--blue);background:rgba(59,127,255,.12);color:var(--t1)}
.layer-btn .l-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── 주소 검색 ── */
.search-wrap{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:7px}
.search-row{display:flex;gap:6px;margin-bottom:8px}
.search-input{
  flex:1;background:var(--s2);border:1px solid var(--border2);
  border-radius:var(--r2);padding:9px 13px;
  color:var(--t1);font-family:var(--sans);font-size:12px;outline:none;transition:.18s
}
.search-input:focus{border-color:var(--blue);background:var(--s3)}
.search-input::placeholder{color:var(--t3)}
.btn-search{
  background:rgba(59,127,255,.18);border:1px solid rgba(59,127,255,.3);
  color:var(--blue);border-radius:var(--r2);
  padding:9px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:.18s;white-space:nowrap
}
.btn-search:hover{background:rgba(59,127,255,.3)}
.radius-row{display:flex;gap:5px}
.r-chip{
  flex:1;text-align:center;padding:7px 0;border-radius:20px;
  font-size:11px;font-weight:700;border:1px solid var(--border2);
  background:var(--s2);color:var(--t2);cursor:pointer;transition:.15s
}
.r-chip.on{background:rgba(59,127,255,.18);border-color:var(--blue);color:var(--blue)}

/* ── 실시간 상권 카테고리 ── */
.cat-section{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.cat-section.hidden{display:none}
.cat-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;
  margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.cat-reset{font-size:10px;color:var(--blue);cursor:pointer;font-weight:600}
.cat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.cat-item{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:10px 6px;border-radius:10px;cursor:pointer;transition:.18s;
  border:1.5px solid var(--border2);background:var(--s2);position:relative;
}
.cat-item:hover{background:var(--s3)}
.cat-item.on{background:rgba(59,127,255,.1);border-color:var(--blue)}
.cat-check{
  position:absolute;top:5px;right:6px;width:13px;height:13px;border-radius:50%;
  border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:.15s
}
.cat-item.on .cat-check{background:var(--blue);border-color:var(--blue)}
.cat-check::after{content:'';display:block;width:4px;height:3px;
  border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;
  transform:rotate(-45deg) translate(1px,-1px);opacity:0;transition:.15s}
.cat-item.on .cat-check::after{opacity:1}
.cat-emoji{font-size:18px;line-height:1}
.cat-name{font-size:10px;color:var(--t3);font-weight:600;text-align:center}
.cat-item.on .cat-name{color:var(--t1)}
.cat-cnt{font-family:var(--mono);font-size:9px;color:var(--green);font-weight:700;
  background:rgba(34,209,134,.1);border-radius:8px;padding:1px 5px}
.cat-cnt:empty{display:none}

/* ── 검색 버튼 ── */
.run-wrap{padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.run-wrap.hidden{display:none}
.btn-run{
  width:100%;padding:12px;border:none;border-radius:var(--r);
  background:var(--blue-g);color:#fff;font-family:var(--sans);
  font-size:13px;font-weight:700;cursor:pointer;transition:.18s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-run:hover{filter:brightness(1.1)}
.btn-run:disabled{opacity:.5;cursor:not-allowed}

/* ── 결과 목록 ── */
.result-wrap{flex:1;overflow-y:auto;min-height:0}
.result-wrap::-webkit-scrollbar{width:3px}
.result-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.result-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:10px;color:var(--t3);font-size:12px;text-align:center;padding:24px
}
.result-empty .e-ico{font-size:32px;opacity:.35}

/* 임대건물 목록 */
.bld-item{
  padding:11px 16px;border-bottom:1px solid rgba(34,38,54,.45);
  cursor:pointer;transition:.12s
}
.bld-item:hover{background:rgba(59,127,255,.06)}
.bld-item.ours{background:rgba(59,127,255,.06);border-left:3px solid var(--blue)}
.bld-name{font-size:12.5px;font-weight:700;color:var(--t1);margin-bottom:2px}
.bld-meta{font-size:10.5px;color:var(--t3)}
.bld-dist{font-family:var(--mono);font-size:10px;color:var(--blue)}

/* 실시간 시설 목록 */
.poi-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;border-bottom:1px solid rgba(34,38,54,.45);
  cursor:pointer;transition:.12s
}
.poi-item:hover{background:rgba(59,127,255,.05)}
.poi-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.poi-info{flex:1;min-width:0}
.poi-name{font-size:12px;font-weight:600;color:var(--t1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.poi-cat{font-size:10px;color:var(--t3);margin-top:1px}
.poi-dist{font-family:var(--mono);font-size:11px;color:var(--t2);flex-shrink:0}

/* 결과 헤더 */
.result-header{
  padding:9px 16px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:rgba(10,11,16,.97);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.result-count{font-family:var(--mono);font-size:11px;color:var(--t2)}
.result-count span{color:var(--green);font-weight:700}
.btn-csv{
  font-size:10px;padding:3px 10px;border-radius:20px;
  border:1px solid var(--border2);background:transparent;
  color:var(--t3);cursor:pointer;transition:.15s
}
.btn-csv:hover{border-color:var(--green);color:var(--green)}

/* ── 범례 ── */
.legend-box{
  position:fixed;bottom:20px;left:16px;z-index:700;
  background:rgba(10,11,16,.9);backdrop-filter:blur(14px);
  border:1px solid rgba(59,127,255,.15);border-radius:10px;
  padding:10px 13px;box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.legend-box.hidden{display:none}
.leg-title{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px;font-weight:700}
.leg-item{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.leg-item:last-child{margin-bottom:0}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.leg-name{font-size:11px;color:var(--t2)}
.leg-cnt{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--green);padding-left:8px;font-weight:700}

/* ── 버전 배지 ── */
.ver-badge{
  position:fixed;bottom:16px;right:16px;z-index:750;
  font-family:var(--mono);font-size:11px;font-weight:700;color:var(--t3);
  letter-spacing:1px;background:rgba(10,11,16,.85);
  border:1px solid var(--border2);border-radius:6px;padding:3px 9px;
}

/* ── 임대건물 팝업 오버레이 ── */
.bld-popup{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:900;
  width:420px;max-height:70vh;
  background:var(--s1);border:1px solid rgba(59,127,255,.25);border-radius:14px;
  box-shadow:0 16px 48px rgba(0,0,0,.7);overflow:hidden;display:flex;flex-direction:column;
}
.bld-popup.hidden{display:none}
.bld-popup-head{
  padding:16px 18px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;
}
.bld-popup-name{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:3px}
.bld-popup-addr{font-size:11px;color:var(--t3)}
.btn-close{background:none;border:none;color:var(--t3);font-size:20px;cursor:pointer;padding:0 4px;line-height:1}
.btn-close:hover{color:var(--t1)}
.bld-popup-body{overflow-y:auto;padding:14px 18px;flex:1}
.bld-popup-body::-webkit-scrollbar{width:3px}
.bld-popup-body::-webkit-scrollbar-thumb{background:var(--border2)}
.floor-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 0;border-bottom:1px solid rgba(34,38,54,.4);font-size:12px
}
.floor-item:last-child{border-bottom:none}
.floor-num{font-family:var(--mono);font-size:11px;color:var(--blue);
  width:28px;flex-shrink:0;font-weight:700}
.floor-tenant{flex:1;color:var(--t1);font-weight:600}
.floor-industry{font-size:10px;color:var(--t3)}
.floor-rent{font-family:var(--mono);font-size:11px;color:var(--green);flex-shrink:0}
.popup-overlay{
  position:fixed;inset:0;z-index:890;background:rgba(0,0,0,.5);
}
.popup-overlay.hidden{display:none}

@media(max-width:640px){
  :root{--panel-w:calc(100vw - 20px)}
  .panel{right:10px;left:10px;top:58px;bottom:0;border-radius:14px 14px 0 0;width:auto;max-height:55vh}
  .bld-popup{width:calc(100vw - 32px)}
}
</style>
</head>
<body>

<div id="map"></div>

<!-- 헤더 -->
<div class="topbar">
  <div class="brand">
    <div class="brand-name">BLUEPICA</div>
    <div class="brand-sub">통합 상권지도</div>
  </div>
  <div class="topbar-r">
    <div class="dot"></div>
    <a href="index.html" class="btn-nav">← 허브로</a>
    <a href="market.html" class="btn-nav">임대지도</a>
    <a href="infra.html" class="btn-nav">인프라</a>
  </div>
</div>

<!-- 우측 패널 -->
<div class="panel">

  <!-- 패널 헤더 -->
  <div class="panel-head">
    <div class="panel-title">🗺 통합 상권지도</div>
    <div class="panel-sub">임대 데이터 + 실시간 상권을 한 화면에</div>
  </div>

  <!-- 레이어 선택 -->
  <div class="layer-wrap">
    <div class="layer-label">레이어 선택</div>
    <div class="layer-row">
      <div class="layer-btn on" id="layerBld" onclick="toggleLayer('bld')">
        <div class="l-dot" style="background:#3b7fff"></div>
        🏢 임대 건물
      </div>
      <div class="layer-btn on" id="layerPoi" onclick="toggleLayer('poi')">
        <div class="l-dot" style="background:#22d186"></div>
        📍 실시간 상권
      </div>
    </div>
  </div>

  <!-- 주소 검색 -->
  <div class="search-wrap">
    <div class="search-label">기준 위치 및 반경</div>
    <div class="search-row">
      <input class="search-input" id="addrInput" type="text"
        placeholder="주소 입력 후 Enter" autocomplete="off">
      <button class="btn-search" onclick="geocodeAddress()">📍 설정</button>
    </div>
    <div class="radius-row">
      <div class="r-chip" data-r="500" onclick="setRadius(500)">500m</div>
      <div class="r-chip on" data-r="1000" onclick="setRadius(1000)">1km</div>
      <div class="r-chip" data-r="2000" onclick="setRadius(2000)">2km</div>
      <div class="r-chip" data-r="3000" onclick="setRadius(3000)">3km</div>
    </div>
  </div>

  <!-- 실시간 카테고리 -->
  <div class="cat-section" id="catSection">
    <div class="cat-label">
      실시간 상권 카테고리
      <span class="cat-reset" onclick="toggleAllCats()">전체 토글</span>
    </div>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <!-- 검색 실행 -->
  <div class="run-wrap" id="runWrap">
    <button class="btn-run" id="btnRun" onclick="runPoiSearch()">
      <span id="runIco">🔍</span>
      <span id="runTxt">실시간 상권 검색</span>
    </button>
  </div>

  <!-- 결과 목록 -->
  <div class="result-wrap" id="resultWrap">
    <div class="result-empty">
      <div class="e-ico">🗺️</div>
      <div>레이어를 선택하고<br>검색하세요</div>
    </div>
  </div>

</div>

<!-- 범례 -->
<div class="legend-box hidden" id="legendBox">
  <div class="leg-title">범례</div>
  <div id="legendItems"></div>
</div>

<!-- 임대건물 팝업 -->
<div class="popup-overlay hidden" id="popupOverlay" onclick="closeBldPopup()"></div>
<div class="bld-popup hidden" id="bldPopup">
  <div class="bld-popup-head">
    <div>
      <div class="bld-popup-name" id="popupName">-</div>
      <div class="bld-popup-addr" id="popupAddr">-</div>
    </div>
    <button class="btn-close" onclick="closeBldPopup()">✕</button>
  </div>
  <div class="bld-popup-body" id="popupBody"></div>
</div>

<!-- 버전 배지 -->
<div class="ver-badge">v0623.0710</div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const OUR_LAT = 37.5232, OUR_LNG = 127.0212;
const MAP_SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSqODQv0J98AN_VrhIpdXr8pUYfcgEH_2Fvxfgq_g0z3sCR49t0heYBC0k4Za3hxQiAr9bwVNRtWGxe/pub?gid=1985638477&single=true&output=csv';

const CATEGORIES = [
  { id:'SW8', name:'지하철역',  emoji:'🚇', color:'#3b7fff' },
  { id:'HP8', name:'병원',      emoji:'🏥', color:'#f03860' },
  { id:'PM9', name:'약국',      emoji:'💊', color:'#ff6b9d' },
  { id:'BK9', name:'은행',      emoji:'🏦', color:'#f5bc30' },
  { id:'MT1', name:'대형마트',  emoji:'🛒', color:'#22d186' },
  { id:'CS2', name:'편의점',    emoji:'🏪', color:'#00d4ff' },
  { id:'CE7', name:'카페',      emoji:'☕', color:'#9060f0' },
  { id:'PS3', name:'어린이집',  emoji:'🧒', color:'#ffa94d' },
  { id:'PK6', name:'주차장',    emoji:'🅿️', color:'#748ffc' },
  { id:'AG2', name:'부동산',    emoji:'🏠', color:'#63e6be' },
  { id:'OL7', name:'주유소',    emoji:'⛽', color:'#f07830' },
  { id:'AC5', name:'숙박',      emoji:'🏨', color:'#c084fc' },
];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let map, ps, infowindow;
let currentLat = OUR_LAT, currentLng = OUR_LNG;
let currentRadius = 1000;
let activeCats = new Set(CATEGORIES.map(c => c.id));
let layerBld = true, layerPoi = true;

// 마커 그룹
let bldMarkers = [];      // 임대 건물 마커
let poiMarkers = [];      // 실시간 POI 마커
let circleObj = null;
let centerMarker = null;

// 데이터
let buildings = [];       // 시트에서 불러온 건물 목록
let allPoi = [];          // POI 검색 결과

// ══════════════════════════════════════════════
// 카카오맵 초기화
// ══════════════════════════════════════════════
window.initKakaoMap = function() {
  kakao.maps.load(() => {
    const container = document.getElementById('map');
    map = new kakao.maps.Map(container, {
      center: new kakao.maps.LatLng(OUR_LAT, OUR_LNG),
      level: 5
    });
    map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.BOTTOMLEFT);
    ps = new kakao.maps.services.Places();
    infowindow = new kakao.maps.InfoWindow({ zIndex: 1 });

    // 기준점 마커
    placeCenterPin(OUR_LAT, OUR_LNG);
    drawCircle(OUR_LAT, OUR_LNG, currentRadius);

    // UI 초기화
    buildCatGrid();
    document.getElementById('addrInput').value = '압구정로 112';
    document.getElementById('addrInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') geocodeAddress();
    });

    // 임대 건물 데이터 로드
    loadBuildingData();
  });
};

// ══════════════════════════════════════════════
// 기준점 핀
// ══════════════════════════════════════════════
function placeCenterPin(lat, lng) {
  if (centerMarker) centerMarker.setMap(null);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="34" viewBox="0 0 24 34">
    <path d="M12 0C5.373 0 0 5.373 0 12c0 9 12 22 12 22S24 21 24 12C24 5.373 18.627 0 12 0z"
      fill="#3b7fff" stroke="white" stroke-width="2"/>
    <text x="12" y="16" text-anchor="middle" font-size="10" fill="white">⭐</text>
  </svg>`;
  const img = new kakao.maps.MarkerImage(
    'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg))),
    new kakao.maps.Size(24, 34),
    { offset: new kakao.maps.Point(12, 34) }
  );
  centerMarker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(lat, lng), image: img, map, zIndex: 9999 });
  const iw = new kakao.maps.InfoWindow({
    content: `<div style="padding:8px 12px;font-size:12px;font-weight:700;color:#222;white-space:nowrap">⭐ 케이프혼타워</div>`,
    removable: true
  });
  kakao.maps.event.addListener(centerMarker, 'click', () => iw.open(map, centerMarker));
}

// ══════════════════════════════════════════════
// 반경 원
// ══════════════════════════════════════════════
function drawCircle(lat, lng, r) {
  if (circleObj) circleObj.setMap(null);
  circleObj = new kakao.maps.Circle({
    center: new kakao.maps.LatLng(lat, lng), radius: r,
    strokeWeight: 1.5, strokeColor: '#3b7fff', strokeOpacity: 0.5,
    strokeStyle: 'shortdash', fillColor: '#3b7fff', fillOpacity: 0.03
  });
  circleObj.setMap(map);
}

function setRadius(r) {
  currentRadius = r;
  document.querySelectorAll('.r-chip').forEach(el => el.classList.toggle('on', el.dataset.r == r));
  drawCircle(currentLat, currentLng, r);
  // 반경 변경 시 임대 건물 목록도 갱신
  if (buildings.length > 0 && layerBld) renderBldList();
}

// ══════════════════════════════════════════════
// 임대 건물 데이터 로드
// ══════════════════════════════════════════════
async function loadBuildingData() {
  try {
    const res = await fetch(MAP_SHEET_URL);
    const text = await res.text();
    buildings = parseBuildingCSV(text);
    if (layerBld) drawBldMarkers();
    renderBldList();
  } catch(e) {
    console.error('건물 데이터 로드 실패:', e);
  }
}

function parseBuildingCSV(text) {
  text = text.replace(/^\uFEFF/, '');
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',').map(h => h.replace(/^["'\s]+|["'\s]+$/g, '').trim());
  const rows = lines.slice(1).map(line => {
    const vals = []; let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || '').replace(/^"|"$/g, ''); });
    return obj;
  }).filter(r => r['건물명'] && r['건물명'].trim());

  // 건물별로 그룹핑 (층별 데이터 합치기)
  const bmap = {};
  rows.forEach(row => {
    const key = row['건물명'].trim();
    if (!bmap[key]) {
      bmap[key] = {
        name: key,
        address: row['주소'] || '',
        lat: parseFloat(row['위도']) || 0,
        lng: parseFloat(row['경도']) || 0,
        dong: row['동'] || '',
        floors: []
      };
    }
    bmap[key].floors.push({
      floor: row['층'] || '',
      tenant: row['임차인'] || '',
      industry: row['업종'] || '',
      rent: row['임대료(만원)'] || '',
      deposit: row['보증금(만원)'] || '',
      area: row['면적(평)'] || '',
    });
  });
  return Object.values(bmap).filter(b => b.lat && b.lng);
}

// ══════════════════════════════════════════════
// 임대 건물 마커
// ══════════════════════════════════════════════
function drawBldMarkers() {
  clearBldMarkers();
  buildings.forEach(bld => {
    const pos = new kakao.maps.LatLng(bld.lat, bld.lng);
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="26" viewBox="0 0 18 26">
      <path d="M9 0C4.029 0 0 4.029 0 9c0 6.75 9 17 9 17S18 15.75 18 9C18 4.029 13.971 0 9 0z"
        fill="#3b7fff" stroke="white" stroke-width="1.5"/>
      <circle cx="9" cy="9" r="3.5" fill="white" opacity="0.9"/>
    </svg>`;
    const img = new kakao.maps.MarkerImage(
      'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg))),
      new kakao.maps.Size(18, 26),
      { offset: new kakao.maps.Point(9, 26) }
    );
    const m = new kakao.maps.Marker({ position: pos, image: img, map, zIndex: 5, title: bld.name });
    kakao.maps.event.addListener(m, 'click', () => openBldPopup(bld));
    bldMarkers.push(m);
  });
}

function clearBldMarkers() {
  bldMarkers.forEach(m => m.setMap(null));
  bldMarkers = [];
}

// ══════════════════════════════════════════════
// 임대 건물 팝업
// ══════════════════════════════════════════════
function openBldPopup(bld) {
  document.getElementById('popupName').textContent = bld.name;
  document.getElementById('popupAddr').textContent = bld.address;

  const body = document.getElementById('popupBody');
  if (!bld.floors || bld.floors.length === 0) {
    body.innerHTML = '<div style="color:var(--t3);font-size:12px;padding:12px 0">층별 데이터 없음</div>';
  } else {
    body.innerHTML = bld.floors.map(f => `
      <div class="floor-item">
        <div class="floor-num">${f.floor || '-'}F</div>
        <div class="floor-info" style="flex:1">
          <div class="floor-tenant">${f.tenant || '공실'}</div>
          <div class="floor-industry">${f.industry || ''}</div>
        </div>
        ${f.rent ? `<div class="floor-rent">${parseInt(f.rent).toLocaleString()}만</div>` : ''}
      </div>`).join('');
  }

  document.getElementById('popupOverlay').classList.remove('hidden');
  document.getElementById('bldPopup').classList.remove('hidden');
}

function closeBldPopup() {
  document.getElementById('popupOverlay').classList.add('hidden');
  document.getElementById('bldPopup').classList.add('hidden');
}

// ══════════════════════════════════════════════
// 임대 건물 목록 렌더
// ══════════════════════════════════════════════
function renderBldList() {
  // 반경 내 건물만 필터
  const filtered = buildings.filter(b => {
    const d = calcDist(currentLat, currentLng, b.lat, b.lng);
    return d <= currentRadius;
  }).sort((a, b) => calcDist(currentLat, currentLng, a.lat, a.lng) - calcDist(currentLat, currentLng, b.lat, b.lng));

  const wrap = document.getElementById('resultWrap');
  if (!filtered.length) {
    wrap.innerHTML = `<div class="result-empty"><div class="e-ico">🏢</div><div>반경 내 임대 데이터<br>없음</div></div>`;
    return;
  }
  let h = `<div class="result-header">
    <div class="result-count"><span>${filtered.length}</span>개 건물</div>
  </div>`;
  filtered.forEach(bld => {
    const d = calcDist(currentLat, currentLng, bld.lat, bld.lng);
    h += `<div class="bld-item" onclick="openBldPopup(${JSON.stringify(bld).replace(/"/g, '&quot;')})">
      <div class="bld-name">${bld.name}</div>
      <div class="bld-meta">${bld.dong} · ${bld.floors.length}개 층 데이터</div>
      <div class="bld-dist">${formatDist(d)}</div>
    </div>`;
  });
  wrap.innerHTML = h;
}

// ══════════════════════════════════════════════
// 레이어 토글
// ══════════════════════════════════════════════
function toggleLayer(type) {
  if (type === 'bld') {
    layerBld = !layerBld;
    document.getElementById('layerBld').classList.toggle('on', layerBld);
    if (layerBld) { drawBldMarkers(); renderBldList(); }
    else { clearBldMarkers(); }
  } else {
    layerPoi = !layerPoi;
    document.getElementById('layerPoi').classList.toggle('on', layerPoi);
    document.getElementById('catSection').classList.toggle('hidden', !layerPoi);
    document.getElementById('runWrap').classList.toggle('hidden', !layerPoi);
    if (!layerPoi) { clearPoiMarkers(); }
  }
  // 현재 활성 레이어에 맞는 목록 표시
  updateResultView();
}

function updateResultView() {
  if (layerBld && !layerPoi) renderBldList();
  else if (layerPoi && allPoi.length > 0) renderPoiList(allPoi.filter(p => activeCats.has(p._cat.id)));
  else if (layerBld) renderBldList();
}

// ══════════════════════════════════════════════
// 주소 검색
// ══════════════════════════════════════════════
function geocodeAddress() {
  const addr = document.getElementById('addrInput').value.trim();
  if (!addr) return;
  const geocoder = new kakao.maps.services.Geocoder();
  geocoder.addressSearch(addr, (result, status) => {
    if (status === kakao.maps.services.Status.OK) {
      currentLat = parseFloat(result[0].y);
      currentLng = parseFloat(result[0].x);
      applyNewCenter();
    } else {
      const ps2 = new kakao.maps.services.Places();
      ps2.keywordSearch(addr, (result2, status2) => {
        if (status2 === kakao.maps.services.Status.OK) {
          currentLat = parseFloat(result2[0].y);
          currentLng = parseFloat(result2[0].x);
          applyNewCenter();
        } else alert('주소를 찾을 수 없습니다.');
      }, { size: 1 });
    }
  });
}

function applyNewCenter() {
  map.setCenter(new kakao.maps.LatLng(currentLat, currentLng));
  placeCenterPin(currentLat, currentLng);
  drawCircle(currentLat, currentLng, currentRadius);
  if (layerBld) renderBldList();
}

// ══════════════════════════════════════════════
// 카테고리 UI
// ══════════════════════════════════════════════
function buildCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const el = document.createElement('div');
    el.className = 'cat-item' + (activeCats.has(cat.id) ? ' on' : '');
    el.id = 'cat-' + cat.id;
    el.onclick = () => toggleCat(cat.id);
    el.innerHTML = `
      <div class="cat-check"></div>
      <div class="cat-emoji">${cat.emoji}</div>
      <div class="cat-name">${cat.name}</div>
      <span class="cat-cnt" id="cnt-${cat.id}"></span>`;
    grid.appendChild(el);
  });
}

function toggleCat(id) {
  activeCats.has(id) ? activeCats.delete(id) : activeCats.add(id);
  document.getElementById('cat-' + id)?.classList.toggle('on', activeCats.has(id));
  // 결과 있으면 즉시 필터링
  if (allPoi.length > 0) filterPoiBycat();
}

function toggleAllCats() {
  const allOn = activeCats.size === CATEGORIES.length;
  activeCats = allOn ? new Set() : new Set(CATEGORIES.map(c => c.id));
  CATEGORIES.forEach(cat => document.getElementById('cat-' + cat.id)?.classList.toggle('on', activeCats.has(cat.id)));
  if (allPoi.length > 0) filterPoiBycat();
}

function filterPoiBycat() {
  clearPoiMarkers();
  const filtered = allPoi.filter(p => activeCats.has(p._cat.id));
  filtered.forEach(p => addPoiMarker(p, p._cat));
  renderPoiList(filtered);
  renderLegend(filtered);
}

// ══════════════════════════════════════════════
// POI 검색 (실시간 상권)
// ══════════════════════════════════════════════
function runPoiSearch() {
  if (!layerPoi) return;
  if (activeCats.size === 0) { alert('카테고리를 최소 1개 선택해주세요'); return; }

  const btn = document.getElementById('btnRun');
  btn.disabled = true;
  document.getElementById('runTxt').textContent = '검색 중…';
  document.getElementById('runIco').textContent = '⏳';

  clearPoiMarkers();
  allPoi = [];
  CATEGORIES.forEach(c => { const el = document.getElementById('cnt-' + c.id); if (el) el.textContent = ''; });

  const cats = CATEGORIES.filter(c => activeCats.has(c.id));
  let done = 0;

  function searchPage(cat, page) {
    ps.categorySearch(cat.id, (data, status, pagination) => {
      if (status === kakao.maps.services.Status.OK) {
        data.forEach(place => {
          place._cat = cat;
          allPoi.push(place);
          addPoiMarker(place, cat);
        });
        if (pagination.hasNextPage) {
          setTimeout(() => searchPage(cat, page + 1), 100);
        } else {
          const cnt = allPoi.filter(p => p._cat.id === cat.id).length;
          const el = document.getElementById('cnt-' + cat.id);
          if (el && cnt) el.textContent = cnt;
          done++;
          if (done === cats.length) finishPoiSearch();
        }
      } else {
        done++;
        if (done === cats.length) finishPoiSearch();
      }
    }, {
      location: new kakao.maps.LatLng(currentLat, currentLng),
      radius: currentRadius,
      useMapBounds: false,
      size: 15,
      page
    });
  }

  cats.forEach((cat, i) => setTimeout(() => searchPage(cat, 1), i * 200));
}

function finishPoiSearch() {
  allPoi.sort((a, b) => parseInt(a.distance) - parseInt(b.distance));
  renderPoiList(allPoi);
  renderLegend(allPoi);

  map.setCenter(new kakao.maps.LatLng(currentLat, currentLng));
  const level = currentRadius <= 500 ? 4 : currentRadius <= 1000 ? 5 : currentRadius <= 2000 ? 6 : 7;
  map.setLevel(level);

  const btn = document.getElementById('btnRun');
  btn.disabled = false;
  document.getElementById('runTxt').textContent = '다시 검색';
  document.getElementById('runIco').textContent = '🔄';
}

// ══════════════════════════════════════════════
// POI 마커
// ══════════════════════════════════════════════
function addPoiMarker(place, cat) {
  const pos = new kakao.maps.LatLng(place.y, place.x);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="22" viewBox="0 0 16 22">
    <path d="M8 0C3.582 0 0 3.582 0 8c0 6 8 14 8 14S16 14 16 8C16 3.582 12.418 0 8 0z"
      fill="${cat.color}" stroke="white" stroke-width="1.5"/>
    <circle cx="8" cy="8" r="3" fill="white" opacity="0.85"/>
  </svg>`;
  const img = new kakao.maps.MarkerImage(
    'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg))),
    new kakao.maps.Size(16, 22),
    { offset: new kakao.maps.Point(8, 22) }
  );
  const m = new kakao.maps.Marker({ position: pos, image: img, map, zIndex: 3, title: place.place_name });
  kakao.maps.event.addListener(m, 'click', () => {
    infowindow.setContent(`
      <div style="padding:10px 14px;font-family:'Noto Sans KR',sans-serif;min-width:160px;max-width:220px">
        <div style="font-size:9px;color:${cat.color};font-weight:700;letter-spacing:1px;margin-bottom:3px">${cat.emoji} ${cat.name}</div>
        <div style="font-size:13px;font-weight:700;color:#222;margin-bottom:4px">${place.place_name}</div>
        <div style="font-size:11px;color:#666;margin-bottom:4px">${place.road_address_name || place.address_name || ''}</div>
        ${place.distance ? `<div style="font-size:11px;color:${cat.color};font-weight:600">📏 ${formatDist(parseInt(place.distance))}</div>` : ''}
      </div>`);
    infowindow.open(map, m);
  });
  poiMarkers.push(m);
}

function clearPoiMarkers() {
  poiMarkers.forEach(m => m.setMap(null));
  poiMarkers = [];
  infowindow?.close();
  document.getElementById('legendBox').classList.add('hidden');
}

// ══════════════════════════════════════════════
// POI 목록 렌더
// ══════════════════════════════════════════════
function renderPoiList(items) {
  const wrap = document.getElementById('resultWrap');
  if (!items.length) {
    wrap.innerHTML = `<div class="result-empty"><div class="e-ico">🔍</div><div>검색 결과 없음</div></div>`;
    return;
  }
  let h = `<div class="result-header">
    <div class="result-count"><span>${items.length}</span>개 시설</div>
    <button class="btn-csv" onclick="exportCsv()">📥 CSV</button>
  </div>`;
  items.forEach(it => {
    const dist = it.distance ? formatDist(parseInt(it.distance)) : '';
    h += `<div class="poi-item" onclick="flyTo(${parseFloat(it.y)},${parseFloat(it.x)})">
      <div class="poi-dot" style="background:${it._cat.color}"></div>
      <div class="poi-info">
        <div class="poi-name">${it.place_name}</div>
        <div class="poi-cat">${it._cat.emoji} ${it._cat.name}</div>
      </div>
      <div class="poi-dist">${dist}</div>
    </div>`;
  });
  wrap.innerHTML = h;
}

// ══════════════════════════════════════════════
// 범례
// ══════════════════════════════════════════════
function renderLegend(items) {
  const box = document.getElementById('legendBox');
  if (!items.length) { box.classList.add('hidden'); return; }
  const bycat = {};
  items.forEach(it => { bycat[it._cat.id] = (bycat[it._cat.id] || 0) + 1; });
  document.getElementById('legendItems').innerHTML = CATEGORIES.filter(c => bycat[c.id]).map(cat =>
    `<div class="leg-item">
      <div class="leg-dot" style="background:${cat.color}"></div>
      <div class="leg-name">${cat.emoji} ${cat.name}</div>
      <div class="leg-cnt">${bycat[cat.id]}</div>
    </div>`).join('');
  box.classList.remove('hidden');
}

// ══════════════════════════════════════════════
// CSV 내보내기
// ══════════════════════════════════════════════
function exportCsv() {
  const items = allPoi.filter(p => activeCats.has(p._cat.id));
  if (!items.length) return;
  const rows = [['카테고리','시설명','도로명주소','거리(m)','위도','경도']];
  items.forEach(it => rows.push([it._cat.name, it.place_name,
    it.road_address_name || '', it.distance || '', it.y, it.x]));
  const csv = rows.map(r => r.map(c => '"'+(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'}));
  a.download = `통합상권_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ══════════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════════
function flyTo(lat, lng) {
  map.setCenter(new kakao.maps.LatLng(lat, lng));
  map.setLevel(3);
}

function formatDist(m) { return m >= 1000 ? (m/1000).toFixed(1)+'km' : m+'m'; }

function calcDist(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
